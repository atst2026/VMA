name: Pitch Pack (manual only)

on:
  workflow_dispatch:
    inputs:
      account_name:
        description: "Target account (company name, e.g. 'Unilever')"
        required: true
      role:
        description: "Role being pitched (e.g. 'Head of Internal Communications')"
        default: "Head of Internal Communications"
        required: true
      mode:
        description: "send (live → Sara) | test (→ amirt12) | preview (Actions log only)"
        default: "test"
        required: true
        type: choice
        options:
          - test
          - send
          - preview

permissions:
  contents: read

jobs:
  pitch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Generate pitch pack
        env:
          COMPANIES_HOUSE_KEY: ${{ secrets.COMPANIES_HOUSE_KEY }}
          BRIGHT_DATA_KEY: ${{ secrets.BRIGHT_DATA_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
          PITCH_ROLE: ${{ github.event.inputs.role }}
        run: |
          set -x
          python -m tool.pitch_pack "${{ github.event.inputs.account_name }}" "${{ github.event.inputs.mode }}"

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pitch-pack
          path: tool/state/pitch_pack_*.{html,txt}
          if-no-files-found: warn
