name: Pitch Pack (manual only)

on:
  workflow_dispatch:
    inputs:
      account_name:
        description: "Target account (company name, e.g. 'Unilever')"
        required: true
      role:
        description: "Role being pitched (e.g. 'Head of Internal Communications')"
        default: "Head of Internal Communications"
        required: true
      mode:
        description: "send (live → Sara) | test (→ amirt12) | preview (Actions log only)"
        default: "test"
        required: true
        type: choice
        options:
          - test
          - send
          - preview
      salary_min:
        description: "Optional salary floor override (e.g. 95000). Leave blank to use auto-detected band."
        required: false
        default: ""
      salary_max:
        description: "Optional salary ceiling override (e.g. 140000). Leave blank to use auto-detected band."
        required: false
        default: ""
      profile:
        description: "Desk profile (comms | marketing). Set by the dashboard from the active desk."
        required: false
        default: "comms"
      trigger:
        description: "Optional event anchor (e.g. 'a recent CEO change at Diageo'). Set when fired from a BD lead."
        required: false
        default: ""
      persona:
        description: "Optional reader persona (ceo | cfo | incoming | hr)."
        required: false
        default: ""
      token:
        description: "Internal: unique id from the dashboard so each dispatch maps to its own artifact (prevents a second pitch resolving to the previous one)."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  pitch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # WeasyPrint (comms pitch-pack PDF) needs the Pango/Cairo native stack.
      - name: Install PDF system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libcairo2 libgdk-pixbuf-2.0-0 libffi-dev libharfbuzz0b \
            libfontconfig1 fonts-dejavu-core

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil pypdf pdfplumber weasyprint pillow

      - name: Generate pitch pack
        env:
          COMPANIES_HOUSE_KEY: ${{ secrets.COMPANIES_HOUSE_KEY }}
          BRIGHT_DATA_KEY: ${{ secrets.BRIGHT_DATA_KEY }}
          BRIGHT_DATA_ZONE: ${{ secrets.BRIGHT_DATA_ZONE }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          # logo.dev publishable token (pk_...) for the cover logo. Add it under
          # Settings → Secrets and variables → Actions → New repository secret,
          # name LOGODEV_TOKEN. If unset, the cover falls back to the company
          # name as a wordmark — no failure.
          LOGODEV_TOKEN: ${{ secrets.LOGODEV_TOKEN }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
          VMA_PROFILE: ${{ github.event.inputs.profile }}
          PITCH_ROLE: ${{ github.event.inputs.role }}
          PITCH_SALARY_MIN: ${{ github.event.inputs.salary_min }}
          PITCH_SALARY_MAX: ${{ github.event.inputs.salary_max }}
          PITCH_TRIGGER: ${{ github.event.inputs.trigger }}
          PITCH_PERSONA: ${{ github.event.inputs.persona }}
        run: |
          set -x
          python -m tool.pitch_pack "${{ github.event.inputs.account_name }}" "${{ github.event.inputs.mode }}"

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Per-dispatch name so the dashboard poll resolves to THIS run's
          # artifact, never a previous pitch pack's. Falls back to the plain
          # name for a manual run with no token.
          name: ${{ github.event.inputs.token != '' && format('pitch-pack-{0}', github.event.inputs.token) || 'pitch-pack' }}
          # Two patterns rather than {html,txt} brace expansion - actions/
          # upload-artifact@v4's minimatch does not expand braces, so the
          # brace form was matching zero files and uploading nothing.
          #
          # The ** forms cover the per-DESK state dirs: the comms/default desk
          # writes to tool/state/ but every other profile (marketing) writes to
          # tool/state/<profile>/ (see tool/state_paths.py). Without the **
          # patterns a marketing-desk pitch ran green but uploaded ZERO files,
          # so the dashboard poll never found the artifact and the button was
          # stuck on "Generating…". ** matches zero or more dirs, so these also
          # cover the root-level comms files.
          path: |
            tool/state/pitch_pack_*.pdf
            tool/state/pitch_pack_*.html
            tool/state/pitch_pack_*.txt
            tool/state/**/pitch_pack_*.pdf
            tool/state/**/pitch_pack_*.html
            tool/state/**/pitch_pack_*.txt
          if-no-files-found: warn
