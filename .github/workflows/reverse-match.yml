name: Reverse-match (manual only)

on:
  workflow_dispatch:
    inputs:
      candidate_name:
        description: "Candidate name (e.g. 'Rebecca Torres')"
        required: true
      current_company:
        description: "Their current employer (e.g. 'Vodafone')"
        required: true
      current_title:
        description: "Their current title (e.g. 'Head of Internal Communications')"
        required: true
      mode:
        description: "send (→ Sara) | test (→ amirt12) | preview (Actions log only)"
        default: "test"
        required: true
        type: choice
        options:
          - test
          - send
          - preview

permissions:
  contents: read
  actions: read   # needed to download morning-brief artifact for cross-reference

jobs:
  match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      # Pull the most recent morning-brief artifact so reverse-match can
      # cross-reference its 15 target companies against the predictor
      # pipeline + live-leads. Without this, every target falls back to
      # COLD (the workflow runner starts fresh with empty tool/state/).
      - name: Hydrate state from latest morning-brief
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p tool/state
          # Find the latest successful morning-brief artifact
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=30" \
            --jq '[.artifacts[] | select(.name == "morning-brief" and .expired == false)] | sort_by(.created_at) | reverse | .[0].id' || echo "")
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "No morning-brief artifact found — every target will fall back to COLD."
            exit 0
          fi
          echo "Found morning-brief artifact id=$ARTIFACT_ID — downloading state files"
          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > artifact.zip
          unzip -o -j artifact.zip 'latest_signals.json' 'latest_predictive.json' \
                                    'predictor_pipeline.json' 'predictive_jobs.json' \
                                    -d tool/state/ 2>/dev/null || true
          # The artifact may store files with the tool/state/ prefix; strip + flatten
          unzip -o -j artifact.zip 'tool/state/latest_signals.json' \
                                    'tool/state/latest_predictive.json' \
                                    'tool/state/predictor_pipeline.json' \
                                    'tool/state/predictive_jobs.json' \
                                    -d tool/state/ 2>/dev/null || true
          ls -la tool/state/ | head -20

      - name: Generate reverse-match
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
        run: |
          set -x
          python -m tool.reverse_match \
            "${{ github.event.inputs.candidate_name }}" \
            "${{ github.event.inputs.current_company }}" \
            "${{ github.event.inputs.current_title }}" \
            "${{ github.event.inputs.mode }}"

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reverse-match
          # Two patterns rather than {html,txt} brace expansion - actions/
          # upload-artifact@v4's minimatch does not expand braces, so the
          # brace form was matching zero files and uploading nothing.
          path: |
            tool/state/reverse_match_*.html
            tool/state/reverse_match_*.txt
          if-no-files-found: warn
