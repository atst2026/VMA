name: Sara's Morning Brief (Mon–Fri)

on:
  schedule:
    # GitHub Actions cron is best-effort on the free tier and frequently
    # fires hours late. We schedule both BST (07:55 UTC -> 08:55 London)
    # and GMT (08:55 UTC -> 08:55 London) so whichever one fires first
    # delivers the brief. The dedup state in tool/state/seen.json means
    # the second run of the day produces no new signals -> empty brief
    # -> morning_brief.py sees nothing new and skips the send.
    - cron: "55 7 * * 1-5"   # BST: 08:55 London
    - cron: "55 8 * * 1-5"   # GMT: 08:55 London
  workflow_dispatch:
    inputs:
      mode:
        description: "send (live → Sara) | test (real scouring → amirt12) | sample (synthetic data → amirt12)"
        default: "test"
        required: true
        type: choice
        options:
          - test
          - sample
          - send
          - preview

permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Log local time (informational only)
        run: |
          # Previously this step gated the rest of the job to 08:30-10:30
          # London. We dropped the gate because GitHub free-tier cron is
          # so unreliable that the gate skipped almost every run. Now we
          # send whenever the cron fires, and morning_brief.py drops the
          # email entirely if dedup leaves zero new signals (so the
          # second cron of the day doesn't spam Sara).
          LOCAL_HOUR=$(TZ="Europe/London" date +%H)
          LOCAL_MIN=$(TZ="Europe/London" date +%M)
          echo "Europe/London time is ${LOCAL_HOUR}:${LOCAL_MIN}"
          echo "Event: ${{ github.event_name }}"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Run the brief
        env:
          COMPANIES_HOUSE_KEY: ${{ secrets.COMPANIES_HOUSE_KEY }}
          BRIGHT_DATA_KEY: ${{ secrets.BRIGHT_DATA_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
        run: |
          set -x
          # Scheduled runs deliver live to stehrani@vmagroup.com.
          # Manual dispatches can still pick `test` / `sample` / `preview`
          # from the workflow_dispatch input to avoid Sara's inbox.
          MODE="${{ github.event.inputs.mode || 'send' }}"
          echo "Running brief in mode: $MODE"
          if [ "$MODE" = "sample" ]; then
              python -m tool.sample_brief test
          else
              python -m tool.morning_brief "$MODE"
          fi

      - name: Upload brief artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-brief
          path: |
            tool/state/latest_brief.html
            tool/state/latest_brief.txt
            tool/state/latest_signals.json
          if-no-files-found: warn
