name: Sara's Morning Brief (08:55 London, Mon–Fri)

on:
  schedule:
    # GitHub Actions crons are UTC. 08:55 Europe/London ==
    #   - BST (Mar–Oct): 07:55 UTC
    #   - GMT (Oct–Mar): 08:55 UTC
    # We schedule both and the job skips itself if it's not the right local hour.
    - cron: "55 7 * * 1-5"   # BST
    - cron: "55 8 * * 1-5"   # GMT
  workflow_dispatch:
    inputs:
      mode:
        description: "send (live → Sara) | test (real scouring → amirt12) | sample (synthetic data → amirt12)"
        default: "test"
        required: true
        type: choice
        options:
          - test
          - sample
          - send
          - preview

permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Skip if not the right local hour
        run: |
          # If both crons fire, only let the one that matches current UK time run
          LOCAL_HOUR=$(TZ="Europe/London" date +%H)
          LOCAL_MIN=$(TZ="Europe/London" date +%M)
          echo "Europe/London time is ${LOCAL_HOUR}:${LOCAL_MIN}"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${LOCAL_HOUR}" != "08" ]; then
              echo "Not 08:xx London time. Exiting without running."
              exit 0
          fi

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Run the brief
        env:
          COMPANIES_HOUSE_KEY: ${{ secrets.COMPANIES_HOUSE_KEY }}
          BRIGHT_DATA_KEY: ${{ secrets.BRIGHT_DATA_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
        run: |
          set -x
          MODE="${{ github.event.inputs.mode || 'send' }}"
          echo "Running brief in mode: $MODE"
          if [ "$MODE" = "sample" ]; then
              python -m tool.sample_brief test
          else
              python -m tool.morning_brief "$MODE"
          fi

      - name: Upload brief artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-brief
          path: |
            tool/state/latest_brief.html
            tool/state/latest_brief.txt
            tool/state/latest_signals.json
          if-no-files-found: warn
