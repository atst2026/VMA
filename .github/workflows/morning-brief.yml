name: Sara's Morning Brief (08:55 London, Mon–Fri)

on:
  schedule:
    # GitHub Actions crons are UTC. 08:55 Europe/London ==
    #   - BST (Mar–Oct): 07:55 UTC
    #   - GMT (Oct–Mar): 08:55 UTC
    # We schedule both and the job skips itself if it's not the right local hour.
    - cron: "55 7 * * 1-5"   # BST
    - cron: "55 8 * * 1-5"   # GMT
  workflow_dispatch:
    inputs:
      mode:
        description: "send (live → Sara) | test (real scouring → amirt12) | sample (synthetic data → amirt12)"
        default: "test"
        required: true
        type: choice
        options:
          - test
          - sample
          - send
          - preview

permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide whether to send
        id: gate
        run: |
          # GitHub Actions cron is best-effort and can fire hours late.
          # Plus we schedule both BST (07:55 UTC) and GMT (08:55 UTC) crons.
          # Only proceed if it's currently 08:30-10:30 London time on a
          # weekday. Anything outside that window is either: the wrong
          # cron firing in DST, a delayed cron run too late to be a
          # "morning brief", or a non-UK-business-hours dispatch.
          # workflow_dispatch always proceeds (manual override).
          LOCAL_HOUR=$(TZ="Europe/London" date +%H)
          LOCAL_MIN=$(TZ="Europe/London" date +%M)
          LOCAL_HHMM="${LOCAL_HOUR}${LOCAL_MIN}"
          echo "Europe/London time is ${LOCAL_HOUR}:${LOCAL_MIN}"
          echo "Event: ${{ github.event_name }}"

          if [ "${{ github.event_name }}" != "schedule" ]; then
              echo "Manual dispatch — proceeding regardless of clock."
              echo "proceed=true" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          # Schedule path: only fire 08:30-10:30 London
          if [ "$LOCAL_HHMM" -ge "0830" ] && [ "$LOCAL_HHMM" -le "1030" ]; then
              echo "Within morning window — proceeding."
              echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
              echo "Outside 08:30-10:30 London window — skipping send."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Python deps
        if: steps.gate.outputs.proceed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Run the brief
        if: steps.gate.outputs.proceed == 'true'
        env:
          COMPANIES_HOUSE_KEY: ${{ secrets.COMPANIES_HOUSE_KEY }}
          BRIGHT_DATA_KEY: ${{ secrets.BRIGHT_DATA_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
        run: |
          set -x
          # Scheduled runs deliver live to stehrani@vmagroup.com.
          # Manual dispatches can still pick `test` / `sample` / `preview`
          # from the workflow_dispatch input to avoid Sara's inbox.
          MODE="${{ github.event.inputs.mode || 'send' }}"
          echo "Running brief in mode: $MODE"
          if [ "$MODE" = "sample" ]; then
              python -m tool.sample_brief test
          else
              python -m tool.morning_brief "$MODE"
          fi

      - name: Upload brief artefacts
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: morning-brief
          path: |
            tool/state/latest_brief.html
            tool/state/latest_brief.txt
            tool/state/latest_signals.json
          if-no-files-found: warn
