name: Sara's Morning Brief (Mon–Fri)

on:
  schedule:
    # Single weekday cron at 05:30 UTC.
    # In BST (Mar-Oct) that's 06:30 London. In GMT (Oct-Mar) that's 05:30
    # London — an hour earlier than target in winter, but that just buys
    # more margin. Goal: workflow definitely completed by 09:00 London
    # so Sara's dashboard refresh button shows today's data when she
    # arrives at her desk.
    #
    # GitHub free-tier cron is "best effort" and can lag 30-60 minutes
    # under peak load. 06:30 London BST + worst-case 60 min drift +
    # ~15 min runtime = done by 07:45 London. Generous margin to 09:00.
    #
    # 05:30 UTC is also off-peak (overnight in most of the world) and
    # off-the-hour, which GitHub's own scheduling docs recommend to
    # minimise queue lag vs HH:00 / HH:30 top-of-hour rushes.
    - cron: "30 5 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "send (live → Sara) | test (real scouring → amirt12) | sample (synthetic data → amirt12)"
        default: "test"
        required: true
        type: choice
        options:
          - test
          - sample
          - send
          - preview

permissions:
  contents: write   # needed to auto-commit hiring_contacts.json updates
                    # (CH-driven name refreshes - see tool/contacts/auto_update.py)

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Persist tool/state/ across runs so dedup (seen.json) and the
      # 30-day predictive_jobs log work across days. Without this each
      # run starts with empty state and Sara sees the same listings
      # repeated every morning.
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: tool/state
          key: vma-state-${{ github.run_id }}
          restore-keys: |
            vma-state-

      # CRITICAL: the cache restore above can overwrite the git-tracked
      # hiring_contacts.json with a stale cached copy from an earlier
      # run (this is exactly what wiped the 30-company seeded version
      # back to {} in May 2026 - the cache had {} from the first seed
      # run, and the auto-commit step then pushed that empty file back
      # to main).
      #
      # Restore the git version after the cache restore so the seeded
      # contacts are always authoritative. Future-proofs against any
      # cache shape we add later.
      - name: Restore git-tracked hiring_contacts.json (cache-overwrite guard)
        run: |
          git checkout HEAD -- tool/state/hiring_contacts.json 2>/dev/null || true
          echo "hiring_contacts.json size after restore: $(wc -c < tool/state/hiring_contacts.json) bytes"

      - name: Log local time (informational only)
        run: |
          # Previously this step gated the rest of the job to 08:30-10:30
          # London. We dropped the gate because GitHub free-tier cron is
          # so unreliable that the gate skipped almost every run. Now we
          # send whenever the cron fires, and morning_brief.py drops the
          # email entirely if dedup leaves zero new signals (so the
          # second cron of the day doesn't spam Sara).
          LOCAL_HOUR=$(TZ="Europe/London" date +%H)
          LOCAL_MIN=$(TZ="Europe/London" date +%M)
          echo "Europe/London time is ${LOCAL_HOUR}:${LOCAL_MIN}"
          echo "Event: ${{ github.event_name }}"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Run the brief
        env:
          COMPANIES_HOUSE_KEY: ${{ secrets.COMPANIES_HOUSE_KEY }}
          BRIGHT_DATA_KEY: ${{ secrets.BRIGHT_DATA_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
          # 90-day window so the predictor pipeline bootstraps fully
          # on first deploy AND stays populated across the rolling
          # 90-day forward-prediction horizon. Live-leads dedup still
          # strips items Sara has already seen, so today's leads stay
          # fresh-only. Runtime ~10 min; runs once daily overnight.
          VMA_SWEEP_DAYS: "90"
        run: |
          set -x
          # Scheduled runs deliver live to stehrani@vmagroup.com.
          # Manual dispatches can still pick `test` / `sample` / `preview`
          # from the workflow_dispatch input to avoid Sara's inbox.
          MODE="${{ github.event.inputs.mode || 'send' }}"
          echo "Running brief in mode: $MODE"
          if [ "$MODE" = "sample" ]; then
              python -m tool.sample_brief test
          else
              python -m tool.morning_brief "$MODE"
          fi

      - name: Upload brief artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-brief
          path: |
            tool/state/latest_brief.html
            tool/state/latest_brief.txt
            tool/state/latest_signals.json
            tool/state/latest_predictive.json
            tool/state/predictor_pipeline.json
            tool/state/predictive_jobs.json
          if-no-files-found: warn

      # Auto-commit any hiring_contacts.json updates produced by the
      # contacts auto-update (CH-driven name refreshes). Only commits
      # if the file actually changed. Skip on PRs / forks where push
      # would fail. The brief itself does not depend on this step.
      - name: Auto-commit hiring_contacts updates
        if: success() && github.ref == 'refs/heads/main'
        run: |
          set -e
          if git diff --quiet tool/state/hiring_contacts.json 2>/dev/null; then
            echo "hiring_contacts.json unchanged - nothing to commit."
            exit 0
          fi
          # Safety guard: refuse to commit an empty / near-empty file.
          # The seeded contacts table is ~56KB. An honest auto-update
          # adds/removes a few entries - the file should never shrink
          # below 10KB. If it does, something has gone wrong (cache
          # corruption, load failure, etc.) and we must NOT push that
          # state to main.
          SIZE=$(wc -c < tool/state/hiring_contacts.json)
          if [ "$SIZE" -lt 10000 ]; then
            echo "REFUSING to commit: hiring_contacts.json shrunk to $SIZE bytes (threshold 10000)."
            echo "This is the regression that wiped the seeded contacts in May 2026."
            echo "Investigate the auto-update logic; do not push."
            exit 1
          fi
          git config user.email "actions@github.com"
          git config user.name "morning-brief-bot"
          git add tool/state/hiring_contacts.json
          # Summarise what changed for the commit body
          SUMMARY=$(python -c "
          import json, subprocess
          diff_out = subprocess.check_output(['git', 'diff', '--cached', '--stat',
                                              'tool/state/hiring_contacts.json']).decode()
          print(diff_out.strip() or '(no diff)')
          " 2>/dev/null || echo "(diff summary unavailable)")
          git commit -m "auto: refresh hiring_contacts via Companies House

          ${SUMMARY}

          Generated by morning-brief auto-update. Safety: only Companies House
          structured data drives this commit. Departure events expire matching
          entries (verified_at -> 365d ago, forcing freshness check to fail);
          appointment events populate empty/stale slots only. Fresh entries
          are never overwritten."
          git push origin HEAD:main
