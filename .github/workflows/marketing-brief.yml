name: VMA Marketing Brief (Mon–Fri)

# Marketing desk's nightly scour — the same engine as Sara's comms brief,
# run with VMA_PROFILE=marketing so it uses the marketing taxonomy and
# writes to its OWN state namespace (tool/state/marketing/, mirrored to the
# dashboard-state branch). Kept as a SEPARATE workflow so it can never
# affect the live comms job. Email delivery is off globally
# (MORNING_BRIEF_EMAIL_ENABLED) — this only refreshes the marketing
# dashboard. Offset 15 min after the comms cron to spread source load.

on:
  schedule:
    - cron: "45 5 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "send (refresh marketing dashboard) | preview (no persist)"
        default: "send"
        required: true
        type: choice
        options:
          - send
          - preview

permissions:
  contents: write   # persist the marketing state NAMESPACE to the dashboard-state
                    # branch, exactly like the comms brief — so the dashboard can
                    # hydrate marketing leads/predictors on every cold start instead
                    # of relying on a live artifact pull. SAFE for comms: every write
                    # is namespaced by github_state._ns() to tool/state/marketing/**,
                    # and this workflow has NO git-commit-to-main step, so it can never
                    # touch comms' files or the shared hiring_contacts on main.

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Persist the marketing state namespace across runs (dedup + the
      # 30-day predictive log). Separate cache key from the comms job.
      - name: Restore marketing state cache
        uses: actions/cache@v4
        with:
          path: tool/state/marketing
          key: vma-marketing-state-${{ github.run_id }}
          restore-keys: |
            vma-marketing-state-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # anthropic powers the model passes (semantic scan + outreach
          # contact research/drafts) — same fix as the comms brief.
          pip install requests beautifulsoup4 lxml python-dateutil anthropic

      - name: Run the marketing brief
        env:
          VMA_PROFILE: marketing
          # Same scour budget as comms; the marketing job reads the SHARED
          # account universe (hiring_contacts / watchlist) but writes leads,
          # predictors and triage to tool/state/marketing/.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPANIES_HOUSE_KEY: ${{ secrets.COMPANIES_HOUSE_KEY }}
          # Semantic signal reader (tool/semantic_scan.py) — without it
          # the model pass silently no-ops and only regex triggers fire.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # SEND OUTREACH email layer — see morning-brief.yml.
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          # Spend governors - see morning-brief.yml.
          HUNTER_MONTHLY_SEARCH_BUDGET: ${{ secrets.HUNTER_MONTHLY_SEARCH_BUDGET }}
          HUNTER_MONTHLY_VERIFY_BUDGET: ${{ secrets.HUNTER_MONTHLY_VERIFY_BUDGET }}
          OUTREACH_RESEARCH_MAX_JOBS: ${{ secrets.OUTREACH_RESEARCH_MAX_JOBS }}
          BD_POC_RESEARCH_MAX: ${{ secrets.BD_POC_RESEARCH_MAX }}
          ADVISORY_RESEARCH_MAX: ${{ secrets.ADVISORY_RESEARCH_MAX }}
          BRIGHT_DATA_KEY: ${{ secrets.BRIGHT_DATA_KEY }}
          BRIGHT_DATA_ZONE: ${{ secrets.BRIGHT_DATA_ZONE }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          CRUNCHBASE_API_KEY: ${{ secrets.CRUNCHBASE_API_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
          VMA_SWEEP_DAYS: "90"
        run: |
          set -x
          MODE="${{ github.event.inputs.mode || 'send' }}"
          echo "Running MARKETING brief in mode: $MODE"
          python -m tool.morning_brief "$MODE"

      - name: Upload marketing brief artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketing-brief
          path: |
            tool/state/marketing/latest_brief.html
            tool/state/marketing/latest_brief.txt
            tool/state/marketing/latest_signals.json
            tool/state/marketing/latest_predictive.json
            tool/state/marketing/latest_pulses.json
            tool/state/marketing/latest_funding.json
            tool/state/marketing/predictor_pipeline.json
          if-no-files-found: warn
