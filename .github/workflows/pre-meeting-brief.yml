name: Pre-meeting brief (manual only)

# Triggered from the dashboard (Pre-meeting brief panel) or directly via
# the Actions UI. Generates an on-demand prep pack for ONE meeting given
# an account name + optional contact + optional meeting context, and
# emails it to Sara (BCC Amir) or amirt12 in test mode.
#
# No cron - this is on-demand only. The morning brief continues to run
# nightly and provides the underlying signals + predictors that this
# tool reads from.

on:
  workflow_dispatch:
    inputs:
      account_name:
        description: "Account / company name (e.g. 'Severn Trent')"
        required: true
      contact_name:
        description: "Optional - specific contact (e.g. 'Carla Sherry')"
        required: false
        default: ""
      meeting_context:
        description: "Optional - meeting date/time/format (e.g. '10am Mon, Zoom')"
        required: false
        default: ""
      mode:
        description: "send (live -> Sara) | test (-> amirt12) | preview (Actions log only)"
        default: "test"
        required: true
        type: choice
        options:
          - test
          - send
          - preview

permissions:
  contents: read
  actions: read

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil pypdf pdfplumber

      # Pull the most recent morning-brief artefact so the prep pack can
      # reference signals + predictors from this morning's scour. Without
      # this, those sections render as "(no recent matches)" - still
      # useful but less rich.
      - name: Hydrate state from latest morning-brief
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p tool/state
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=30" \
            --jq '[.artifacts[] | select(.name == "morning-brief" and .expired == false)] | sort_by(.created_at) | reverse | .[0].id' || echo "")
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "No morning-brief artifact yet - prep pack will render without signals/predictors context."
            exit 0
          fi
          echo "Found morning-brief artifact id=$ARTIFACT_ID"
          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > artifact.zip
          unzip -o -j artifact.zip 'latest_signals.json' 'latest_predictive.json' \
                                    -d tool/state/ 2>/dev/null || true
          unzip -o -j artifact.zip 'tool/state/latest_signals.json' \
                                    'tool/state/latest_predictive.json' \
                                    -d tool/state/ 2>/dev/null || true
          ls -la tool/state/ | head -10

      - name: Generate pre-meeting brief
        env:
          COMPANIES_HOUSE_KEY: ${{ secrets.COMPANIES_HOUSE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
        run: |
          set -x
          python -m tool.pre_meeting \
            "${{ github.event.inputs.account_name }}" \
            "${{ github.event.inputs.mode }}" \
            "${{ github.event.inputs.contact_name }}" \
            "${{ github.event.inputs.meeting_context }}"

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-meeting-brief
          # Multi-line path (brace expansion not supported by minimatch)
          path: |
            tool/state/pre_meeting_*.html
            tool/state/pre_meeting_*.txt
          if-no-files-found: warn
          retention-days: 14
