name: Pre-meeting brief (Mon-Fri)

# Generates a prep-pack email for today's meetings that have external
# attendees at a Tier-A watchlist company. Sends to Sara (BCC Amir) by
# ~7am London so she has it before her first meeting of the day.
#
# Requires the CALENDAR_ICAL_URL secret: Sara generates a private
# iCal URL from her calendar (Google Calendar -> Settings -> Integrate
# Calendar -> Secret address in iCal format, OR Microsoft 365 ->
# Calendar -> Publish a calendar -> ICS URL) and pastes the URL into
# the repo secret. Same security model as a Doodle link - whoever holds
# the URL can read the calendar; rotate by regenerating in calendar
# settings.

on:
  schedule:
    # 04:30 UTC = 05:30 London BST / 04:30 London GMT.
    # Morning brief runs at 05:30 UTC, so this fires an hour before to
    # use yesterday's signals (still fresh enough for prep) without
    # competing for the same compute slot.
    # 60-min worst-case cron drift -> done by 06:00-06:30 London latest.
    # Delivers email by ~07:00 London comfortably.
    - cron: "30 4 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "send (live -> Sara) | test (-> amirt12) | preview (Actions log only)"
        default: "test"
        required: true
        type: choice
        options:
          - test
          - send
          - preview

permissions:
  contents: read
  actions: read

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil pypdf pdfplumber

      # Pull yesterday's morning-brief artifact so the prep email can
      # reference recent signals and predictors. Without this, the
      # signals/predictors sections render empty (still useful, but less
      # rich).
      - name: Hydrate state from latest morning-brief
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p tool/state
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=30" \
            --jq '[.artifacts[] | select(.name == "morning-brief" and .expired == false)] | sort_by(.created_at) | reverse | .[0].id' || echo "")
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "No morning-brief artifact yet - prep brief will render without signals/predictors context."
            exit 0
          fi
          echo "Found morning-brief artifact id=$ARTIFACT_ID"
          gh api "repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" > artifact.zip
          unzip -o -j artifact.zip 'latest_signals.json' 'latest_predictive.json' \
                                    -d tool/state/ 2>/dev/null || true
          unzip -o -j artifact.zip 'tool/state/latest_signals.json' \
                                    'tool/state/latest_predictive.json' \
                                    -d tool/state/ 2>/dev/null || true
          ls -la tool/state/ | head -10

      - name: Generate pre-meeting brief
        env:
          CALENDAR_ICAL_URL: ${{ secrets.CALENDAR_ICAL_URL }}
          COMPANIES_HOUSE_KEY: ${{ secrets.COMPANIES_HOUSE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
        run: |
          set -x
          MODE="${{ github.event.inputs.mode || 'send' }}"
          echo "Running pre-meeting brief in mode: $MODE"
          python -m tool.pre_meeting "$MODE"

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-meeting-brief
          # Multi-line path - actions/upload-artifact@v4's minimatch does
          # not expand brace syntax (same issue as pitch-pack / reverse-match)
          path: |
            tool/state/pre_meeting_*.html
            tool/state/pre_meeting_*.txt
          if-no-files-found: warn
          retention-days: 14
