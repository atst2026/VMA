name: Sara's 14-Day Catch-up Sweep (manual only)

on:
  workflow_dispatch:
    inputs:
      window_days:
        description: "Look-back window in days (default 14, max 60)"
        default: "14"
        required: true
      mode:
        description: "send (live → Sara) | test (real scouring → amirt12) | preview"
        default: "test"
        required: true
        type: choice
        options:
          - test
          - send
          - preview
      token:
        description: "Internal: unique id from the dashboard so each dispatch maps to its own artifact."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Run sweep
        env:
          COMPANIES_HOUSE_KEY: ${{ secrets.COMPANIES_HOUSE_KEY }}
          BRIGHT_DATA_KEY: ${{ secrets.BRIGHT_DATA_KEY }}
          BRIGHT_DATA_ZONE: ${{ secrets.BRIGHT_DATA_ZONE }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM_NAME: ${{ secrets.GMAIL_FROM_NAME }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          CRUNCHBASE_API_KEY: ${{ secrets.CRUNCHBASE_API_KEY }}
          PYTHONUNBUFFERED: "1"
          PYTHONPATH: "."
          VMA_SWEEP_DAYS: ${{ github.event.inputs.window_days }}
        run: |
          set -x
          MODE="${{ github.event.inputs.mode }}"
          echo "Sweep window: ${VMA_SWEEP_DAYS} days · mode: ${MODE}"
          python -m tool.sweep "$MODE"

      - name: Upload sweep artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Per-dispatch name so the loading tab resolves to THIS run's
          # artifact, never a previous sweep's (falls back to the plain name).
          name: ${{ github.event.inputs.token != '' && format('fortnightly-sweep-{0}', github.event.inputs.token) || 'fortnightly-sweep' }}
          path: |
            tool/state/latest_sweep.html
            tool/state/latest_sweep.txt
            tool/state/**/latest_sweep.html
            tool/state/**/latest_sweep.txt
            tool/state/latest_sweep_signals.json
            tool/state/latest_predictive.json
            tool/state/predictor_pipeline.json
            tool/state/predictive_jobs.json
          if-no-files-found: warn
