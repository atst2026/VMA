<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — X4 Heat Matrix (light)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#152033;--muted:#5a6b85;--faint:#94a2ba;
    --line:rgba(40,70,120,.13);--line2:rgba(40,70,120,.07);
    --reg:#2f6df0;--pol:#1ba37a;--evt:#d98a3a;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#eef3fb;font-family:Inter,system-ui,sans-serif;display:flex;justify-content:center;padding:28px;}
  .panel{position:relative;width:584px;height:400px;border-radius:16px;overflow:hidden;color:var(--ink);
    background:radial-gradient(90% 60% at 50% -10%,rgba(108,166,255,.30),transparent 60%),linear-gradient(180deg,#fff,#f3f7ff);
    border:1px solid rgba(255,255,255,.7);box-shadow:0 20px 50px rgba(40,70,120,.16);}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line2);}
  .ph h3{margin:0;font-size:10.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;}
  .tot{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
  .body{display:flex;flex-direction:column;height:calc(400px - 49px);padding:12px 12px 0;}
  .matrix{display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(2,1fr);gap:7px;flex:0 0 auto;height:118px;}
  .cell{position:relative;border-radius:10px;border:1px solid var(--line2);padding:7px 9px;cursor:default;
    display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;transition:.14s;}
  .cell.has{cursor:pointer;} .cell.has:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(40,70,120,.16);}
  .cell.past{opacity:.5;}
  .c-m{font-size:11px;font-weight:600;position:relative;z-index:1;}
  .c-n{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;position:relative;z-index:1;}
  .c-top{display:flex;align-items:baseline;justify-content:space-between;}
  .keys{display:flex;gap:3px;position:relative;z-index:1;}
  .kk{width:10px;height:3px;border-radius:2px;background:rgba(40,70,120,.18);}
  .kk.reg{background:var(--reg);box-shadow:0 0 5px rgba(47,109,240,.6);}
  .kk.pol{background:var(--pol);box-shadow:0 0 5px rgba(27,163,122,.55);}
  .kk.evt{background:var(--evt);box-shadow:0 0 5px rgba(217,138,58,.55);}
  .cell.sel{border-color:transparent;}
  .cell.sel::after{content:"";position:absolute;inset:-1px;border-radius:10px;box-shadow:0 0 0 1.5px var(--reg),0 0 16px rgba(47,109,240,.4);pointer-events:none;}
  .c-new{position:absolute;top:6px;right:8px;z-index:2;font-family:'JetBrains Mono',monospace;font-size:7px;letter-spacing:.08em;color:#fff;background:var(--reg);padding:1px 5px;border-radius:4px;}
  /* detail scroll */
  .detail{position:relative;flex:1;min-height:0;margin-top:11px;border-top:1px solid var(--line2);}
  .detail::before{content:"";position:absolute;left:0;right:0;top:1px;height:16px;background:linear-gradient(180deg,rgba(243,247,255,.95),transparent);z-index:2;pointer-events:none;}
  .scroll{height:100%;overflow-y:auto;padding:11px 4px 14px;}
  .scroll::-webkit-scrollbar{width:6px;} .scroll::-webkit-scrollbar-thumb{background:rgba(47,109,240,.3);border-radius:6px;}
  .d-cap{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;} .d-cap .mm{font-size:14px;font-weight:600;} .d-cap .sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);}
  .d-item{padding:11px 0;border-top:1px solid var(--line2);} .d-item:nth-child(2){border-top:none;}
  .d-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .chip{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px 3px 6px;border-radius:6px;display:inline-flex;align-items:center;gap:6px;}
  .chip::before{content:"";width:6px;height:6px;border-radius:50%;}
  .chip.reg{color:#1c50c4;background:rgba(47,109,240,.12);}.chip.reg::before{background:var(--reg);box-shadow:0 0 5px var(--reg);}
  .chip.pol{color:#147a5a;background:rgba(27,163,122,.13);}.chip.pol::before{background:var(--pol);box-shadow:0 0 5px var(--pol);}
  .chip.evt{color:#a5641f;background:rgba(217,138,58,.14);}.chip.evt::before{background:var(--evt);box-shadow:0 0 5px var(--evt);}
  .d-when{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--reg);border:1px solid rgba(47,109,240,.25);border-radius:999px;padding:2px 8px;}
  .d-rm{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--faint);background:none;border:1px solid var(--line);border-radius:5px;padding:2px 7px;cursor:pointer;}
  .d-name{font-size:12.5px;font-weight:600;margin-top:6px;}
  .d-seat{font-size:11.5px;margin-top:5px;}
  .d-angle{font-size:11.5px;line-height:1.5;color:var(--muted);margin-top:4px;}
  .d-tg{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .d-tg span{font-size:10px;color:var(--muted);background:rgba(40,70,120,.05);border:1px solid var(--line2);border-radius:6px;padding:2px 8px;}
  .d-foot{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);margin-top:8px;} .d-foot a{color:var(--reg);text-decoration:none;}
</style></head>
<body><div class="panel">
  <div class="ph"><h3>BD Calendar</h3><span class="tot" id="tot"></span></div>
  <div class="body">
    <div class="matrix" id="matrix"></div>
    <div class="detail"><div class="scroll" id="scroll"></div></div>
  </div>
</div>
<script src="cal_data2.js"></script>
<script>
  const matrix=document.getElementById('matrix');let tot=0,maxN=Math.max(...DATA.map(p=>p.length));
  // luminous slate→blue heat fills
  function tint(n){const f=n/maxN;const a=0.10+f*0.5;return 'radial-gradient(120% 120% at 30% 0%,rgba(47,109,240,'+a+'),rgba(47,109,240,'+(a*0.25)+'))';}
  DATA.forEach((ps,m)=>{
    tot+=ps.length;const has=ps.length>0,past=m<NOW;
    const types=[...new Set(ps.map(p=>p.type))];
    const c=document.createElement('div');
    c.className='cell'+(has?' has':'')+(past?' past':'')+(m===NOW?' sel':'');c.dataset.m=m;
    if(has)c.style.background=tint(ps.length);
    c.innerHTML=(m===FRESH?'<span class="c-new">NEW</span>':'')+
      '<div class="c-top"><span class="c-m">'+MON[m]+'</span><span class="c-n">'+(has?ps.length:'·')+'</span></div>'+
      '<div class="keys">'+['reg','pol','evt'].map(t=>'<span class="kk'+(types.includes(t)?' '+t:'')+'"></span>').join('')+'</div>';
    if(has)c.addEventListener('click',()=>sel(m));
    matrix.appendChild(c);
  });
  document.getElementById('tot').textContent=tot+' windows · FY2026';
  function sel(m){
    document.querySelectorAll('.cell').forEach(c=>c.classList.toggle('sel',+c.dataset.m===m));
    document.getElementById('scroll').innerHTML=detailHTML(m);
  }
  sel(NOW);
</script>
</body></html>
