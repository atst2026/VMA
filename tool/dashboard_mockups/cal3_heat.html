<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — V3 Heat Columns</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f7f9fc;--surface:#fff;--surface-2:#F4F7FC;
    --border:rgba(60,64,67,.12);--border-hov:rgba(66,133,244,.36);
    --text:#1F1F1F;--muted:#5F6368;--dim:#9AA0A6;
    --blue:#4285F4;--blue-soft:rgba(66,133,244,.10);--blue-dark:#1A3D7C;
    --green:#34A853;--amber:#e89c4a;--shadow-md:0 6px 22px rgba(60,64,67,.08),0 1px 3px rgba(60,64,67,.04);}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--text);display:flex;justify-content:center;padding:30px;}
  .panel{width:600px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-md);overflow:hidden;}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border);}
  .ph h3{margin:0;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;}
  .cnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue-dark);background:var(--blue-soft);border-radius:8px;padding:2px 9px;}
  .pb{padding:18px 16px 14px;}
  .chart{display:grid;grid-template-columns:repeat(12,1fr);gap:7px;align-items:end;height:200px;
    background:linear-gradient(180deg,rgba(66,133,244,.03),transparent);border-radius:10px;padding:10px 6px 0;}
  .col{display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:5px;height:100%;cursor:default;}
  .col.has{cursor:pointer;}
  .stack{display:flex;flex-direction:column-reverse;gap:4px;width:100%;align-items:center;}
  .cellpip{width:16px;height:16px;border-radius:5px;transition:transform .12s;}
  .col.has:hover .cellpip{transform:scale(1.12);}
  .cellpip.high{background:var(--blue);box-shadow:0 0 8px rgba(66,133,244,.35);}
  .cellpip.med{background:var(--green);} .cellpip.event{background:var(--amber);}
  .empty-tick{width:16px;height:3px;border-radius:3px;background:var(--border);}
  .axis{display:grid;grid-template-columns:repeat(12,1fr);gap:7px;margin-top:9px;padding:0 6px;}
  .ax{text-align:center;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--dim);position:relative;}
  .ax.now{color:var(--blue-dark);font-weight:600;}
  .ax.now::after{content:"";display:block;width:5px;height:5px;border-radius:50%;background:var(--blue);margin:3px auto 0;
    animation:ping 1.6s ease-out infinite;}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(66,133,244,.5);}70%,100%{box-shadow:0 0 0 6px rgba(66,133,244,0);}}
  .ax.fresh{color:var(--blue);font-weight:700;}
  .col.now{background:linear-gradient(180deg,var(--blue-soft),transparent);border-radius:8px;}
  .legend{display:flex;gap:16px;font-size:10px;color:var(--dim);margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
  .legend i{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:6px;vertical-align:middle;}
</style></head>
<body><div class="panel">
  <div class="ph"><h3>BD Calendar</h3><span class="cnt" id="cnt">—</span></div>
  <div class="pb">
    <div class="chart" id="chart"></div>
    <div class="axis" id="axis"></div>
    <div class="legend"><span><i style="background:#4285F4"></i>high confidence</span><span><i style="background:#34A853"></i>policy firming</span><span><i style="background:#e89c4a"></i>comms event</span></div>
  </div>
</div>
<script>
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const TODAY_M=4,FRESH_M=5;
  const DATA=[['high','med'],['med'],['high','med','event'],['high','med'],
    ['high','high','med','event'],['high','med','event','high','med','event'],
    ['med','event','high'],['high','med','event','high','med'],['med','event'],
    ['high','med','event','high','med','event','high'],['event'],['high','med','event','high']];
  let total=0;const chart=document.getElementById('chart'),axis=document.getElementById('axis');
  DATA.forEach((ps,m)=>{
    total+=ps.length;const has=ps.length>0,now=m===TODAY_M;
    const col=document.createElement('div');col.className='col'+(has?' has':'')+(now?' now':'');
    col.innerHTML='<div class="stack">'+(has?ps.map(t=>'<span class="cellpip '+t+'"></span>').join(''):'<span class="empty-tick"></span>')+'</div>';
    chart.appendChild(col);
    const ax=document.createElement('div');ax.className='ax'+(now?' now':'')+(m===FRESH_M?' fresh':'');
    ax.textContent=MON[m];axis.appendChild(ax);
  });
  document.getElementById('cnt').textContent=total;
</script>
</body></html>
