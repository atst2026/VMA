<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — X2 Aurora (light)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#152033;--muted:#5a6b85;--faint:#94a2ba;
    --line:rgba(40,70,120,.14);--line2:rgba(40,70,120,.08);
    --reg:#2f6df0;--pol:#1ba37a;--evt:#d98a3a;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#eef3fb;font-family:Inter,system-ui,sans-serif;display:flex;justify-content:center;padding:28px;}
  .panel{position:relative;width:584px;height:400px;border-radius:16px;overflow:hidden;color:var(--ink);
    background:
      radial-gradient(95% 70% at 18% -15%,rgba(108,166,255,.55),transparent 55%),
      radial-gradient(80% 70% at 105% 120%,rgba(120,224,190,.40),transparent 55%),
      linear-gradient(180deg,#ffffff,#f4f8ff);
    border:1px solid rgba(255,255,255,.7);box-shadow:0 20px 50px rgba(40,70,120,.16);}
  .panel::before{content:"";position:absolute;inset:0;backdrop-filter:blur(2px);pointer-events:none;}
  .ph{position:relative;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line2);}
  .ph h3{margin:0;font-size:10.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;}
  .tot{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
  .body{position:relative;height:calc(400px - 49px);display:flex;flex-direction:column;padding:12px 12px 0;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:8px;flex:0 0 auto;height:188px;}
  .cell{position:relative;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.55);
    backdrop-filter:blur(8px);padding:8px 10px;display:flex;flex-direction:column;gap:6px;cursor:default;transition:.15s;overflow:hidden;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7);}
  .cell.has{cursor:pointer;} .cell.has:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(40,70,120,.12);}
  .cell.past{opacity:.45;}
  .c-top{display:flex;align-items:baseline;justify-content:space-between;}
  .c-m{font-size:11.5px;font-weight:600;} .c-n{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--faint);}
  .pips{display:flex;flex-wrap:wrap;gap:4px;margin-top:auto;}
  .pip{width:7px;height:7px;border-radius:50%;}
  .pip.reg{background:var(--reg);box-shadow:0 0 5px rgba(47,109,240,.6);}
  .pip.pol{background:var(--pol);box-shadow:0 0 5px rgba(27,163,122,.55);}
  .pip.evt{background:var(--evt);box-shadow:0 0 5px rgba(217,138,58,.55);}
  .cell.sel{border-color:transparent;background:rgba(255,255,255,.85);}
  .cell.sel::after{content:"";position:absolute;inset:-1px;border-radius:11px;box-shadow:0 0 0 1.5px var(--reg),0 0 18px rgba(47,109,240,.35);pointer-events:none;}
  .newdot{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--reg);}
  /* DETAIL — bounded scroll region with top fade */
  .detail{position:relative;flex:1;min-height:0;margin-top:11px;border-top:1px solid var(--line2);}
  .detail::before{content:"";position:absolute;left:0;right:0;top:1px;height:18px;background:linear-gradient(180deg,rgba(244,248,255,.95),transparent);pointer-events:none;z-index:2;}
  .scroll{height:100%;overflow-y:auto;padding:12px 4px 14px;}
  .scroll::-webkit-scrollbar{width:6px;} .scroll::-webkit-scrollbar-thumb{background:rgba(47,109,240,.3);border-radius:6px;}
  .d-cap{display:flex;align-items:baseline;gap:8px;margin-bottom:4px;}
  .d-cap .mm{font-size:14px;font-weight:600;} .d-cap .sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);}
  .d-item{padding:11px 0;border-top:1px solid var(--line2);} .d-item:nth-child(2){border-top:none;}
  .d-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .chip{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px 3px 6px;border-radius:6px;display:inline-flex;align-items:center;gap:6px;}
  .chip::before{content:"";width:6px;height:6px;border-radius:50%;}
  .chip.reg{color:#1c50c4;background:rgba(47,109,240,.12);}.chip.reg::before{background:var(--reg);box-shadow:0 0 5px var(--reg);}
  .chip.pol{color:#147a5a;background:rgba(27,163,122,.13);}.chip.pol::before{background:var(--pol);box-shadow:0 0 5px var(--pol);}
  .chip.evt{color:#a5641f;background:rgba(217,138,58,.14);}.chip.evt::before{background:var(--evt);box-shadow:0 0 5px var(--evt);}
  .d-when{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--reg);border:1px solid rgba(47,109,240,.25);border-radius:999px;padding:2px 8px;}
  .d-rm{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--faint);background:none;border:1px solid var(--line);border-radius:5px;padding:2px 7px;cursor:pointer;}
  .d-name{font-size:12.5px;font-weight:600;margin-top:6px;}
  .d-seat{font-size:11.5px;margin-top:5px;}
  .d-angle{font-size:11.5px;line-height:1.5;color:var(--muted);margin-top:4px;}
  .d-tg{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .d-tg span{font-size:10px;color:var(--muted);background:rgba(40,70,120,.05);border:1px solid var(--line2);border-radius:6px;padding:2px 8px;}
  .d-foot{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);margin-top:8px;} .d-foot a{color:var(--reg);text-decoration:none;}
</style></head>
<body><div class="panel">
  <div class="ph"><h3>BD Calendar</h3><span class="tot" id="tot"></span></div>
  <div class="body">
    <div class="grid" id="grid"></div>
    <div class="detail"><div class="scroll" id="scroll"></div></div>
  </div>
</div>
<script src="cal_data2.js"></script>
<script>
  const grid=document.getElementById('grid');let tot=0;
  DATA.forEach((ps,m)=>{
    tot+=ps.length;const has=ps.length>0,past=m<NOW;
    const c=document.createElement('div');
    c.className='cell'+(has?' has':'')+(past?' past':'')+(m===NOW?' sel':'');c.dataset.m=m;
    c.innerHTML='<div class="c-top"><span class="c-m">'+MON[m]+'</span>'+
      (m===FRESH?'<span class="newdot">NEW</span>':(has?'<span class="c-n">'+ps.length+'</span>':''))+'</div>'+
      '<div class="pips">'+ps.map(p=>'<span class="pip '+p.type+'"></span>').join('')+'</div>';
    if(has)c.addEventListener('click',()=>sel(m));
    grid.appendChild(c);
  });
  document.getElementById('tot').textContent=tot+' windows · FY2026';
  function sel(m){
    document.querySelectorAll('.cell').forEach(c=>c.classList.toggle('sel',+c.dataset.m===m));
    document.getElementById('scroll').innerHTML=detailHTML(m);
  }
  sel(NOW);
</script>
</body></html>
