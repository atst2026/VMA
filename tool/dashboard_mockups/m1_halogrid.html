<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — M1 Halo Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f9fc;--surface:#fff;--ink:#1F1F1F;--muted:#5F6368;--dim:#9AA0A6;
    --line:rgba(60,64,67,.10);--line2:rgba(60,64,67,.05);
    --blue:#4285F4;--blue-dark:#1A3D7C;--blue-soft:rgba(66,133,244,.10);
    --reg:#3D5A82;--pol:#5E8B73;--evt:#B5824E;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--ink);display:flex;justify-content:center;padding:28px;}
  .panel{width:584px;height:400px;background:var(--surface);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 10px 30px rgba(31,55,124,.07),0 1px 3px rgba(60,64,67,.05);display:flex;flex-direction:column;overflow:hidden;}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 13px;}
  .ph h3{margin:0;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;}
  .tot{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
  .body{flex:1;min-height:0;display:flex;flex-direction:column;padding:0 16px 14px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex:0 0 auto;}
  .cell{position:relative;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;
    padding:0 12px;cursor:default;transition:background .15s;}
  .cell.has{cursor:pointer;} .cell.has:hover{background:#f4f7fc;}
  .c-m{font-size:12.5px;font-weight:500;color:var(--ink);}
  .cell.empty .c-m{color:var(--dim);font-weight:400;}
  .c-n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
  .cell.now::before{content:"";position:absolute;inset:0;border-radius:10px;
    background:radial-gradient(120% 130% at 50% 0%,var(--blue-soft),transparent 75%);z-index:-1;}
  .cell.sel{background:rgba(66,133,244,.07);box-shadow:inset 0 0 0 1.5px rgba(66,133,244,.5);}
  .cell.sel .c-m{color:var(--blue-dark);font-weight:600;}
  .c-new{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--blue);}
  /* DETAIL */
  .detail{position:relative;flex:1;min-height:0;margin-top:13px;}
  .detail::before{content:"";position:absolute;left:0;right:0;top:0;height:14px;background:linear-gradient(180deg,#fff,transparent);z-index:2;pointer-events:none;}
  .d-cap{display:flex;align-items:baseline;gap:8px;padding:0 2px 2px;}
  .d-cap .mm{font-size:14px;font-weight:600;} .d-cap .sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);}
  .scroll{height:calc(100% - 22px);overflow-y:auto;padding:8px 2px 0;}
  .scroll::-webkit-scrollbar{width:5px;} .scroll::-webkit-scrollbar-thumb{background:rgba(66,133,244,.25);border-radius:5px;}
  .grp{margin-top:13px;} .grp:first-child{margin-top:2px;}
  .grp-h{display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
  .grp-h .gd{width:6px;height:6px;border-radius:50%;}
  .grp-h.reg .gd{background:var(--reg);} .grp-h.pol .gd{background:var(--pol);} .grp-h.evt .gd{background:var(--evt);}
  .grp-h .gc{margin-left:auto;color:var(--dim);}
  .li{padding:8px 0 9px;border-bottom:1px solid var(--line2);margin-left:13px;}
  .li-top{display:flex;align-items:baseline;gap:8px;}
  .li-name{font-size:12.5px;font-weight:600;color:var(--ink);}
  .li-when{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--blue-dark);background:var(--blue-soft);border-radius:999px;padding:2px 8px;white-space:nowrap;}
  .li-seat{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .li-angle{font-size:11px;line-height:1.45;color:var(--dim);margin-top:3px;}
</style></head>
<body><div class="panel">
  <div class="ph"><h3>BD Calendar</h3><span class="tot" id="tot"></span></div>
  <div class="body">
    <div class="grid" id="grid"></div>
    <div class="detail">
      <div class="d-cap"><span class="mm" id="dm"></span><span class="sub" id="ds"></span></div>
      <div class="scroll" id="scroll"></div>
    </div>
  </div>
</div>
<script src="cal_data3.js"></script>
<script>
  const grid=document.getElementById('grid');let tot=0;
  DATA.forEach((ps,m)=>{
    tot+=ps.length;const has=ps.length>0;
    const c=document.createElement('div');
    c.className='cell'+(has?' has':' empty')+(m===NOW?' now':'')+(m===NOW?' sel':'');c.dataset.m=m;
    c.innerHTML='<span class="c-m">'+MON[m]+'</span>'+
      (m===FRESH?'<span class="c-new">NEW</span>':(has?'<span class="c-n">'+ps.length+'</span>':''));
    if(has)c.addEventListener('click',()=>sel(m));
    grid.appendChild(c);
  });
  document.getElementById('tot').textContent=tot+' windows · FY2026';
  function sel(m){
    document.querySelectorAll('.cell').forEach(c=>c.classList.toggle('sel',+c.dataset.m===m));
    document.getElementById('dm').textContent=FULL[m];
    document.getElementById('ds').textContent=DATA[m].length+' windows';
    document.getElementById('scroll').innerHTML=groupedHTML(m);
  }
  sel(NOW);
</script>
</body></html>
