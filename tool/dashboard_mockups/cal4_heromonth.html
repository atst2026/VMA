<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — V4 Hero Month</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f7f9fc;--surface:#fff;--surface-2:#F4F7FC;
    --border:rgba(60,64,67,.12);--border-hov:rgba(66,133,244,.36);
    --text:#1F1F1F;--muted:#5F6368;--dim:#9AA0A6;
    --blue:#4285F4;--blue-soft:rgba(66,133,244,.10);--blue-dark:#1A3D7C;
    --green:#34A853;--amber:#e89c4a;--shadow-md:0 6px 22px rgba(60,64,67,.08),0 1px 3px rgba(60,64,67,.04);}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--text);display:flex;justify-content:center;padding:30px;}
  .panel{width:600px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-md);overflow:hidden;}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border);}
  .ph h3{margin:0;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;}
  .cnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue-dark);background:var(--blue-soft);border-radius:8px;padding:2px 9px;}
  .pb{padding:16px;}
  /* HERO */
  .hero{position:relative;border:1px solid var(--border-hov);border-radius:14px;padding:16px 18px;overflow:hidden;
    background:radial-gradient(140% 120% at 12% 0%,rgba(66,133,244,.12),#fff 60%);}
  .hero::before{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
    background:radial-gradient(circle,rgba(66,133,244,.20),transparent 70%);filter:blur(6px);}
  .h-top{display:flex;align-items:baseline;gap:12px;position:relative;}
  .h-mon{font-size:26px;font-weight:800;letter-spacing:-.01em;}
  .h-yr{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--dim);}
  .h-tag{margin-left:auto;font-size:9.5px;font-weight:700;letter-spacing:.08em;color:#fff;background:var(--blue);
    padding:3px 9px;border-radius:7px;}
  .h-sum{font-size:12.5px;color:var(--muted);margin-top:4px;position:relative;}
  .h-pips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;position:relative;}
  .hp{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text);
    background:#fff;border:1px solid var(--border);border-radius:9px;padding:5px 10px;box-shadow:var(--shadow-md);}
  .hp i{width:9px;height:9px;border-radius:50%;}
  .hp i.high{background:var(--blue);}.hp i.med{background:var(--green);}.hp i.event{background:var(--amber);}
  /* MINI YEAR STRIP */
  .strip{display:grid;grid-template-columns:repeat(12,1fr);gap:5px;margin-top:16px;}
  .mtile{position:relative;border:1px solid var(--border);border-radius:9px;padding:7px 4px 6px;text-align:center;
    background:#fff;cursor:pointer;transition:.13s;}
  .mtile:hover{border-color:var(--border-hov);transform:translateY(-2px);}
  .mtile.past{opacity:.4;}
  .mtile.sel{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft);}
  .mt-l{font-size:9.5px;font-weight:700;color:var(--muted);}
  .mtile.sel .mt-l{color:var(--blue-dark);}
  .mt-d{display:flex;justify-content:center;gap:2px;margin-top:4px;height:6px;}
  .dot{width:5px;height:5px;border-radius:50%;}
  .dot.high{background:var(--blue);}.dot.med{background:var(--green);}.dot.event{background:var(--amber);}
  .more{font-size:8px;color:var(--dim);font-family:'JetBrains Mono',monospace;}
  @property --sa{syntax:'<angle>';initial-value:0deg;inherits:false;}
  .mtile.fresh::after{content:"";position:absolute;inset:0;border-radius:9px;padding:1.5px;pointer-events:none;
    background:conic-gradient(from var(--sa),transparent 0 250deg,rgba(66,133,244,.35) 300deg,#5B9BFF 340deg,#cdeaff 352deg,#fff 358deg,transparent 360deg);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:shoot 2.4s linear infinite;}
  @keyframes shoot{to{--sa:360deg;}}
  .legend{display:flex;gap:16px;font-size:10px;color:var(--dim);margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}
</style></head>
<body><div class="panel">
  <div class="ph"><h3>BD Calendar</h3><span class="cnt" id="cnt">—</span></div>
  <div class="pb">
    <div class="hero" id="hero"></div>
    <div class="strip" id="strip"></div>
    <div class="legend"><span><i style="background:#4285F4"></i>high confidence</span><span><i style="background:#34A853"></i>policy firming</span><span><i style="background:#e89c4a"></i>comms event</span></div>
  </div>
</div>
<script>
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const FULL=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const LBL={high:'High-confidence window',med:'Policy timeline firming',event:'Comms event'};
  const TODAY_M=4,FRESH_M=5;
  const DATA=[['high','med'],['med'],['high','med','event'],['high','med'],
    ['high','high','med','event'],['high','med','event','high','med','event'],
    ['med','event','high'],['high','med','event','high','med'],['med','event'],
    ['high','med','event','high','med','event','high'],['event'],['high','med','event','high']];
  let total=DATA.reduce((a,p)=>a+p.length,0);
  document.getElementById('cnt').textContent=total;
  function renderHero(m){
    const ps=DATA[m];
    document.getElementById('hero').innerHTML=
      '<div class="h-top"><span class="h-mon">'+FULL[m]+'</span><span class="h-yr">2026</span>'+
      (m===FRESH_M?'<span class="h-tag">NEW THIS WEEK</span>':(m===TODAY_M?'<span class="h-tag">THIS MONTH</span>':''))+'</div>'+
      '<div class="h-sum">'+(ps.length?ps.length+' placement window'+(ps.length>1?'s':'')+' building toward this month':'No window open this month')+'</div>'+
      '<div class="h-pips">'+ps.map(t=>'<span class="hp"><i class="'+t+'"></i>'+LBL[t]+'</span>').join('')+'</div>';
  }
  const strip=document.getElementById('strip');
  DATA.forEach((ps,m)=>{
    const past=m<TODAY_M,sel=m===TODAY_M,fresh=m===FRESH_M;
    const t=document.createElement('div');
    t.className='mtile'+(past?' past':'')+(sel?' sel':'')+(fresh?' fresh':'');
    const shown=ps.slice(0,3).map(x=>'<span class="dot '+x+'"></span>').join('');
    t.innerHTML='<div class="mt-l">'+MON[m]+'</div><div class="mt-d">'+shown+'</div>'+
      (ps.length>3?'<div class="more">+'+(ps.length-3)+'</div>':(ps.length?'<div class="more">&nbsp;</div>':'<div class="more">&nbsp;</div>'));
    t.addEventListener('click',()=>{document.querySelectorAll('.mtile').forEach(x=>x.classList.remove('sel'));t.classList.add('sel');renderHero(m);});
    strip.appendChild(t);
  });
  renderHero(TODAY_M);
</script>
</body></html>
