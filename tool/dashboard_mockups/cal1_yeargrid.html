<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — V1 Year Grid</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f9fc;--surface:#fff;--surface-2:#F4F7FC;
    --border:rgba(60,64,67,.12);--border-hov:rgba(66,133,244,.36);
    --text:#1F1F1F;--muted:#5F6368;--dim:#9AA0A6;
    --blue:#4285F4;--blue-soft:rgba(66,133,244,.10);--blue-dark:#1A3D7C;
    --green:#34A853;--amber:#e89c4a;
    --shadow-md:0 6px 22px rgba(60,64,67,.08),0 1px 3px rgba(60,64,67,.04);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--text);
       display:flex;justify-content:center;align-items:flex-start;padding:30px;}
  .panel{width:600px;background:var(--surface);border:1px solid var(--border);
         border-radius:16px;box-shadow:var(--shadow-md);overflow:hidden;}
  .ph{display:flex;align-items:center;justify-content:space-between;
      padding:15px 18px;border-bottom:1px solid var(--border);}
  .ph-l{display:flex;align-items:center;gap:10px;}
  .ph h3{margin:0;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text);}
  .yr{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);letter-spacing:.1em;}
  .cnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue-dark);
       background:var(--blue-soft);border-radius:8px;padding:2px 9px;}
  .pb{padding:16px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
  .cell{position:relative;height:96px;border:1px solid var(--border);border-radius:12px;
        padding:9px 10px;background:linear-gradient(180deg,#fff,#fbfcfe);
        display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s,border-color .15s;}
  .cell.has{cursor:pointer;}
  .cell.has:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--border-hov);}
  .cell.past{opacity:.42;}
  .cell-top{display:flex;align-items:center;justify-content:space-between;}
  .mlab{font-size:12.5px;font-weight:700;color:var(--text);}
  .cell.past .mlab{color:var(--muted);}
  .mc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
  .pips{margin-top:auto;display:flex;flex-wrap:wrap;gap:5px;align-content:flex-end;}
  .pip{width:10px;height:10px;border-radius:50%;}
  .pip.high{background:var(--blue);} .pip.med{background:var(--green);} .pip.event{background:var(--amber);}
  /* NOW: soft halo ring */
  .cell.now{border-color:transparent;background:
      radial-gradient(120% 120% at 50% 0%,var(--blue-soft),#fff 70%);}
  .cell.now::before{content:"";position:absolute;inset:0;border-radius:12px;
      border:1.5px solid var(--blue);box-shadow:0 0 0 4px var(--blue-soft);pointer-events:none;}
  .nowdot{width:6px;height:6px;border-radius:50%;background:var(--blue);
      box-shadow:0 0 0 0 var(--blue-soft);animation:ping 1.6s ease-out infinite;}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(66,133,244,.5);}70%,100%{box-shadow:0 0 0 7px rgba(66,133,244,0);}}
  /* FRESH: shooting border + NEW badge */
  @property --sa{syntax:'<angle>';initial-value:0deg;inherits:false;}
  .cell.fresh::after{content:"";position:absolute;inset:0;border-radius:12px;padding:1.5px;pointer-events:none;
    background:conic-gradient(from var(--sa),transparent 0 250deg,rgba(66,133,244,.35) 300deg,#5B9BFF 340deg,#cdeaff 352deg,#fff 358deg,transparent 360deg);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;
    animation:shoot 2.4s linear infinite;}
  @keyframes shoot{to{--sa:360deg;}}
  .nb{position:absolute;top:-7px;right:8px;font-size:8.5px;font-weight:800;letter-spacing:.05em;color:#fff;
      background:var(--blue);padding:2px 6px;border-radius:6px;box-shadow:var(--shadow-md);}
  .legend{display:flex;gap:16px;font-size:10px;color:var(--dim);margin-top:14px;padding-top:12px;border-top:1px solid var(--border);}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}
</style></head>
<body><div class="panel">
  <div class="ph"><div class="ph-l"><h3>BD Calendar</h3><span class="yr">FY 2026</span></div><span class="cnt" id="cnt">—</span></div>
  <div class="pb"><div class="grid" id="grid"></div>
    <div class="legend">
      <span><i style="background:#4285F4"></i>high confidence</span>
      <span><i style="background:#34A853"></i>policy firming</span>
      <span><i style="background:#e89c4a"></i>comms event</span>
    </div>
  </div>
</div>
<script>
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const TODAY_M=4,FRESH_M=5;
  const DATA=[['high','med'],['med'],['high','med','event'],['high','med'],
    ['high','high','med','event'],['high','med','event','high','med','event'],
    ['med','event','high'],['high','med','event','high','med'],['med','event'],
    ['high','med','event','high','med','event','high'],['event'],['high','med','event','high']];
  let total=0;const g=document.getElementById('grid');
  DATA.forEach((ps,m)=>{
    total+=ps.length;
    const has=ps.length>0,past=m<TODAY_M,now=m===TODAY_M,fresh=m===FRESH_M;
    const d=document.createElement('div');
    d.className='cell'+(has?' has':'')+(past?' past':'')+(now?' now':'')+(fresh?' fresh':'');
    d.innerHTML='<div class="cell-top"><span class="mlab">'+MON[m]+(now?' <span class="nowdot"></span>':'')+'</span>'+
      (has?'<span class="mc">'+ps.length+'</span>':'')+'</div>'+
      (fresh?'<span class="nb">NEW</span>':'')+
      '<div class="pips">'+ps.map(t=>'<span class="pip '+t+'"></span>').join('')+'</div>';
    g.appendChild(d);
  });
  document.getElementById('cnt').textContent=total;
</script>
</body></html>
