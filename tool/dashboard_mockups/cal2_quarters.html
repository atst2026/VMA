<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — V2 Quarter Rows</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f7f9fc;--surface:#fff;--surface-2:#F4F7FC;
    --border:rgba(60,64,67,.12);--border-hov:rgba(66,133,244,.36);
    --text:#1F1F1F;--muted:#5F6368;--dim:#9AA0A6;
    --blue:#4285F4;--blue-soft:rgba(66,133,244,.10);--blue-dark:#1A3D7C;
    --green:#34A853;--amber:#e89c4a;--shadow-md:0 6px 22px rgba(60,64,67,.08),0 1px 3px rgba(60,64,67,.04);}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--text);
       display:flex;justify-content:center;padding:30px;}
  .panel{width:600px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-md);overflow:hidden;}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border);}
  .ph h3{margin:0;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;}
  .cnt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue-dark);background:var(--blue-soft);border-radius:8px;padding:2px 9px;}
  .pb{padding:8px 16px 16px;}
  .q{display:grid;grid-template-columns:54px 1fr;gap:12px;align-items:stretch;padding:13px 0;}
  .q+.q{border-top:1px solid var(--border);}
  .qlab{display:flex;flex-direction:column;justify-content:center;}
  .qn{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;color:var(--blue-dark);}
  .qr{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.08em;margin-top:2px;}
  .qbar{width:3px;border-radius:3px;background:linear-gradient(180deg,var(--blue),transparent);}
  .months{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .mc{position:relative;border:1px solid var(--border);border-radius:11px;padding:9px 11px;min-height:64px;
      background:linear-gradient(180deg,#fff,#fbfcfe);display:flex;flex-direction:column;transition:.15s;}
  .mc.has{cursor:pointer;} .mc.has:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--border-hov);}
  .mc.past{opacity:.42;}
  .mtop{display:flex;align-items:center;justify-content:space-between;}
  .mlab{font-size:12px;font-weight:700;} .mc.past .mlab{color:var(--muted);}
  .num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
  .pips{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px;}
  .pip{width:9px;height:9px;border-radius:50%;}
  .pip.high{background:var(--blue);}.pip.med{background:var(--green);}.pip.event{background:var(--amber);}
  .mc.now{background:radial-gradient(120% 120% at 50% 0%,var(--blue-soft),#fff 72%);border-color:transparent;}
  .mc.now::before{content:"";position:absolute;inset:0;border-radius:11px;border:1.5px solid var(--blue);box-shadow:0 0 0 3px var(--blue-soft);pointer-events:none;}
  @property --sa{syntax:'<angle>';initial-value:0deg;inherits:false;}
  .mc.fresh::after{content:"";position:absolute;inset:0;border-radius:11px;padding:1.5px;pointer-events:none;
    background:conic-gradient(from var(--sa),transparent 0 250deg,rgba(66,133,244,.35) 300deg,#5B9BFF 340deg,#cdeaff 352deg,#fff 358deg,transparent 360deg);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:shoot 2.4s linear infinite;}
  @keyframes shoot{to{--sa:360deg;}}
  .nb{position:absolute;top:-7px;right:8px;font-size:8px;font-weight:800;color:#fff;background:var(--blue);padding:2px 6px;border-radius:6px;box-shadow:var(--shadow-md);}
  .legend{display:flex;gap:16px;font-size:10px;color:var(--dim);margin-top:8px;padding-top:12px;border-top:1px solid var(--border);}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}
</style></head>
<body><div class="panel">
  <div class="ph"><h3>BD Calendar</h3><span class="cnt" id="cnt">—</span></div>
  <div class="pb"><div id="qs"></div>
    <div class="legend"><span><i style="background:#4285F4"></i>high confidence</span><span><i style="background:#34A853"></i>policy firming</span><span><i style="background:#e89c4a"></i>comms event</span></div>
  </div>
</div>
<script>
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const QN=['Q1','Q2','Q3','Q4'],QR=['JAN–MAR','APR–JUN','JUL–SEP','OCT–DEC'];
  const TODAY_M=4,FRESH_M=5;
  const DATA=[['high','med'],['med'],['high','med','event'],['high','med'],
    ['high','high','med','event'],['high','med','event','high','med','event'],
    ['med','event','high'],['high','med','event','high','med'],['med','event'],
    ['high','med','event','high','med','event','high'],['event'],['high','med','event','high']];
  let total=0;const root=document.getElementById('qs');
  for(let q=0;q<4;q++){
    const row=document.createElement('div');row.className='q';
    let mhtml='';
    for(let i=0;i<3;i++){const m=q*3+i,ps=DATA[m];total+=ps.length;
      const has=ps.length>0,past=m<TODAY_M,now=m===TODAY_M,fresh=m===FRESH_M;
      mhtml+='<div class="mc'+(has?' has':'')+(past?' past':'')+(now?' now':'')+(fresh?' fresh':'')+'">'+
        (fresh?'<span class="nb">NEW</span>':'')+
        '<div class="mtop"><span class="mlab">'+MON[m]+'</span>'+(has?'<span class="num">'+ps.length+'</span>':'')+'</div>'+
        '<div class="pips">'+ps.map(t=>'<span class="pip '+t+'"></span>').join('')+'</div></div>';
    }
    row.innerHTML='<div class="qlab"><span class="qn">'+QN[q]+'</span><span class="qr">'+QR[q]+'</span></div><div class="months">'+mhtml+'</div>';
    root.appendChild(row);
  }
  document.getElementById('cnt').textContent=total;
</script>
</body></html>
