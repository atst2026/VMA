<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — M5 Swap</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f9fc;--surface:#fff;--ink:#1F1F1F;--muted:#5F6368;--dim:#9AA0A6;
    --line:rgba(60,64,67,.10);--line2:rgba(60,64,67,.05);
    --blue:#4285F4;--blue-dark:#1A3D7C;--blue-soft:rgba(66,133,244,.10);
    --reg:#3D5A82;--pol:#5E8B73;--evt:#B5824E;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--ink);display:flex;justify-content:center;padding:28px;}
  .panel{position:relative;width:584px;height:400px;background:var(--surface);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 10px 30px rgba(31,55,124,.07),0 1px 3px rgba(60,64,67,.05);overflow:hidden;}
  .view{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .2s;}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;}
  .ph h3{margin:0;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;}
  .tot{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
  /* grid view */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:4px 18px 18px;flex:1;min-height:0;}
  .cell{position:relative;border:1px solid var(--line2);border-radius:12px;display:flex;flex-direction:column;justify-content:space-between;
    padding:11px 13px;cursor:default;transition:.15s;}
  .cell.has{cursor:pointer;} .cell.has:hover{border-color:rgba(66,133,244,.4);box-shadow:0 6px 18px rgba(31,55,124,.08);transform:translateY(-1px);}
  .cell.empty{opacity:.55;}
  .c-m{font-size:13px;font-weight:600;}
  .c-sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);margin-top:2px;}
  .keys{display:flex;gap:4px;}
  .k{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);display:inline-flex;align-items:center;gap:4px;}
  .k::before{content:"";width:6px;height:6px;border-radius:50%;}
  .k.reg::before{background:var(--reg);} .k.pol::before{background:var(--pol);} .k.evt::before{background:var(--evt);}
  .cell.now{border-color:transparent;background:radial-gradient(120% 130% at 50% 0%,var(--blue-soft),#fff 75%);box-shadow:inset 0 0 0 1.5px rgba(66,133,244,.4);}
  .cell.now .c-m{color:var(--blue-dark);}
  .c-new{position:absolute;top:9px;right:11px;font-family:'JetBrains Mono',monospace;font-size:7.5px;letter-spacing:.08em;color:var(--blue);}
  /* detail view */
  .dv{padding:0;}
  .dh{display:flex;align-items:center;gap:10px;padding:15px 20px 10px;border-bottom:1px solid var(--line2);}
  .back{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
    border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer;}
  .dh .mm{font-size:16px;font-weight:600;} .dh .sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);margin-left:auto;}
  .scroll{flex:1;min-height:0;overflow-y:auto;padding:6px 22px 16px;}
  .scroll::-webkit-scrollbar{width:5px;} .scroll::-webkit-scrollbar-thumb{background:rgba(66,133,244,.25);border-radius:5px;}
  .grp{margin-top:14px;} .grp:first-child{margin-top:4px;}
  .grp-h{display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
  .grp-h .gd{width:6px;height:6px;border-radius:50%;}
  .grp-h.reg .gd{background:var(--reg);} .grp-h.pol .gd{background:var(--pol);} .grp-h.evt .gd{background:var(--evt);}
  .grp-h .gc{margin-left:auto;color:var(--dim);}
  .li{padding:9px 0 10px;border-bottom:1px solid var(--line2);margin-left:13px;}
  .li-top{display:flex;align-items:baseline;gap:8px;}
  .li-name{font-size:13px;font-weight:600;}
  .li-when{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--blue-dark);background:var(--blue-soft);border-radius:999px;padding:2px 8px;white-space:nowrap;}
  .li-seat{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .li-angle{font-size:11px;line-height:1.45;color:var(--dim);margin-top:3px;}
</style></head>
<body><div class="panel">
  <div class="view" id="gridview" style="display:none;">
    <div class="ph"><h3>BD Calendar</h3><span class="tot" id="tot"></span></div>
    <div class="grid" id="grid"></div>
  </div>
  <div class="view dv" id="detailview">
    <div class="dh"><span class="back" id="back">‹ all months</span><span class="mm" id="mm"></span><span class="sub" id="sub"></span></div>
    <div class="scroll" id="scroll"></div>
  </div>
</div>
<script src="cal_data3.js"></script>
<script>
  const grid=document.getElementById('grid');let tot=0;
  DATA.forEach((ps,m)=>{
    tot+=ps.length;const has=ps.length>0;const c=counts(m);
    const keys=['reg','pol','evt'].filter(t=>c[t]>0).map(t=>'<span class="k '+t+'">'+c[t]+'</span>').join('');
    const d=document.createElement('div');
    d.className='cell'+(has?' has':' empty')+(m===NOW?' now':'');d.dataset.m=m;
    d.innerHTML=(m===FRESH?'<span class="c-new">NEW</span>':'')+
      '<div><div class="c-m">'+MON[m]+'</div><div class="c-sub">'+(has?ps.length+' windows':'—')+'</div></div>'+
      '<div class="keys">'+keys+'</div>';
    if(has)d.addEventListener('click',()=>open(m));
    grid.appendChild(d);
  });
  document.getElementById('tot').textContent=tot+' windows · FY2026';
  function open(m){
    document.getElementById('mm').textContent=FULL[m]+' 2026';
    document.getElementById('sub').textContent=DATA[m].length+' windows';
    document.getElementById('scroll').innerHTML=groupedHTML(m);
    document.getElementById('gridview').style.display='none';
    document.getElementById('detailview').style.display='flex';
  }
  document.getElementById('back').addEventListener('click',()=>{
    document.getElementById('detailview').style.display='none';
    document.getElementById('gridview').style.display='flex';
  });
  open(NOW);   // screenshot shows the click-through detail
</script>
</body></html>
