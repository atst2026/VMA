<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — X5 Neural Spine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --b0:#0a1020;--b1:#0f1830;--ink:#e7edf8;--muted:#93a0b5;--faint:#5d6c85;
    --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.05);
    --reg:#6aa3ff;--pol:#54c79a;--evt:#e0a662;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#070b16;font-family:Inter,system-ui,sans-serif;display:flex;justify-content:center;padding:28px;}
  .panel{position:relative;width:584px;height:400px;border-radius:16px;overflow:hidden;color:var(--ink);
    background:radial-gradient(110% 60% at 50% -10%,rgba(106,163,255,.20),transparent 55%),linear-gradient(160deg,var(--b1),var(--b0));
    border:1px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,.45);}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line2);}
  .ph h3{margin:0;font-size:10.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;}
  .tot{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
  .body{display:flex;flex-direction:column;height:calc(400px - 49px);}
  .spine{flex:0 0 auto;height:132px;padding:6px 6px 0;}
  .legend{display:flex;gap:13px;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--faint);margin-top:2px;}
  .legend i{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;}
  /* detail scroll */
  .detail{position:relative;flex:1;min-height:0;border-top:1px solid var(--line2);margin-top:4px;}
  .detail::before{content:"";position:absolute;left:0;right:0;top:1px;height:16px;background:linear-gradient(180deg,rgba(11,17,33,.95),transparent);z-index:2;pointer-events:none;}
  .sh{display:flex;align-items:baseline;gap:8px;padding:10px 16px 5px;}
  .sh .mm{font-size:14px;font-weight:600;} .sh .sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);}
  .scroll{height:calc(100% - 34px);overflow-y:auto;padding:0 16px 14px;}
  .scroll::-webkit-scrollbar{width:6px;} .scroll::-webkit-scrollbar-thumb{background:rgba(106,163,255,.4);border-radius:6px;}
  .d-item{padding:11px 0;border-top:1px solid var(--line2);} .d-item:first-child{border-top:none;}
  .d-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .chip{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px 3px 6px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;}
  .chip::before{content:"";width:6px;height:6px;border-radius:50%;}
  .chip.reg{color:#bdd6ff;background:rgba(106,163,255,.16);}.chip.reg::before{background:var(--reg);box-shadow:0 0 6px var(--reg);}
  .chip.pol{color:#b6ecd6;background:rgba(84,199,154,.16);}.chip.pol::before{background:var(--pol);box-shadow:0 0 6px var(--pol);}
  .chip.evt{color:#f2d6af;background:rgba(224,166,98,.16);}.chip.evt::before{background:var(--evt);box-shadow:0 0 6px var(--evt);}
  .d-when{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:8.5px;color:#bdd6ff;border:1px solid rgba(106,163,255,.3);border-radius:999px;padding:2px 7px;}
  .d-rm{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--faint);background:none;border:1px solid var(--line);border-radius:5px;padding:2px 6px;cursor:pointer;}
  .d-name{font-size:12px;font-weight:600;margin-top:6px;}
  .d-seat{font-size:11px;color:#c7d2e3;margin-top:4px;}
  .d-angle{font-size:11px;line-height:1.5;color:var(--muted);margin-top:4px;}
  .d-tg{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
  .d-tg span{font-size:9.5px;color:#c7d2e3;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:5px;padding:2px 7px;}
  .d-foot{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--faint);margin-top:7px;} .d-foot a{color:var(--reg);text-decoration:none;}
  .d-cap{display:none;}
  .nlbl{font-family:'JetBrains Mono',monospace;font-size:8.5px;fill:var(--faint);cursor:pointer;}
  .nlbl.now{fill:#bdd6ff;} .nlbl.past{opacity:.45;}
</style></head>
<body><div class="panel">
  <div class="ph"><h3>BD Calendar</h3><span class="tot" id="tot"></span></div>
  <div class="body">
    <div class="spine"><svg id="spine" width="100%" height="118" viewBox="0 0 560 118" preserveAspectRatio="none"></svg>
      <div class="legend"><span><i style="background:#6aa3ff"></i>Regulatory deadline</span><span><i style="background:#54c79a"></i>Policy timeline</span><span><i style="background:#e0a662"></i>Comms event</span></div>
    </div>
    <div class="detail">
      <div class="sh"><span class="mm" id="shm"></span><span class="sub" id="shs"></span></div>
      <div class="scroll" id="scroll"></div>
    </div>
  </div>
</div>
<script src="cal_data2.js"></script>
<script>
  const COL={reg:'#6aa3ff',pol:'#54c79a',evt:'#e0a662'};
  const NS='http://www.w3.org/2000/svg',svg=document.getElementById('spine');
  const W=560,baseY=78,maxN=Math.max(...DATA.map(p=>p.length));
  let tot=DATA.reduce((a,p)=>a+p.length,0);document.getElementById('tot').textContent=tot+' windows · FY2026';
  function el(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
  const defs=el('defs',{});defs.innerHTML='<filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'+
    '<linearGradient id="spineg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="rgba(106,163,255,.15)"/><stop offset="0.5" stop-color="rgba(106,163,255,.55)"/><stop offset="1" stop-color="rgba(84,199,154,.25)"/></linearGradient>';
  svg.appendChild(defs);
  const xs=m=>40+m*(W-80)/11;
  // glowing spine
  svg.appendChild(el('line',{x1:30,y1:baseY,x2:W-30,y2:baseY,stroke:'url(#spineg)','stroke-width':2,filter:'url(#g)'}));
  for(let m=0;m<12;m++){
    const x=xs(m),ps=DATA[m],n=ps.length;
    // node: size grows with density, glows
    const r=n?4+Math.min(n,7)*1.7:3;
    // filaments: stack small pips above the node for each finding
    ps.slice(0,7).forEach((p,i)=>{
      svg.appendChild(el('circle',{cx:x,cy:baseY-14-i*8,r:3.2,fill:COL[p.type],filter:'url(#g)',opacity:m<NOW?.5:1}));
    });
    if(n>7){const e=el('text',{x:x,y:baseY-14-7*8-3,'text-anchor':'middle','font-size':8,fill:'var(--faint)','font-family':'JetBrains Mono,monospace'});e.textContent='+'+(n-7);svg.appendChild(e);}
    const node=el('circle',{cx:x,cy:baseY,r:r,fill:n?'#0f1830':'#0c1326',stroke:m===NOW?'#bdd6ff':'rgba(106,163,255,.5)','stroke-width':m===NOW?2:1,filter:'url(#g)','class':'node'});
    if(n)node.style.cursor='pointer';node.addEventListener('click',()=>sel(m));svg.appendChild(node);
    if(m===NOW){svg.appendChild(el('circle',{cx:x,cy:baseY,r:r+6,fill:'none',stroke:'rgba(106,163,255,.4)','stroke-width':1,filter:'url(#g)'}));}
    const lab=el('text',{x:x,y:baseY+22,'text-anchor':'middle',class:'nlbl'+(m===NOW?' now':'')+(m<NOW?' past':'')});lab.textContent=MON[m];
    lab.addEventListener('click',()=>sel(m));svg.appendChild(lab);
    if(m===FRESH){const e=el('text',{x:x,y:baseY+34,'text-anchor':'middle','font-size':7,'font-weight':700,fill:'#bdd6ff','font-family':'Inter,sans-serif'});e.textContent='NEW';svg.appendChild(e);}
  }
  function sel(m){
    document.querySelectorAll('.nlbl').forEach((l,i)=>l.classList.toggle('now',i===m));
    document.getElementById('shm').textContent=FULL[m]+' 2026';
    document.getElementById('shs').textContent=DATA[m].length+' windows';
    document.getElementById('scroll').innerHTML=detailHTML(m);
  }
  sel(NOW);
</script>
</body></html>
