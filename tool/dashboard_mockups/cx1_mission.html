<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — X1 Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --b0:#0a1020;--b1:#0e1730;--ink:#e7edf8;--muted:#93a0b5;--faint:#5d6c85;
    --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.05);--glass:rgba(255,255,255,.045);
    --reg:#6aa3ff;--pol:#54c79a;--evt:#e0a662;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#070b16;font-family:Inter,system-ui,sans-serif;display:flex;justify-content:center;padding:28px;}
  .panel{position:relative;width:584px;height:400px;border-radius:16px;overflow:hidden;color:var(--ink);
    background:
      radial-gradient(120% 90% at 12% -10%,rgba(106,163,255,.22),transparent 55%),
      radial-gradient(90% 80% at 108% 115%,rgba(84,199,154,.16),transparent 55%),
      linear-gradient(160deg,var(--b1),var(--b0));
    border:1px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,.45);}
  .grain{position:absolute;inset:0;background-image:linear-gradient(var(--line2) 1px,transparent 1px),linear-gradient(90deg,var(--line2) 1px,transparent 1px);background-size:48px 48px;opacity:.5;pointer-events:none;}
  .ph{position:relative;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line2);}
  .ph-l{display:flex;align-items:center;gap:9px;}
  .ph h3{margin:0;font-size:10.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;}
  .live{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.14em;color:var(--reg);}
  .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--reg);box-shadow:0 0 8px var(--reg);animation:bp 1.8s ease-in-out infinite;}
  @keyframes bp{50%{opacity:.4;}}
  .tot{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
  .body{position:relative;height:calc(400px - 49px);padding:12px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:8px;height:100%;}
  .cell{position:relative;border:1px solid var(--line);border-radius:11px;background:var(--glass);backdrop-filter:blur(6px);
    padding:9px 10px;display:flex;flex-direction:column;gap:7px;cursor:default;transition:.16s;overflow:hidden;}
  .cell.has{cursor:pointer;} .cell.has:hover{border-color:rgba(106,163,255,.5);transform:translateY(-1px);}
  .cell.past{opacity:.4;}
  .c-top{display:flex;align-items:baseline;justify-content:space-between;}
  .c-m{font-size:11.5px;font-weight:600;letter-spacing:.01em;}
  .c-n{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--faint);}
  .pips{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto;}
  .pip{width:7px;height:7px;border-radius:50%;}
  .pip.reg{background:var(--reg);box-shadow:0 0 6px rgba(106,163,255,.85);}
  .pip.pol{background:var(--pol);box-shadow:0 0 6px rgba(84,199,154,.8);}
  .pip.evt{background:var(--evt);box-shadow:0 0 6px rgba(224,166,98,.8);}
  .cell.now{border-color:rgba(106,163,255,.6);background:radial-gradient(120% 120% at 50% 0%,rgba(106,163,255,.22),var(--glass));}
  .cell.now::after{content:"";position:absolute;inset:-1px;border-radius:11px;box-shadow:0 0 0 1px rgba(106,163,255,.5),0 0 22px rgba(106,163,255,.35);pointer-events:none;}
  .newdot{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;color:var(--reg);}
  /* DRAWER (within the fixed panel; internal scroll) */
  .drawer{position:absolute;left:8px;right:8px;bottom:8px;height:248px;border-radius:13px;
    background:linear-gradient(180deg,rgba(16,24,46,.92),rgba(10,16,32,.96));backdrop-filter:blur(14px);
    border:1px solid rgba(106,163,255,.28);box-shadow:0 -18px 50px rgba(0,0,0,.5),0 0 30px rgba(106,163,255,.12);
    display:flex;flex-direction:column;overflow:hidden;}
  .dwh{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--line2);}
  .dwh .mm{font-size:14px;font-weight:600;}
  .dwh .sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);}
  .dwh .x{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 8px;cursor:pointer;}
  .scroll{flex:1;min-height:0;overflow-y:auto;padding:4px 14px 14px;}
  .scroll::-webkit-scrollbar{width:6px;} .scroll::-webkit-scrollbar-thumb{background:rgba(106,163,255,.4);border-radius:6px;}
  .d-item{padding:12px 0;border-top:1px solid var(--line2);} .d-item:first-child{border-top:none;}
  .d-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .chip{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px 3px 6px;border-radius:6px;display:inline-flex;align-items:center;gap:6px;}
  .chip::before{content:"";width:6px;height:6px;border-radius:50%;}
  .chip.reg{color:#bdd6ff;background:rgba(106,163,255,.16);}.chip.reg::before{background:var(--reg);box-shadow:0 0 6px var(--reg);}
  .chip.pol{color:#b6ecd6;background:rgba(84,199,154,.16);}.chip.pol::before{background:var(--pol);box-shadow:0 0 6px var(--pol);}
  .chip.evt{color:#f2d6af;background:rgba(224,166,98,.16);}.chip.evt::before{background:var(--evt);box-shadow:0 0 6px var(--evt);}
  .d-when{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:#bdd6ff;border:1px solid rgba(106,163,255,.3);border-radius:999px;padding:2px 8px;}
  .d-rm{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--faint);background:none;border:1px solid var(--line);border-radius:5px;padding:2px 7px;cursor:pointer;}
  .d-name{font-size:13px;font-weight:600;margin-top:7px;}
  .d-seat{font-size:11.5px;color:#c7d2e3;margin-top:5px;}
  .d-angle{font-size:11.5px;line-height:1.5;color:var(--muted);margin-top:5px;}
  .d-tg{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
  .d-tg span{font-size:10px;color:#c7d2e3;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:6px;padding:2px 8px;}
  .d-foot{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);margin-top:8px;} .d-foot a{color:var(--reg);text-decoration:none;}
  .d-cap{display:none;}
</style></head>
<body><div class="panel">
  <div class="grain"></div>
  <div class="ph"><div class="ph-l"><h3>BD Calendar</h3><span class="live">SCANNING</span></div><span class="tot" id="tot"></span></div>
  <div class="body">
    <div class="grid" id="grid"></div>
    <div class="drawer" id="drawer" style="display:none;">
      <div class="dwh"><span class="mm" id="dwm"></span><span class="sub" id="dws"></span><span class="x" id="x">esc ✕</span></div>
      <div class="scroll" id="scroll"></div>
    </div>
  </div>
</div>
<script src="cal_data2.js"></script>
<script>
  const grid=document.getElementById('grid');let tot=0;
  DATA.forEach((ps,m)=>{
    tot+=ps.length;const has=ps.length>0,past=m<NOW;
    const c=document.createElement('div');
    c.className='cell'+(has?' has':'')+(past?' past':'')+(m===NOW?' now':'');
    c.innerHTML='<div class="c-top"><span class="c-m">'+MON[m]+'</span>'+
      (m===FRESH?'<span class="newdot">NEW</span>':(has?'<span class="c-n">'+ps.length+'</span>':''))+'</div>'+
      '<div class="pips">'+ps.map(p=>'<span class="pip '+p.type+'"></span>').join('')+'</div>';
    if(has)c.addEventListener('click',()=>open(m));
    grid.appendChild(c);
  });
  document.getElementById('tot').textContent=tot+' windows · FY2026';
  function open(m){
    document.getElementById('dwm').textContent=FULL[m]+' 2026';
    document.getElementById('dws').textContent=DATA[m].length+' windows';
    document.getElementById('scroll').innerHTML=detailHTML(m);
    document.getElementById('drawer').style.display='flex';
  }
  document.getElementById('x').addEventListener('click',()=>document.getElementById('drawer').style.display='none');
  open(NOW);
</script>
</body></html>
