<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — M3 Halo Ring</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f9fc;--surface:#fff;--ink:#1F1F1F;--muted:#5F6368;--dim:#9AA0A6;
    --line:rgba(60,64,67,.10);--line2:rgba(60,64,67,.05);
    --blue:#4285F4;--blue-dark:#1A3D7C;--blue-soft:rgba(66,133,244,.10);
    --reg:#3D5A82;--pol:#5E8B73;--evt:#B5824E;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--ink);display:flex;justify-content:center;padding:28px;}
  .panel{width:584px;height:400px;background:var(--surface);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 10px 30px rgba(31,55,124,.07),0 1px 3px rgba(60,64,67,.05);display:flex;flex-direction:column;overflow:hidden;}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 6px;}
  .ph h3{margin:0;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;}
  .tot{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);}
  .body{flex:1;min-height:0;display:grid;grid-template-columns:212px 1fr;}
  .ringwrap{position:relative;display:flex;align-items:center;justify-content:center;}
  .ringwrap::before{content:"";position:absolute;width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle,var(--blue-soft),transparent 70%);}
  .ml{font-family:'JetBrains Mono',monospace;font-size:8.5px;fill:var(--muted);cursor:pointer;}
  .ml.now{fill:var(--blue-dark);font-weight:600;} .ml.empty{fill:var(--dim);opacity:.6;}
  .cm{font-size:17px;font-weight:700;fill:var(--ink);} .cs{font-family:'JetBrains Mono',monospace;font-size:8.5px;fill:var(--dim);}
  .side{display:flex;flex-direction:column;min-height:0;border-left:1px solid var(--line2);}
  .sh{display:flex;align-items:baseline;gap:8px;padding:14px 16px 4px;}
  .sh .mm{font-size:14px;font-weight:600;} .sh .sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--dim);}
  .scroll{flex:1;min-height:0;overflow-y:auto;padding:6px 16px 14px;}
  .scroll::-webkit-scrollbar{width:5px;} .scroll::-webkit-scrollbar-thumb{background:rgba(66,133,244,.25);border-radius:5px;}
  .grp{margin-top:12px;} .grp:first-child{margin-top:2px;}
  .grp-h{display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);}
  .grp-h .gd{width:6px;height:6px;border-radius:50%;}
  .grp-h.reg .gd{background:var(--reg);} .grp-h.pol .gd{background:var(--pol);} .grp-h.evt .gd{background:var(--evt);}
  .grp-h .gc{margin-left:auto;color:var(--dim);}
  .li{padding:7px 0 8px;border-bottom:1px solid var(--line2);margin-left:13px;}
  .li-top{display:flex;align-items:baseline;gap:8px;}
  .li-name{font-size:12px;font-weight:600;}
  .li-when{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue-dark);background:var(--blue-soft);border-radius:999px;padding:2px 7px;white-space:nowrap;}
  .li-seat{font-size:11px;color:var(--muted);margin-top:3px;}
  .li-angle{font-size:10.5px;line-height:1.45;color:var(--dim);margin-top:3px;}
</style></head>
<body><div class="panel">
  <div class="ph"><h3>BD Calendar</h3><span class="tot" id="tot"></span></div>
  <div class="body">
    <div class="ringwrap"><svg id="ring" width="196" height="196" viewBox="0 0 200 200"></svg></div>
    <div class="side">
      <div class="sh"><span class="mm" id="mm"></span><span class="sub" id="sub"></span></div>
      <div class="scroll" id="scroll"></div>
    </div>
  </div>
</div>
<script src="cal_data3.js"></script>
<script>
  const NS='http://www.w3.org/2000/svg',svg=document.getElementById('ring');const cx=100,cy=100;
  let tot=DATA.reduce((a,p)=>a+p.length,0);document.getElementById('tot').textContent=tot+' windows · FY2026';
  function el(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
  function pol(deg,r){const t=(deg-90)*Math.PI/180;return [cx+r*Math.cos(t),cy+r*Math.sin(t)];}
  svg.appendChild(el('circle',{cx,cy,r:76,fill:'none',stroke:'rgba(60,64,67,.10)','stroke-width':1}));
  function center(m){
    [...svg.querySelectorAll('.ctr')].forEach(n=>n.remove());
    const g=el('g',{class:'ctr'});
    const a=el('text',{x:cx,y:cy-1,'text-anchor':'middle',class:'cm'});a.textContent=MON[m];
    const b=el('text',{x:cx,y:cy+15,'text-anchor':'middle',class:'cs'});b.textContent=DATA[m].length+' windows';
    g.appendChild(a);g.appendChild(b);svg.appendChild(g);
  }
  for(let m=0;m<12;m++){
    const deg=m*30,has=DATA[m].length>0;const[dx,dy]=pol(deg,76);
    if(m===NOW){svg.appendChild(el('circle',{cx:dx,cy:dy,r:9,fill:'var(--blue-soft)'}));}
    svg.appendChild(el('circle',{cx:dx,cy:dy,r:m===NOW?4:(has?3:2),
      fill:m===NOW?'#4285F4':(has?'#9aa6b8':'#d6dce4')}));
    const[lx,ly]=pol(deg,92);
    const lab=el('text',{x:lx,y:ly+3,'text-anchor':'middle',class:'ml'+(m===NOW?' now':'')+(has?'':' empty')});
    lab.textContent=MON[m];lab.addEventListener('click',()=>sel(m));svg.appendChild(lab);
  }
  function sel(m){
    [...svg.querySelectorAll('.ml')].forEach((l,i)=>l.classList.toggle('now',i===m));
    center(m);
    document.getElementById('mm').textContent=FULL[m];
    document.getElementById('sub').textContent=DATA[m].length+' windows';
    document.getElementById('scroll').innerHTML=groupedHTML(m);
  }
  sel(NOW);
</script>
</body></html>
