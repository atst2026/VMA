<!doctype html><html><head><meta charset="utf-8">
<title>BD Calendar — X3 Reactor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --b0:#0a1020;--b1:#101a34;--ink:#e7edf8;--muted:#93a0b5;--faint:#5d6c85;
    --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.05);
    --reg:#6aa3ff;--pol:#54c79a;--evt:#e0a662;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#070b16;font-family:Inter,system-ui,sans-serif;display:flex;justify-content:center;padding:28px;}
  .panel{position:relative;width:584px;height:400px;border-radius:16px;overflow:hidden;color:var(--ink);
    background:radial-gradient(80% 90% at 25% 30%,rgba(106,163,255,.18),transparent 60%),linear-gradient(160deg,var(--b1),var(--b0));
    border:1px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,.45);}
  .ph{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line2);}
  .ph h3{margin:0;font-size:10.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;}
  .tot{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
  .body{display:grid;grid-template-columns:248px 1fr;height:calc(400px - 49px);}
  .dialwrap{position:relative;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--line2);}
  .clbl{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--muted);cursor:pointer;}
  .clbl.now{fill:#bdd6ff;} .clbl.past{opacity:.4;}
  .ctr-m{font-size:19px;font-weight:700;fill:var(--ink);} .ctr-s{font-family:'JetBrains Mono',monospace;font-size:8.5px;fill:var(--faint);}
  .ctr-n{font-size:10px;font-weight:600;fill:#bdd6ff;}
  /* right detail with internal scroll */
  .side{display:flex;flex-direction:column;min-height:0;}
  .sh{display:flex;align-items:baseline;gap:8px;padding:11px 14px 7px;}
  .sh .mm{font-size:14px;font-weight:600;} .sh .sub{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--faint);}
  .scroll{flex:1;min-height:0;overflow-y:auto;padding:0 14px 14px;}
  .scroll::-webkit-scrollbar{width:6px;} .scroll::-webkit-scrollbar-thumb{background:rgba(106,163,255,.4);border-radius:6px;}
  .d-item{padding:11px 0;border-top:1px solid var(--line2);} .d-item:first-child{border-top:none;}
  .d-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .chip{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px 3px 6px;border-radius:6px;display:inline-flex;align-items:center;gap:5px;}
  .chip::before{content:"";width:6px;height:6px;border-radius:50%;}
  .chip.reg{color:#bdd6ff;background:rgba(106,163,255,.16);}.chip.reg::before{background:var(--reg);box-shadow:0 0 6px var(--reg);}
  .chip.pol{color:#b6ecd6;background:rgba(84,199,154,.16);}.chip.pol::before{background:var(--pol);box-shadow:0 0 6px var(--pol);}
  .chip.evt{color:#f2d6af;background:rgba(224,166,98,.16);}.chip.evt::before{background:var(--evt);box-shadow:0 0 6px var(--evt);}
  .d-when{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:8.5px;color:#bdd6ff;border:1px solid rgba(106,163,255,.3);border-radius:999px;padding:2px 7px;}
  .d-rm{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--faint);background:none;border:1px solid var(--line);border-radius:5px;padding:2px 6px;cursor:pointer;}
  .d-name{font-size:12px;font-weight:600;margin-top:6px;}
  .d-seat{font-size:11px;color:#c7d2e3;margin-top:4px;}
  .d-angle{font-size:11px;line-height:1.5;color:var(--muted);margin-top:4px;}
  .d-tg{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
  .d-tg span{font-size:9.5px;color:#c7d2e3;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:5px;padding:2px 7px;}
  .d-foot{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--faint);margin-top:7px;} .d-foot a{color:var(--reg);text-decoration:none;}
  .d-cap{display:none;}
  .legend{position:absolute;left:14px;bottom:10px;display:flex;gap:11px;font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--faint);}
  .legend i{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;}
</style></head>
<body><div class="panel">
  <div class="ph"><h3>BD Calendar</h3><span class="tot" id="tot"></span></div>
  <div class="body">
    <div class="dialwrap">
      <svg id="dial" width="232" height="232" viewBox="0 0 240 240"></svg>
      <div class="legend">
        <span><i style="background:#6aa3ff"></i>Regulatory</span>
        <span><i style="background:#54c79a"></i>Policy</span>
        <span><i style="background:#e0a662"></i>Event</span>
      </div>
    </div>
    <div class="side">
      <div class="sh"><span class="mm" id="shm"></span><span class="sub" id="shs"></span></div>
      <div class="scroll" id="scroll"></div>
    </div>
  </div>
</div>
<script src="cal_data2.js"></script>
<script>
  const COL={reg:'#6aa3ff',pol:'#54c79a',evt:'#e0a662'};
  const NS='http://www.w3.org/2000/svg',svg=document.getElementById('dial');
  const cx=120,cy=120;let tot=DATA.reduce((a,p)=>a+p.length,0);
  document.getElementById('tot').textContent=tot+' windows · FY2026';
  function el(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
  function pol(deg,r){const t=(deg-90)*Math.PI/180;return [cx+r*Math.cos(t),cy+r*Math.sin(t)];}
  function arc(r,a0,a1){const[x0,y0]=pol(a0,r),[x1,y1]=pol(a1,r);const large=(a1-a0)>180?1:0;
    return 'M'+x0+' '+y0+' A'+r+' '+r+' 0 '+large+' 1 '+x1+' '+y1;}
  // defs glow
  const defs=el('defs',{});defs.innerHTML='<filter id="g" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';svg.appendChild(defs);
  svg.appendChild(el('circle',{cx,cy,r:104,fill:'none',stroke:'rgba(255,255,255,.06)','stroke-width':1}));
  function center(m){
    [...svg.querySelectorAll('.ctr')].forEach(n=>n.remove());
    const g=el('g',{class:'ctr'});
    const a=el('text',{x:cx,y:cy-4,'text-anchor':'middle',class:'ctr-m'});a.textContent=MON[m];
    const b=el('text',{x:cx,y:cy+11,'text-anchor':'middle',class:'ctr-s'});b.textContent='2026';
    const c=el('text',{x:cx,y:cy+27,'text-anchor':'middle',class:'ctr-n'});c.textContent=DATA[m].length+' windows';
    g.appendChild(a);g.appendChild(b);g.appendChild(c);svg.appendChild(g);
  }
  for(let m=0;m<12;m++){
    const deg=m*30,ps=DATA[m],n=Math.min(ps.length,6);
    // stacked glowing arc ticks growing outward
    ps.slice(0,6).forEach((p,i)=>{
      const r=58+i*7.5;
      const path=el('path',{d:arc(r,deg-9,deg+9),fill:'none',stroke:COL[p.type],'stroke-width':4,'stroke-linecap':'round',filter:'url(#g)',opacity:m<NOW?.5:1});
      svg.appendChild(path);
    });
    if(ps.length>6){const[tx,ty]=pol(deg,58+6*7.5+6);const e=el('text',{x:tx,y:ty+3,'text-anchor':'middle','font-size':8,fill:'var(--faint)','font-family':'JetBrains Mono,monospace'});e.textContent='+'+(ps.length-6);svg.appendChild(e);}
    const[lx,ly]=pol(deg,118);
    const lab=el('text',{x:lx,y:ly+3,'text-anchor':'middle',class:'clbl'+(m===NOW?' now':'')+(m<NOW?' past':'')});lab.textContent=MON[m];
    lab.addEventListener('click',()=>sel(m));svg.appendChild(lab);
    if(m===NOW){const[a,b]=pol(deg,50),[c,d]=pol(deg,108);svg.appendChild(el('line',{x1:a,y1:b,x2:c,y2:d,stroke:'rgba(106,163,255,.5)','stroke-width':1.5,filter:'url(#g)'}));}
  }
  svg.appendChild(el('circle',{cx,cy,r:46,fill:'rgba(10,16,32,.85)',stroke:'rgba(106,163,255,.35)','stroke-width':1,filter:'url(#g)'}));
  function sel(m){
    center(m);
    document.getElementById('shm').textContent=FULL[m]+' 2026';
    document.getElementById('shs').textContent=DATA[m].length+' windows';
    document.getElementById('scroll').innerHTML=detailHTML(m);
  }
  sel(NOW);
</script>
</body></html>
