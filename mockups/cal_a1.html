<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Calendar — AI Month Calendar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:#F7F9FC;color:#1F1F1F;min-height:100vh}
.wm-head{padding:24px 32px 15px;background:radial-gradient(ellipse 86% 165% at 50% -16%,#a4c6e8 0%,#bdd4ea 16%,#d4e2ef 34%,#e9f0f7 58%,#f4f8fc 78%,rgba(247,249,252,0) 100%)}
.container{max-width:1240px;margin:0 auto;padding:24px 32px;display:flex;gap:24px}
.calendar-main{flex:1;min-width:0}
.ai-sidebar{width:290px;flex-shrink:0}
.month-nav{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.month-nav h2{font-size:22px;font-weight:700;color:#385578;min-width:200px}
.month-nav button{width:36px;height:36px;border-radius:50%;border:1px solid rgba(60,64,67,.12);background:#fff;cursor:pointer;display:grid;place-items:center;font-size:18px;color:#385578;transition:all .15s}
.month-nav button:hover{background:#e9f0f7;border-color:#385578}
.legend{display:flex;gap:20px;margin-bottom:16px;font-size:13px;color:#555}
.legend span{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block}
.cal-grid{background:#fff;border-radius:12px;border:1px solid rgba(60,64,67,.12);overflow:hidden;box-shadow:0 1px 3px rgba(60,64,67,.06)}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-bottom:1px solid rgba(60,64,67,.12)}
.cal-header div{padding:10px 8px;font-size:12px;font-weight:600;color:#385578;text-transform:uppercase;letter-spacing:.5px;text-align:center}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.day-cell{min-height:90px;border-right:1px solid rgba(60,64,67,.06);border-bottom:1px solid rgba(60,64,67,.06);padding:4px;cursor:pointer;position:relative;transition:background .15s}
.day-cell:nth-child(7n){border-right:none}
.day-cell:hover{background:#f4f8fc}
.day-cell.other-month{background:#fafbfd}
.day-cell.other-month .day-num{color:#bbb}
.day-cell.selected{background:#e9f0f7}
.day-cell.today .day-num{background:#385578;color:#fff;border-radius:50%;width:26px;height:26px;display:grid;place-items:center}
.day-cell.urgent{background:rgba(220,53,69,.04)}
.day-num{font-size:13px;font-weight:600;color:#1F1F1F;padding:2px 4px;display:inline-block;margin-bottom:2px}
.bar-slot{height:18px;margin:1px 0;font-size:10px;line-height:18px;padding:0 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-weight:500;cursor:pointer;position:relative}
.bar-slot.framework{background:#4285F4}
.bar-slot.event{background:#1E7A41}
.bar-slot.mandate{background:#B98235}
.bar-slot.bar-start{border-radius:3px 0 0 3px;margin-right:0}
.bar-slot.bar-mid{border-radius:0;margin-left:0;margin-right:0}
.bar-slot.bar-end{border-radius:0 3px 3px 0;margin-left:0}
.bar-slot.bar-full{border-radius:3px}
.bar-slot.bar-mid,.bar-slot.bar-end{padding-left:3px}
.event-dot{width:8px;height:8px;border-radius:50%;background:#1E7A41;display:inline-block;margin:2px 2px;cursor:pointer;position:relative}
.event-dot-wrap{display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.event-label{font-size:9px;color:#1E7A41;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.sidebar-card{background:#fff;border-radius:12px;border:1px solid rgba(60,64,67,.12);padding:20px;box-shadow:0 1px 3px rgba(60,64,67,.06);margin-bottom:16px}
.sidebar-card h3{font-size:15px;font-weight:700;color:#385578;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sidebar-card h3 svg{flex-shrink:0}
.ai-bullet{padding:10px 12px;background:#f4f8fc;border-radius:8px;margin-bottom:8px;font-size:13px;line-height:1.5;color:#333;border-left:3px solid #4285F4;transition:all .2s}
.ai-bullet:last-child{margin-bottom:0}
.ai-bullet strong{color:#385578}
.ai-bullet.urgent-bullet{border-left-color:#dc3545;background:#fff5f5}
.ai-bullet.event-bullet{border-left-color:#1E7A41}
.ai-bullet.mandate-bullet{border-left-color:#B98235}
.sidebar-day-title{font-size:14px;font-weight:700;color:#1F1F1F;margin-bottom:12px}
.sidebar-item{padding:8px 10px;border-radius:6px;margin-bottom:6px;font-size:12px;line-height:1.4;display:flex;align-items:flex-start;gap:8px}
.sidebar-item .si-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;margin-top:3px}
.sidebar-item .si-text{flex:1}
.sidebar-item .si-text strong{display:block;font-size:12px;margin-bottom:2px}
.sidebar-item .si-text span{color:#666;font-size:11px}
.category-filter{display:flex;gap:8px;margin-bottom:16px}
.category-filter button{padding:6px 14px;border-radius:20px;border:1px solid rgba(60,64,67,.12);background:#fff;font-size:12px;cursor:pointer;font-weight:500;transition:all .15s;color:#555}
.category-filter button.active{color:#fff}
.category-filter button.fw-active{background:#4285F4;border-color:#4285F4;color:#fff}
.category-filter button.ev-active{background:#1E7A41;border-color:#1E7A41;color:#fff}
.category-filter button.mw-active{background:#B98235;border-color:#B98235;color:#fff}
</style>
</head>
<body>
<div class="wm-head">
  <div style="display:flex;align-items:center;gap:13px;max-width:1240px;margin:0 auto">
    <span style="display:grid;place-items:center;color:#1F1F1F"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg></span>
    <span style="font-size:30px;font-weight:700;letter-spacing:-.3px">BD Calendar</span>
  </div>
</div>

<div class="container">
  <div class="calendar-main">
    <div class="month-nav">
      <button onclick="changeMonth(-1)" title="Previous month">&#8249;</button>
      <h2 id="monthTitle"></h2>
      <button onclick="changeMonth(1)" title="Next month">&#8250;</button>
    </div>
    <div class="legend">
      <span><span class="legend-dot" style="background:#4285F4"></span> Approved Frameworks</span>
      <span><span class="legend-dot" style="background:#1E7A41"></span> Events &amp; Networking</span>
      <span><span class="legend-dot" style="background:#B98235"></span> Mandate Windows</span>
    </div>
    <div class="cal-grid">
      <div class="cal-header">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
      </div>
      <div class="cal-body" id="calBody"></div>
    </div>
  </div>
  <div class="ai-sidebar">
    <div class="sidebar-card" id="aiPriorities">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4285F4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 017 7c0 3-2 5-3 7h-8c-1-2-3-4-3-7a7 7 0 017-7z"/><path d="M9 16v2a3 3 0 006 0v-2"/></svg>
        AI Priorities — This Month
      </h3>
      <div id="aiContent"></div>
    </div>
    <div class="sidebar-card" id="dayDetail" style="display:none">
      <h3>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#385578" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span id="dayDetailTitle"></span>
      </h3>
      <div id="dayDetailContent"></div>
    </div>
  </div>
</div>

<script>
const TODAY = new Date(2026, 5, 6);
let currentYear = 2026, currentMonth = 5;
let selectedDate = null;

const FRAMEWORKS = [
  {name:'NHS Workforce Alliance — Exec Search & Interim', start:new Date(2026,0,1), end:new Date(2026,11,31), buyer:'NHS Workforce Alliance (via CCS)', detail:'Health sector senior leadership', type:'framework'},
  {name:'Nuclear Decommissioning Authority — Shared Services Lot 6', start:new Date(2026,9,1), end:new Date(2027,2,31), buyer:'NDA', detail:'Senior/specialist roles', type:'framework'},
  {name:'Devolved Government — Executive Search', start:new Date(2027,0,1), end:new Date(2027,8,30), buyer:'Scottish/Welsh/NI Governments', detail:'Senior public-appointment & comms', type:'framework'},
  {name:'Crown Commercial Service — Executive Search 3', start:new Date(2027,5,1), end:new Date(2028,4,31), buyer:'CCS', detail:'Senior public-sector comms leadership', type:'framework'}
];

const EVENTS = [
  {name:'CIPR Excellence Awards', date:new Date(2026,6,1), location:'London', category:'External', detail:'Senior comms judges + finalists', type:'event'},
  {name:'Internal Comms & Engagement Live', date:new Date(2026,6,8), location:'The Brewery, London', category:'Internal', detail:'Head of IC / Director of IC delegates', type:'event'},
  {name:'IoIC Awards', date:new Date(2026,8,17), location:'London', category:'Internal', detail:'Premier UK IC awards', type:'event'},
  {name:'ICCO Global Summit', date:new Date(2026,10,11), location:'Milan', category:'External', detail:'Consultancy CEOs + in-house clients', type:'event'},
  {name:'CIPR Annual Conference', date:new Date(2026,10,18), location:'London', category:'External', detail:'Tier-1 comms leaders', type:'event'},
  {name:'European Excellence Awards', date:new Date(2026,11,11), location:'Europe', category:'Mixed', detail:'UK + EU CCO attendance', type:'event'}
];

const MANDATES = [
  {name:'FCA Consumer Duty — board-report ramp', start:new Date(2026,3,1), end:new Date(2026,6,31), role:'Head of Regulatory Comms', daysLeft:56, confidence:'High', sector:'Financial Services', type:'mandate'},
  {name:'UK SRS — sustainability-reporting build-up', start:new Date(2026,0,1), end:new Date(2026,11,31), role:'Head of Sustainability Comms', daysLeft:209, confidence:'Medium', sector:'Cross-sector', type:'mandate'},
  {name:'Machinery-of-government — post-SR reshuffle', start:new Date(2026,3,1), end:new Date(2026,11,31), role:'Director of Communications (GCS)', daysLeft:209, confidence:'Medium', sector:'Public Sector', type:'mandate'},
  {name:'UK annual-report & AGM season', start:new Date(2026,1,1), end:new Date(2026,5,30), role:'Head of IR Communications', daysLeft:25, confidence:'High', sector:'Cross-sector', type:'mandate'},
  {name:'Gender Pay Gap — reporting & scrutiny', start:new Date(2026,2,1), end:new Date(2026,5,30), role:'Head of Internal/DEI Comms', daysLeft:25, confidence:'High', sector:'Cross-sector', type:'mandate'},
  {name:'NHS operational-planning round', start:new Date(2026,0,1), end:new Date(2026,4,31), role:'Director of Comms — NHS', daysLeft:-1, confidence:'Medium', sector:'Public Sector', closed:true, type:'mandate'},
  {name:'Higher-Education clearing & new-intake', start:new Date(2026,5,15), end:new Date(2026,8,30), role:'Head of Comms/Student Recruitment', daysLeft:117, confidence:'Medium', sector:'Public Sector', type:'mandate'}
];

function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function dateKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}
function fmtDate(d){const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear()}

function getActiveItems(date) {
  const items = [];
  FRAMEWORKS.forEach(f => { if(date >= f.start && date <= f.end) items.push(f); });
  EVENTS.forEach(e => { if(sameDay(date, e.date)) items.push(e); });
  MANDATES.forEach(m => { if(!m.closed && date >= m.start && date <= m.end) items.push(m); });
  return items;
}

function generateAI(year, month) {
  const monthStart = new Date(year, month, 1);
  const monthEnd = new Date(year, month+1, 0);
  const bullets = [];

  MANDATES.forEach(m => {
    if(m.closed) return;
    if(m.end >= monthStart && m.end <= monthEnd) {
      bullets.push({html:`<strong>${m.name}</strong> closes ${fmtDate(m.end)} — finalise outreach to remaining targets and secure pipeline commitments.`, cls:'urgent-bullet'});
    } else if(m.end > monthEnd && m.start <= monthEnd && m.daysLeft > 0 && m.daysLeft < 90) {
      bullets.push({html:`<strong>${m.name}</strong> — ${m.daysLeft} days remaining. Prioritise ${m.role} placements this month.`, cls:'mandate-bullet'});
    }
  });

  EVENTS.forEach(e => {
    const prepDate = new Date(e.date); prepDate.setDate(prepDate.getDate() - 35);
    if(e.date.getMonth() === month && e.date.getFullYear() === year) {
      bullets.push({html:`<strong>${e.name}</strong> on ${fmtDate(e.date)} — research finalists shortlist and confirm attendance for networking.`, cls:'event-bullet'});
    } else if(prepDate >= monthStart && prepDate <= monthEnd) {
      bullets.push({html:`Start preparing for <strong>${e.name}</strong> (${fmtDate(e.date)}) — identify key attendees and plan approach strategy.`, cls:'event-bullet'});
    }
  });

  FRAMEWORKS.forEach(f => {
    if(f.start >= monthStart && f.start <= monthEnd) {
      bullets.push({html:`<strong>${f.name}</strong> opens this month — review requirements and prepare submission materials.`, cls:''});
    }
    if(f.end >= monthStart && f.end <= monthEnd) {
      bullets.push({html:`<strong>${f.name}</strong> closes ${fmtDate(f.end)} — ensure all candidate slates are finalised.`, cls:'urgent-bullet'});
    }
  });

  if(bullets.length === 0) {
    bullets.push({html:'Relatively quiet month — focus on pipeline building and relationship maintenance.', cls:''});
  }

  return bullets.slice(0, 5);
}

function renderCalendar() {
  const year = currentYear, month = currentMonth;
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('monthTitle').textContent = monthNames[month] + ' ' + year;

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;

  const calBody = document.getElementById('calBody');
  calBody.innerHTML = '';

  const startDate = new Date(firstDay);
  startDate.setDate(startDate.getDate() - startDow);

  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;

  // Build bar layout data
  const allBars = [];
  FRAMEWORKS.forEach(f => {
    const bs = new Date(Math.max(f.start, startDate));
    const be = new Date(Math.min(f.end, new Date(startDate.getTime() + (totalCells-1)*86400000)));
    if(bs <= be) allBars.push({...f, barStart:new Date(bs), barEnd:new Date(be), color:'#4285F4', cls:'framework'});
  });
  MANDATES.forEach(m => {
    if(m.closed) return;
    const bs = new Date(Math.max(m.start, startDate));
    const be = new Date(Math.min(m.end, new Date(startDate.getTime() + (totalCells-1)*86400000)));
    if(bs <= be) allBars.push({...m, barStart:new Date(bs), barEnd:new Date(be), color:'#B98235', cls:'mandate'});
  });

  // Assign bar rows
  const barRows = [];
  allBars.sort((a,b) => a.barStart - b.barStart);
  allBars.forEach(bar => {
    let row = 0;
    while(true) {
      if(!barRows[row]) barRows[row] = [];
      const conflict = barRows[row].some(b => bar.barStart <= b.barEnd && bar.barEnd >= b.barStart);
      if(!conflict) { barRows[row].push(bar); bar.row = row; break; }
      row++;
    }
  });

  // Build cells
  for(let i = 0; i < totalCells; i++) {
    const cellDate = new Date(startDate);
    cellDate.setDate(cellDate.getDate() + i);
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if(cellDate.getMonth() !== month) cell.classList.add('other-month');
    if(sameDay(cellDate, TODAY)) cell.classList.add('today');
    if(selectedDate && sameDay(cellDate, selectedDate)) cell.classList.add('selected');

    // Check urgency (window ending within 14 days from today)
    const diffMs = cellDate - TODAY;
    const diffDays = diffMs / 86400000;
    MANDATES.forEach(m => {
      if(!m.closed && sameDay(cellDate, m.end) || (!m.closed && m.end >= TODAY && (m.end - TODAY)/86400000 <= 14 && sameDay(cellDate, m.end))) {
        cell.classList.add('urgent');
      }
    });
    // Also tint days where a mandate ends within 14 days
    MANDATES.forEach(m => {
      if(!m.closed) {
        const daysToEnd = (m.end - TODAY) / 86400000;
        if(daysToEnd <= 14 && daysToEnd >= 0 && cellDate >= TODAY && cellDate <= m.end) {
          cell.classList.add('urgent');
        }
      }
    });

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = cellDate.getDate();
    cell.appendChild(num);

    // Bars
    const maxBarsShow = 2;
    let barsShown = 0;
    allBars.forEach(bar => {
      if(cellDate >= bar.barStart && cellDate <= bar.barEnd && barsShown < maxBarsShow) {
        const barEl = document.createElement('div');
        barEl.className = 'bar-slot ' + bar.cls;
        const isStart = sameDay(cellDate, bar.barStart) || cellDate.getDay() === 1 || i % 7 === 0;
        const isEnd = sameDay(cellDate, bar.barEnd) || cellDate.getDay() === 0 || i % 7 === 6;
        if(isStart && isEnd) barEl.classList.add('bar-full');
        else if(isStart) barEl.classList.add('bar-start');
        else if(isEnd) barEl.classList.add('bar-end');
        else barEl.classList.add('bar-mid');

        if(isStart) barEl.textContent = bar.name.length > 22 ? bar.name.substring(0,20)+'...' : bar.name;
        cell.appendChild(barEl);
        barsShown++;
      }
    });

    // Events
    EVENTS.forEach(e => {
      if(sameDay(cellDate, e.date)) {
        const wrap = document.createElement('div');
        wrap.className = 'event-dot-wrap';
        const dot = document.createElement('span');
        dot.className = 'event-dot';
        dot.title = e.name;
        wrap.appendChild(dot);
        const lbl = document.createElement('span');
        lbl.className = 'event-label';
        lbl.textContent = e.name.length > 18 ? e.name.substring(0,16)+'...' : e.name;
        wrap.appendChild(lbl);
        cell.appendChild(wrap);
      }
    });

    const cd = new Date(cellDate);
    cell.addEventListener('click', () => selectDay(cd));
    calBody.appendChild(cell);
  }

  // AI sidebar
  const bullets = generateAI(year, month);
  const aiDiv = document.getElementById('aiContent');
  aiDiv.innerHTML = bullets.map(b => `<div class="ai-bullet ${b.cls}">${b.html}</div>`).join('');
}

function selectDay(date) {
  selectedDate = date;
  renderCalendar();
  const items = getActiveItems(date);
  const detail = document.getElementById('dayDetail');
  const title = document.getElementById('dayDetailTitle');
  const content = document.getElementById('dayDetailContent');
  title.textContent = fmtDate(date);

  if(items.length === 0) {
    content.innerHTML = '<div style="font-size:13px;color:#888;padding:8px 0">No active items on this date.</div>';
  } else {
    content.innerHTML = items.map(item => {
      let color = '#4285F4', label = 'Framework';
      if(item.type === 'event') { color = '#1E7A41'; label = 'Event'; }
      if(item.type === 'mandate') { color = '#B98235'; label = 'Mandate Window'; }
      let extra = '';
      if(item.type === 'framework') extra = `<span>Buyer: ${item.buyer}<br>${item.detail}</span>`;
      if(item.type === 'event') extra = `<span>${item.location} · ${item.category}<br>${item.detail}</span>`;
      if(item.type === 'mandate') extra = `<span>${item.role}<br>${item.sector} · ${item.confidence} confidence</span>`;
      return `<div class="sidebar-item" style="background:${color}08"><div class="si-dot" style="background:${color}"></div><div class="si-text"><strong>${item.name}</strong>${extra}</div></div>`;
    }).join('');
  }
  detail.style.display = 'block';
}

function changeMonth(dir) {
  currentMonth += dir;
  if(currentMonth > 11) { currentMonth = 0; currentYear++; }
  if(currentMonth < 0) { currentMonth = 11; currentYear--; }
  selectedDate = null;
  document.getElementById('dayDetail').style.display = 'none';
  renderCalendar();
}

renderCalendar();
</script>
</body>
</html>
