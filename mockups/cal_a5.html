<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Calendar — Year-at-a-Glance</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:#F7F9FC;color:#1F1F1F;min-height:100vh}
.wm-head{padding:24px 32px 15px;background:radial-gradient(ellipse 86% 165% at 50% -16%,#a4c6e8 0%,#bdd4ea 16%,#d4e2ef 34%,#e9f0f7 58%,#f4f8fc 78%,rgba(247,249,252,0) 100%)}
.container{max-width:1280px;margin:0 auto;padding:24px 32px}
.ai-insight-bar{background:#fff;border-radius:12px;border:1px solid rgba(60,64,67,.12);padding:16px 24px;margin-bottom:24px;box-shadow:0 1px 3px rgba(60,64,67,.06);display:flex;align-items:center;gap:12px}
.ai-insight-bar svg{flex-shrink:0}
.ai-insight-bar p{font-size:14px;line-height:1.5;color:#333;margin:0}
.ai-insight-bar strong{color:#385578}
.year-title{font-size:20px;font-weight:700;color:#385578;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.legend{display:flex;gap:18px;margin-bottom:20px;font-size:12px;color:#555}
.legend span{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px}
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.month-card{background:#fff;border-radius:12px;border:1px solid rgba(60,64,67,.12);overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(60,64,67,.04)}
.month-card:hover{box-shadow:0 4px 12px rgba(60,64,67,.1);transform:translateY(-2px)}
.month-card.expanded{grid-column:1/-1;cursor:default;transform:none;box-shadow:0 2px 8px rgba(60,64,67,.08)}
.month-card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(60,64,67,.06)}
.month-card-header h3{font-size:15px;font-weight:700;color:#385578;margin:0}
.month-card-header .activity-count{font-size:11px;color:#888;font-weight:500}
.month-card.current .month-card-header{background:#385578}
.month-card.current .month-card-header h3,.month-card.current .month-card-header .activity-count{color:#fff}
.intensity-bars{padding:10px 16px 8px;display:flex;gap:4px;align-items:flex-end;height:48px}
.intensity-bar{flex:1;border-radius:2px 2px 0 0;min-width:0;transition:height .3s}
.event-dots{padding:4px 16px 12px;display:flex;gap:4px;flex-wrap:wrap;min-height:24px}
.event-dot{width:8px;height:8px;border-radius:50%;background:#1E7A41;cursor:pointer;position:relative}
.event-dot:hover::after{content:attr(data-name);position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:10px;padding:3px 8px;border-radius:4px;white-space:nowrap;z-index:10}

/* Expanded month view */
.expanded-body{display:none;padding:0}
.month-card.expanded .expanded-body{display:block}
.month-card.expanded .intensity-bars,.month-card.expanded .event-dots{display:none}
.close-expanded{float:right;width:28px;height:28px;border-radius:50%;border:1px solid rgba(60,64,67,.12);background:#fff;cursor:pointer;display:none;place-items:center;font-size:16px;color:#666}
.month-card.expanded .close-expanded{display:grid}
.exp-cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-bottom:1px solid rgba(60,64,67,.08)}
.exp-cal-header div{padding:8px;font-size:11px;font-weight:600;color:#385578;text-align:center;text-transform:uppercase}
.exp-cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.exp-cell{min-height:70px;border-right:1px solid rgba(60,64,67,.04);border-bottom:1px solid rgba(60,64,67,.04);padding:3px;position:relative}
.exp-cell:nth-child(7n){border-right:none}
.exp-cell.other-month{background:#fafbfd}
.exp-cell.other-month .exp-num{color:#ccc}
.exp-cell.today .exp-num{background:#385578;color:#fff;border-radius:50%;width:22px;height:22px;display:grid;place-items:center}
.exp-num{font-size:12px;font-weight:600;padding:2px 3px;display:inline-block}
.exp-bar{height:14px;margin:1px 0;font-size:8px;line-height:14px;padding:0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-weight:500;border-radius:2px}
.exp-bar.framework{background:#4285F4}
.exp-bar.mandate{background:#B98235}
.exp-bar.bar-start{border-radius:2px 0 0 2px}
.exp-bar.bar-mid{border-radius:0}
.exp-bar.bar-end{border-radius:0 2px 2px 0}
.exp-bar.bar-full{border-radius:2px}
.exp-event{display:flex;align-items:center;gap:3px;margin-top:1px}
.exp-event-dot{width:6px;height:6px;border-radius:50%;background:#1E7A41;flex-shrink:0}
.exp-event-label{font-size:8px;color:#1E7A41;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="wm-head">
  <div style="display:flex;align-items:center;gap:13px;max-width:1240px;margin:0 auto">
    <span style="display:grid;place-items:center;color:#1F1F1F"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg></span>
    <span style="font-size:30px;font-weight:700;letter-spacing:-.3px">BD Calendar</span>
  </div>
</div>
<div class="container">
  <div class="ai-insight-bar">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4285F4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 017 7c0 3-2 5-3 7h-8c-1-2-3-4-3-7a7 7 0 017-7z"/><path d="M9 16v2a3 3 0 006 0v-2"/></svg>
    <p id="aiInsightLine"></p>
  </div>
  <div class="year-title">
    <span>Jul 2026 — Jun 2027</span>
  </div>
  <div class="legend">
    <span><span class="legend-dot" style="background:#4285F4"></span> Frameworks</span>
    <span><span class="legend-dot" style="background:#1E7A41"></span> Events</span>
    <span><span class="legend-dot" style="background:#B98235"></span> Mandate Windows</span>
    <span style="font-size:11px;color:#888">Click any month to expand</span>
  </div>
  <div class="year-grid" id="yearGrid"></div>
</div>

<script>
const TODAY = new Date(2026, 5, 6);

const FRAMEWORKS = [
  {name:'NHS Workforce Alliance — Exec Search & Interim', short:'NHS Workforce', start:new Date(2026,0,1), end:new Date(2026,11,31), type:'framework'},
  {name:'Nuclear Decommissioning Authority — Shared Services Lot 6', short:'NDA Lot 6', start:new Date(2026,9,1), end:new Date(2027,2,31), type:'framework'},
  {name:'Devolved Government — Executive Search', short:'Devolved Gov', start:new Date(2027,0,1), end:new Date(2027,8,30), type:'framework'},
  {name:'Crown Commercial Service — Executive Search 3', short:'CCS Exec Search 3', start:new Date(2027,5,1), end:new Date(2028,4,31), type:'framework'}
];
const EVENTS = [
  {name:'CIPR Excellence Awards', date:new Date(2026,6,1), type:'event'},
  {name:'Internal Comms & Engagement Live', date:new Date(2026,6,8), type:'event'},
  {name:'IoIC Awards', date:new Date(2026,8,17), type:'event'},
  {name:'ICCO Global Summit', date:new Date(2026,10,11), type:'event'},
  {name:'CIPR Annual Conference', date:new Date(2026,10,18), type:'event'},
  {name:'European Excellence Awards', date:new Date(2026,11,11), type:'event'}
];
const MANDATES = [
  {name:'FCA Consumer Duty — board-report ramp', short:'FCA Consumer Duty', start:new Date(2026,3,1), end:new Date(2026,6,31), type:'mandate', closed:false},
  {name:'UK SRS — sustainability-reporting build-up', short:'UK SRS', start:new Date(2026,0,1), end:new Date(2026,11,31), type:'mandate', closed:false},
  {name:'Machinery-of-government — post-SR reshuffle', short:'MoG reshuffle', start:new Date(2026,3,1), end:new Date(2026,11,31), type:'mandate', closed:false},
  {name:'UK annual-report & AGM season', short:'UK AGM season', start:new Date(2026,1,1), end:new Date(2026,5,30), type:'mandate', closed:false},
  {name:'Gender Pay Gap — reporting & scrutiny', short:'Gender Pay Gap', start:new Date(2026,2,1), end:new Date(2026,5,30), type:'mandate', closed:false},
  {name:'NHS operational-planning round', short:'NHS ops planning', start:new Date(2026,0,1), end:new Date(2026,4,31), type:'mandate', closed:true},
  {name:'Higher-Education clearing & new-intake', short:'HE clearing', start:new Date(2026,5,15), end:new Date(2026,8,30), type:'mandate', closed:false}
];

function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];

// Year range: Jul 2026 - Jun 2027
const yearMonths = [];
for(let i = 0; i < 12; i++) {
  const m = (6 + i) % 12;
  const y = m < 6 ? 2027 : 2026;
  // Fix: Jul=6 2026, Aug=7 2026, ... Dec=11 2026, Jan=0 2027, ... Jun=5 2027
  yearMonths.push({month: m, year: y});
}

function countActivity(year, month) {
  const ms = new Date(year, month, 1);
  const me = new Date(year, month+1, 0);
  let fw = 0, ev = 0, mw = 0;
  FRAMEWORKS.forEach(f => { if(f.start <= me && f.end >= ms) fw++; });
  EVENTS.forEach(e => { if(e.date >= ms && e.date <= me) ev++; });
  MANDATES.forEach(m => { if(!m.closed && m.start <= me && m.end >= ms) mw++; });
  return {fw, ev, mw, total: fw + ev + mw};
}

function getMonthEvents(year, month) {
  const ms = new Date(year, month, 1);
  const me = new Date(year, month+1, 0);
  return EVENTS.filter(e => e.date >= ms && e.date <= me);
}

let expandedMonth = null;

function renderYear() {
  const grid = document.getElementById('yearGrid');
  grid.innerHTML = '';

  // Calculate activity for insight
  const activityData = yearMonths.map(ym => ({...ym, ...countActivity(ym.year, ym.month)}));
  const maxActivity = Math.max(...activityData.map(a => a.total));

  // Find busiest and quietest
  let busiest = activityData.reduce((a,b) => a.total > b.total ? a : b);
  let quietest = activityData.reduce((a,b) => a.total < b.total ? a : b);

  // Find busiest period (consecutive months)
  let bestRun = {start:0, end:0, total:0};
  for(let i = 0; i < activityData.length - 1; i++) {
    const t = activityData[i].total + activityData[i+1].total;
    if(t > bestRun.total) bestRun = {start:i, end:i+1, total:t};
  }

  const bs = activityData[bestRun.start], be = activityData[bestRun.end];
  const bsAct = countActivity(bs.year, bs.month);
  const beAct = countActivity(be.year, be.month);
  const totalEv = bsAct.ev + beAct.ev, totalFw = bsAct.fw + beAct.fw, totalMw = bsAct.mw + beAct.mw;

  document.getElementById('aiInsightLine').innerHTML = `<strong>Busiest period: ${MN[bs.month].substring(0,3)}–${MN[be.month].substring(0,3)} ${be.year}</strong> (${totalEv} events, ${totalFw} frameworks, ${totalMw} windows). <strong>Quietest: ${MN[quietest.month].substring(0,3)} ${quietest.year}</strong> (${quietest.total} active items). Plan resource allocation accordingly.`;

  activityData.forEach((ym, idx) => {
    const card = document.createElement('div');
    card.className = 'month-card';
    const isCurrent = ym.year === TODAY.getFullYear() && ym.month === TODAY.getMonth();
    if(isCurrent) card.classList.add('current');
    const isExpanded = expandedMonth !== null && expandedMonth.year === ym.year && expandedMonth.month === ym.month;
    if(isExpanded) card.classList.add('expanded');

    // Header
    const header = document.createElement('div');
    header.className = 'month-card-header';
    header.innerHTML = `<h3>${MN[ym.month]} ${ym.year}</h3><span class="activity-count">${ym.total} active</span>` +
      (isExpanded ? `<button class="close-expanded" onclick="collapseMonth(event)" style="display:grid">&#215;</button>` : '');
    card.appendChild(header);

    // Intensity bars
    const barsDiv = document.createElement('div');
    barsDiv.className = 'intensity-bars';
    const maxH = 32;
    [{val:ym.fw,color:'#4285F4'},{val:ym.mw,color:'#B98235'},{val:ym.ev,color:'#1E7A41'}].forEach(b => {
      const bar = document.createElement('div');
      bar.className = 'intensity-bar';
      bar.style.background = b.color;
      bar.style.height = (b.val > 0 ? Math.max(6, (b.val / Math.max(maxActivity, 1)) * maxH) : 0) + 'px';
      bar.style.opacity = b.val > 0 ? '1' : '0.15';
      barsDiv.appendChild(bar);
    });
    card.appendChild(barsDiv);

    // Event dots
    const dotsDiv = document.createElement('div');
    dotsDiv.className = 'event-dots';
    getMonthEvents(ym.year, ym.month).forEach(e => {
      const dot = document.createElement('span');
      dot.className = 'event-dot';
      dot.setAttribute('data-name', e.name);
      dotsDiv.appendChild(dot);
    });
    card.appendChild(dotsDiv);

    // Expanded body
    const expBody = document.createElement('div');
    expBody.className = 'expanded-body';
    if(isExpanded) {
      expBody.appendChild(buildExpandedMonth(ym.year, ym.month));
    }
    card.appendChild(expBody);

    if(!isExpanded) {
      card.addEventListener('click', () => expandMonth(ym.year, ym.month));
    }

    grid.appendChild(card);
  });
}

function expandMonth(year, month) {
  expandedMonth = {year, month};
  renderYear();
}

function collapseMonth(e) {
  e.stopPropagation();
  expandedMonth = null;
  renderYear();
}

function buildExpandedMonth(year, month) {
  const frag = document.createDocumentFragment();

  const calHeader = document.createElement('div');
  calHeader.className = 'exp-cal-header';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    const div = document.createElement('div');
    div.textContent = d;
    calHeader.appendChild(div);
  });
  frag.appendChild(calHeader);

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const sd = new Date(firstDay); sd.setDate(sd.getDate() - startDow);
  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;
  const endDateGrid = new Date(sd.getTime() + (totalCells - 1) * 86400000);

  // Bars
  const allBars = [];
  FRAMEWORKS.forEach(f => {
    const bs = new Date(Math.max(f.start, sd));
    const be = new Date(Math.min(f.end, endDateGrid));
    if(bs<=be) allBars.push({...f,barStart:bs,barEnd:be,cls:'framework'});
  });
  MANDATES.forEach(m => {
    if(m.closed) return;
    const bs = new Date(Math.max(m.start, sd));
    const be = new Date(Math.min(m.end, endDateGrid));
    if(bs<=be) allBars.push({...m,barStart:bs,barEnd:be,cls:'mandate'});
  });

  const body = document.createElement('div');
  body.className = 'exp-cal-body';

  for(let i = 0; i < totalCells; i++) {
    const cellDate = new Date(sd); cellDate.setDate(cellDate.getDate() + i);
    const cell = document.createElement('div');
    cell.className = 'exp-cell';
    if(cellDate.getMonth() !== month) cell.classList.add('other-month');
    if(sameDay(cellDate, TODAY)) cell.classList.add('today');

    const num = document.createElement('div');
    num.className = 'exp-num';
    num.textContent = cellDate.getDate();
    cell.appendChild(num);

    let barsShown = 0;
    allBars.forEach(bar => {
      if(cellDate >= bar.barStart && cellDate <= bar.barEnd && barsShown < 2) {
        const el = document.createElement('div');
        el.className = 'exp-bar ' + bar.cls;
        const isStart = sameDay(cellDate, bar.barStart) || i%7===0;
        const isEnd = sameDay(cellDate, bar.barEnd) || i%7===6;
        if(isStart&&isEnd) el.classList.add('bar-full');
        else if(isStart) el.classList.add('bar-start');
        else if(isEnd) el.classList.add('bar-end');
        else el.classList.add('bar-mid');
        if(isStart) el.textContent = (bar.short||bar.name).substring(0,16);
        cell.appendChild(el);
        barsShown++;
      }
    });

    EVENTS.forEach(e => {
      if(sameDay(cellDate, e.date)) {
        const wrap = document.createElement('div');
        wrap.className = 'exp-event';
        wrap.innerHTML = `<span class="exp-event-dot"></span><span class="exp-event-label">${e.name.substring(0,14)}</span>`;
        cell.appendChild(wrap);
      }
    });

    body.appendChild(cell);
  }
  frag.appendChild(body);
  return frag;
}

renderYear();
</script>
</body>
</html>
