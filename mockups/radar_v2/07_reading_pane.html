<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VMA — Communications Radar · Reading Pane</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#101626; --sec:#3C4043; --muted:#5A6577; --dim:#9AA0A6;
  --hair:rgba(16,22,38,.08); --hair2:rgba(16,22,38,.12);
  --slate:#3E5C84; --deep:#1A3D7C; --accent:#4285F4; --wash:#E8F0FE;
  --clay:#D97757; --green:#1E7A41; --amber:#B45309; --red:#B3261E;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,monospace;
  --ui:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  display:flex;overflow:hidden;background:#fff;color:var(--ink);
  font:400 14px/1.5 var(--ui);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
.scroll{scrollbar-width:thin;scrollbar-color:rgba(16,22,38,.16) transparent}
.scroll::-webkit-scrollbar{width:6px}
.scroll::-webkit-scrollbar-track{background:transparent}
.scroll::-webkit-scrollbar-thumb{background:rgba(16,22,38,.14);border-radius:3px}
.scroll::-webkit-scrollbar-thumb:hover{background:rgba(16,22,38,.25)}

/* ============================== LEFT RAIL ============================== */
#rail{width:320px;flex:none;height:100%;display:flex;flex-direction:column;background:#FBFCFE;border-right:1px solid var(--hair)}
.rail-head{padding:20px 18px 12px}
.wordmark{font:800 13px/1 var(--ui);letter-spacing:.01em;color:var(--ink)}
.wordmark span{font-weight:300;letter-spacing:.34em;margin-left:7px;color:var(--sec)}
.rail-title{margin-top:11px;font:600 13.5px/1.3 var(--ui);color:var(--ink)}
.rail-date{font:500 9.5px var(--mono);letter-spacing:.06em;color:var(--dim);margin-top:3px;text-transform:uppercase}
.synth{margin-top:13px;padding:11px 12px;background:#fff;border:1px solid var(--hair);border-radius:10px;font:400 11px/1.6 var(--ui);color:var(--muted)}
.synth .spark{color:var(--clay);margin-right:3px}
#railScroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:2px 0 12px}
.rail-label{font:600 9px var(--mono);letter-spacing:.15em;color:var(--dim);padding:14px 18px 8px}
.rail-foot{padding:11px 18px 12px;border-top:1px solid var(--hair);display:flex;flex-direction:column;gap:3px}
.rail-foot span{font:500 10px var(--mono);letter-spacing:.04em;color:var(--dim)}
.rail-foot .concept{color:#B9BFC9}

/* ready list items */
.item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 14px 9px 16px;transition:background .15s ease;position:relative}
.item:hover{background:#F1F4FA}
.item.sel{background:var(--wash);box-shadow:inset 3px 0 0 var(--deep)}
.item:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;border-radius:0}
.item.done{opacity:.62}
.item.dismissed{opacity:.45}
.item.dismissed .item-co b{text-decoration:line-through;text-decoration-color:rgba(16,22,38,.35)}
.ringwrap{position:relative;width:30px;height:30px;flex:none}
.item-main{flex:1;min-width:0}
.item-co{display:flex;align-items:center;gap:6px;font:600 14px/1.25 var(--ui);color:var(--ink)}
.item-seat{display:block;font:400 11.5px/1.4 var(--ui);color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font:500 10px var(--mono);color:var(--dim);flex:none}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--clay);flex:none;animation:pulse 2.4s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,119,87,.35)}50%{box-shadow:0 0 0 4px rgba(217,119,87,0)}}
.tbadge{position:absolute;right:-3px;bottom:-3px;width:14px;height:14px;border-radius:50%;display:grid;place-items:center;border:2px solid #FBFCFE;color:#fff}
.tbadge.done{background:var(--green)}
.tbadge.dismissed{background:var(--dim)}

/* groups */
.group{margin-top:2px}
.ghead{display:flex;align-items:center;gap:7px;width:100%;padding:10px 16px 8px 18px;font:600 9px var(--mono);letter-spacing:.15em;color:var(--dim);transition:color .15s ease}
.ghead:hover{color:var(--sec)}
.ghead:focus-visible{outline-offset:-2px}
.gcount{font:600 9px var(--mono);background:rgba(16,22,38,.06);color:var(--muted);padding:2px 7px;border-radius:999px;letter-spacing:0}
.gcount.red{background:#FBEAE8;color:var(--red)}
.ghead .chev{margin-left:auto;transition:transform .25s ease;color:var(--dim)}
.group.open .ghead .chev{transform:rotate(180deg)}
.gbody{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s ease}
.group.open .gbody{grid-template-rows:1fr}
.gbody>div{overflow:hidden}
.gitem{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:7px 14px 7px 18px;opacity:.78;transition:background .15s ease}
.gitem:hover{background:#F1F4FA;opacity:1}
.gitem.sel{background:var(--wash);box-shadow:inset 3px 0 0 var(--deep);opacity:1}
.gitem:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;border-radius:0}
.gitem.dismissed{opacity:.4}
.gscore{font:600 10px var(--mono);color:var(--dim);width:22px;flex:none;text-align:center}
.g-co{display:flex;align-items:center;gap:6px;font:500 13px/1.3 var(--ui);color:var(--sec)}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--red);flex:none}
.gmark{font:600 9px var(--mono);color:var(--dim)}
.gmark.ok{color:var(--green)}

/* ============================== RIGHT PANE ============================= */
#pane{flex:1;min-width:0;height:100%;overflow-y:auto;overflow-x:hidden;
  background:radial-gradient(900px 360px at 78% -140px,rgba(66,133,244,.05),transparent 62%) #fff}
.actionbar{position:sticky;top:0;z-index:6;display:flex;justify-content:flex-end;padding:14px 22px 4px;pointer-events:none}
.cluster{pointer-events:auto;display:flex;align-items:stretch;gap:2px;padding:4px;
  background:rgba(255,255,255,.9);backdrop-filter:blur(12px) saturate(1.3);-webkit-backdrop-filter:blur(12px) saturate(1.3);
  border:1px solid var(--hair);border-radius:12px;box-shadow:0 10px 30px rgba(16,22,38,.10)}
.btn{display:inline-flex;align-items:center;gap:6px;font:600 12px/1 var(--ui);color:var(--sec);padding:8px 10px;border-radius:8px;transition:background .15s ease,color .15s ease}
.btn svg{color:var(--muted);transition:color .15s ease}
.btn:hover{background:#F1F4FA;color:var(--ink)}
.btn:hover svg{color:var(--ink)}
.btn.good:hover{background:#E7F3EC;color:var(--green)}
.btn.good:hover svg{color:var(--green)}
.btn.bad:hover{background:#FBEAE8;color:var(--red)}
.btn.bad:hover svg{color:var(--red)}
.btn.good.active{background:#E7F3EC;color:var(--green)}
.btn.good.active svg{color:var(--green)}
.btn.bad.active{background:#FBEAE8;color:var(--red)}
.btn.bad.active svg{color:var(--red)}
.vsep{width:1px;background:var(--hair2);margin:5px 4px}

/* the document */
.doc{max-width:744px;margin:0 auto;padding:16px 56px 84px}
.st{opacity:0;animation:rise .5s cubic-bezier(.22,.61,.36,1) both;animation-delay:var(--d,0ms)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.eyebrow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:20px}
.chip{display:inline-flex;align-items:center;gap:5px;font:600 10px/1 var(--mono);letter-spacing:.06em;padding:5px 8px;border-radius:6px;border:1px solid var(--hair);color:var(--muted);background:#fff;text-transform:uppercase;white-space:nowrap}
.chip svg{flex:none}
.chip.trig-lead{background:#e9effb;color:#1d4ed8;border-color:transparent}
.chip.trig-fund{background:#e7f3ec;color:#1e7a41;border-color:transparent}
.chip.trig-restr{background:#edf0f4;color:#46556e;border-color:transparent}
.chip.trig-warn{background:#fdecdb;color:#b5530e;border-color:transparent}
.chip.trig-mna{background:#efe9fb;color:#6b3fb5;border-color:transparent}
.chip.trig-people{background:#ddf3f0;color:#0e7c74;border-color:transparent}
.chip.new{background:#FCEDE6;color:#C2521F;border-color:transparent}
.chip.new i{width:5px;height:5px;border-radius:50%;background:var(--clay)}
.chip.ver-reg{background:#e7f3ec;color:var(--green);border-color:transparent}
.chip.ver-multi{background:#edf0f4;color:#46556e;border-color:transparent}
.chip.ver-single{background:#fdecdb;color:#b5530e;border-color:transparent}
.chip.rt{background:#e7f3ec;color:var(--green);border-color:transparent}
.chip.plan{color:var(--muted)}
.chip.plan b{color:var(--clay);font-weight:600;margin-right:1px}
.chip.tier-dev{background:#fdecdb;color:var(--amber);border-color:transparent}
.chip.tier-early{background:#edf0f4;color:var(--muted);border-color:transparent}
.chip.tier-blocked{background:#FBEAE8;color:var(--red);border-color:transparent}

.doc h1{font:800 38px/1.1 var(--ui);letter-spacing:-.02em;color:var(--ink);margin:0 0 14px}
.standfirst{font:400 18px/1.6 var(--ui);color:var(--muted);max-width:60ch;margin:0}
.divider{display:flex;align-items:center;gap:12px;margin:34px 0 30px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--hair)}
.divider span{font:600 9px var(--mono);letter-spacing:.2em;color:var(--dim);white-space:nowrap}
.divider .spark{color:var(--clay);letter-spacing:0;margin-right:2px}

.sec{margin-bottom:30px}
.slabel{display:flex;align-items:center;gap:8px;font:600 8.5px var(--mono);letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.slabel .right{margin-left:auto;font:600 9px var(--mono);letter-spacing:.1em;color:var(--dim)}
.body{font:400 13.5px/1.65 var(--ui);color:var(--sec);max-width:64ch}
.badge{display:inline-flex;align-items:center;font:600 9px/1 var(--mono);letter-spacing:.07em;padding:4px 7px;border-radius:5px}
.badge.fee{background:#FCEDE6;color:#C2521F}
.badge.q4{background:var(--wash);color:var(--deep);text-transform:none;letter-spacing:.03em}
.tip{position:relative;cursor:help}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 9px);left:-4px;width:300px;background:var(--ink);color:#E8EDF6;font:400 11px/1.55 var(--ui);letter-spacing:0;text-transform:none;padding:9px 11px;border-radius:8px;box-shadow:0 12px 30px rgba(16,22,38,.28);opacity:0;transform:translateY(3px);pointer-events:none;transition:opacity .18s ease,transform .18s ease;z-index:12}
.tip:hover::after,.tip:focus-visible::after{opacity:1;transform:none}

/* typed paragraphs: ghost reserves the final height, typed paints over */
.type-host{position:relative}
.type-host .ghost{visibility:hidden}
.type-host .typed{position:absolute;left:0;right:0;top:0}
.caret{display:inline-block;width:7px;height:13px;background:var(--clay);border-radius:1.5px;margin-left:2px;vertical-align:-1px}

.buyer{font:600 14.5px/1.5 var(--ui);color:var(--ink);margin:0 0 4px}
.champ{font:400 13px/1.6 var(--ui);color:var(--muted);max-width:64ch}

.draft-btn{display:inline-flex;align-items:center;gap:7px;margin-top:14px;font:600 12px/1 var(--ui);color:var(--deep);background:#fff;border:1px solid var(--hair2);border-radius:9px;padding:9px 13px;transition:border-color .15s ease,background .15s ease}
.draft-btn:hover{border-color:var(--deep);background:#F4F7FD}
.draft-btn .spark{color:var(--clay)}
.draft{margin-top:14px;background:#FBFCFE;border:1px solid var(--hair);border-left:3px solid var(--clay);border-radius:4px 12px 12px 4px;padding:13px 18px 15px;max-width:64ch}
.draft-head{font:600 8.5px var(--mono);letter-spacing:.16em;color:var(--dim);margin-bottom:8px}
.draft-head .spark{color:var(--clay)}

.src{display:flex;align-items:baseline;gap:10px;padding:9px 0}
.src + .src{border-top:1px solid var(--hair)}
.src-kind{flex:none;font:600 8.5px var(--mono);letter-spacing:.08em;text-transform:uppercase;padding:3px 6px;border-radius:4px;background:#EDF0F4;color:var(--muted)}
.src-kind.k-registry{background:#e7f3ec;color:var(--green)}
.src-kind.k-press{background:#e9effb;color:#1d4ed8}
.src-kind.k-trade{background:#fdecdb;color:#b5530e}
.src-kind.k-social{background:#ddf3f0;color:#0e7c74}
.src-kind.k-jobs{background:#efe9fb;color:#6b3fb5}
.src-label{flex:1;min-width:0;font:500 13px/1.4 var(--ui);color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-meta{flex:none;font:500 10.5px var(--mono);color:var(--dim)}

.meter{display:flex;align-items:flex-end;gap:18px;padding:14px 16px 15px;border:1px solid var(--hair);border-radius:12px;background:#FBFCFE}
.dim{flex:1;min-width:0;cursor:help}
.dim-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px}
.dim-label{font:600 8.5px var(--mono);letter-spacing:.12em;color:var(--dim);text-transform:uppercase}
.dim-mark{font:600 9px var(--mono)}
.dim-mark.m0{color:var(--dim)}
.dim-mark.m1{color:var(--amber)}
.dim-mark.m2{color:var(--green)}
.cells{display:flex;gap:4px}
.cells i{height:6px;flex:1;border-radius:3px;background:rgba(16,22,38,.08)}
.cells i.on{background:var(--deep)}
.mtotal{flex:none;font:700 16px var(--mono);color:var(--ink);padding-left:4px;line-height:1}
.mtotal span{font:500 11px var(--mono);color:var(--dim)}
.prop-row{display:flex;align-items:baseline;gap:9px;margin-top:14px;flex-wrap:wrap}
.pchip{flex:none;font:600 10px/1 var(--mono);letter-spacing:.05em;text-transform:uppercase;padding:5px 8px;border-radius:6px}
.pchip.pro{background:#e7f3ec;color:var(--green)}
.pchip.ext{background:#e9effb;color:#1d4ed8}
.pchip.unk{background:#EDF0F4;color:var(--muted)}
.pwhy{font:400 12.5px/1.55 var(--ui);color:var(--muted)}
.bizcase{margin-top:18px}
.mini-label{font:600 8.5px var(--mono);letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
.body.strong{color:var(--ink);font-weight:500}

/* gate view */
.gate-panel{margin:26px 0 30px;background:#FBF3E6;border:1px solid rgba(180,83,9,.18);border-left:3px solid #D97A2B;border-radius:4px 12px 12px 4px;padding:15px 18px 16px;max-width:64ch}
.gate-panel .glabel{font:600 8.5px var(--mono);letter-spacing:.16em;color:var(--amber);text-transform:uppercase;margin-bottom:8px}
.gate-panel p{font:400 13.5px/1.65 var(--ui);color:var(--sec)}
.dnc{display:flex;align-items:center;gap:10px;margin:26px 0 0;background:#FBEAE8;border:1px solid rgba(179,38,30,.25);border-radius:12px;padding:12px 16px;max-width:64ch}
.dnc svg{flex:none;color:var(--red)}
.dnc span{font:600 13px/1.45 var(--ui);color:var(--red)}
.dnc + .gate-panel{margin-top:12px}

.docfoot{margin-top:40px;padding-top:18px;border-top:1px solid var(--hair);display:flex;align-items:center;justify-content:space-between;gap:14px}
.kbd-hint{font:500 9.5px var(--mono);letter-spacing:.09em;color:#B9BFC9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.next{display:inline-flex;align-items:center;gap:8px;font:600 13px/1 var(--ui);color:var(--deep);background:#fff;border:1px solid rgba(26,61,124,.25);border-radius:10px;padding:10px 14px;transition:border-color .15s ease,background .15s ease;white-space:nowrap}
.next:hover{border-color:var(--deep);background:#F4F7FD}

/* toast */
.toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,16px);display:flex;align-items:center;gap:14px;background:var(--ink);color:#E8EDF6;font:500 12.5px/1 var(--ui);padding:12px 18px;border-radius:999px;box-shadow:0 14px 36px rgba(16,22,38,.28);opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;z-index:50}
.toast.show{opacity:1;transform:translate(-50%,0);pointer-events:auto}
.toast button{font:600 12.5px/1 var(--ui);color:#8AB4F8;padding:0}
.toast button:hover{text-decoration:underline}

@media (max-width:1220px){ .doc{padding:16px 40px 84px} }
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}
</style>
</head>
<body>

<aside id="rail" aria-label="Lead list">
  <div class="rail-head">
    <div class="wordmark">VMA<span>GROUP</span></div>
    <div class="rail-title">Communications Radar</div>
    <div class="rail-date" id="railDate"></div>
    <div class="synth"><span class="spark">&#10022;</span><span id="synthText"></span></div>
  </div>
  <nav id="railScroll" class="scroll" aria-label="Leads"></nav>
  <footer class="rail-foot">
    <span id="railStats"></span>
    <span class="concept">concept 07 · reading pane</span>
  </footer>
</aside>

<main id="pane" class="scroll" aria-label="Call file">
  <div class="actionbar"><div class="cluster" id="cluster" role="toolbar" aria-label="Lead actions"></div></div>
  <article class="doc" id="doc" data-qa="portfolio"></article>
</main>

<div class="toast" id="toast" role="status">
  <span id="toastMsg"></span>
  <button id="toastUndo" type="button" hidden>Undo</button>
</div>

  const r = 12.5, c = 2*Math.PI*r;

}

const state = { sel: null, open: { dev:false, early:false, blocked:false }, triage: {} };
let typers = [];        // active / scheduled typewriters
let lastUndo = null;
let toastTimer = null;

/* ----------------------------- typewriter ------------------------------- */
/* Each typer can be cancelled (on reselect) or finished (skip on click).
   The ghost span reserves final layout, so typing never shifts the page. */
function scheduleType(host, text, speed, delay){
  if (!host) return;
  const typed = host.querySelector('.typed');
  if (!typed) return;
  const d = { done:false, int:null };
  d.start = function(){
    if (d.done) return;
    typed.textContent = '';
    d.tn = document.createTextNode('');
    typed.appendChild(d.tn);
    d.caret = document.createElement('span');
    d.caret.className = 'caret';
    typed.appendChild(d.caret);
    let i = 0;
    d.int = setInterval(function(){
      i++;
      d.tn.data = text.slice(0, i);
      if (i >= text.length) d.finish();
    }, speed);
  };
  d.finish = function(){
    if (d.done) return;
    d.done = true;
    if (d.int) clearInterval(d.int);
    clearTimeout(d.timer);
    typed.textContent = text;
  };
  d.cancel = function(){
    d.done = true;
    if (d.int) clearInterval(d.int);
    clearTimeout(d.timer);
  };
  d.timer = setTimeout(d.start, delay);
  typers.push(d);
}
function cancelTyping(){ typers.forEach(t => t.cancel()); typers = []; }
function finishTyping(){ typers.forEach(t => t.finish()); }

/* ----------------------------- toast ------------------------------------ */
function toast(msg, undoable){
  $('#toastMsg').textContent = msg;
  $('#toastUndo').hidden = !undoable;
  const t = $('#toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3600);
}
function hideToast(){ clearTimeout(toastTimer); $('#toast').classList.remove('show'); }

  return '<button type="button" class="item'+(sel?' sel':'')+(tr?' '+tr:'')+'" data-id="'+l.id+'" data-qa="lead-trigger"'+(sel?' aria-current="true"':'')+'>'

    + '<span class="item-main">'
    +   '<span class="item-co"><b style="font-weight:600">'+esc(l.co)+'</b>'+(l.isNew?'<i class="ndot" title="New today"></i>':'')+'</span>'

    + '</span>'
    + '<span class="item-meta">'+fmtAge(l.age)+'</span>'
    + '</button>';
}
function gitemHTML(l){
  const tr = state.triage[l.id] || '';
  const sel = state.sel === l.id;
  const mark = tr === 'dismissed' ? '<span class="gmark">&#10005;</span>' : tr === 'done' ? '<span class="gmark ok">&#10003;</span>' : '';
  return '<button type="button" class="gitem'+(sel?' sel':'')+(tr?' '+tr:'')+'" data-id="'+l.id+'" data-qa="lead-trigger"'+(sel?' aria-current="true"':'')+'>'
    + '<span class="gscore">'+l.score+'</span>'
    + '<span class="item-main">'
    +   '<span class="g-co">'+(l.tier==='blocked'?'<i class="bdot" title="Do not call"></i>':'')+esc(l.co)+mark+'</span>'
    +   '<span class="item-seat">'+esc(l.seat)+'</span>'
    + '</span>'
    + '<span class="item-meta">'+fmtAge(l.age)+'</span>'
    + '</button>';
}
function groupHTML(t){
  const items = byTier(t);
  const open = state.open[t];
  return '<section class="group'+(open?' open':'')+'">'
    + '<button type="button" class="ghead" data-group="'+t+'" aria-expanded="'+(!!open)+'">'
    +   '<span>'+TIERLBL[t].toUpperCase()+'</span>'
    +   '<span class="gcount'+(t==='blocked'?' red':'')+'">'+items.length+'</span>'
    +   '<span class="chev">'+icon('chev',12)+'</span>'
    + '</button>'
    + '<div class="gbody"><div>'+items.map(gitemHTML).join('')+'</div></div>'
    + '</section>';
}
function renderRail(){
  const sc = $('#railScroll');
  const keep = sc.scrollTop;
  const hadFocus = sc.contains(document.activeElement);
  const ready = byTier('ready');
  sc.innerHTML =
    '<div class="rail-label">TODAY · '+ready.length+' CALL-READY</div>'
    + ready.map(itemHTML).join('')
    + ['dev','early','blocked'].map(groupHTML).join('');
  sc.scrollTop = keep;
  if (hadFocus){
    const el = sc.querySelector('.sel');
    if (el) el.focus({ preventScroll:true });
  }
}

/* ----------------------------- document --------------------------------- */
function eyebrowChips(l){
  let h = '<span class="chip trig-'+l.key+'">'+esc(l.type)+'</span>';
  h += '<span class="chip">'+esc(l.win)+'</span>';
  if (l.tier !== 'ready') h += '<span class="chip tier-'+l.tier+'">'+TIERLBL[l.tier]+'</span>';
  if (l.isNew) h += '<span class="chip new"><i></i>NEW</span>';
  h += '<span class="chip ver-'+l.ver+'">'+icon('shield',11)+esc(VER[l.ver])+'</span>';
  if (l.rt) h += '<span class="chip rt">RED-TEAMED &#10003; '+l.conviction+'</span>';
  const plan = RADAR.meta.planOrder.indexOf(l.id);
  if (plan >= 0) h += '<span class="chip plan"><b>&#10022;</b>CALL #'+(plan+1)+'</span>';
  return h;
}
function proofHTML(l, stc){
  const conf = l.conf ? '<span class="right">CONFIDENCE '+esc(l.conf).toUpperCase()+'</span>' : '';
  return '<section '+stc('sec')+'>'
    + '<div class="slabel"><span>PROOF</span>'+conf+'</div>'
    + l.stack.map(function(s){
        return '<div class="src">'
          + '<span class="src-kind k-'+s.kind.toLowerCase()+'">'+esc(s.kind)+'</span>'
          + '<span class="src-label" title="'+esc(s.label)+'">'+esc(s.label)+'</span>'
          + '<span class="src-meta">'+esc(s.src)+' · '+fmtAge(s.age)+'</span>'
          + '</div>';
      }).join('')
    + '</section>';
}
function footHTML(l, stc){
  const nav = navList();
  const i = nav.findIndex(x => x.id === l.id);
  const nxt = nav[(i+1) % nav.length];
  return '<footer '+stc('docfoot')+'>'
    + '<span class="kbd-hint">&#8593;&#8595; NAVIGATE · F FOLLOW UP · D DISMISS</span>'
    + '<button type="button" class="next" data-action="next">Next: '+esc(nxt.co)+' '+icon('arrow',14)+'</button>'
    + '</footer>';
}
function readyDocHTML(l){
  let si = 0;
  const stc = c => 'class="'+c+' st" style="--d:'+(si++)*70+'ms"';
  const q = l.qual;
  const dims = ['seat','budget','urgency','buyer'].map(function(k){
    const v = q[k], why = q[k+'_why'];
    const mark = v === 2 ? '✓✓' : v === 1 ? '✓' : '✗';
    return '<div class="dim" tabindex="0" title="'+esc(k.charAt(0).toUpperCase()+k.slice(1))+' '+mark+' — '+esc(why)+'">'
      + '<span class="dim-top"><span class="dim-label">'+k+'</span><span class="dim-mark m'+v+'">'+mark+'</span></span>'
      + '<span class="cells"><i class="'+(v>=1?'on':'')+'"></i><i class="'+(v>=2?'on':'')+'"></i></span>'
      + '</div>';
  }).join('');

  let h = '<div '+stc('eyebrow')+'>'+eyebrowChips(l)+'</div>';
  h += '<h1 '+stc('')+'>'+esc(l.co)+'</h1>';
  h += '<p '+stc('standfirst')+'>'+esc(l.hook)+'</p>';
  h += '<div '+stc('divider')+'><span><span class="spark">&#10022;</span> VMA INTELLIGENCE</span></div>';

  /* why now — typed in */
  const whyDelay = si*70 + 160;
  h += '<section '+stc('sec')+'>'
    + '<div class="slabel"><span>WHY NOW</span>'
    + (l.fee ? '<span class="badge fee tip" tabindex="0" data-tip="'+esc(l.feeTip)+'">'+esc(l.fee)+'</span>' : '')
    + (l.q4 ? '<span class="badge q4" title="Year-end budget window: unspent budget converts to mandates before FYE">'+esc(l.q4)+'</span>' : '')
    + '</div>'
    + '<p class="body type-host" id="whynow"><span class="ghost">'+esc(l.whyNow)+'</span><span class="typed"></span></p>'
    + '</section>';

  h += '<section '+stc('sec')+'><div class="slabel"><span>WHO TO CALL</span></div>'
    + '<p class="buyer">'+esc(l.buyer)+'</p>'
    + '<p class="champ">'+esc(l.champion)+'</p>'
    + '</section>';

  h += '<section '+stc('sec')+'><div class="slabel"><span>THE OPENING</span></div>'
    + '<p class="body">'+esc(l.opening)+'</p>'
    + '<button type="button" class="draft-btn" data-action="draft"><span class="spark">&#10022;</span>Draft opener</button>'
    + '<div class="draft" id="draftBox" hidden>'
    +   '<div class="draft-head"><span class="spark">&#10022;</span> DRAFT OPENER · VMA INTELLIGENCE</div>'
    +   '<p class="body type-host" id="draftHost"><span class="ghost">'+esc(l.opener)+'</span><span class="typed"></span></p>'
    + '</div>'
    + '</section>';

  h += '<section '+stc('sec')+'><div class="slabel"><span>WHAT KILLS IT</span></div>'
    + '<p class="body">'+esc(l.kill)+'</p>'
    + '</section>';

  h += proofHTML(l, stc);

  h += '<section '+stc('sec')+'><div class="slabel"><span>THE NUMBERS</span></div>'
    + '<div class="meter">'+dims+'<div class="mtotal">'+q.total+'<span>/8</span></div></div>'
    + '<div class="prop-row"><span class="pchip '+l.propCls+'">'+esc(l.prop)+'</span>'
    + (l.propWhy ? '<span class="pwhy">'+esc(l.propWhy)+'</span>' : '')
    + '</div>'
    + (l.bizCase ? '<div class="bizcase"><div class="mini-label">BUSINESS CASE</div><p class="body strong">'+esc(l.bizCase)+'</p></div>' : '')
    + '</section>';

  h += footHTML(l, stc);
  return { html:h, whyDelay:whyDelay };
}
function gateDocHTML(l){
  let si = 0;
  const stc = c => 'class="'+c+' st" style="--d:'+(si++)*70+'ms"';
  let h = '<div '+stc('eyebrow')+'>'+eyebrowChips(l)+'</div>';
  h += '<h1 '+stc('')+'>'+esc(l.co)+'</h1>';
  h += '<p '+stc('standfirst')+'>'+esc(l.hook)+'</p>';
  if (l.conflict){
    h += '<div '+stc('dnc')+'>'+icon('alert',16)+'<span>DO NOT CALL · '+esc(l.anti.join(', '))+'</span></div>';
  }
  h += '<div '+stc('gate-panel')+'>'
    + '<div class="glabel">WHY NOT CALL-READY</div>'
    + '<p>'+esc(l.gateWhy)+'</p>'
    + '</div>';
  h += proofHTML(l, stc);
  h += footHTML(l, stc);
  return { html:h };
}
function renderDoc(l){
  cancelTyping();
  const built = l.tier === 'ready' ? readyDocHTML(l) : gateDocHTML(l);
  $('#doc').innerHTML = built.html;
  renderActions(l);
  $('#pane').scrollTop = 0;
  if (l.tier === 'ready'){
    scheduleType($('#whynow'), l.whyNow, 6, built.whyDelay);
  }
}

/* ----------------------------- action bar ------------------------------- */
function renderActions(l){
  const tr = state.triage[l.id] || '';
  let h = '';
  if (l.tier === 'ready'){
    h += '<button type="button" class="btn" data-action="pitch">'+icon('file')+'<span>Generate pitch</span></button>'
      +  '<button type="button" class="btn" data-action="draft">'+icon('pen')+'<span>Draft opener</span></button>';
  }
  h += '<button type="button" class="btn" data-action="sources">'+icon('layers')+'<span>View sources</span></button>'
    +  '<span class="vsep"></span>';
  if (l.tier === 'ready'){
    h += '<button type="button" class="btn good'+(tr==='done'?' active':'')+'" data-action="done">'+icon('check')+'<span>Followed up</span></button>';
  }
  h += '<button type="button" class="btn bad'+(tr==='dismissed'?' active':'')+'" data-action="dismiss">'+icon('x')+'<span>Dismiss</span></button>';
  $('#cluster').innerHTML = h;
}

/* ----------------------------- selection & triage ----------------------- */
function select(id){
  const l = byId(id);
  if (!l) return;
  state.sel = id;
  if (l.tier !== 'ready' && !state.open[l.tier]) state.open[l.tier] = true;
  renderRail();
  renderDoc(l);
}
function cur(){ return byId(state.sel); }
function nextUntriaged(fromId){
  const nav = navList();
  const i = nav.findIndex(x => x.id === fromId);
  for (let k = 1; k <= nav.length; k++){
    const c = nav[(i+k) % nav.length];
    if (!state.triage[c.id]) return c;
  }
  return null;
}
function triage(kind){
  const l = cur();
  if (!l) return;
  if (kind === 'done' && l.tier !== 'ready') return;
  const prev = state.triage[l.id] || null;
  if (prev === kind){
    delete state.triage[l.id];
    lastUndo = null;
    toast(kind === 'done' ? 'Follow-up cleared for '+l.co : l.co+' restored');
    renderRail(); renderActions(l);
    return;
  }
  state.triage[l.id] = kind;
  lastUndo = { id:l.id, prev:prev };
  toast(kind === 'done' ? l.co+' marked as followed up' : l.co+' dismissed for today', true);
  const nxt = nextUntriaged(l.id);
  if (nxt && nxt.id !== l.id){ select(nxt.id); }
  else { renderRail(); renderActions(l); }
}
function undo(){
  if (!lastUndo) return;
  if (lastUndo.prev) state.triage[lastUndo.id] = lastUndo.prev;
  else delete state.triage[lastUndo.id];
  lastUndo = null;
  hideToast();
  renderRail();
  const l = cur();
  if (l) renderActions(l);
}

/* ----------------------------- actions ---------------------------------- */
function doAction(act){
  const l = cur();
  if (!l) return;
  if (act === 'pitch'){
    toast('Pitch pack queued for '+l.co+' — a few minutes');
  } else if (act === 'draft'){
    const box = $('#draftBox');
    if (!box) return;
    if (box.hidden){
      box.hidden = false;
      box.classList.add('st');
      scheduleType($('#draftHost'), l.opener, 8, 200);
    }
    box.scrollIntoView({ behavior:'smooth', block:'center' });
  } else if (act === 'sources'){
    const secs = document.querySelectorAll('#doc .slabel span');
    for (const s of secs){
      if (s.textContent === 'PROOF'){ s.closest('section').scrollIntoView({ behavior:'smooth', block:'start' }); break; }
    }
    toast(l.stack.length + (l.stack.length === 1 ? ' source' : ' sources') + ' on file for '+l.co+' · '+VER[l.ver]);
  } else if (act === 'done'){
    triage('done');
  } else if (act === 'dismiss'){
    triage('dismissed');
  } else if (act === 'next'){
    const nav = navList();
    const i = nav.findIndex(x => x.id === l.id);
    select(nav[(i+1) % nav.length].id);
  }
}

/* ----------------------------- events ----------------------------------- */
$('#railScroll').addEventListener('click', function(e){
  const g = e.target.closest('.ghead');
  if (g){
    const t = g.dataset.group;
    state.open[t] = !state.open[t];
    renderRail();
    return;
  }
  const it = e.target.closest('[data-id]');
  if (it) select(it.dataset.id);
});

/* one click handler for the pane: any click skips active typing,
   data-action buttons then dispatch */
$('#pane').addEventListener('click', function(e){
  finishTyping();
  const a = e.target.closest('[data-action]');
  if (a) doAction(a.dataset.action);
});

$('#toastUndo').addEventListener('click', undo);

document.addEventListener('keydown', function(e){
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp'){
    e.preventDefault();
    const nav = navList();
    const i = nav.findIndex(x => x.id === state.sel);
    const j = Math.min(nav.length - 1, Math.max(0, i + (e.key === 'ArrowDown' ? 1 : -1)));
    if (j !== i){
      select(nav[j].id);
      const el = $('#railScroll .sel');
      if (el) el.scrollIntoView({ block:'nearest' });
    }
  } else if (e.key === 'f' || e.key === 'F'){
    triage('done');
  } else if (e.key === 'd' || e.key === 'D'){
    triage('dismissed');
  }
});

/* ----------------------------- init ------------------------------------- */
$('#railDate').textContent = RADAR.meta.dateLabel;
$('#synthText').textContent = ' ' + RADAR.meta.synthesis;
$('#railStats').textContent = RADAR.meta.signals+' signals · '+RADAR.meta.sources+' sources · scanned '+RADAR.meta.scanTime;
select(byTier('ready')[0].id);

})();
</script>
</body>
</html>
