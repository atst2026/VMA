<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>VMA — Communications Radar · Command Rail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F9FC; --ink:#101626; --sec:#3C4043; --muted:#5A6577; --dim:#9AA0A6;
  --hair:rgba(16,22,38,.08); --slate:#3E5C84; --deep:#1A3D7C; --acc:#4285F4;
  --wash:#E8F0FE; --clay:#D97757; --clay-ink:#A8553A; --green:#1E7A41;
  --amber:#B45309; --amber-bg:#FDECDB; --red:#B3261E;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
html,body{height:100%}
body{
  font-family:var(--sans);color:var(--ink);
  background:radial-gradient(1100px 480px at 50% -120px, rgba(62,92,132,.055), transparent 62%), var(--bg);
  -webkit-font-smoothing:antialiased;
}
body.locked{overflow:hidden}
.mono{font-family:var(--mono)}
button{font-family:inherit}

/* ---------- centre column ---------- */
main{max-width:660px;margin:0 auto;padding:12vh 24px 120px}

/* ---------- masthead ---------- */
.masthead{text-align:center}
.wordmark{font-size:13px;font-weight:800;letter-spacing:.02em;color:var(--ink)}
.wordmark span{font-weight:300;letter-spacing:.34em;font-size:11px;color:var(--muted);margin-left:7px;vertical-align:1px}
.page-title{margin-top:9px;font-size:14px;font-weight:600;letter-spacing:.01em;color:var(--ink)}
.meta-line{margin-top:7px;font-size:10.5px;letter-spacing:.04em;color:var(--dim)}

/* ---------- command bar ---------- */
.bar-wrap{margin-top:36px}
.bar{
  height:56px;display:flex;align-items:center;gap:12px;padding:0 18px;
  background:#fff;border:1px solid var(--hair);border-radius:14px;
  box-shadow:0 1px 2px rgba(16,22,38,.05),0 4px 12px rgba(16,22,38,.06),0 14px 36px rgba(16,22,38,.07);
  transition:border-color .18s ease, box-shadow .18s ease;
}
.bar:focus-within{
  border-color:rgba(66,133,244,.45);
  box-shadow:0 1px 2px rgba(16,22,38,.05),0 4px 12px rgba(16,22,38,.06),0 14px 36px rgba(16,22,38,.07),0 0 0 4px rgba(66,133,244,.13);
}
.spark{color:var(--clay);font-size:16px;line-height:1;flex:none}
.bar input{
  flex:1;min-width:0;border:0;outline:none;background:none;
  font:400 15px var(--sans);color:var(--ink);caret-color:var(--acc);
}
.bar input::placeholder{color:var(--dim)}
.bar.armed input{color:var(--clay-ink);caret-color:var(--clay)}
.keycap{
  flex:none;font:500 10.5px var(--mono);color:var(--dim);
  border:1px solid var(--hair);border-bottom-width:2px;border-radius:6px;
  padding:3px 7px;background:#FBFCFE;
}
.bar-wrap.shake .bar{animation:shake .36s ease}
@keyframes shake{
  20%{transform:translateX(-5px)}40%{transform:translateX(4px)}
  60%{transform:translateX(-3px)}80%{transform:translateX(2px)}
}
.ghost{margin-top:13px;text-align:center;font-size:11px;letter-spacing:.03em;color:var(--dim)}

/* ---------- synthesis line ---------- */
.synth{margin:30px auto 0;max-width:560px;text-align:center;font-size:13px;line-height:1.65;color:var(--muted)}
.synth .spark{font-size:12px;margin-right:2px}

/* ---------- the seven quiet lines ---------- */
#list{margin-top:38px;border-top:1px solid var(--hair)}
.row{
  position:relative;display:block;padding:14px 12px;border-bottom:1px solid var(--hair);
  cursor:pointer;transition:background .15s ease, opacity .15s ease;
}
.row::before{
  content:'';position:absolute;left:0;top:9px;bottom:9px;width:2px;border-radius:2px;
  background:var(--acc);opacity:0;transition:opacity .15s ease;
}
.row:hover,.row.sel{background:rgba(232,240,254,.55)}
.row:hover::before,.row.sel::before{opacity:1}
.row:focus-visible{outline:2px solid var(--acc);outline-offset:-2px;border-radius:8px}
.row-line{display:flex;align-items:center;gap:12px;min-width:0}
.rank{flex:none;width:18px;text-align:right;font-size:11px;color:var(--dim)}
.rank-plan{color:var(--clay);font-weight:600}
.co{flex:none;display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap}
.dot{width:6px;height:6px;border-radius:50%;background:var(--clay);flex:none;animation:pulse 2.6s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(217,119,87,.32)}50%{box-shadow:0 0 0 5px rgba(217,119,87,0)}}
.hook{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;color:var(--dim)}
.score{flex:none;width:26px;text-align:right;font-size:13px;font-weight:600}
.s-hi{color:var(--green)} .s-mid{color:var(--amber)} .s-lo{color:var(--dim)}
.win{
  flex:none;font-size:10px;letter-spacing:.03em;color:var(--muted);white-space:nowrap;
  border:1px solid var(--hair);border-radius:999px;padding:3px 9px;background:#fff;
}
.tag{font-size:9.5px;letter-spacing:.08em;padding:2.5px 7px;border-radius:4px;font-weight:500}
.tag-followed{color:var(--green);background:#E7F3EC}
.tag-dismissed{color:var(--dim);background:rgba(16,22,38,.05)}
.row-followed{opacity:.78}
.row-dismissed{opacity:.45}
.row-dismissed .co .co-name{text-decoration:line-through;text-decoration-color:var(--dim)}
.row-dim{opacity:.5}
.row-dim:hover,.row-dim.sel{opacity:.9}
.row-below{opacity:.62}
.row-below:hover,.row-below.sel{opacity:.95}

/* below the line */
.bt-label{display:flex;align-items:center;gap:14px;margin:30px 0 0;font:500 10px var(--mono);letter-spacing:.18em;color:var(--dim)}
.bt-label::before,.bt-label::after{content:'';height:1px;background:var(--hair);flex:1}
.gate{display:flex;align-items:baseline;gap:9px;margin:7px 0 1px 30px;font-size:12px;line-height:1.5;color:var(--amber)}
.gate.g-blocked{color:var(--red)}
.gtag{flex:none;font:500 9px var(--mono);letter-spacing:.1em;padding:2.5px 7px;border-radius:4px;background:var(--amber-bg);color:#B5530E}
.g-blocked .gtag{background:#FBEAE9;color:var(--red)}

/* ---------- chips (shared) ---------- */
.chip{
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
  font:500 9.5px/1 var(--mono);letter-spacing:.07em;text-transform:uppercase;
  padding:5px 9px;border-radius:999px;cursor:default;
}
.c-reg{background:#E7F3EC;color:var(--green)}
.c-multi{background:var(--wash);color:#1d4ed8}
.c-single{background:var(--amber-bg);color:#B5530E}
.c-rt{background:rgba(217,119,87,.14);color:var(--clay-ink)}
.c-conf{background:rgba(16,22,38,.05);color:var(--muted)}
.c-total{background:rgba(16,22,38,.05);color:var(--sec)}
.prop-pro{background:#E7F3EC;color:var(--green)}
.prop-ext{background:var(--wash);color:var(--deep)}
.prop-unk{background:rgba(16,22,38,.05);color:var(--dim)}

/* ---------- tooltip ---------- */
[data-tip]{position:relative}
[data-tip]:hover::after,[data-tip]:focus-visible::after{
  content:attr(data-tip);position:absolute;left:0;bottom:calc(100% + 9px);z-index:90;
  width:max-content;max-width:300px;white-space:normal;text-transform:none;letter-spacing:0;
  font:400 11.5px/1.5 var(--sans);color:#EDF1F8;background:var(--ink);
  padding:9px 12px;border-radius:9px;box-shadow:0 6px 22px rgba(16,22,38,.28);pointer-events:none;
}

/* ---------- peek card ---------- */
#peek{
  position:fixed;z-index:40;left:calc(50vw + 358px);width:min(300px,calc(50vw - 378px));
  background:#fff;border:1px solid var(--hair);border-radius:14px;padding:16px;
  box-shadow:0 2px 6px rgba(16,22,38,.05),0 14px 40px rgba(16,22,38,.13);
  opacity:0;visibility:hidden;transform:translateY(5px);
  transition:opacity .18s ease, transform .18s ease, visibility .18s;
  pointer-events:none;
}
#peek.on{opacity:1;visibility:visible;transform:none}
#peek.inline{position:static;width:auto;margin:4px 12px 14px 42px;transform:none;
  box-shadow:0 1px 3px rgba(16,22,38,.06),0 8px 24px rgba(16,22,38,.08)}
@media (max-width:1179px){#peek:not(.inline){display:none}}
.p-seat{font-size:13px;font-weight:600;color:var(--ink);line-height:1.45}
.p-kv{display:flex;gap:10px;margin-top:9px;font-size:12px;line-height:1.5;color:var(--muted)}
.p-kv .k{flex:none;width:58px;font:500 9px var(--mono);letter-spacing:.12em;color:var(--dim);padding-top:2.5px}
.p-gate{margin-top:10px;font-size:11.5px;line-height:1.55;color:var(--amber)}
.p-gate.g-blocked{color:var(--red)}
.p-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:13px}

/* ---------- takeover ---------- */
#takeover{
  position:fixed;inset:0;z-index:60;background:#fff;overflow-y:auto;
  opacity:0;transition:opacity .22s ease;
}
#takeover.on{opacity:1}
.t-col{max-width:740px;margin:0 auto;padding:0 28px 28px}
.t-head{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.93);backdrop-filter:blur(5px);padding:18px 0 10px}
.crumb{
  font:500 11px var(--mono);letter-spacing:.04em;color:var(--dim);
  background:none;border:0;cursor:pointer;padding:6px 9px;margin-left:-9px;border-radius:7px;
  transition:color .15s ease, background .15s ease;
}
.crumb:hover{color:var(--ink);background:rgba(16,22,38,.045)}
.crumb:focus-visible{outline:2px solid var(--acc);outline-offset:1px}

.hero{display:flex;justify-content:space-between;align-items:flex-start;gap:28px;margin-top:26px}
.h-pills{display:flex;flex-wrap:wrap;gap:7px}
.h-pill{font:500 10px var(--mono);letter-spacing:.08em;padding:4px 10px;border-radius:999px;white-space:nowrap}
.h-new{background:rgba(217,119,87,.14);color:var(--clay-ink)}
.h-dev{background:var(--amber-bg);color:#B5530E}
.h-watch{background:rgba(16,22,38,.05);color:var(--muted)}
.h-block{background:#FBEAE9;color:var(--red)}
.h-co{font-size:36px;font-weight:700;letter-spacing:-.02em;line-height:1.08;color:var(--ink);margin:13px 0 9px}
.h-sub{font-size:13.5px;color:var(--muted)}
.ringwrap{flex:none;display:flex;flex-direction:column;align-items:center;gap:5px;padding-top:4px}
.ring-num{font:600 14px var(--mono);fill:var(--ink)}
.ring-cap{font:500 8.5px var(--mono);letter-spacing:.18em;color:var(--dim)}

section{margin-top:36px}
.s-label{display:flex;align-items:center;gap:12px;margin-bottom:13px;font:500 10px var(--mono);letter-spacing:.16em;color:var(--dim)}
.s-label::after{content:'';flex:1;height:1px;background:var(--hair)}
.s-body{font-size:14.5px;line-height:1.68;color:var(--sec)}
.badges{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}
.b-fee{border:1px solid rgba(217,119,87,.22);background:rgba(217,119,87,.12);color:var(--clay-ink);cursor:help}
.b-fee:hover{background:rgba(217,119,87,.18)}
.b-fee:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
.b-q4{background:var(--amber-bg);color:#B5530E;text-transform:none}

.kv{display:flex;gap:16px;margin-top:11px}
.kv:first-of-type{margin-top:0}
.kv .k{flex:none;width:118px;font:500 9.5px var(--mono);letter-spacing:.13em;color:var(--dim);padding-top:3px}
.kv .v{font-size:14px;line-height:1.6;color:var(--sec)}
.kv .v strong{color:var(--ink);font-weight:600}

.draft-btn{margin-top:14px}
.draft{display:none;margin-top:14px;background:#FBFCFE;border:1px solid var(--hair);border-left:2px solid var(--clay);border-radius:10px;padding:14px 17px}
.draft.on{display:block}
.d-label{font:500 9.5px var(--mono);letter-spacing:.14em;color:var(--clay-ink);margin-bottom:9px}
.d-text{font-size:14px;line-height:1.72;color:var(--sec);min-height:1.7em}
.caret{display:inline-block;width:2px;height:1.05em;background:var(--clay);vertical-align:-2px;margin-left:1px;animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}

.gatebox{border:1px solid rgba(180,83,9,.24);background:rgba(253,236,219,.5);border-radius:10px;padding:14px 17px;font-size:14px;line-height:1.65;color:#7A4410}
.gatebox.blocked{border-color:rgba(179,38,30,.28);background:#FBEAE9;color:#8C2722}
.gatebox .gtag{display:inline-block;margin-bottom:9px}
.gatebox.blocked .gtag{background:rgba(179,38,30,.12);color:var(--red)}

.chips{display:flex;flex-wrap:wrap;gap:7px}
.srcs{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.src{display:flex;justify-content:space-between;align-items:baseline;gap:18px;border:1px solid var(--hair);border-radius:10px;padding:9px 13px;background:#FBFCFE}
.src .s-l{font-size:13px;color:var(--sec);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.src .s-m{flex:none;font:400 10.5px var(--mono);letter-spacing:.02em;color:var(--dim)}

.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px 26px}
.q-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.q-name{font:500 10px var(--mono);letter-spacing:.15em;color:var(--muted)}
.q-mark{font:600 13px var(--mono);letter-spacing:.04em}
.m0{color:var(--dim)} .m1{color:var(--amber)} .m2{color:var(--green)}
.q-why{margin-top:4px;font-size:12px;line-height:1.5;color:var(--muted)}
.n-foot{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:18px}
.propwhy{margin-top:10px;font-size:12.5px;line-height:1.55;color:var(--muted)}
.bizcase{margin-top:16px;background:rgba(232,240,254,.5);border:1px solid var(--hair);border-radius:10px;padding:13px 16px}
.bizcase .bc-label{font:500 9.5px var(--mono);letter-spacing:.14em;color:var(--slate);margin-bottom:7px}
.bizcase .bc-body{font-size:13.5px;line-height:1.62;color:var(--sec)}

.actions{
  position:sticky;bottom:0;background:#fff;border-top:1px solid var(--hair);
  margin-top:40px;padding:14px 0;display:flex;flex-wrap:wrap;gap:10px;align-items:center;
}
.btn{
  display:inline-flex;align-items:center;gap:8px;cursor:pointer;
  font:600 13px var(--sans);color:var(--sec);background:#fff;
  border:1px solid rgba(16,22,38,.13);border-radius:9px;padding:9px 14px;
  transition:all .15s ease;
}
.btn:hover{border-color:rgba(16,22,38,.24);background:#FBFCFE;color:var(--ink)}
.btn:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
.btn .b-spark{color:var(--clay);font-size:13px}
.btn kbd{font:500 9.5px var(--mono);color:var(--dim);border:1px solid var(--hair);border-radius:4px;padding:1.5px 5px;background:#FBFCFE}
.btn-primary{background:var(--deep);border-color:var(--deep);color:#fff}
.btn-primary:hover{background:#15336B;border-color:#15336B;color:#fff}
.btn-good:hover{color:var(--green);border-color:rgba(30,122,65,.4)}
.btn-bad:hover{color:var(--red);border-color:rgba(179,38,30,.35)}
.spacer{flex:1}

/* ---------- toast ---------- */
#toast{
  position:fixed;left:50%;bottom:30px;z-index:100;transform:translate(-50%,12px);
  display:flex;align-items:center;gap:14px;max-width:min(80vw,560px);
  background:var(--ink);color:#F2F5FA;font-size:13px;line-height:1.45;
  padding:11px 18px;border-radius:999px;box-shadow:0 10px 32px rgba(16,22,38,.35);
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity .22s ease, transform .22s ease, visibility .22s;
}
#toast.on{opacity:1;visibility:visible;transform:translate(-50%,0);pointer-events:auto}
#toast button{
  background:none;border:0;cursor:pointer;flex:none;
  font:600 12.5px var(--sans);color:#E89678;padding:2px 4px;border-radius:5px;
}
#toast button:hover{color:#F2B49C;text-decoration:underline}
#toast button:focus-visible{outline:2px solid #E89678;outline-offset:1px}

/* ---------- corner label ---------- */
.corner{position:fixed;left:18px;bottom:15px;z-index:5;font-size:10px;letter-spacing:.08em;color:var(--dim)}
</style>
</head>
<body>

<main>
  <header class="masthead">
    <div class="wordmark">VMA<span>GROUP</span></div>
    <div class="page-title">Communications Radar</div>
    <div class="meta-line mono" id="metaLine"></div>
  </header>

  <div class="bar-wrap" id="barWrap">
    <div class="bar" id="bar">
      <span class="spark" aria-hidden="true">✦</span>
      <input id="cmd" type="text" placeholder="Search accounts or type a command…"
             autofocus autocomplete="off" spellcheck="false"
             aria-label="Search accounts or type a command">
      <kbd class="keycap" id="kbdHint">⌘K</kbd>
    </div>
    <div class="ghost mono" id="ghost">try: plan · dev · reckitt — ↑↓ select · ↵ open · esc back</div>
  </div>

  <p class="synth"><span class="spark" aria-hidden="true">✦</span><span id="synthText"></span></p>

  <div id="list" role="listbox" aria-label="Call-ready leads"></div>
</main>

<aside id="peek" aria-hidden="true"></aside>

<div id="takeover" hidden>
  <div class="t-col">
    <div class="t-head">
      <button class="crumb" id="crumb" type="button"></button>
    </div>
    <article id="portfolio" data-qa="portfolio"></article>
  </div>
</div>

<div id="toast" role="status" aria-live="polite"></div>
<footer class="corner mono">concept 05 · command rail</footer>

    peek.classList.remove('inline');
    if (peek.parentNode !== document.body) document.body.appendChild(peek);
    peek.style.top = '0px';
    const h = peek.offsetHeight, r = el.getBoundingClientRect();
    peek.style.top = Math.max(14, Math.min(r.top - 2, window.innerHeight - h - 14)) + 'px';
  } else {
    peek.classList.add('inline');
    peek.style.top = '';
    el.appendChild(peek);
  }
  peek.classList.add('on');
}
function hidePeek() {
  peek.classList.remove('on');
  if (peek.classList.contains('inline')) {
    peek.classList.remove('inline');
    document.body.appendChild(peek);
  }
}

/* ---------- takeover (the call file) ---------- */
function ring(score) {
  const C = 2 * Math.PI * 24, off = C * (1 - score / 100);
  return '<div class="ringwrap"><svg width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Lead strength ' + score + '">' +
    '<circle cx="32" cy="32" r="24" fill="none" stroke="rgba(16,22,38,.08)" stroke-width="4.5"/>' +
    '<circle cx="32" cy="32" r="24" fill="none" stroke="' + scoreCol(score) + '" stroke-width="4.5" stroke-linecap="round" ' +
      'stroke-dasharray="' + C.toFixed(2) + '" stroke-dashoffset="' + off.toFixed(2) + '" transform="rotate(-90 32 32)"/>' +
    '<text x="32" y="37" text-anchor="middle" class="ring-num">' + score + '</text>' +
    '</svg><span class="ring-cap">STRENGTH</span></div>';
}
function sLabel(t) { return '<div class="s-label">' + t + '</div>'; }
function mark(v) {
  return '<span class="q-mark m' + v + '">' + (v === 2 ? '✓✓' : v === 1 ? '✓' : '✗') + '</span>';
}

function portfolioHtml(lead) {
  const ready = lead.tier === 'ready';
  const tint = TINTS[lead.key] || ['#46556e', '#edf0f4'];
  const tierPill = !ready
    ? '<span class="h-pill ' + (lead.tier === 'blocked' ? 'h-block' : lead.tier === 'dev' ? 'h-dev' : 'h-watch') + '">' + TIER[lead.tier] + '</span>'
    : '';
  let h = '<header class="hero"><div>' +
    '<div class="h-pills">' +
      '<span class="h-pill" style="color:' + tint[0] + ';background:' + tint[1] + '">' + escH(lead.type).toUpperCase() + '</span>' +
      (lead.isNew ? '<span class="h-pill h-new">NEW</span>' : '') + tierPill +
    '</div>' +
    '<h1 class="h-co">' + escH(lead.co) + '</h1>' +
    '<div class="h-sub">' + escH(lead.seat) + ' · ' + (lead.win === 'horizon' ? 'on the horizon' : escH(lead.win) + ' window') + ' · ' + escH(lead.sector) + '</div>' +
  '</div>' + ring(lead.score) + '</header>';

  /* WHY NOW */
  let badges = '';
  if (lead.fee) badges += '<span class="chip b-fee" tabindex="0" data-tip="' + escH(lead.feeTip) + '">' + escH(lead.fee) + '</span>';
  if (lead.q4)  badges += '<span class="chip b-q4">' + escH(lead.q4) + '</span>';
  h += '<section>' + sLabel('WHY NOW') +
       '<p class="s-body">' + escH(lead.whyNow) + '</p>' +
       (badges ? '<div class="badges">' + badges + '</div>' : '') + '</section>';

  if (ready) {
    /* WHO TO CALL */
    h += '<section>' + sLabel('WHO TO CALL') +
      '<div class="kv"><span class="k">ECONOMIC BUYER</span><span class="v"><strong>' + escH(lead.buyer) + '</strong></span></div>' +
      '<div class="kv"><span class="k">WARM PATH</span><span class="v">' + escH(lead.champion) + '</span></div></section>';

    /* THE OPENING */
    h += '<section>' + sLabel('THE OPENING') +
      '<p class="s-body">' + escH(lead.opening) + '</p>' +
      '<button class="btn draft-btn" type="button" data-act="draft"><span class="b-spark">✦</span>Draft opener</button>' +
      '<div class="draft"><div class="d-label">✦ VMA INTELLIGENCE · DRAFT OPENER</div><p class="d-text"></p></div></section>';

    /* WHAT KILLS IT */
    h += '<section>' + sLabel('WHAT KILLS IT') + '<p class="s-body">' + escH(lead.kill) + '</p></section>';
  } else {
    /* honest gate instead of a call file */
    h += '<section>' + sLabel('WHY NOT CALL-READY') +
      '<div class="gatebox' + (lead.conflict ? ' blocked' : '') + '">' +
      (lead.conflict ? '<span class="gtag mono">DO NOT CALL</span><br>' : '') +
      escH(lead.gateWhy) + '</div></section>';
  }

  /* PROOF */
  const v = VER[lead.ver];
  let proofChips = '<span class="chip ' + v[1] + '">' + v[0] + '</span>';
  if (lead.rt) proofChips += '<span class="chip c-rt">RED-TEAMED ✓ ' + lead.conviction + '</span>';
  if (lead.conf) proofChips += '<span class="chip c-conf">' + escH(lead.conf) + ' confidence</span>';
  let srcs = lead.stack.map(s =>
    '<div class="src"><span class="s-l">' + escH(s.label) + '</span>' +
    '<span class="s-m">' + escH(s.src) + ' · ' + ageTxt(s.age) + '</span></div>').join('');
  h += '<section id="sec-proof">' + sLabel('PROOF') +
       '<div class="chips">' + proofChips + '</div><div class="srcs">' + srcs + '</div></section>';

  /* THE NUMBERS */
  const q = lead.qual;
  const dims = [['SEAT', q.seat, q.seat_why], ['BUDGET', q.budget, q.budget_why],
                ['URGENCY', q.urgency, q.urgency_why], ['BUYER', q.buyer, q.buyer_why]];
  let grid = dims.map(d =>
    '<div class="q"><div class="q-top"><span class="q-name">' + d[0] + '</span>' + mark(d[1]) + '</div>' +
    '<div class="q-why">' + escH(d[2]) + '</div></div>').join('');
  h += '<section>' + sLabel('THE NUMBERS') +
    '<div class="qgrid">' + grid + '</div>' +
    '<div class="n-foot"><span class="chip c-total">QUALIFICATION ' + q.total + ' / 8</span>' +
    (lead.prop ? '<span class="chip prop-' + lead.propCls + '">' + escH(lead.prop) + '</span>' : '') + '</div>' +
    (lead.propWhy ? '<p class="propwhy">Fee propensity · ' + escH(lead.propWhy) + '</p>' : '') +
    (lead.bizCase ? '<div class="bizcase"><div class="bc-label">BUSINESS CASE</div><div class="bc-body">' + escH(lead.bizCase) + '</div></div>' : '') +
    '</section>';

  /* actions */
  h += '<div class="actions">' + (ready
    ? '<button class="btn btn-primary" type="button" data-act="pitch">Generate pitch</button>' +
      '<button class="btn" type="button" data-act="draft"><span class="b-spark">✦</span>Draft opener</button>' +
      '<button class="btn" type="button" data-act="sources">View sources</button>' +
      '<span class="spacer"></span>' +
      '<button class="btn btn-good" type="button" data-act="follow">✓ Followed up <kbd>F</kbd></button>' +
      '<button class="btn btn-bad" type="button" data-act="dismiss">✕ Dismiss <kbd>D</kbd></button>'
    : '<button class="btn" type="button" data-act="sources">View sources</button>' +
      '<span class="spacer"></span>' +
      '<button class="btn btn-bad" type="button" data-act="dismiss">✕ Dismiss <kbd>D</kbd></button>') +
    '</div>';
  return h;
}

function open(lead) {
  openLead = lead;
  hidePeek();
  clearTimeout(closeTimer);
  portfolio.innerHTML = portfolioHtml(lead);
  crumb.textContent = '← esc to return · ' + lead.co;
  takeover.hidden = false;
  takeover.scrollTop = 0;
  document.body.classList.add('locked');
  requestAnimationFrame(() => takeover.classList.add('on'));
  crumb.focus({ preventScroll: true });
}
function closeTakeover() {
  if (takeover.hidden) return;
  clearInterval(typeTimer);
  takeover.classList.remove('on');
  closeTimer = setTimeout(() => { takeover.hidden = true; }, 230);
  document.body.classList.remove('locked');
  openLead = null;
  input.focus({ preventScroll: true });
}

/* typewriter — the AI moment */
function draftOpener() {
  if (!openLead || !openLead.opener) return;
  const panel = portfolio.querySelector('.draft');
  if (!panel) return;
  panel.classList.add('on');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  const out = panel.querySelector('.d-text');
  clearInterval(typeTimer);
  out.innerHTML = '<span class="t"></span><span class="caret"></span>';
  const txt = out.querySelector('.t'), caret = out.querySelector('.caret'), full = openLead.opener;
  let i = 0;
  typeTimer = setInterval(() => {
    i += 2;
    txt.textContent = full.slice(0, i);
    if (i >= full.length) { clearInterval(typeTimer); caret.remove(); }
  }, 16);
}

/* triage */
function triage(kind) {
  if (!openLead) return;
  const lead = openLead;
  state.status[lead.id] = kind;
  closeTakeover();
  render();
  toast(kind === 'followed' ? '✓ ' + lead.co + ' marked followed up' : lead.co + ' dismissed',
        () => { delete state.status[lead.id]; render(); });
}

portfolio.addEventListener('click', e => {
  const b = e.target.closest('[data-act]');
  if (!b || !openLead) return;
  const act = b.dataset.act;
  if (act === 'pitch') toast('✦ Pitch pack queued for ' + openLead.co + ' — a few minutes');
  else if (act === 'draft') draftOpener();
  else if (act === 'sources') {
    const sec = portfolio.querySelector('#sec-proof');
    if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    const n = openLead.stack.length;
    toast(n + ' source' + (n === 1 ? '' : 's') + ' — listed under Proof');
  }
  else if (act === 'follow') triage('followed');
  else if (act === 'dismiss') triage('dismissed');
});
crumb.addEventListener('click', closeTakeover);

/* ---------- toast ---------- */
function toast(msg, undoFn) {
  clearTimeout(toastTimer);
  toastEl.innerHTML = '<span>' + escH(msg) + '</span>' + (undoFn ? '<button type="button">Undo</button>' : '');
  if (undoFn) toastEl.querySelector('button').addEventListener('click', () => {
    undoFn(); toastEl.classList.remove('on');
  });
  toastEl.classList.add('on');
  toastTimer = setTimeout(() => toastEl.classList.remove('on'), 4200);
}

/* ---------- the command bar ---------- */
function shake() {
  barWrap.classList.remove('shake');
  void barWrap.offsetWidth;
  barWrap.classList.add('shake');
}
barWrap.addEventListener('animationend', () => barWrap.classList.remove('shake'));

function resetInput() {
  input.value = ''; state.q = '';
  bar.classList.remove('armed');
}
function runEnter() {
  const raw = input.value.trim(), cmd = raw.toLowerCase();
  if (cmd === 'plan') {
    state.plan = true; resetInput(); render();
    toast('✦ Morning planned — three calls before lunch');
  } else if (cmd === 'dev') {
    state.dev = true; resetInput(); render();
    const n = RADAR.leads.filter(l => l.tier !== 'ready').length;
    toast(n + ' below the line — gate reasons shown');
  } else if (cmd === 'clear') {
    state.plan = false; state.dev = false; resetInput(); render();
    toast('Cleared — ranked by lead strength');
  } else if (!raw) {
    if (state.sel >= 0) open(rows[state.sel].lead);
  } else if (rows.length) {
    open(rows[state.sel >= 0 ? state.sel : 0].lead);
  } else {
    shake();
  }
}
input.addEventListener('input', () => {
  state.q = input.value.trim();
  bar.classList.toggle('armed', isCmdText(state.q));
  render();
});

/* ---------- keyboard ---------- */
document.addEventListener('keydown', e => {
  const k = e.key;
  /* ⌘K / Ctrl-K from anywhere */
  if ((e.metaKey || e.ctrlKey) && k.toLowerCase() === 'k') {
    e.preventDefault();
    if (!takeover.hidden) closeTakeover();
    input.focus(); input.select();
    return;
  }
  if (!takeover.hidden) {                      /* — inside the takeover — */
    if (k === 'Escape') { e.preventDefault(); closeTakeover(); return; }
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (k === 'f' || k === 'F') { if (openLead && openLead.tier === 'ready') { e.preventDefault(); triage('followed'); } return; }
    if (k === 'd' || k === 'D') { e.preventDefault(); triage('dismissed'); return; }
    return;
  }
  /* — on the rail — */
  if (k === 'ArrowDown') { e.preventDefault(); moveSel(1); return; }
  if (k === 'ArrowUp')   { e.preventDefault(); moveSel(-1); return; }
  if (k === 'Enter') {
    if (document.activeElement === input) { e.preventDefault(); runEnter(); }
    else if (document.activeElement && document.activeElement.classList.contains('row')) {
      e.preventDefault();
      const r = rows.find(x => x.el === document.activeElement);
      if (r) open(r.lead);
    }
    return;
  }
  if (k === ' ' && document.activeElement && document.activeElement.classList.contains('row')) {
    e.preventDefault();
    const r = rows.find(x => x.el === document.activeElement);
    if (r) open(r.lead);
    return;
  }
  if (k === 'Escape') {
    if (input.value) { resetInput(); render(); input.focus(); }
    else deselect();
  }
});

/* keep the floating peek glued to its row while the page scrolls */
window.addEventListener('scroll', () => {
  if (peek.classList.contains('on') && !peek.classList.contains('inline') && state.sel >= 0) {
    const { el } = rows[state.sel];
    const r = el.getBoundingClientRect(), h = peek.offsetHeight;
    peek.style.top = Math.max(14, Math.min(r.top - 2, window.innerHeight - h - 14)) + 'px';
  }
}, { passive: true });
window.addEventListener('resize', hidePeek);

/* ---------- boot ---------- */
const m = RADAR.meta;
$('#metaLine').textContent = m.dateLabel + ' · ' + m.signals + ' signals · ' + m.sources + ' sources · scanned ' + m.scanTime;
$('#synthText').textContent = ' ' + m.synthesis;
$('#kbdHint').textContent = /mac/i.test(navigator.platform || navigator.userAgent) ? '⌘K' : 'Ctrl K';
render();
input.focus();
})();
</script>
</body>
</html>
