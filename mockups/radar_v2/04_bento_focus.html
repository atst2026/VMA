<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VMA — Communications Radar · Bento Focus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F9FC; --ink:#101626; --sec:#3C4043; --muted:#5A6577; --dim:#9AA0A6;
    --hair:rgba(16,22,38,.08); --slate:#3E5C84; --deep:#1A3D7C; --blue:#4285F4;
    --wash:#E8F0FE; --clay:#D97757; --green:#1E7A41; --green2:#34A853;
    --amber:#B45309; --amber2:#D97A2B; --red:#B42318;
    --ease:cubic-bezier(.2,.7,.2,1);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
    background:
      radial-gradient(620px 360px at 12% -4%, rgba(66,133,244,.045), transparent 70%),
      radial-gradient(560px 340px at 92% 2%, rgba(217,119,87,.035), transparent 70%),
      var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .mono{ font-family:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace; }
  button{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--blue); outline-offset:2px; border-radius:6px; }

  .wrap{ max-width:1240px; margin:0 auto; padding:26px 28px 56px; }

  /* ----- header ----- */
  header{ display:flex; align-items:baseline; gap:14px; padding:2px 4px 20px; }
  .brand{ display:flex; align-items:baseline; gap:7px; white-space:nowrap; }
  .brand .vma{ font-weight:800; font-size:19px; letter-spacing:.01em; color:var(--ink); }
  .brand .group{ font-weight:300; font-size:13px; letter-spacing:.34em; color:var(--slate); }
  .hsep{ width:1px; height:16px; background:var(--hair); align-self:center; }
  .ptitle{ font-size:14px; font-weight:600; color:var(--sec); }
  .hspace{ flex:1; }
  .hdate{ font-size:12.5px; color:var(--muted); font-weight:500; }
  .hscan{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--dim); letter-spacing:.02em; }

  /* ----- bento grid ----- */
  .grid{ display:grid; grid-template-columns:repeat(12,1fr); gap:14px; }
  .tile{
    position:relative; background:#fff; border:1px solid var(--hair); border-radius:18px;
    box-shadow:0 1px 2px rgba(16,22,38,.03), 0 6px 18px rgba(16,22,38,.04);
    transition:transform .16s var(--ease), box-shadow .16s var(--ease), opacity .25s ease;
  }
  .tile.click{ cursor:pointer; }
  .tile.click:hover{ transform:translateY(-2px); box-shadow:0 2px 4px rgba(16,22,38,.04), 0 12px 30px rgba(16,22,38,.08); }
  .s4{ grid-column:span 4; } .s5{ grid-column:span 5; } .s6{ grid-column:span 6; }
  .s7{ grid-column:span 7; } .s12{ grid-column:span 12; }

  /* trigger pills */
  .pill{ display:inline-flex; align-items:center; font-family:'JetBrains Mono',monospace; font-size:10px;
    font-weight:600; letter-spacing:.07em; text-transform:uppercase; padding:4px 9px; border-radius:999px; white-space:nowrap; }
  .pill.lead  { color:#1d4ed8; background:#e9effb; }
  .pill.fund  { color:#1e7a41; background:#e7f3ec; }
  .pill.restr { color:#46556e; background:#edf0f4; }
  .pill.warn  { color:#b5530e; background:#fdecdb; }
  .pill.mna   { color:#6b3fb5; background:#efe9fb; }
  .pill.people{ color:#0e7c74; background:#ddf3f0; }

  .newtag{ font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; letter-spacing:.09em;
    color:var(--clay); background:rgba(217,119,87,.11); padding:4px 8px; border-radius:999px; }
  .newtag.pulse{ animation:newpulse 2.6s ease-in-out infinite; }
  @keyframes newpulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(217,119,87,.22); }
    45%{ box-shadow:0 0 0 6px rgba(217,119,87,0); }
  }

  .scorechip{ font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; padding:4px 9px;
    border-radius:8px; line-height:1; }
  .scorechip.good{ color:var(--green); background:#e7f3ec; }
  .scorechip.mid { color:var(--amber); background:#fdecdb; }
  .scorechip.low { color:var(--muted); background:#edf0f4; }

  .badge{ display:inline-flex; align-items:center; gap:5px; font-family:'JetBrains Mono',monospace;
    font-size:10px; font-weight:600; letter-spacing:.05em; padding:4px 9px; border-radius:7px; white-space:nowrap; }
  .badge.win{ color:var(--muted); background:#F1F4F9; }
  .badge.fee{ color:var(--amber); background:#fdecdb; }
  .badge.q4 { color:var(--amber); background:#fdecdb; }
  .badge svg{ flex:none; }

  /* ----- hero tile ----- */
  .hero{ min-height:300px; padding:26px; overflow:hidden; display:flex; flex-direction:column; }
  .hero::before{ content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background:
      radial-gradient(420px 260px at 86% -10%, rgba(66,133,244,.06), transparent 70%),
      radial-gradient(360px 240px at -6% 108%, rgba(217,119,87,.05), transparent 70%); }
  .hero > *{ position:relative; }
  .hero .toprow{ display:flex; align-items:center; gap:8px; margin-bottom:14px; padding-right:84px; }
  .hero h1{ font-size:40px; font-weight:750; letter-spacing:-.022em; line-height:1.05; margin-bottom:10px; padding-right:84px; }
  .hero .hook{ font-size:17px; line-height:1.5; color:var(--muted); max-width:54ch; margin-bottom:16px; }
  .microlabel{ font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.12em;
    color:var(--dim); text-transform:uppercase; }
  .hero .why1{ font-size:13.5px; line-height:1.55; color:var(--sec); max-width:60ch; margin:4px 0 14px; }
  .hero .who{ display:flex; align-items:baseline; gap:10px; margin-bottom:18px; }
  .hero .who b{ font-size:13.5px; font-weight:600; color:var(--ink); }
  .hero .botrow{ margin-top:auto; display:flex; align-items:center; gap:8px; }
  .hero .openaff{ margin-left:auto; font-size:12.5px; font-weight:600; color:var(--dim); transition:color .15s ease; white-space:nowrap; }
  .tile.click:hover .openaff{ color:var(--deep); }
  .hero .ringwrap{ position:absolute; top:24px; right:24px; }

  /* score ring */
  .ring text{ font-family:'JetBrains Mono',monospace; font-weight:700; fill:var(--ink); }

  /* ----- side intelligence tile ----- */
  .side{ padding:26px; display:flex; flex-direction:column; overflow:hidden; }
  .side::before{ content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background:radial-gradient(300px 200px at 100% 0%, rgba(217,119,87,.05), transparent 70%); }
  .side > *{ position:relative; }
  .side .ai-h{ display:flex; align-items:center; gap:7px; margin-bottom:13px; }
  .side .spark{ color:var(--clay); font-size:14px; line-height:1; }
  .side .ai-name{ font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; letter-spacing:.13em;
    text-transform:uppercase; color:var(--slate); }
  .side .ai-meta{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--dim); margin-bottom:12px; letter-spacing:.02em; }
  .side .synth{ font-size:15px; line-height:1.65; color:var(--sec); }
  .planbtn{
    margin-top:auto; align-self:flex-start; border:0; cursor:pointer;
    background:var(--deep); color:#fff; font-size:13px; font-weight:600; letter-spacing:.01em;
    padding:11px 20px; border-radius:11px; display:inline-flex; align-items:center; gap:8px;
    transition:background .15s ease, transform .15s var(--ease), box-shadow .15s ease;
    box-shadow:0 2px 8px rgba(26,61,124,.22);
  }
  .planbtn:hover{ background:#16336A; transform:translateY(-1px); box-shadow:0 4px 14px rgba(26,61,124,.3); }
  .planbtn.done{ background:#e7f3ec; color:var(--green); box-shadow:none; cursor:default; transform:none; }

  /* plan-order corner badges */
  .planbadge{ position:absolute; top:-9px; left:-9px; width:26px; height:26px; border-radius:50%;
    background:var(--deep); color:#fff; font-family:'JetBrains Mono',monospace; font-size:12.5px; font-weight:700;
    display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(26,61,124,.35);
    z-index:5; animation:badgein .3s var(--ease); }
  @keyframes badgein{ from{ transform:scale(.4); opacity:0; } to{ transform:scale(1); opacity:1; } }
  .tile.planned{ box-shadow:0 0 0 2px rgba(26,61,124,.28), 0 0 26px rgba(66,133,244,.16), 0 6px 18px rgba(16,22,38,.05); }
  .tile.click.planned:hover{ box-shadow:0 0 0 2px rgba(26,61,124,.28), 0 0 26px rgba(66,133,244,.18), 0 12px 30px rgba(16,22,38,.08); }

  /* triage corner badge */
  .statebadge{ position:absolute; top:-9px; right:14px; font-family:'JetBrains Mono',monospace; font-size:9.5px;
    font-weight:700; letter-spacing:.07em; padding:4px 9px; border-radius:999px; z-index:5;
    animation:badgein .3s var(--ease); }
  .statebadge.followed{ color:#fff; background:var(--green); }
  .statebadge.dismissed{ color:#fff; background:#7A8294; }
  .tile.dismissed{ opacity:.52; }

  /* ----- medium tiles ----- */
  .med{ padding:24px; display:flex; flex-direction:column; min-height:178px; }
  .med .toprow{ display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .med .toprow .scorechip{ margin-left:auto; }
  .med h2{ font-size:24px; font-weight:700; letter-spacing:-.015em; margin-bottom:3px; }
  .med .seat{ font-size:12.5px; font-weight:500; color:var(--muted); margin-bottom:9px; }
  .med .hook{ font-size:13.5px; line-height:1.5; color:var(--sec); display:-webkit-box;
    -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:12px; }
  .med .botrow{ margin-top:auto; display:flex; align-items:center; }

  /* ----- compact tiles ----- */
  .cmp{ padding:22px; display:flex; flex-direction:column; gap:7px; }
  .cmp .toprow{ display:flex; align-items:center; gap:8px; }
  .cmp .toprow .scorechip{ margin-left:auto; }
  .cmp h3{ font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .cmp .seat{ font-size:12px; font-weight:500; color:var(--muted); }

  /* ----- below the line ----- */
  .below{ grid-column:span 12; background:#F4F7FC; border:1px solid var(--hair); border-radius:18px;
    box-shadow:none; padding:22px 26px; }
  .below .btitle{ font-family:'JetBrains Mono',monospace; font-size:10.5px; font-weight:700; letter-spacing:.14em;
    color:var(--dim); margin-bottom:16px; }
  .bcols{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:26px; }
  .bcol .bch{ font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:.11em;
    text-transform:uppercase; color:var(--muted); padding-bottom:8px; border-bottom:1px solid var(--hair); margin-bottom:10px; }
  .bline{ padding:7px 0; cursor:help; }
  .bline .l1{ display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .bline .co{ font-size:13px; font-weight:600; color:var(--sec); }
  .bline .trig{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:.04em; }
  .bline .dnc{ font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700; letter-spacing:.09em;
    color:#fff; background:var(--red); padding:2px 7px; border-radius:999px; }
  .bline .gate{ font-size:11.5px; line-height:1.5; color:var(--amber); margin-top:2px; }
  .bline.blocked .gate{ color:var(--red); }

  /* ----- tooltips ----- */
  [data-tip]{ position:relative; }
  [data-tip]::after{
    content:attr(data-tip); position:absolute; left:0; bottom:calc(100% + 8px);
    background:var(--ink); color:#fff; font-family:'Inter',sans-serif; font-weight:400;
    font-size:11.5px; line-height:1.5; letter-spacing:0; text-transform:none;
    padding:8px 11px; border-radius:9px; width:max-content; max-width:300px;
    opacity:0; transform:translateY(3px); transition:opacity .16s ease .1s, transform .16s ease .1s;
    pointer-events:none; z-index:80; box-shadow:0 10px 26px rgba(16,22,38,.2);
  }
  [data-tip]:hover::after, [data-tip]:focus-visible::after{ opacity:1; transform:none; }
  .tip-down[data-tip]::after{ bottom:auto; top:calc(100% + 8px); transform:translateY(-3px); }
  .tip-down[data-tip]:hover::after, .tip-down[data-tip]:focus-visible::after{ transform:none; }
  .tip-right[data-tip]::after{ left:auto; right:0; }

  /* ----- overlay: scrim + growing panel ----- */
  .scrim{ position:fixed; inset:0; background:rgba(16,22,38,.4); backdrop-filter:blur(2px);
    opacity:0; transition:opacity .28s ease; z-index:890; display:none; }
  .scrim.on{ opacity:1; }
  .panel{
    position:fixed; left:0; top:0; background:#fff; border:1px solid var(--hair); border-radius:18px;
    box-shadow:0 24px 70px rgba(16,22,38,.26); overflow:hidden; z-index:900; display:none;
    transition:transform .3s var(--ease), width .3s var(--ease), height .3s var(--ease);
    will-change:transform,width,height;
  }
  .panel.notrans{ transition:none; }
  .pinner{ position:absolute; left:0; top:0; height:100%; opacity:0; transition:opacity .12s ease; }
  .panel.shown .pinner{ opacity:1; transition:opacity .24s ease .15s; }
  .pclose{ position:absolute; top:16px; right:16px; z-index:10; width:34px; height:34px; border-radius:10px;
    border:1px solid var(--hair); background:#fff; color:var(--muted); cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s; }
  .pclose:hover{ background:#F1F4F9; color:var(--ink); }

  /* ----- dossier ----- */
  .dossier{ height:100%; overflow-y:auto; overscroll-behavior:contain; }
  .dossier::-webkit-scrollbar{ width:9px; }
  .dossier::-webkit-scrollbar-thumb{ background:rgba(16,22,38,.13); border-radius:8px; border:2px solid #fff; }
  .dbody{ padding:30px 34px 0; }
  .dhero{ display:flex; align-items:flex-start; gap:18px; padding-bottom:20px; border-bottom:1px solid var(--hair); margin-bottom:22px; }
  .dhero .dl{ flex:1; min-width:0; }
  .dhero .toprow{ display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .dhero h2{ font-size:30px; font-weight:750; letter-spacing:-.02em; margin-bottom:4px; }
  .dhero .dsub{ font-size:13px; color:var(--muted); font-weight:500; margin-bottom:12px; }
  .dhero .dbadges{ display:flex; gap:8px; flex-wrap:wrap; }
  .dhero .ringwrap{ flex:none; margin-right:46px; text-align:center; }
  .dhero .ringlbl{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.12em; color:var(--dim); margin-top:4px; }

  .dsec{ margin-bottom:22px; }
  .dsec .shead{ display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .dsec .shead::after{ content:""; flex:1; height:1px; background:var(--hair); }
  .dsec p{ font-size:13.5px; line-height:1.62; color:var(--sec); max-width:62ch; }
  .dsec .inlinebadges{ display:inline-flex; gap:6px; margin-left:8px; vertical-align:2px; }

  .whorow{ display:flex; align-items:flex-start; gap:11px; padding:11px 0 2px; }
  .whorow svg{ flex:none; margin-top:2px; color:var(--slate); }
  .whorow .wl{ font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.11em; color:var(--dim); text-transform:uppercase; margin-bottom:2px; }
  .whorow .wv{ font-size:13.5px; line-height:1.5; color:var(--ink); font-weight:500; }
  .whorow .wv .note{ color:var(--muted); font-weight:400; }

  .openerbtn{ margin-top:11px; display:inline-flex; align-items:center; gap:7px; cursor:pointer;
    border:1px solid var(--hair); background:#fff; color:var(--deep); font-size:12.5px; font-weight:600;
    padding:8px 15px; border-radius:10px; transition:background .15s, border-color .15s; }
  .openerbtn:hover{ background:var(--wash); border-color:rgba(26,61,124,.22); }
  .openerbox{ display:none; margin-top:12px; background:#FAFBFE; border:1px solid var(--hair);
    border-left:3px solid var(--clay); border-radius:12px; padding:14px 17px;
    font-size:13.5px; line-height:1.65; color:var(--sec); max-width:62ch; }
  .openerbox.on{ display:block; }
  .openerbox .ai-tag{ font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.11em;
    color:var(--clay); text-transform:uppercase; display:block; margin-bottom:7px; }
  .caret{ display:inline-block; width:7px; height:14px; background:var(--clay); vertical-align:-2px;
    margin-left:2px; animation:blink .85s steps(1) infinite; border-radius:1.5px; }
  @keyframes blink{ 50%{ opacity:0; } }

  .proofrow{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:11px; }
  .proofchip{ display:inline-flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace;
    font-size:10.5px; font-weight:600; letter-spacing:.05em; padding:5px 10px; border-radius:8px; }
  .proofchip.ver{ color:var(--slate); background:#EDF1F7; }
  .proofchip.rt{ color:var(--green); background:#e7f3ec; }
  .proofchip.conf{ color:var(--muted); background:#F1F4F9; }
  .srcs{ display:flex; flex-direction:column; gap:6px; }
  .srcchip{ display:flex; align-items:baseline; gap:9px; padding:8px 12px; background:#FAFBFE;
    border:1px solid var(--hair); border-radius:10px; }
  .srcchip .sl{ font-size:12.5px; font-weight:550; color:var(--sec); }
  .srcchip .sm{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--dim); margin-left:auto; white-space:nowrap; }

  .qualrow{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:13px; }
  .qchip{ display:inline-flex; align-items:center; gap:7px; border:1px solid var(--hair); background:#FAFBFE;
    border-radius:9px; padding:6px 11px; cursor:help; }
  .qchip .qn{ font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; }
  .qchip .qg{ font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; }
  .qchip .qg.q0{ color:var(--dim); } .qchip .qg.q1{ color:var(--amber); } .qchip .qg.q2{ color:var(--green); }
  .qtotal{ font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--ink); margin-left:2px; }
  .numline{ font-size:13px; line-height:1.6; color:var(--sec); margin-bottom:7px; }
  .numline .nl{ font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.1em; color:var(--dim); text-transform:uppercase; margin-right:7px; }
  .bizbox{ margin-top:12px; background:var(--wash); border-radius:12px; padding:13px 16px;
    font-size:13px; line-height:1.6; color:#243A5E; max-width:64ch; }
  .bizbox .bl{ font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.11em; color:var(--slate);
    text-transform:uppercase; display:block; margin-bottom:5px; }

  /* action row */
  .actrow{ position:sticky; bottom:0; background:linear-gradient(180deg, rgba(255,255,255,0), #fff 26%);
    padding:18px 34px 22px; display:flex; align-items:center; gap:9px; border-top:1px solid var(--hair); margin-top:6px; }
  .abtn{ cursor:pointer; font-size:12.5px; font-weight:600; padding:9px 16px; border-radius:10px;
    border:1px solid var(--hair); background:#fff; color:var(--sec); display:inline-flex; align-items:center; gap:7px;
    transition:background .15s, color .15s, border-color .15s; white-space:nowrap; }
  .abtn:hover{ background:#F1F4F9; color:var(--ink); }
  .abtn.primary{ background:var(--deep); border-color:var(--deep); color:#fff; }
  .abtn.primary:hover{ background:#16336A; }
  .abtn.follow{ color:var(--green); }
  .abtn.follow:hover{ background:#e7f3ec; border-color:rgba(30,122,65,.25); color:var(--green); }
  .abtn.dismiss{ color:var(--muted); }
  .abtn.dismiss:hover{ background:#FBEFEC; border-color:rgba(180,35,24,.2); color:var(--red); }
  .actspace{ flex:1; }

  /* toast */
  .toast{ position:fixed; left:50%; bottom:30px; transform:translate(-50%,14px); background:var(--ink); color:#fff;
    font-size:13px; font-weight:500; padding:11px 18px; border-radius:999px; display:flex; align-items:center; gap:13px;
    box-shadow:0 14px 36px rgba(16,22,38,.3); opacity:0; pointer-events:none;
    transition:opacity .22s ease, transform .22s var(--ease); z-index:1000; max-width:84vw; }
  .toast.on{ opacity:1; transform:translate(-50%,0); pointer-events:auto; }
  .toast .undo{ cursor:pointer; border:0; background:none; color:#9DBBF5; font-size:12.5px; font-weight:700;
    letter-spacing:.02em; padding:2px 2px; }
  .toast .undo:hover{ color:#fff; }

  footer{ max-width:1240px; margin:0 auto; padding:0 32px 26px; font-family:'JetBrains Mono',monospace;
    font-size:10px; letter-spacing:.1em; color:var(--dim); text-transform:uppercase; }

  @media (max-width:1180px){
    .hero h1{ font-size:34px; }
    .bcols{ gap:18px; }
  }
  @media (prefers-reduced-motion:reduce){
    *{ transition-duration:.01ms !important; animation-duration:.01ms !important; }
  }
</style>
</head>
<body>

const $  = (s, el=document) => el.querySelector(s);
const esc = s => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const band = sc => sc >= 70 ? "good" : sc >= 45 ? "mid" : "low";
const bandCol = sc => sc >= 70 ? "#1E7A41" : sc >= 45 ? "#B45309" : "#9AA0A6";
const verLabel = v => v === "reg" ? "Registry-attested" : v === "multi" ? "2+ sources" : "Single source";
const ageLabel = a => a === 0 ? "today" : a + "d";
const firstSentence = t => { const m = String(t).match(/^.*?[.!?](?=\s|$)/); return m ? m[0] : t; };
const buyerName = b => String(b).split(" — ")[0];
const qGlyph = n => n === 0 ? "✗" : n === 1 ? "✓" : "✓✓";

function ringSVG(score, size){
  const sw = size >= 70 ? 5.5 : 5;
  const r = size/2 - sw - 1, c = +(2*Math.PI*r).toFixed(2), off = +(c*(1-score/100)).toFixed(2);
  const fs = size >= 70 ? 19 : 17;
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="Lead score ${score} of 100">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(16,22,38,.08)" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${bandCol(score)}" stroke-width="${sw}"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="50%" text-anchor="middle" dy="${fs*0.36}" font-size="${fs}">${score}</text></svg>`;
}
const pillHTML = L => `<span class="pill ${L.key}">${esc(L.type)}</span>`;
const scoreChip = L => `<span class="scorechip ${band(L.score)}">${L.score}</span>`;
const newTag = (L, pulse) => L.isNew ? `<span class="newtag${pulse ? " pulse" : ""}">NEW</span>` : "";
const winBadge = L => `<span class="badge win">
  <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="4.7"/><path d="M6 3.6V6l1.7 1.2"/></svg>
  WINDOW ${esc(L.win.toUpperCase())}</span>`;
const feeBadge = (L, down) => L.fee ? `<span class="badge fee${down ? " tip-down" : ""}" data-tip="${esc(L.feeTip)}" tabindex="0">${esc(L.fee)}</span>` : "";

/* ============================== toast ==================================== */
const toastEl = $("#toast");
let toastTimer = null;
function toast(msg, undoFn){
  clearTimeout(toastTimer);
  toastEl.innerHTML = `<span>${esc(msg)}</span>${undoFn ? '<button class="undo" type="button">Undo</button>' : ""}`;
  if (undoFn) $(".undo", toastEl).addEventListener("click", () => { undoFn(); hideToast(); });
  toastEl.classList.add("on");
  toastTimer = setTimeout(hideToast, undoFn ? 5200 : 3400);
}
function hideToast(){ toastEl.classList.remove("on"); }

/* ============================== plan my morning ========================== */
$("#planbtn").addEventListener("click", function(){
  if (this.classList.contains("done")) return;
  M.planOrder.forEach((id, i) => {
    const t = $(`.tile[data-id="${id}"]`);
    if (!t) return;
    t.classList.add("planned");
    const b = document.createElement("span");
    b.className = "planbadge"; b.textContent = i + 1;
    b.setAttribute("aria-label", `Call order ${i + 1}`);
    t.appendChild(b);
  });
  this.textContent = "Morning planned ✓";
  this.classList.add("done");
  this.setAttribute("aria-disabled", "true");
  toast(`Morning planned — ${M.planOrder.map(id => byId[id].co).join(", then ")}.`);
});

/* ============================== typewriter =============================== */
function draftOpener(L){
  const box = $("#openerbox"), txt = $("#openertext"), caret = $("#openercaret");
  if (!box) return;
  $("#d-opening").scrollIntoView({ behavior: "smooth", block: "nearest" });
  if (box.classList.contains("on")){           // second press: complete instantly
    clearInterval(typeTimer); typeTimer = null;
    txt.textContent = L.opener; caret.style.display = "none";
    return;
  }
  box.classList.add("on");
  txt.textContent = ""; caret.style.display = "";
  let i = 0;
  clearInterval(typeTimer);
  typeTimer = setInterval(() => {
    i += 2;
    txt.textContent = L.opener.slice(0, i);
    if (i >= L.opener.length){
      clearInterval(typeTimer); typeTimer = null;
      txt.textContent = L.opener;
      setTimeout(() => { caret.style.display = "none"; }, 700);
    }
  }, 18);
}

/* ============================== triage =================================== */
function setTriage(id, state){
  const tile = $(`.tile[data-id="${id}"]`);
  if (!tile) return;
  triage[id] = state || undefined;
  const old = tile.querySelector(".statebadge");
  if (old) old.remove();
  tile.classList.toggle("dismissed", state === "dismissed");
  if (state){
    const b = document.createElement("span");
    b.className = "statebadge " + state;
    b.textContent = state === "followed" ? "✓ FOLLOWED UP" : "DISMISSED";
    tile.appendChild(b);
  }
}

/* ============================== overlay (FLIP grow) ====================== */
const scrim = $("#scrim"), panel = $("#panel"), pinner = $("#pinner"), pclose = $("#pclose");

function lockScroll(on){
  const sw = window.innerWidth - document.documentElement.clientWidth;
  document.body.style.overflow = on ? "hidden" : "";
  document.body.style.paddingRight = on ? sw + "px" : "";
}

function openDossier(tile){
  if (animating || openId) return;
  const L = byId[tile.dataset.id];
  if (!L) return;
  animating = true; openId = L.id; openTile = tile;

  panel.setAttribute("aria-label", `Call file: ${L.co}`);
  pinner.innerHTML = dossierHTML(L);
  const r = tile.getBoundingClientRect();
  const W = Math.min(760, window.innerWidth - 48);
  const H = Math.min(window.innerHeight * 0.86, 880);
  const tx = (window.innerWidth - W) / 2 - r.left;
  const ty = (window.innerHeight - H) / 2 - r.top;

  lockScroll(true);
  scrim.style.display = "block";
  panel.style.display = "block";
  panel.classList.add("notrans");
  panel.style.left = r.left + "px";
  panel.style.top = r.top + "px";
  panel.style.width = r.width + "px";
  panel.style.height = r.height + "px";
  panel.style.transform = "none";
  pinner.style.width = W + "px";                 // fixed final width: no text reflow mid-grow
  void panel.offsetHeight;                       // force reflow
  panel.classList.remove("notrans");

  requestAnimationFrame(() => {
    scrim.classList.add("on");
    panel.style.width = W + "px";
    panel.style.height = H + "px";
    panel.style.transform = `translate(${tx}px, ${ty}px)`;
    panel.classList.add("shown");
  });

  const onEnd = e => {
    if (e.target !== panel || e.propertyName !== "transform") return;
    panel.removeEventListener("transitionend", onEnd);
    animating = false;
    const d = pinner.querySelector(".dossier");
    if (d) d.scrollTop = 0;
    pclose.focus({ preventScroll: true });
  };
  panel.addEventListener("transitionend", onEnd);
  setTimeout(() => { if (animating){ animating = false; pclose.focus({ preventScroll: true }); } }, 460);
}

function closeDossier(){
  if (!openId || animating) return;
  animating = true;
  clearInterval(typeTimer); typeTimer = null;
  const tile = openTile;
  const r = tile.getBoundingClientRect();
  panel.classList.remove("shown");               // content fades out fast
  scrim.classList.remove("on");
  panel.style.width = r.width + "px";
  panel.style.height = r.height + "px";
  panel.style.transform = "none";                // back to the tile's rect

  const finish = () => {
    panel.style.display = "none";
    scrim.style.display = "none";
    pinner.innerHTML = "";
    lockScroll(false);
    animating = false; openId = null;
    if (tile && tile.isConnected) tile.focus({ preventScroll: true });
    openTile = null;
  };
  const onEnd = e => {
    if (e.target !== panel || e.propertyName !== "transform") return;
    panel.removeEventListener("transitionend", onEnd);
    finish();
  };
  panel.addEventListener("transitionend", onEnd);
  setTimeout(() => { if (animating) finish(); }, 460);
}

/* tile clicks + keyboard */
$("#grid").addEventListener("click", e => {
  const tile = e.target.closest(".tile.click");
  if (tile) openDossier(tile);
});
$("#grid").addEventListener("keydown", e => {
  const tile = e.target.closest(".tile.click");
  if (tile && (e.key === "Enter" || e.key === " ")){ e.preventDefault(); openDossier(tile); }
});

/* dossier actions */
panel.addEventListener("click", e => {
  const btn = e.target.closest("[data-act]");
  if (!btn || !openId) return;
  const L = byId[openId];
  switch (btn.dataset.act){
    case "pitch":   toast(`Pitch pack queued for ${L.co} — a few minutes`); break;
    case "opener":  draftOpener(L); break;
    case "sources": toast(`${L.stack.length} source${L.stack.length === 1 ? "" : "s"} opened for ${L.co}`); break;
    case "follow": {
      const id = openId;
      setTriage(id, "followed");
      closeDossier();
      toast(`${L.co} marked as followed up`, () => setTriage(id, null));
      break;
    }
    case "dismiss": {
      const id = openId;
      setTriage(id, "dismissed");
      closeDossier();
      toast(`${L.co} dismissed`, () => setTriage(id, null));
      break;
    }
  }
});

pclose.addEventListener("click", closeDossier);
scrim.addEventListener("click", closeDossier);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDossier(); });
</script>
