<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VMA — Communications Radar · The Runway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F9FC; --ink:#101626; --sec:#3C4043; --muted:#5A6577; --dim:#9AA0A6;
    --hair:rgba(16,22,38,.08);
    --slate:#3E5C84; --deep:#1A3D7C; --accent:#4285F4; --wash:#E8F0FE;
    --clay:#D97757; --green:#1E7A41; --green2:#34A853; --amber:#B45309;
    --red:#B3261E;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --ui:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --cardw:210px;
    --drawerh:46vh;
  }
  @media (max-width:1240px){ :root{ --cardw:190px; } }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:var(--ui); background:var(--bg); color:var(--ink);
    overflow-x:hidden; min-height:780px;
    display:flex; flex-direction:column;
  }
  button{ font-family:inherit; cursor:pointer; }
  button:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--accent); outline-offset:2px;
  }

  /* ---------- header ---------- */
  header{
    flex:0 0 auto; height:60px; padding:0 26px;
    display:flex; align-items:center; gap:18px;
    background:#fff; border-bottom:1px solid var(--hair);
    position:relative; z-index:5;
  }
  .wordmark{ display:flex; align-items:baseline; gap:7px; white-space:nowrap; }
  .wordmark b{ font-weight:800; font-size:17px; letter-spacing:.01em; }
  .wordmark span{ font-weight:300; font-size:13px; letter-spacing:.34em; color:var(--muted); }
  .pagetitle{
    font-size:13.5px; font-weight:600; color:var(--sec);
    padding-left:18px; border-left:1px solid var(--hair); white-space:nowrap;
  }
  .headright{ margin-left:auto; display:flex; align-items:center; gap:16px; min-width:0; }
  .datelabel{ font-size:11.5px; color:var(--muted); white-space:nowrap; }
  .scanstat{
    font-family:var(--mono); font-size:10px; letter-spacing:.08em; color:var(--dim);
    text-transform:uppercase; white-space:nowrap;
  }

  /* ---------- intelligence strip ---------- */
  .strip{
    flex:0 0 auto; height:42px; padding:0 26px;
    display:flex; align-items:center; gap:14px;
    background:linear-gradient(90deg,#fff, #FBFCFE 60%, #F4F8FE);
    border-bottom:1px solid var(--hair);
    position:relative; z-index:5; min-width:0;
  }
  .ai-line{
    font-size:12.5px; color:var(--sec); white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; min-width:0;
  }
  .ai-line .spark{ color:var(--clay); margin-right:6px; }
  .ai-line b{ font-weight:700; color:var(--ink); }
  .chips{ margin-left:auto; display:flex; align-items:center; gap:8px; flex:0 0 auto; }
  .chip{
    font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:.1em;
    padding:4px 8px; border-radius:999px; border:1px solid var(--hair);
    background:#fff; color:var(--muted); white-space:nowrap;
    display:inline-flex; align-items:center; gap:6px;
  }
  .chip .dot{ width:5px; height:5px; border-radius:50%; display:inline-block; }
  .chip.plan{ color:var(--slate); background:var(--wash); border-color:rgba(62,92,132,.18); }
  @media (max-width:1240px){ .chip.plan{ display:none; } }

  /* ---------- runway canvas ---------- */
  main{ flex:1 1 auto; position:relative; min-height:0; }
  #canvas{ position:absolute; inset:0; overflow:hidden; }

  .gridline{ position:absolute; top:0; bottom:0; width:1px; background:rgba(16,22,38,.06); }
  .monthlab{
    position:absolute; top:10px; transform:translateX(-50%);
    font-family:var(--mono); font-size:10px; letter-spacing:.16em; color:var(--dim);
  }
  .washband{
    position:absolute; top:0; bottom:0;
    background:linear-gradient(90deg, rgba(66,133,244,.075), rgba(66,133,244,.05) 70%, rgba(66,133,244,0));
    border-right:1px dashed rgba(66,133,244,.22);
  }
  .washlab{
    position:absolute; top:30px;
    font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:.22em;
    color:var(--accent); opacity:.75; white-space:nowrap;
  }
  .todayline{ position:absolute; top:24px; bottom:0; width:1px; background:rgba(217,119,87,.4); }
  .todaydot{
    position:absolute; top:20px; width:9px; height:9px; border-radius:50%;
    background:var(--clay); transform:translateX(-4px);
    box-shadow:0 0 0 3px rgba(217,119,87,.16);
  }
  .todaylab{
    position:absolute; top:8px;
    font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:.18em;
    color:var(--clay); white-space:nowrap;
  }

  #connector{
    position:absolute; width:2px; border-radius:2px; display:none;
    background:linear-gradient(180deg, rgba(66,133,244,.18), rgba(66,133,244,.55));
    transition:left .3s ease, top .3s ease, height .3s ease;
  }
  body.drawer-open #connector.on{ display:block; }

  /* ---------- lead cards ---------- */
  .lead{
    position:absolute; width:var(--cardw); height:104px;
    background:#fff; border:1px solid var(--hair); border-radius:12px;
    padding:10px 12px; overflow:hidden; cursor:pointer; text-align:left;
    box-shadow:0 1px 2px rgba(16,22,38,.04), 0 6px 16px rgba(16,22,38,.05);
    transition:top .3s ease, left .3s ease, height .3s ease,
               box-shadow .2s ease, transform .2s ease, opacity .3s ease;
    animation:drop .45s ease backwards;
  }
  @keyframes drop{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:none; } }
  .lead:hover{ transform:translateY(-2px); box-shadow:0 2px 4px rgba(16,22,38,.06), 0 14px 28px rgba(16,22,38,.10); }
  .lead.selected{ box-shadow:0 0 0 2px var(--accent), 0 12px 26px rgba(26,61,124,.14); }
  .lead.new-lead{ animation:drop .45s ease backwards, newpulse 1.6s ease .7s 2; }
  @keyframes newpulse{
    0%,100%{ box-shadow:0 1px 2px rgba(16,22,38,.04), 0 6px 16px rgba(16,22,38,.05), 0 0 0 0 rgba(217,119,87,0); }
    45%{ box-shadow:0 1px 2px rgba(16,22,38,.04), 0 6px 16px rgba(16,22,38,.05), 0 0 0 5px rgba(217,119,87,.22); }
  }
  .lead .pillrow{ display:flex; align-items:center; gap:6px; margin-bottom:6px; }
  .pill{
    font-family:var(--mono); font-size:8.5px; font-weight:600; letter-spacing:.08em;
    text-transform:uppercase; padding:2px 7px; border-radius:999px; white-space:nowrap;
  }
  .lead .co{
    font-size:15px; font-weight:700; line-height:19px; margin-bottom:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .lead .seat{
    font-size:11.5px; color:var(--muted); line-height:15px; margin-bottom:6px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .lead .metarow{ display:flex; align-items:center; gap:8px; }
  .scorechip{
    font-family:var(--mono); font-size:11px; font-weight:700;
    padding:1px 7px; border-radius:6px; line-height:16px;
  }
  .scorechip.hi{ color:var(--green); background:#E7F3EC; }
  .scorechip.mid{ color:var(--amber); background:#FDECDB; }
  .scorechip.lo{ color:var(--dim); background:#EFF1F4; }
  .lead .win{
    font-family:var(--mono); font-size:10px; letter-spacing:.06em; color:var(--dim);
    text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .lead .lock{ color:var(--dim); display:inline-flex; align-items:center; }

  .lead.ghost{ opacity:.6; border-style:dashed; box-shadow:none; }
  .lead.ghost:hover{ opacity:.85; transform:translateY(-2px); }
  .lead.blocked{ background:#F2F3F6; opacity:.78; box-shadow:none; }
  .lead.blocked .co{ text-decoration:line-through; text-decoration-color:rgba(179,38,30,.5); text-decoration-thickness:1px; color:var(--muted); }
  .lead.blocked:hover{ transform:translateY(-2px); }

  .cornertag{
    position:absolute; top:0; right:0;
    font-family:var(--mono); font-size:8px; font-weight:700; letter-spacing:.1em;
    padding:3px 8px; border-radius:0 11px 0 9px;
  }
  .cornertag.newtag{ color:#fff; background:var(--clay); }
  .cornertag.dnc{ color:#fff; background:var(--red); }
  .ticktag{
    position:absolute; top:6px; right:6px; width:18px; height:18px; border-radius:50%;
    background:var(--green2); color:#fff; display:none;
    align-items:center; justify-content:center;
  }
  .lead.done .ticktag{ display:flex; }
  .lead.done{ border-color:rgba(52,168,83,.45); }
  .lead.dismissed{ opacity:.3; }
  .lead.dismissed:hover{ opacity:.5; }

  body.squash .lead{ height:76px; padding:8px 11px; }
  body.squash .lead .seat{ display:none; }
  body.squash .lead .pillrow{ margin-bottom:4px; }
  body.squash .lead .co{ margin-bottom:4px; }

  /* ---------- drawer ---------- */
  .drawer{
    position:fixed; left:0; right:0; bottom:0; height:var(--drawerh);
    background:#fff; border-radius:20px 20px 0 0;
    box-shadow:0 -6px 18px rgba(16,22,38,.08), 0 -28px 70px rgba(16,22,38,.16);
    transform:translateY(106%); transition:transform .32s cubic-bezier(.32,.72,.28,1), height .25s ease;
    z-index:40; display:flex; flex-direction:column;
  }
  .drawer.short{ height:30vh; min-height:230px; }
  body.drawer-open .drawer{ transform:translateY(0); }
  .grab{ width:44px; height:5px; border-radius:99px; background:#DDE2EA; margin:9px auto 4px; flex:0 0 auto; }
  .dhead{
    flex:0 0 auto; display:flex; align-items:center; gap:12px;
    padding:2px 26px 9px; border-bottom:1px solid var(--hair);
  }
  .dhead .dlabel{
    font-family:var(--mono); font-size:9.5px; font-weight:600; letter-spacing:.18em;
    color:var(--slate); text-transform:uppercase;
  }
  .dhead .dlabel .spark{ color:var(--clay); }
  .dhead .dcount{ font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:.08em; }
  .dnav{ margin-left:auto; display:flex; align-items:center; gap:6px; }
  .navbtn{
    width:28px; height:28px; border-radius:8px; border:1px solid var(--hair);
    background:#fff; color:var(--sec); display:inline-flex; align-items:center; justify-content:center;
    transition:background .15s ease, border-color .15s ease;
  }
  .navbtn:hover{ background:var(--wash); border-color:rgba(66,133,244,.3); }
  .navbtn[disabled]{ opacity:.35; cursor:default; }
  .navbtn[disabled]:hover{ background:#fff; border-color:var(--hair); }
  .navbtn.close{ font-size:13px; line-height:1; }
  .dnav .sep{ width:1px; height:18px; background:var(--hair); margin:0 4px; }

  .dbody{
    flex:1 1 auto; min-height:0;
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:0;
    padding:0 14px 6px;
  }
  .dcol{ min-height:0; overflow-y:auto; padding:14px 14px 18px; }
  .dcol + .dcol{ border-left:1px solid var(--hair); }
  .dcol::-webkit-scrollbar{ width:8px; }
  .dcol::-webkit-scrollbar-thumb{ background:#E2E6ED; border-radius:99px; }

  .seclab{
    font-family:var(--mono); font-size:9.5px; font-weight:600; letter-spacing:.16em;
    color:var(--dim); text-transform:uppercase; margin:16px 0 7px;
  }
  .dcol .seclab:first-child{ margin-top:2px; }
  .body12{ font-size:12px; line-height:1.55; color:var(--sec); }

  .hero{ display:flex; gap:14px; align-items:center; margin-bottom:4px; }
  .ring{ flex:0 0 auto; position:relative; width:54px; height:54px; }
  .ring svg{ transform:rotate(-90deg); }
  .ring .rnum{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:14px; font-weight:700;
  }
  .hero .hco{ font-size:18px; font-weight:800; line-height:22px; }
  .hero .hseat{ font-size:12px; color:var(--muted); margin-top:1px; }
  .hero .hwin{
    font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; color:var(--slate);
    text-transform:uppercase; margin-top:4px;
  }

  .badges{ display:flex; flex-wrap:wrap; gap:6px; margin:0 0 7px; }
  .badge{
    font-family:var(--mono); font-size:8.5px; font-weight:700; letter-spacing:.1em;
    padding:3px 8px; border-radius:6px; white-space:nowrap;
  }
  .badge.fee{ color:#fff; background:var(--deep); position:relative; cursor:default; }
  .badge.q4{ color:var(--amber); background:#FDECDB; }
  .tip{ position:relative; }
  .tip::after{
    content:attr(data-tip); position:absolute; left:0; top:calc(100% + 7px);
    width:250px; padding:8px 10px; border-radius:8px;
    background:var(--ink); color:#fff; font-family:var(--ui);
    font-size:10.5px; font-weight:500; line-height:1.5; letter-spacing:0; white-space:normal;
    opacity:0; pointer-events:none; transition:opacity .15s ease; z-index:60;
    box-shadow:0 8px 24px rgba(16,22,38,.3); text-transform:none;
  }
  .tip:hover::after, .tip:focus-visible::after{ opacity:1; }

  .qualgrid{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .qual{
    flex:1 1 auto; min-width:72px; border:1px solid var(--hair); border-radius:8px;
    padding:5px 8px; background:#FBFCFE; cursor:default;
  }
  .qual .qk{ font-family:var(--mono); font-size:8px; letter-spacing:.12em; color:var(--dim); text-transform:uppercase; }
  .qual .qv{ font-family:var(--mono); font-size:11.5px; font-weight:700; margin-top:1px; }
  .qual .qv.q2{ color:var(--green); } .qual .qv.q1{ color:var(--amber); } .qual .qv.q0{ color:var(--dim); }
  .qtotal{ font-family:var(--mono); font-size:11px; font-weight:700; color:var(--ink); margin-bottom:10px; }
  .qtotal span{ color:var(--dim); font-weight:500; }
  .propchip{
    display:inline-block; font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:.08em;
    padding:3px 8px; border-radius:999px; text-transform:uppercase; margin-bottom:5px;
  }
  .propchip.pro{ color:var(--green); background:#E7F3EC; }
  .propchip.ext{ color:#1d4ed8; background:#E9EFFB; }
  .propchip.unk{ color:var(--muted); background:#EFF1F4; }
  .micro{ font-size:11px; line-height:1.5; color:var(--muted); }

  .buyer{ font-size:12.5px; font-weight:600; color:var(--ink); line-height:1.45; }
  .champ{ font-size:11.5px; color:var(--muted); line-height:1.5; margin-top:4px; }

  .openerbtn{
    margin-top:9px; display:inline-flex; align-items:center; gap:6px;
    font-size:11.5px; font-weight:600; color:var(--deep);
    background:var(--wash); border:1px solid rgba(66,133,244,.25); border-radius:8px;
    padding:6px 11px; transition:background .15s ease;
  }
  .openerbtn:hover{ background:#DCE8FC; }
  .openerbtn .spark{ color:var(--clay); }
  .typebox{
    display:none; margin-top:9px; padding:10px 12px; border-radius:10px;
    background:#FBFCFE; border:1px solid rgba(66,133,244,.25);
    font-size:12px; line-height:1.6; color:var(--sec); cursor:pointer;
  }
  .typebox.on{ display:block; }
  .typebox .caret{
    display:inline-block; width:7px; height:13px; margin-left:2px; vertical-align:-2px;
    background:var(--accent); animation:blink .8s steps(1) infinite;
  }
  .typebox.donetyping .caret{ display:none; }
  @keyframes blink{ 50%{ opacity:0; } }

  .killbox{ border-left:2px solid rgba(179,38,30,.4); padding-left:10px; }

  .proofchips{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:9px; }
  .pchip{
    font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:.08em;
    padding:3px 8px; border-radius:6px; text-transform:uppercase; white-space:nowrap;
  }
  .pchip.ver{ color:var(--slate); background:#EDF0F4; }
  .pchip.rt{ color:var(--green); background:#E7F3EC; }
  .pchip.conf{ color:var(--muted); background:#F2F3F6; }
  .srclist{ display:flex; flex-direction:column; gap:5px; border-radius:8px; }
  .srclist.flash{ animation:flash 1.3s ease; }
  @keyframes flash{ 0%,100%{ box-shadow:none; } 30%{ box-shadow:0 0 0 3px rgba(66,133,244,.28); } }
  .src{
    display:flex; align-items:baseline; gap:8px; padding:6px 9px;
    border:1px solid var(--hair); border-radius:8px; background:#FBFCFE; min-width:0;
  }
  .src .sl{ font-size:11px; color:var(--sec); flex:1 1 auto; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .src .sd{ font-family:var(--mono); font-size:9px; color:var(--dim); flex:0 0 auto; }
  .src .sa{ font-family:var(--mono); font-size:9px; color:var(--slate); flex:0 0 auto; }

  .bizbox{
    background:var(--wash); border-radius:10px; padding:10px 12px;
    font-size:12px; line-height:1.55; color:var(--sec);
  }

  .actions{ display:flex; flex-direction:column; gap:7px; margin-top:2px; }
  .abtn{
    border-radius:9px; padding:8px 12px; font-size:12px; font-weight:600;
    border:1px solid var(--hair); background:#fff; color:var(--sec); text-align:center;
    transition:background .15s ease, border-color .15s ease, transform .12s ease;
  }
  .abtn:hover{ background:#F4F7FC; transform:translateY(-1px); }
  .abtn.primary{ background:var(--deep); border-color:var(--deep); color:#fff; }
  .abtn.primary:hover{ background:#16335f; }
  .abtn .spark{ color:var(--clay); }
  .abtn.primary .spark{ color:#F4B9A2; }
  .triage{ display:flex; gap:7px; }
  .triage .abtn{ flex:1; }
  .abtn.good{ color:var(--green); border-color:rgba(30,122,65,.3); }
  .abtn.good:hover{ background:#E7F3EC; }
  .abtn.bad{ color:var(--red); border-color:rgba(179,38,30,.3); }
  .abtn.bad:hover{ background:#FBEAEA; }

  /* compact (non-ready) drawer */
  .compactbody{ grid-template-columns:1fr; padding:0 26px 18px; display:block; overflow-y:auto; }
  .minihero{ display:flex; align-items:center; gap:10px; margin:14px 0 10px; flex-wrap:wrap; }
  .minihero .hco{ font-size:17px; font-weight:800; }
  .minihero .hseat{ font-size:12px; color:var(--muted); }
  .minihero .win{
    font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; color:var(--slate); text-transform:uppercase;
  }
  .hookline{ font-size:13.5px; line-height:1.55; color:var(--ink); max-width:78ch; margin-bottom:12px; }
  .gatebox{
    border-radius:10px; padding:11px 14px; max-width:78ch;
    background:#FDF3E4; border:1px solid rgba(180,83,9,.22);
  }
  .gatebox .gl{
    font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:.16em;
    color:var(--amber); text-transform:uppercase; margin-bottom:5px;
  }
  .gatebox .gt{ font-size:12.5px; line-height:1.55; color:#7C4A12; }
  .gatebox.red{ background:#FBEAEA; border-color:rgba(179,38,30,.25); }
  .gatebox.red .gl{ color:var(--red); }
  .gatebox.red .gt{ color:#8C2722; }

  /* ---------- toast ---------- */
  #toast{
    position:fixed; left:50%; bottom:26px; transform:translate(-50%,16px);
    background:var(--ink); color:#fff; border-radius:999px;
    padding:9px 18px; font-size:12.5px; font-weight:500;
    display:flex; align-items:center; gap:14px;
    opacity:0; pointer-events:none; transition:opacity .22s ease, transform .22s ease, bottom .25s ease;
    z-index:80; box-shadow:0 10px 30px rgba(16,22,38,.3); white-space:nowrap;
  }
  #toast.on{ opacity:1; transform:translate(-50%,0); pointer-events:auto; }
  body.drawer-open #toast{ bottom:calc(var(--drawerh) + 18px); }
  body.drawer-open.drawer-short #toast{ bottom:calc(30vh + 18px); }
  #toast button{
    background:none; border:none; color:#8AB4F8; font-size:12px; font-weight:700;
    letter-spacing:.04em; padding:2px 2px;
  }
  #toast button:hover{ text-decoration:underline; }

  .cornerlabel{
    position:fixed; right:14px; bottom:10px; z-index:3;
    font-family:var(--mono); font-size:10px; letter-spacing:.18em; color:var(--dim);
  }
</style>
</head>
<body>

<header>
  <div class="wordmark"><b>VMA</b><span>GROUP</span></div>
  <div class="pagetitle">Communications Radar</div>
  <div class="headright">
    <div class="datelabel" id="dateLabel"></div>
    <div class="scanstat" id="scanStat"></div>
  </div>
</header>

<div class="strip">
  <div class="ai-line" id="aiLine"></div>
  <div class="chips" id="stripChips"></div>
</div>

<main>
  <div id="canvas">
    <div id="axisLayer"></div>
    <div id="connector"></div>
    <div id="cardLayer"></div>
  </div>

const cardLayer = $("#cardLayer");
const connector = $("#connector");
const PADL = 26, PADR = 26, GAP = 16, MAXLANES = 4;
const SPLIT = 56, FRAC = 0.55, DMAX = 184;   /* non-linear: first 8 weeks get 55% */
const BASE = new Date(2026, 5, 10);
const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

let drawerLead = null;      /* lead currently in the drawer */
const cardEls = {};         /* id -> element */
const cardPos = {};         /* id -> {x,lane} (px, lane index) */
let laneTops = [], cardH = 104;

function xOf(d, W){
  d = Math.max(0, Math.min(d, DMAX));
  return d <= SPLIT
    ? (d / SPLIT) * FRAC * W
    : FRAC * W + ((d - SPLIT) / (DMAX - SPLIT)) * (1 - FRAC) * W;
}
function drawerPx(){
  if (!document.body.classList.contains("drawer-open")) return 0;
  const short = $("#drawer").classList.contains("short");
  return Math.round(window.innerHeight * (short ? 0.30 : 0.46));
}
function cardW(){
  return parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--cardw")) || 210;
}

function renderAxis(W, visH){
  let h = "";
  /* call-window wash: first ~6 weeks */
  const washW = xOf(42, W);
  h += '<div class="washband" style="left:' + PADL + 'px;width:' + washW + 'px"></div>';
  h += '<div class="washlab" style="left:' + (PADL + washW - 86) + 'px">CALL WINDOW</div>';
  /* month boundaries + span-centred labels JUN -> DEC */
  const bounds = [0];
  for (let m = 6; m <= 11; m++)
    bounds.push(Math.round((new Date(2026, m, 1) - BASE) / 864e5));
  bounds.push(DMAX);
  for (let i = 1; i < bounds.length - 1; i++)
    h += '<div class="gridline" style="left:' + (PADL + xOf(bounds[i], W)) + 'px"></div>';
  for (let i = 0; i < bounds.length - 1; i++){
    const cx = PADL + (xOf(bounds[i], W) + xOf(bounds[i+1], W)) / 2;
    h += '<div class="monthlab" style="left:' + cx + 'px">' + MONTHS[5 + i] + '</div>';
  }
  /* today marker at the left edge */
  h += '<div class="todaydot" style="left:' + PADL + 'px"></div>';
  h += '<div class="todayline" style="left:' + PADL + 'px"></div>';
  h += '<div class="todaylab" style="left:' + (PADL + 9) + 'px">TODAY · 10 JUN</div>';
  axisLayer.innerHTML = h;
}

function layout(){
  const W = canvas.clientWidth - PADL - PADR;
  const visH = canvas.clientHeight - drawerPx();
  const CW = cardW();

  /* vertical plan: try roomy cards, squash if the drawer eats the space */
  const topStart = 52, botPad = 14;
  const avail = visH - topStart - botPad;
  let squash = false;
  cardH = 104;
  if (MAXLANES * cardH + (MAXLANES - 1) * 8 > avail){ squash = true; cardH = 76; }
  document.body.classList.toggle("squash", squash);
  const minBlock = MAXLANES * cardH + (MAXLANES - 1) * 6;
  let step = cardH + 6;
  if (avail > minBlock)
    step = cardH + Math.min(34, (avail - MAXLANES * cardH) / (MAXLANES - 1));
  const blockH = (MAXLANES - 1) * step + cardH;
  const offset = Math.max(0, (avail - blockH) / 2);
  laneTops = [];
  for (let i = 0; i < MAXLANES; i++) laneTops.push(Math.round(topStart + offset + i * step));

  renderAxis(W, visH);

  /* greedy lane assignment by x-collision; nudge right when a slot is taken */
  const items = RADAR.leads
    .map(l => ({ l, d: Math.min(l.winDays, DMAX) }))
    .sort((a,b) => a.d - b.d || b.l.score - a.l.score);
  const laneEnd = new Array(MAXLANES).fill(-1e9);
  items.forEach(it => {
    const want = Math.min(xOf(it.d, W), W - CW);
    let best = -1, bestStart = Infinity;
    for (let i = 0; i < MAXLANES; i++){
      const start = Math.max(want, laneEnd[i] + GAP);
      if (start + CW <= W + 0.6 && start < bestStart){ bestStart = start; best = i; }
    }
    if (best < 0){ /* fallback: least-loaded lane, clamped (not hit by this dataset) */
      best = laneEnd.indexOf(Math.min.apply(null, laneEnd));
      bestStart = Math.min(W - CW, Math.max(want, laneEnd[best] + GAP));
    }
    laneEnd[best] = bestStart + CW;
    cardPos[it.l.id] = { x: Math.round(PADL + bestStart), lane: best };
  });

  RADAR.leads.forEach(l => {
    const el = cardEls[l.id], p = cardPos[l.id];
    if (!el || !p) return;
    el.style.left = p.x + "px";
    el.style.top = laneTops[p.lane] + "px";
  });
  positionConnector();
}

function positionConnector(){
  if (!drawerLead || !document.body.classList.contains("drawer-open")){
    connector.classList.remove("on"); return;
  }
  const p = cardPos[drawerLead.id];
  if (!p){ connector.classList.remove("on"); return; }
  const visH = canvas.clientHeight - drawerPx();
  const top = laneTops[p.lane] + cardH + 4;
  const hgt = visH - top + 6;
  if (hgt < 8){ connector.classList.remove("on"); return; }
  connector.style.left = (p.x + cardW() / 2) + "px";
  connector.style.top = top + "px";
  connector.style.height = hgt + "px";
  connector.classList.add("on");
}

/* ===================== cards ===================== */
function buildCards(){
  RADAR.leads.forEach((l, i) => {
    const el = document.createElement("button");
    el.type = "button";
    el.className = "lead";
    el.dataset.qa = "lead-trigger";
    el.dataset.id = l.id;
    /* second value times the one-off NEW pulse so it starts after the drop */
    el.style.animationDelay = l.isNew
      ? (i * 45) + "ms, " + (700 + i * 45) + "ms"
      : (i * 45) + "ms";
    el.setAttribute("aria-label", l.co + " — " + l.seat + ", score " + l.score + ", window " + l.win);
    if (l.tier === "dev" || l.tier === "early") el.classList.add("ghost");
    if (l.tier === "blocked") el.classList.add("blocked");
    if (l.isNew) el.classList.add("new-lead");

    let corner = "";
    if (l.tier === "blocked") corner = '<span class="cornertag dnc">DO NOT CALL</span>';
    else if (l.isNew) corner = '<span class="cornertag newtag">NEW</span>';
    const lock = (l.tier === "dev" || l.tier === "early")
      ? '<span class="lock" aria-hidden="true">' + LOCK_SVG + '</span>' : "";

    el.innerHTML =
      '<div class="pillrow">' + pillHTML(l) + '</div>' +
      '<div class="co">' + esc(l.co) + '</div>' +
      '<div class="seat">' + esc(l.seat) + '</div>' +
      '<div class="metarow">' +
        '<span class="scorechip ' + scoreCls(l.score) + '">' + l.score + '</span>' +
        lock +
        '<span class="win">' + esc(l.win) + '</span>' +
      '</div>' +
      corner +
      '<span class="ticktag" aria-hidden="true">' + TICK_SVG + '</span>';

    el.addEventListener("click", () => openDrawer(l));
    cardLayer.appendChild(el);
    cardEls[l.id] = el;
  });
}

/* ===================== drawer ===================== */
const drawer = $("#drawer"), dBody = $("#dBody"), dLabel = $("#dLabel"), dCount = $("#dCount");
const readyOrder = RADAR.leads
  .filter(l => l.tier === "ready")
  .sort((a,b) => a.winDays - b.winDays || b.score - a.score);
let typeTimer = null;

function stopType(){ if (typeTimer){ clearInterval(typeTimer); typeTimer = null; } }

function openDrawer(lead){
  stopType();
  drawerLead = lead;
  const ready = lead.tier === "ready";
  drawer.classList.toggle("short", !ready);
  document.body.classList.add("drawer-open");
  document.body.classList.toggle("drawer-short", !ready);
  drawer.setAttribute("aria-hidden", "false");

  Object.values(cardEls).forEach(el => el.classList.remove("selected"));
  cardEls[lead.id].classList.add("selected");

  if (ready){
    const i = readyOrder.indexOf(lead);
    dLabel.innerHTML = '<span class="spark">&#10038;</span> VMA INTELLIGENCE · CALL FILE';
    dCount.textContent = (i + 1) + " OF " + readyOrder.length + " · WINDOW ORDER";
    $("#navPrev").disabled = i <= 0;
    $("#navNext").disabled = i >= readyOrder.length - 1;
    dBody.classList.remove("compactbody");
    dBody.innerHTML = fullFile(lead);
    wireFullFile(lead);
  } else {
    dLabel.innerHTML = '<span class="spark">&#10038;</span> VMA INTELLIGENCE · RADAR FILE';
    dCount.textContent = lead.tier === "blocked" ? "BLOCKED" : (lead.tier === "dev" ? "DEVELOPING" : "WATCH");
    $("#navPrev").disabled = true;
    $("#navNext").disabled = true;
    dBody.classList.add("compactbody");
    dBody.innerHTML = compactFile(lead);
  }
  layout();
}

function closeDrawer(){
  stopType();
  const last = drawerLead;
  /* move focus out before hiding so aria-hidden never traps a focused node */
  if (last && cardEls[last.id]) cardEls[last.id].focus({ preventScroll: true });
  document.body.classList.remove("drawer-open", "drawer-short");
  drawer.setAttribute("aria-hidden", "true");
  Object.values(cardEls).forEach(el => el.classList.remove("selected"));
  drawerLead = null;
  connector.classList.remove("on");
  layout();
}

function ringSVG(score){
  const r = 21, c = 2 * Math.PI * r, on = c * score / 100;
  const col = scoreColor(score);
  return '<div class="ring">' +
    '<svg width="54" height="54" viewBox="0 0 54 54">' +
    '<circle cx="27" cy="27" r="' + r + '" fill="none" stroke="rgba(16,22,38,.08)" stroke-width="4"/>' +
    '<circle cx="27" cy="27" r="' + r + '" fill="none" stroke="' + col + '" stroke-width="4" stroke-linecap="round" stroke-dasharray="' + on.toFixed(1) + ' ' + c.toFixed(1) + '"/>' +
    '</svg><span class="rnum" style="color:' + col + '">' + score + '</span></div>';
}

function qualHTML(l){
  const marks = ["&#10007;","&#10003;","&#10003;&#10003;"];
  const dims = [["Seat","seat"],["Budget","budget"],["Urgency","urgency"],["Buyer","buyer"]];
  return '<div class="qualgrid">' + dims.map(d => {
    const v = l.qual[d[1]], why = l.qual[d[1] + "_why"];
    return '<div class="qual" title="' + esc(why) + '">' +
      '<div class="qk">' + d[0] + '</div>' +
      '<div class="qv q' + v + '">' + marks[v] + '</div></div>';
  }).join("") + '</div>' +
  '<div class="qtotal">' + l.qual.total + ' / 8 <span>qualification</span></div>';
}

function fullFile(l){
  const feeBadge = l.fee
    ? '<span class="badge fee tip" tabindex="0" data-tip="' + esc(l.feeTip) + '">' + esc(l.fee) + '</span>' : "";
  const q4Badge = l.q4 ? '<span class="badge q4">' + esc(l.q4) + '</span>' : "";
  const rtChip = l.rt
    ? '<span class="pchip rt">RED-TEAMED &#10003; ' + l.conviction + '</span>' : "";
  const confChip = l.conf ? '<span class="pchip conf">CONFIDENCE ' + esc(l.conf).toUpperCase() + '</span>' : "";
  const srcs = l.stack.map(s =>
    '<div class="src"><span class="sl" title="' + esc(s.label) + '">' + esc(s.label) + '</span>' +
    '<span class="sd">' + esc(s.src) + '</span><span class="sa">' + ageTxt(s.age) + '</span></div>').join("");

  return (
  '<div class="dcol">' +
    '<div class="hero">' + ringSVG(l.score) +
      '<div><div class="hco">' + esc(l.co) + '</div>' +
      '<div class="hseat">' + esc(l.seat) + ' · ' + esc(l.sector) + '</div>' +
      '<div class="hwin">' + pillHTML(l) + ' &nbsp;WINDOW ' + esc(l.win) + '</div></div>' +
    '</div>' +
    '<div class="seclab">Why now</div>' +
    (feeBadge || q4Badge ? '<div class="badges">' + feeBadge + q4Badge + '</div>' : "") +
    '<p class="body12">' + esc(l.whyNow) + '</p>' +
    '<div class="seclab">The numbers</div>' +
    qualHTML(l) +
    '<span class="propchip ' + esc(l.propCls) + '">' + esc(l.prop) + '</span>' +
    '<p class="micro">' + esc(l.propWhy) + '</p>' +
  '</div>' +
  '<div class="dcol">' +
    '<div class="seclab">Who to call</div>' +
    '<p class="buyer">' + esc(l.buyer) + '</p>' +
    '<p class="champ">' + esc(l.champion) + '</p>' +
    '<div class="seclab">The opening</div>' +
    '<p class="body12">' + esc(l.opening) + '</p>' +
    '<button class="openerbtn" id="openerBtn2"><span class="spark">&#10038;</span> Draft opener</button>' +
    '<div class="typebox" id="typeBox" title="Click to complete"><span id="typeTxt"></span><span class="caret"></span></div>' +
    '<div class="seclab">What kills it</div>' +
    '<div class="killbox"><p class="body12">' + esc(l.kill) + '</p></div>' +
  '</div>' +
  '<div class="dcol">' +
    '<div class="seclab">Proof</div>' +
    '<div class="proofchips"><span class="pchip ver">' + esc(VER[l.ver] || l.ver) + '</span>' + rtChip + confChip + '</div>' +
    '<div class="srclist" id="srcList">' + srcs + '</div>' +
    (l.bizCase ? '<div class="seclab">Business case</div><div class="bizbox">' + esc(l.bizCase) + '</div>' : "") +
    '<div class="seclab">Actions</div>' +
    '<div class="actions">' +
      '<button class="abtn primary" id="actPitch"><span class="spark">&#10038;</span> Generate pitch</button>' +
      '<button class="abtn" id="actOpener">Draft opener</button>' +
      '<button class="abtn" id="actSources">View sources</button>' +
      '<div class="triage">' +
        '<button class="abtn good" id="actDone">&#10003; Followed up</button>' +
        '<button class="abtn bad" id="actDismiss">&#10005; Dismiss</button>' +
      '</div>' +
    '</div>' +
  '</div>');
}

function compactFile(l){
  const blocked = l.tier === "blocked";
  return (
    '<div class="minihero">' + pillHTML(l) +
      '<span class="hco">' + esc(l.co) + '</span>' +
      '<span class="hseat">' + esc(l.seat) + '</span>' +
      '<span class="scorechip ' + scoreCls(l.score) + '">' + l.score + '</span>' +
      '<span class="win">WINDOW ' + esc(l.win) + '</span>' +
    '</div>' +
    '<p class="hookline">' + esc(l.hook) + '</p>' +
    '<div class="gatebox' + (blocked ? ' red' : '') + '">' +
      '<div class="gl">' + (blocked ? 'Do not call' : 'Why not call-ready') + '</div>' +
      '<div class="gt">' + esc(l.gateWhy) + '</div>' +
    '</div>');
}

function wireFullFile(l){
  const typeOpener = () => {
    stopType();
    const box = $("#typeBox"), txt = $("#typeTxt");
    box.classList.add("on"); box.classList.remove("donetyping");
    txt.textContent = "";
    let i = 0;
    typeTimer = setInterval(() => {
      i += 2;
      txt.textContent = l.opener.slice(0, i);
      if (i >= l.opener.length){ stopType(); box.classList.add("donetyping"); }
    }, 24);
    box.onclick = () => { stopType(); txt.textContent = l.opener; box.classList.add("donetyping"); };
  };
  $("#openerBtn2").addEventListener("click", typeOpener);
  $("#actOpener").addEventListener("click", typeOpener);
  $("#actPitch").addEventListener("click", () =>
    toast("Pitch pack queued for " + l.co + " — a few minutes"));
  $("#actSources").addEventListener("click", () => {
    const list = $("#srcList");
    list.classList.remove("flash"); void list.offsetWidth; list.classList.add("flash");
    toast("Showing " + l.stack.length + " source" + (l.stack.length === 1 ? "" : "s") + " for " + l.co);
  });
  $("#actDone").addEventListener("click", () => triage(l, "done"));
  $("#actDismiss").addEventListener("click", () => triage(l, "dismissed"));
}

/* ===================== triage + undo ===================== */
function triage(l, state){
  const el = cardEls[l.id];
  el.classList.remove("done", "dismissed");
  el.classList.add(state);
  closeDrawer();
  toast(
    l.co + (state === "done" ? " marked followed up" : " dismissed"),
    { label: "Undo", fn: () => el.classList.remove(state), duration: 8000 }
  );
}

/* ===================== toast ===================== */
const toastEl = $("#toast");
let toastTimer = null;
function toast(msg, action){
  if (toastTimer){ clearTimeout(toastTimer); toastTimer = null; }
  toastEl.innerHTML = "<span>" + esc(msg) + "</span>";
  if (action){
    const b = document.createElement("button");
    b.textContent = action.label;
    b.addEventListener("click", () => {
      action.fn();
      toastEl.classList.remove("on");
      if (toastTimer){ clearTimeout(toastTimer); toastTimer = null; }
    });
    toastEl.appendChild(b);
  }
  toastEl.classList.add("on");
  toastTimer = setTimeout(() => toastEl.classList.remove("on"), (action && action.duration) || 3200);
}

/* ===================== nav + keys ===================== */
function navReady(dir){
  if (!drawerLead || drawerLead.tier !== "ready") return;
  const i = readyOrder.indexOf(drawerLead) + dir;
  if (i >= 0 && i < readyOrder.length) openDrawer(readyOrder[i]);
}
$("#navPrev").addEventListener("click", () => navReady(-1));
$("#navNext").addEventListener("click", () => navReady(1));
$("#navClose").addEventListener("click", closeDrawer);
document.addEventListener("keydown", e => {
  if (!document.body.classList.contains("drawer-open")) return;
  if (e.key === "Escape") closeDrawer();
  else if (e.key === "ArrowLeft") navReady(-1);
  else if (e.key === "ArrowRight") navReady(1);
});

/* ===================== boot ===================== */
buildCards();
layout();
window.addEventListener("resize", layout);
</script>
