<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VMA — Communications Radar · Signal Orbit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0F1E; --bg2:#0B1220;
    --ink:#E8EDF6; --dim:#8A94A6; --faint:#566075;
    --hair:rgba(255,255,255,.08); --hair2:rgba(255,255,255,.05);
    --blue:#4285F4; --steel:#7EA8CC; --clay:#D97757;
    --green:#34A853; --green-t:#5BC77F;
    --amber:#D97A2B; --amber-t:#E59A4F;
    --red:#D14B41; --red-t:#E5746C;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --ui:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--ui);
    height:100vh; overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  /* halo + noise */
  body::before{
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(900px 620px at 26% 30%, rgba(66,133,244,.07), transparent 62%),
      radial-gradient(700px 540px at 86% 78%, rgba(126,168,204,.05), transparent 60%),
      linear-gradient(180deg, var(--bg), var(--bg2));
  }
  body::after{
    content:''; position:fixed; inset:0; pointer-events:none; z-index:1; opacity:.028;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
  }
  /* ---------- header ---------- */
  header{
    position:relative; z-index:3; height:64px; display:flex; align-items:center;
    gap:18px; padding:0 28px; border-bottom:1px solid var(--hair2);
  }
  .wordmark{font-weight:800; font-size:17px; letter-spacing:.01em}
  .wordmark span{font-weight:300; letter-spacing:.34em; color:var(--dim); margin-left:6px; font-size:14px}
  .hdr-sep{width:1px; height:22px; background:var(--hair)}
  .hdr-title{font-size:13px; font-weight:600; color:#C5CEDF}
  .hdr-right{margin-left:auto; display:flex; align-items:center; gap:16px}
  .hdr-date{font-family:var(--mono); font-size:11px; color:var(--dim); letter-spacing:.04em}
  .hdr-scan{font-family:var(--mono); font-size:10px; color:var(--faint); letter-spacing:.06em}
  .hdr-scan b{color:var(--steel); font-weight:600}
  /* ---------- layout ---------- */
  main{
    position:relative; z-index:2; display:grid; grid-template-columns:58fr 42fr;
    gap:26px; padding:18px 28px 26px; height:calc(100vh - 64px); min-height:0;
  }
  /* ---------- radar ---------- */
  .radar-pane{display:flex; flex-direction:column; min-width:0; min-height:0}
  .stage-wrap{flex:1; display:flex; align-items:center; justify-content:center; min-height:0}
  .stage{position:relative; width:min(100%, calc(100vh - 218px), 720px); aspect-ratio:1/1}
  .axis{position:absolute; background:rgba(255,255,255,.04); pointer-events:none}
  .axis.h{left:6%; right:6%; top:50%; height:1px}
  .axis.v{top:6%; bottom:6%; left:50%; width:1px}
  .ring{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    border:1px solid var(--hair); border-radius:50%; pointer-events:none;
  }
  .ring-label{
    position:absolute; left:50%; transform:translate(-50%,-50%); z-index:3;
    font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:.2em;
    color:var(--faint); background:var(--bg); padding:2px 8px; pointer-events:none;
  }
  .sweep{
    position:absolute; left:50%; top:50%; width:88%; height:88%; z-index:1;
    transform:translate(-50%,-50%); border-radius:50%; pointer-events:none;
    background:conic-gradient(from 0deg,
      rgba(66,133,244,0) 0deg, rgba(66,133,244,.045) 44deg,
      rgba(126,168,204,.10) 57deg, rgba(200,220,250,.14) 59.6deg,
      transparent 60deg);
    animation:sweep 8s linear infinite;
  }
  @keyframes sweep{
    from{transform:translate(-50%,-50%) rotate(0deg)}
    to{transform:translate(-50%,-50%) rotate(360deg)}
  }
  .hub{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:4;
    width:9px; height:9px; border-radius:50%; background:#DCE5F2;
    box-shadow:0 0 0 4px rgba(220,229,242,.08), 0 0 12px rgba(220,229,242,.45);
    pointer-events:none;
  }
  .hub-label{
    position:absolute; left:50%; top:calc(50% + 13px); transform:translateX(-50%); z-index:4;
    font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:.22em;
    color:var(--faint); pointer-events:none;
  }
  /* ---------- blips ---------- */
  .blip{
    position:absolute; transform:translate(-50%,-50%); z-index:5;
    border:0; padding:0; border-radius:50%; cursor:pointer; background:none;
    transition:filter .2s ease;
  }
  .blip:hover{filter:brightness(1.45)}
  .blip:focus-visible{outline:2px solid var(--steel); outline-offset:4px}
  .blip.t-ready{
    background:radial-gradient(circle at 34% 30%, #FFFFFF 0%, #BFD7FF 30%, var(--blue) 72%);
    box-shadow:0 0 10px rgba(66,133,244,.85), 0 0 26px rgba(66,133,244,.32);
  }
  .blip.t-dev{
    background:radial-gradient(circle at 34% 30%, #FFE9CF 0%, var(--amber) 68%);
    box-shadow:0 0 9px rgba(217,122,43,.55), 0 0 20px rgba(217,122,43,.2);
  }
  .blip.t-early{
    background:#39425A; border:1px solid rgba(255,255,255,.2);
    box-shadow:0 0 6px rgba(138,148,166,.3);
  }
  .blip.t-blocked{
    background:radial-gradient(circle at 34% 30%, #F2ADA6 0%, var(--red) 66%);
    box-shadow:0 0 9px rgba(209,75,65,.55), 0 0 18px rgba(209,75,65,.22);
    display:flex; align-items:center; justify-content:center;
  }
  .blip.t-blocked svg{width:58%; height:58%; display:block}
  .blip.selected::before{
    content:''; position:absolute; inset:-5px; border-radius:50%;
    border:1.5px solid rgba(232,237,246,.9);
  }
  .blip.followed::before{
    content:''; position:absolute; inset:-5px; border-radius:50%;
    border:2px solid var(--green); box-shadow:0 0 9px rgba(52,168,83,.5);
  }
  .blip.dismissed{opacity:.25}
  .blip.isnew::after{
    content:''; position:absolute; inset:0; border-radius:50%;
    border:1.5px solid rgba(122,170,255,.75);
    animation:pulse 2.4s ease-out infinite; pointer-events:none;
  }
  @keyframes pulse{
    0%{transform:scale(1); opacity:.85}
    70%{transform:scale(2.5); opacity:0}
    100%{transform:scale(2.5); opacity:0}
  }
  .blip-label{
    position:absolute; top:50%; transform:translateY(-50%); pointer-events:none;
    font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:.06em;
    color:var(--dim); white-space:nowrap; transition:color .2s ease;
  }
  .blip-label.right{left:calc(100% + 9px)}
  .blip-label.left{right:calc(100% + 9px)}
  .blip.t-ready .blip-label{color:#C4D1E6}
  .blip.t-early .blip-label{color:var(--faint)}
  .blip:hover .blip-label, .blip.selected .blip-label{color:var(--ink)}
  /* tooltip */
  .tipcard{
    position:absolute; z-index:30; pointer-events:none; min-width:170px;
    background:#10182B; border:1px solid rgba(255,255,255,.12); border-radius:10px;
    padding:10px 12px; box-shadow:0 12px 32px rgba(0,0,0,.55);
    opacity:0; transition:opacity .15s ease;
  }
  .tipcard.show{opacity:1}
  .tipcard .t-co{font-size:12px; font-weight:700; color:var(--ink)}
  .tipcard .t-seat{font-size:11px; color:var(--dim); margin-top:2px}
  .tipcard .t-row{display:flex; gap:12px; margin-top:7px; font-family:var(--mono); font-size:10px; letter-spacing:.05em}
  .tipcard .t-score{font-weight:700}
  .tipcard .t-win{color:var(--dim)}
  /* legend */
  .legend{
    display:flex; align-items:center; gap:18px; padding:8px 4px 0;
    font-family:var(--mono); font-size:10px; letter-spacing:.08em; color:var(--faint);
    flex-wrap:wrap;
  }
  .lg{display:flex; align-items:center; gap:7px}
  .lg-dot{width:9px; height:9px; border-radius:50%; flex:none; position:relative}
  .lg-dot.r{background:radial-gradient(circle at 34% 30%, #fff, var(--blue) 75%); box-shadow:0 0 6px rgba(66,133,244,.7)}
  .lg-dot.d{background:var(--amber); box-shadow:0 0 5px rgba(217,122,43,.5)}
  .lg-dot.e{background:#39425A; border:1px solid rgba(255,255,255,.2)}
  .lg-dot.b{background:var(--red); display:flex; align-items:center; justify-content:center}
  .lg-dot.b svg{width:60%; height:60%}
  .lg-dot.n{background:transparent; border:1.5px solid rgba(122,170,255,.75)}
  .lg-dot.n::after{
    content:''; position:absolute; inset:-1.5px; border-radius:50%;
    border:1.5px solid rgba(122,170,255,.6); animation:pulse 2.4s ease-out infinite;
  }
  /* ---------- panel ---------- */
  .panel{
    position:relative; min-height:0; border-radius:18px;
    background:rgba(255,255,255,.05); border:1px solid var(--hair);
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    box-shadow:0 24px 60px rgba(0,0,0,.35); overflow:hidden;
  }
  .panel-scroll{height:100%; overflow-y:auto; overflow-x:hidden; padding:24px 26px 26px}
  .panel-scroll::-webkit-scrollbar{width:6px}
  .panel-scroll::-webkit-scrollbar-track{background:transparent}
  .panel-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.13); border-radius:99px}
  .panel-scroll{scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.13) transparent}
  .view.enter-right{animation:inR .32s cubic-bezier(.2,.7,.3,1)}
  .view.enter-left{animation:inL .32s cubic-bezier(.2,.7,.3,1)}
  @keyframes inR{from{opacity:0; transform:translateX(22px)} to{opacity:1; transform:none}}
  @keyframes inL{from{opacity:0; transform:translateX(-22px)} to{opacity:1; transform:none}}
  /* synthesis view */
  .ai-head{display:flex; align-items:baseline; gap:9px; flex-wrap:wrap}
  .spark{color:var(--clay); font-size:15px}
  .ai-name{font-size:15px; font-weight:700; letter-spacing:.01em}
  .ai-sub{font-family:var(--mono); font-size:9px; letter-spacing:.18em; color:var(--faint)}
  .stats{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap}
  .stat{
    font-family:var(--mono); font-size:10px; letter-spacing:.07em; color:var(--dim);
    border:1px solid var(--hair); border-radius:999px; padding:4px 10px;
  }
  .stat b{color:var(--ink); font-weight:600}
  .syn-text{font-size:13.5px; line-height:1.65; color:#C9D2E2; margin-top:16px}
  .sec-title{
    display:flex; align-items:baseline; justify-content:space-between; gap:10px;
    font-family:var(--mono); font-size:10px; font-weight:600; letter-spacing:.18em;
    color:var(--faint); margin:24px 0 10px;
  }
  .sec .sec-title{margin-top:0}
  .row{
    display:flex; align-items:center; gap:13px; width:100%; text-align:left;
    background:rgba(255,255,255,.03); border:1px solid var(--hair2); border-radius:12px;
    padding:12px 14px; margin-bottom:8px; cursor:pointer; color:var(--ink);
    font-family:var(--ui); transition:background .2s ease, transform .2s ease, border-color .2s ease;
  }
  .row:hover{background:rgba(255,255,255,.075); border-color:var(--hair); transform:translateX(3px)}
  .row:focus-visible{outline:2px solid var(--steel); outline-offset:2px}
  .row.dimmed{opacity:.4}
  .row .rk{font-family:var(--mono); font-size:13px; font-weight:700; color:var(--steel); width:24px; flex:none}
  .row .rb{flex:1; min-width:0}
  .row .rco{display:block; font-size:13px; font-weight:700}
  .row .rseat{display:block; font-size:11px; color:var(--dim); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .row .rnum{text-align:right; flex:none}
  .row .rscore{display:block; font-family:var(--mono); font-size:16px; font-weight:700}
  .row .rwin{display:block; font-family:var(--mono); font-size:9px; letter-spacing:.08em; color:var(--faint); margin-top:2px}
  .syn-hint{
    font-family:var(--mono); font-size:9px; letter-spacing:.16em; color:var(--faint);
    margin-top:22px; text-align:center;
  }
  /* call file */
  .back{
    display:inline-block; background:none; border:0; cursor:pointer;
    font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:.08em;
    color:var(--dim); padding:2px 0; margin-bottom:14px; transition:color .2s ease;
  }
  .back:hover{color:var(--ink)}
  .back:focus-visible{outline:2px solid var(--steel); outline-offset:3px}
  .cf-head{display:flex; align-items:flex-start; gap:16px}
  .cf-id{flex:1; min-width:0}
  .cf-co{font-size:22px; font-weight:800; letter-spacing:-.01em}
  .cf-sector{font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--dim); margin-top:5px}
  .cf-seat{font-size:13px; font-weight:600; color:#C9D2E2; margin-top:7px}
  .chiprow{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px}
  .chip{
    display:inline-flex; align-items:center; gap:5px; font-family:var(--mono);
    font-size:9.5px; font-weight:600; letter-spacing:.08em; padding:3.5px 9px;
    border-radius:999px; border:1px solid transparent; white-space:nowrap;
  }
  .chip.plain{color:var(--dim); border-color:var(--hair)}
  .chip.new{color:#9DC0FF; background:rgba(66,133,244,.16); border-color:rgba(66,133,244,.4)}
  .chip.fee{color:#F0A98C; background:rgba(217,119,87,.13); border-color:rgba(217,119,87,.42); cursor:default}
  .chip.q4{color:var(--amber-t); background:rgba(217,122,43,.12); border-color:rgba(217,122,43,.38)}
  .chip.ver-reg{color:#7FD0A0; background:rgba(52,168,83,.12); border-color:rgba(52,168,83,.35)}
  .chip.ver-multi{color:#9DC0FF; background:rgba(66,133,244,.12); border-color:rgba(66,133,244,.32)}
  .chip.ver-single{color:var(--dim); background:rgba(255,255,255,.05); border-color:var(--hair)}
  .chip.rt{color:#F0A98C; background:rgba(217,119,87,.12); border-color:rgba(217,119,87,.4)}
  .chip.tier-ready{color:#9DC0FF; background:rgba(66,133,244,.13); border-color:rgba(66,133,244,.34)}
  .chip.tier-dev{color:var(--amber-t); background:rgba(217,122,43,.12); border-color:rgba(217,122,43,.36)}
  .chip.tier-early{color:var(--dim); background:rgba(255,255,255,.05); border-color:var(--hair)}
  .chip.tier-blocked{color:var(--red-t); background:rgba(209,75,65,.12); border-color:rgba(209,75,65,.4)}
  /* trigger-type tints, dark-translucent */
  .chip.k-lead{color:#9DB8F4; background:rgba(29,78,216,.2); border-color:rgba(29,78,216,.45)}
  .chip.k-fund{color:#7FD0A0; background:rgba(30,122,65,.2); border-color:rgba(30,122,65,.45)}
  .chip.k-restr{color:#B7C3D6; background:rgba(70,85,110,.32); border-color:rgba(120,135,160,.4)}
  .chip.k-warn{color:#F2B27E; background:rgba(181,83,14,.18); border-color:rgba(181,83,14,.42)}
  .chip.k-mna{color:#C9B2EF; background:rgba(107,63,181,.22); border-color:rgba(107,63,181,.45)}
  .chip.k-people{color:#8AD9D2; background:rgba(14,124,116,.22); border-color:rgba(14,124,116,.45)}
  .tip{position:relative}
  .tip::after{
    content:attr(data-tip); position:absolute; left:0; bottom:calc(100% + 9px);
    width:248px; background:#10182B; border:1px solid rgba(255,255,255,.12);
    color:#C8D2E4; font-family:var(--ui); font-weight:500; font-size:11px; line-height:1.55;
    letter-spacing:0; text-transform:none; padding:9px 11px; border-radius:9px;
    opacity:0; pointer-events:none; transition:opacity .15s ease; z-index:40; white-space:normal;
  }
  .tip:hover::after, .tip:focus-visible::after{opacity:1}
  .chip.tip:focus-visible{outline:2px solid var(--steel); outline-offset:2px}
  .scorering{flex:none; position:relative; width:64px; height:64px}
  .scorering svg{display:block}
  .scorering .sv{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:18px; font-weight:700;
  }
  .cf-hook{font-size:12.5px; line-height:1.6; color:var(--dim); font-style:italic; margin-top:14px}
  .sec{margin-top:22px}
  .sec p{font-size:13px; line-height:1.62; color:#C9D2E2}
  .sec .micro{font-size:11.5px; line-height:1.55; color:var(--dim); margin-top:6px}
  .kv{display:flex; flex-direction:column; gap:8px}
  .kv .k{font-family:var(--mono); font-size:9px; letter-spacing:.14em; color:var(--faint)}
  .kv .v{font-size:13px; line-height:1.5; color:#C9D2E2; margin-top:2px}
  .danger{
    display:flex; gap:11px; align-items:flex-start; margin-top:18px;
    background:rgba(209,75,65,.1); border:1px solid rgba(209,75,65,.42);
    border-radius:12px; padding:13px 15px;
  }
  .danger .dx{flex:none; width:16px; height:16px; margin-top:1px}
  .danger .dt{font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.18em; color:var(--red-t)}
  .danger .dd{font-size:12.5px; line-height:1.55; color:#E4B6B1; margin-top:5px}
  .gate{
    border-radius:12px; padding:13px 15px; margin-top:4px;
    font-size:12.5px; line-height:1.6;
  }
  .gate.g-dev{background:rgba(217,122,43,.08); border:1px solid rgba(217,122,43,.3); color:#E8C49C}
  .gate.g-early{background:rgba(255,255,255,.04); border:1px solid var(--hair); color:var(--dim)}
  .opener-box{
    margin-top:12px; padding:12px 14px; border-left:2px solid var(--clay);
    background:rgba(217,119,87,.07); border-radius:0 10px 10px 0;
    font-size:13px; line-height:1.6; color:#DCE3F0; min-height:20px;
  }
  .caret{
    display:inline-block; width:7px; height:13px; background:var(--clay);
    vertical-align:-2px; margin-left:2px; animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0}}
  .src{
    display:flex; align-items:baseline; gap:9px; padding:8px 2px;
    border-top:1px dashed rgba(255,255,255,.07); font-size:12px;
  }
  .src:first-of-type{border-top:0}
  .src .sk{font-family:var(--mono); font-size:9px; letter-spacing:.1em; color:var(--faint); width:58px; flex:none}
  .src .sl{flex:1; min-width:0; color:#C9D2E2; line-height:1.45}
  .src .sd{font-family:var(--mono); font-size:10px; color:var(--faint); flex:none}
  .qual{display:grid; grid-template-columns:1fr 1fr; gap:8px}
  .q{
    background:rgba(255,255,255,.03); border:1px solid var(--hair2);
    border-radius:10px; padding:10px 12px;
  }
  .q .qh{display:flex; align-items:baseline; justify-content:space-between; gap:8px}
  .q .qn{font-family:var(--mono); font-size:9px; font-weight:600; letter-spacing:.16em; color:var(--faint)}
  .q .qm{font-family:var(--mono); font-size:13px; font-weight:700}
  .q .qw{font-size:10.5px; line-height:1.5; color:var(--dim); margin-top:6px}
  .mk0{color:var(--red-t)} .mk1{color:var(--amber-t)} .mk2{color:var(--green-t)}
  .numrow{display:flex; align-items:baseline; gap:10px; margin-top:12px; flex-wrap:wrap}
  .numrow .chip.prop-pro{color:#7FD0A0; background:rgba(52,168,83,.1); border-color:rgba(52,168,83,.32)}
  .numrow .chip.prop-ext{color:#9DC0FF; background:rgba(66,133,244,.1); border-color:rgba(66,133,244,.3)}
  .numrow .chip.prop-unk{color:var(--dim); background:rgba(255,255,255,.04); border-color:var(--hair)}
  .numrow .pw{font-size:11px; color:var(--dim); line-height:1.5; flex:1; min-width:180px}
  .actions{
    display:flex; gap:8px; flex-wrap:wrap; align-items:center;
    margin-top:26px; padding-top:18px; border-top:1px solid var(--hair2);
  }
  .actions .gap{flex:1}
  .btn{
    font-family:var(--ui); font-size:12px; font-weight:600; color:var(--ink);
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
    border-radius:9px; padding:8px 13px; cursor:pointer;
    transition:background .18s ease, border-color .18s ease, color .18s ease;
    white-space:nowrap;
  }

    astrazeneca: -132, asos: 115
  };
  const VER_LABEL = { reg:'Registry-attested', multi:'2+ sources', single:'Single source' };
  const TIER_LABEL = { ready:'Call-ready', dev:'Developing', early:'Early signal', blocked:'Do not call' };
  const XGLYPH = '<svg viewBox="0 0 10 10" fill="none" aria-hidden="true">'
    + '<path d="M2.6 2.6l4.8 4.8M7.4 2.6L2.6 7.4" stroke="#FFF" stroke-width="1.7" stroke-linecap="round"/></svg>';

  const ringFor = d => d <= 14 ? 0 : d <= 45 ? 1 : d <= 95 ? 2 : 3;
  const angleFor = (lead, i) => (lead.id in ANGLES) ? ANGLES[lead.id] : ((i * GOLDEN) % 360);
  const sizeFor = score => Math.round(10 + 8 * Math.max(0, Math.min(1, (score - 35) / 55)));
  const scoreColor = s => s >= 70 ? 'var(--green-t)' : s >= 45 ? 'var(--amber-t)' : 'var(--dim)';
  const ageLabel = a => a === 0 ? 'today' : a + 'd';
  const leadById = id => RADAR.leads.find(l => l.id === id);

  const state = {
    selected: null,
    followed: new Set(),
    dismissed: new Set(),
    typeTimer: null
  };

  /* ---------- header ---------- */
  $('#hdrDate').textContent = RADAR.meta.dateLabel;
  $('#hdrScan').innerHTML =
    '<b>' + RADAR.meta.signals + '</b> SIGNALS · <b>' + RADAR.meta.sources +
    '</b> SOURCES · SCANNED <b>' + esc(RADAR.meta.scanTime) + '</b>';
  $('#hubLabel').textContent = RADAR.meta.user.toUpperCase();

  /* ---------- radar build ---------- */
  const stage = $('#stage');
  const tipcard = $('#tipcard');

  RING_FRAC.forEach((fr, i) => {
    const ring = document.createElement('div');
    ring.className = 'ring';
    ring.style.width = ring.style.height = (fr * 100) + '%';
    stage.appendChild(ring);
    const lbl = document.createElement('div');
    lbl.className = 'ring-label';
    lbl.textContent = RING_NAMES[i];
    lbl.style.top = 'calc(50% - ' + (fr * 50) + '%)';
    stage.appendChild(lbl);
  });

  RADAR.leads.forEach((lead, i) => {
    const ring = ringFor(lead.winDays);
    const aDeg = angleFor(lead, i);
    const a = aDeg * Math.PI / 180;
    const fr = RING_FRAC[ring];
    const x = 50 + fr * Math.cos(a) * 50;
    const y = 50 + fr * Math.sin(a) * 50;
    const s = sizeFor(lead.score);

    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'blip t-' + lead.tier
      + (lead.isNew ? ' isnew' : '')
      + (lead.conflict ? ' blocked' : '');
    b.dataset.qa = 'lead-trigger';
    b.dataset.id = lead.id;
    b.style.left = x + '%';
    b.style.top = y + '%';
    b.style.width = b.style.height = s + 'px';
    b.setAttribute('aria-label',
      lead.co + ' — ' + lead.seat + ' · score ' + lead.score + ' · window ' + lead.win);
    if (lead.tier === 'blocked') b.innerHTML = XGLYPH;

    const lbl = document.createElement('span');
    lbl.className = 'blip-label ' + (Math.cos(a) >= 0 ? 'right' : 'left');
    lbl.textContent = lead.co;
    b.appendChild(lbl);

    b.addEventListener('click', () => { hideTip(); selectLead(lead.id); });
    b.addEventListener('mouseenter', () => showTip(lead, b));
    b.addEventListener('mouseleave', hideTip);
    stage.appendChild(b);
  });

  function showTip(lead, blip){
    tipcard.innerHTML =
      '<div class="t-co">' + esc(lead.co) + '</div>'
      + '<div class="t-seat">' + esc(lead.seat) + '</div>'
      + '<div class="t-row"><span class="t-score" style="color:' + scoreColor(lead.score) + '">'
      + lead.score + '</span><span class="t-win">' + esc(lead.win.toUpperCase()) + '</span></div>';
    const cx = blip.offsetLeft, cy = blip.offsetTop, r = blip.offsetWidth / 2;
    tipcard.style.left = '0px'; tipcard.style.top = '0px';
    tipcard.classList.add('show');
    tipcard.setAttribute('aria-hidden', 'false');
    const w = tipcard.offsetWidth, h = tipcard.offsetHeight, sw = stage.offsetWidth;
    let left = Math.max(4, Math.min(cx - w / 2, sw - w - 4));
    let top = cy - r - h - 11;
    if (top < 2) top = cy + r + 11;
    tipcard.style.left = left + 'px';
    tipcard.style.top = top + 'px';
  }
  function hideTip(){
    tipcard.classList.remove('show');
    tipcard.setAttribute('aria-hidden', 'true');
  }

  /* ---------- legend ---------- */
  $('#legend').innerHTML =
    '<span class="lg"><span class="lg-dot r"></span>CALL-READY</span>'
    + '<span class="lg"><span class="lg-dot d"></span>DEVELOPING</span>'
    + '<span class="lg"><span class="lg-dot e"></span>EARLY</span>'
    + '<span class="lg"><span class="lg-dot b">' + XGLYPH + '</span>DO NOT CALL</span>'
    + '<span class="lg"><span class="lg-dot n"></span>NEW TODAY</span>';

  /* ---------- panel views ---------- */
  const view = $('#view');
  const panelScroll = $('#panelScroll');

  function setView(html, dir){
    if (state.typeTimer){ clearInterval(state.typeTimer); state.typeTimer = null; }
    view.classList.remove('enter-left', 'enter-right');
    if (dir) void view.offsetWidth; // restart animation
    view.innerHTML = html;
    if (dir) view.classList.add(dir);
    panelScroll.scrollTop = 0;
  }

  function chip(cls, text, tipText){
    return '<span class="chip ' + cls + (tipText ? ' tip" data-tip="' + esc(tipText) : '')
      + '" ' + (tipText ? 'tabindex="0"' : '') + '>' + text + '</span>';
  }

  /* ----- synthesis view ----- */
  function synthesisHTML(){
    const m = RADAR.meta;
    const rows = m.planOrder.map((id, i) => {
      const l = leadById(id);
      if (!l) return '';
      const dim = state.dismissed.has(id) ? ' dimmed' : '';
      return '<button type="button" class="row' + dim + '" data-qa="lead-trigger" data-id="' + esc(l.id) + '">'
        + '<span class="rk">' + String(i + 1).padStart(2, '0') + '</span>'
        + '<span class="rb"><span class="rco">' + esc(l.co) + '</span>'
        + '<span class="rseat">' + esc(l.seat) + '</span></span>'
        + '<span class="rnum"><span class="rscore" style="color:' + scoreColor(l.score) + '">' + l.score + '</span>'
        + '<span class="rwin">' + esc(l.win.toUpperCase()) + '</span></span>'
        + '</button>';
    }).join('');
    return ''
      + '<div class="ai-head"><span class="spark" aria-hidden="true">✦</span>'
      + '<span class="ai-name">VMA Intelligence</span>'
      + '<span class="ai-sub">MORNING SYNTHESIS · ' + esc(m.scanTime) + '</span></div>'
      + '<div class="stats">'
      + '<span class="stat"><b>' + m.callReady + '</b> CALL-READY</span>'
      + '<span class="stat"><b>' + m.newToday + '</b> NEW TODAY</span>'
      + '<span class="stat"><b>' + m.signals + '</b> SIGNALS / <b>' + m.sources + '</b> SOURCES</span>'
      + '</div>'
      + '<p class="syn-text">' + esc(m.synthesis) + '</p>'
      + '<div class="sec-title"><span>SUGGESTED CALL ORDER</span><span>SCORE</span></div>'
      + rows
      + '<div class="syn-hint">SELECT A BLIP FOR THE FULL CALL FILE</div>';
  }

  function renderSynthesis(dir){
    setView(synthesisHTML(), dir);
    view.querySelectorAll('.row').forEach(r =>
      r.addEventListener('click', () => selectLead(r.dataset.id)));
  }

  /* ----- call-file view ----- */
  function qualCell(name, val, why){
    const mark = val === 0 ? '<span class="mk0">✗</span>'
      : val === 1 ? '<span class="mk1">✓</span>'
      : '<span class="mk2">✓✓</span>';
    return '<div class="q"><div class="qh"><span class="qn">' + name + '</span>'
      + '<span class="qm">' + mark + '</span></div>'
      + '<div class="qw">' + esc(why) + '</div></div>';
  }

  function callFileHTML(lead){
    const ready = lead.tier === 'ready';
    const C = 2 * Math.PI * 27;
    const dash = (C * lead.score / 100).toFixed(1);
    const col = scoreColor(lead.score);

    let h = '<button type="button" class="back" id="backLink">← BACK TO SYNTHESIS</button>';
    h += '<div data-qa="portfolio">';

    /* head */
    h += '<div class="cf-head"><div class="cf-id">'
      + '<div class="cf-co">' + esc(lead.co) + '</div>'
      + '<div class="cf-sector">' + esc(lead.sector.toUpperCase()) + ' · SIGNAL ' + ageLabel(lead.age).toUpperCase() + '</div>'
      + '<div class="cf-seat">' + esc(lead.seat) + '</div>'
      + '<div class="chiprow">'
      + chip('k-' + lead.key, esc(lead.type))
      + chip('tier-' + lead.tier, esc(TIER_LABEL[lead.tier].toUpperCase()))
      + (lead.isNew ? chip('new', 'NEW') : '')
      + chip('plain', 'WINDOW ' + esc(lead.win.toUpperCase()))
      + '</div></div>'
      + '<div class="scorering" role="img" aria-label="Lead score ' + lead.score + ' of 100">'
      + '<svg width="64" height="64" viewBox="0 0 64 64">'
      + '<circle cx="32" cy="32" r="27" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="3.5"/>'
      + '<circle cx="32" cy="32" r="27" fill="none" style="stroke:' + col + '" stroke-width="3.5" '
      + 'stroke-linecap="round" stroke-dasharray="' + dash + ' ' + C.toFixed(1) + '" transform="rotate(-90 32 32)"/>'
      + '</svg><span class="sv" style="color:' + col + '">' + lead.score + '</span></div>'
      + '</div>';

    h += '<div class="cf-hook">' + esc(lead.hook) + '</div>';

    /* blocked banner */
    if (lead.tier === 'blocked'){
      h += '<div class="danger"><svg class="dx" viewBox="0 0 16 16" fill="none" aria-hidden="true">'
        + '<circle cx="8" cy="8" r="7" stroke="#E5746C" stroke-width="1.7"/>'
        + '<path d="M5.2 5.2l5.6 5.6M10.8 5.2L5.2 10.8" stroke="#E5746C" stroke-width="1.7" stroke-linecap="round"/></svg>'
        + '<div><div class="dt">DO NOT CALL</div>'
        + '<div class="dd">' + esc(lead.gateWhy) + '</div></div></div>';
    }

    /* why now */
    h += '<div class="sec"><div class="sec-title"><span>WHY NOW</span></div>';
    if (lead.fee || lead.q4){
      h += '<div class="chiprow" style="margin:0 0 10px">'
        + (lead.fee ? chip('fee', esc(lead.fee), lead.feeTip) : '')
        + (lead.q4 ? chip('q4', esc(lead.q4)) : '')
        + '</div>';
    }
    h += '<p>' + esc(lead.whyNow) + '</p></div>';

    if (ready){
      /* who to call */
      h += '<div class="sec"><div class="sec-title"><span>WHO TO CALL</span></div><div class="kv">'
        + '<div><div class="k">ECONOMIC BUYER</div><div class="v">' + esc(lead.buyer) + '</div></div>'
        + '<div><div class="k">WARM PATH</div><div class="v">' + esc(lead.champion) + '</div></div>'
        + '</div></div>';
      /* the opening */
      h += '<div class="sec"><div class="sec-title"><span>THE OPENING</span><span>FIRST 20 SECONDS</span></div>'
        + '<p>' + esc(lead.opening) + '</p>'
        + '<div class="opener-box" id="openerBox" hidden></div></div>';
      /* kill */
      h += '<div class="sec"><div class="sec-title"><span>WHAT KILLS IT</span></div>'
        + '<p>' + esc(lead.kill) + '</p></div>';
      /* business case */
      if (lead.bizCase){
        h += '<div class="sec"><div class="sec-title"><span>BUSINESS CASE</span></div>'
          + '<p>' + esc(lead.bizCase) + '</p></div>';
      }
    } else if (lead.tier !== 'blocked'){
      /* gate */
      h += '<div class="sec"><div class="sec-title"><span>WHY NOT CALL-READY</span></div>'
        + '<div class="gate g-' + lead.tier + '">' + esc(lead.gateWhy) + '</div></div>';
    }

    /* proof */
    h += '<div class="sec" id="proofSec"><div class="sec-title"><span>PROOF</span>'
      + '<span>' + lead.stack.length + ' SOURCE' + (lead.stack.length === 1 ? '' : 'S') + '</span></div>'
      + '<div class="chiprow" style="margin:0 0 10px">'
      + chip('ver-' + lead.ver, esc(VER_LABEL[lead.ver].toUpperCase()))
      + (lead.rt ? chip('rt', 'RED-TEAMED ✓ ' + lead.conviction) : '')
      + (lead.conf ? chip('plain', 'CONFIDENCE ' + esc(lead.conf.toUpperCase())) : '')
      + '</div>';
    h += lead.stack.map(s =>
      '<div class="src"><span class="sk">' + esc(s.kind.toUpperCase()) + '</span>'
      + '<span class="sl">' + esc(s.label) + '</span>'
      + '<span class="sd">' + esc(s.src) + ' · ' + ageLabel(s.age) + '</span></div>'
    ).join('');
    h += '</div>';

    /* numbers */
    const q = lead.qual;
    h += '<div class="sec"><div class="sec-title"><span>THE NUMBERS</span>'
      + '<span>TOTAL ' + q.total + '/8</span></div>'
      + '<div class="qual">'
      + qualCell('SEAT', q.seat, q.seat_why)
      + qualCell('BUDGET', q.budget, q.budget_why)
      + qualCell('URGENCY', q.urgency, q.urgency_why)
      + qualCell('BUYER', q.buyer, q.buyer_why)
      + '</div>'
      + '<div class="numrow">'
      + chip('prop-' + lead.propCls, esc(lead.prop.toUpperCase()))
      + (lead.propWhy ? '<span class="pw">' + esc(lead.propWhy) + '</span>' : '')
      + '</div></div>';

    /* actions */
    h += '<div class="actions">'
      + (ready ? '<button type="button" class="btn primary" id="actPitch">Generate pitch</button>' : '')
      + (ready ? '<button type="button" class="btn" id="actOpener">Draft opener</button>' : '')
      + '<button type="button" class="btn" id="actSources">View sources</button>'
      + '<span class="gap"></span>'
      + '<button type="button" class="btn good' + (state.followed.has(lead.id) ? ' on' : '') + '" id="actFollow">✓ Followed up</button>'
      + '<button type="button" class="btn bad' + (state.dismissed.has(lead.id) ? ' on' : '') + '" id="actDismiss">'
      + (state.dismissed.has(lead.id) ? '✕ Dismissed' : '✕ Dismiss') + '</button>'
      + '</div>';

    h += '</div>'; /* /portfolio */
    return h;
  }

  function renderCallFile(lead, dir){
    setView(callFileHTML(lead), dir);
    $('#backLink').addEventListener('click', back);
    const pitch = $('#actPitch');
    if (pitch) pitch.addEventListener('click', () =>
      toast('Pitch pack queued for ' + lead.co + ' — a few minutes'));
    const op = $('#actOpener');
    if (op) op.addEventListener('click', () => typeOpener(lead));
    $('#actSources').addEventListener('click', () => {
      const sec = $('#proofSec');
      if (sec) sec.scrollIntoView({ behavior:'smooth', block:'start' });
      toast('Source pack — ' + lead.stack.length + ' source'
        + (lead.stack.length === 1 ? '' : 's') + ' for ' + lead.co);
    });
    $('#actFollow').addEventListener('click', () => toggleFollow(lead));
    $('#actDismiss').addEventListener('click', () => toggleDismiss(lead));
  }

  /* ---------- typewriter ---------- */
  function typeOpener(lead){
    const box = $('#openerBox');
    if (!box) return;
    if (state.typeTimer){ clearInterval(state.typeTimer); state.typeTimer = null; }
    box.hidden = false;
    const text = lead.opener;
    let i = 0;
    box.innerHTML = '<span class="caret"></span>';
    const span = document.createTextNode('');
    box.insertBefore(span, box.firstChild);
    state.typeTimer = setInterval(() => {
      i += 2;
      span.textContent = text.slice(0, i);
      if (i >= text.length){
        span.textContent = text;
        clearInterval(state.typeTimer);
        state.typeTimer = null;
      }
    }, 16);
  }

  /* ---------- selection & navigation ---------- */
  function selectLead(id){
    const lead = leadById(id);
    if (!lead) return;
    state.selected = id;
    updateBlips();
    renderCallFile(lead, 'enter-right');
  }
  function back(){
    state.selected = null;
    updateBlips();
    renderSynthesis('enter-left');
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && state.selected) back();
  });

  function updateBlips(){
    stage.querySelectorAll('.blip').forEach(b => {
      const id = b.dataset.id;
      b.classList.toggle('selected', state.selected === id);
      b.classList.toggle('followed', state.followed.has(id));
      b.classList.toggle('dismissed', state.dismissed.has(id));
    });
  }

  /* ---------- triage ---------- */
  function refreshCurrentView(){
    if (state.selected) renderCallFile(leadById(state.selected), '');
    else renderSynthesis('');
  }

  function toggleFollow(lead){
    const on = state.followed.has(lead.id);
    if (on){
      state.followed.delete(lead.id);
      updateBlips(); refreshCurrentView();
      toast('Follow-up cleared — ' + lead.co);
    } else {
      state.followed.add(lead.id);
      updateBlips(); refreshCurrentView();
      toast('Marked as followed up — ' + lead.co, () => {
        state.followed.delete(lead.id);
        updateBlips(); refreshCurrentView();
      });
    }
  }

  function toggleDismiss(lead){
    const on = state.dismissed.has(lead.id);
    if (on){
      state.dismissed.delete(lead.id);
      updateBlips(); refreshCurrentView();
      toast('Restored — ' + lead.co);
    } else {
      state.dismissed.add(lead.id);
      state.selected = null;
      updateBlips();
      renderSynthesis('enter-left');
      toast('Dismissed ' + lead.co, () => {
        state.dismissed.delete(lead.id);
        updateBlips(); refreshCurrentView();
      });
    }
  }

  /* ---------- toast ---------- */
  const toastEl = $('#toast'), toastMsg = $('#toastMsg'), toastUndo = $('#toastUndo');
  let toastTimer = null, undoFn = null;
  toastUndo.addEventListener('click', () => {
    if (undoFn) undoFn();
    undoFn = null;
    toastEl.classList.remove('show');
    if (toastTimer) clearTimeout(toastTimer);
  });
  function toast(msg, undo){
    toastMsg.textContent = msg;
    undoFn = undo || null;
    toastUndo.hidden = !undo;
    toastEl.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), undo ? 5200 : 3400);
  }

  /* ---------- boot ---------- */
  renderSynthesis('');
})();
</script>

</body>
</html>
