<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VMA — Business Development Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#101626;--ink2:#3C4043;--muted:#5A6577;--dim:#9AA0A6;
  --vma:#3E5C84;--deep:#1A3D7C;--blue:#4285F4;--wash:#E8F0FE;--clay:#D97757;
  --grn:#1E7A41;--amb:#B45309;--red:#C0392B;--teal:#0e7c74;--viol:#6b3fb5;
  --hair:rgba(16,22,38,.09);
  --mono:'JetBrains Mono',ui-monospace,monospace;--disp:'Space Grotesk','Inter',sans-serif;
}
html,body{height:100%}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;color:var(--ink);
  background-color:rgb(250,251,254);-webkit-font-smoothing:antialiased;letter-spacing:-.005em;
  overflow-x:hidden}
/* liquid ground: the landing glow + drifting colour for the glass to refract */
.amb{position:fixed;z-index:-1;border-radius:50%;filter:blur(80px);pointer-events:none}
.amb.a1{width:1300px;height:950px;top:38%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(closest-side,rgba(125,190,255,.62),rgba(157,210,255,.36) 50%,transparent 78%);
  animation:drift1 36s ease-in-out infinite alternate}
.amb.a2{width:700px;height:600px;right:-160px;top:-120px;
  background:radial-gradient(closest-side,rgba(217,119,87,.16),transparent 75%);
  animation:drift2 44s ease-in-out infinite alternate}
.amb.a3{width:640px;height:560px;left:-180px;bottom:-140px;
  background:radial-gradient(closest-side,rgba(62,92,132,.2),transparent 75%);
  animation:drift1 50s ease-in-out infinite alternate-reverse}
@keyframes drift1{to{transform:translate(-46%,-52%) scale(1.05)}}
@keyframes drift2{to{transform:translate(-40px,30px)}}
/* ============ liquid glass system ============ */
.glass{background:linear-gradient(135deg,rgba(255,255,255,.6),rgba(255,255,255,.3));
  backdrop-filter:blur(28px) saturate(1.8);-webkit-backdrop-filter:blur(28px) saturate(1.8);
  border:1px solid rgba(255,255,255,.75);border-radius:26px;
  box-shadow:0 12px 40px rgba(26,61,124,.1),inset 0 1px 1px rgba(255,255,255,.95),inset 0 -1px 1px rgba(255,255,255,.25)}
.glass-lite{background:linear-gradient(135deg,rgba(255,255,255,.5),rgba(255,255,255,.22));
  backdrop-filter:blur(18px) saturate(1.6);-webkit-backdrop-filter:blur(18px) saturate(1.6);
  border:1px solid rgba(255,255,255,.65);border-radius:999px;
  box-shadow:0 4px 16px rgba(26,61,124,.08),inset 0 1px 0 rgba(255,255,255,.9)}
/* ============ top bar ============ */
.topbar{position:sticky;top:14px;z-index:40;max-width:1220px;margin:14px auto 0;
  display:flex;align-items:center;gap:16px;padding:10px 12px 10px 24px}
.topbar.glass{border-radius:999px}
.tb-title{font-family:var(--disp);font-weight:700;font-size:15.5px;letter-spacing:-.01em;white-space:nowrap}
.tb-live{display:inline-flex;align-items:center;gap:7px;font:700 8.5px var(--mono);letter-spacing:.16em;color:var(--muted);white-space:nowrap}
.tb-live i{width:7px;height:7px;border-radius:50%;background:#34A853;box-shadow:0 0 8px rgba(52,168,83,.6);animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.18);opacity:1}}
.nav{margin-left:auto;display:flex;gap:4px;padding:4px;border-radius:999px;
  background:rgba(16,22,38,.05);border:1px solid rgba(255,255,255,.5)}
.nav button{font:600 12px 'Inter';color:var(--muted);background:transparent;border:none;
  border-radius:999px;padding:8px 18px;cursor:pointer;transition:.2s;white-space:nowrap}
.nav button:hover{color:var(--ink)}
.nav button.on{color:var(--ink);background:rgba(255,255,255,.92);
  box-shadow:0 3px 10px rgba(26,61,124,.12),inset 0 1px 0 #fff}
/* ============ views ============ */
.page{max-width:1220px;margin:0 auto;padding:26px 26px 48px}
.view{display:none}
.view.on{display:block;animation:vin .35s ease}
@keyframes vin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* ============ ENGINE view ============ */
.engine{padding:30px 30px 26px}
.stages{position:relative;display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.rail{position:absolute;left:9%;right:9%;top:24px;height:2px;z-index:0;
  background:linear-gradient(90deg,rgba(154,160,166,.45),rgba(66,133,244,.5),rgba(26,61,124,.4),rgba(217,122,43,.5),rgba(30,158,87,.55))}
.fdot{position:absolute;top:-2.5px;width:7px;height:7px;border-radius:50%;background:var(--blue);
  box-shadow:0 0 8px rgba(66,133,244,.65);opacity:0;animation:travel 5.4s linear infinite}
.fdot.d2{animation-delay:1.8s}.fdot.d3{animation-delay:3.6s}
@keyframes travel{0%{left:0;opacity:0}8%{opacity:1}86%{opacity:1}100%{left:calc(100% - 7px);opacity:0}}
.stg{position:relative;z-index:1;text-align:center}
.stg .num{font-family:var(--disp);font-weight:700;font-size:34px;letter-spacing:-.02em;line-height:1;
  color:transparent;background:linear-gradient(125deg,var(--s1),var(--s2));
  -webkit-background-clip:text;background-clip:text}
.stg .lbl{font:700 9px var(--mono);letter-spacing:.2em;color:var(--ink2);margin-top:7px}
.stg.s1{--s1:#9AA0A6;--s2:#4285F4}.stg.s2{--s1:#4285F4;--s2:#1A3D7C}
.stg.s3{--s1:#3E5C84;--s2:#1A3D7C}.stg.s4{--s1:#D97A2B;--s2:#B45309}
.stg.s5{--s1:#1E9E57;--s2:#1A3D7C}
.chamber{margin-top:14px;min-height:178px;padding:12px 12px 10px;border-radius:22px;
  display:flex;flex-direction:column;gap:6px;align-items:stretch}
.ghost{height:13px;border-radius:999px;background:linear-gradient(110deg,rgba(62,92,132,.1) 30%,rgba(255,255,255,.65) 46%,rgba(62,92,132,.1) 60%);
  background-size:220% 100%;animation:shim 1.8s linear infinite}
.ghost.g2{width:84%}.ghost.g3{width:68%}.ghost.g4{width:90%}
@keyframes shim{from{background-position:130% 0}to{background-position:-90% 0}}
.gcount{margin-top:auto;font:700 8.5px var(--mono);letter-spacing:.14em;color:var(--dim);text-align:center;padding-top:6px}
.mchip{display:flex;align-items:center;gap:7px;font:600 10.5px 'Inter';color:var(--ink2);
  padding:5px 11px;border-radius:999px;background:rgba(255,255,255,.66);
  border:1px solid rgba(255,255,255,.8);box-shadow:0 1px 4px rgba(26,61,124,.06);white-space:nowrap;overflow:hidden}
.mchip .ms{margin-left:auto;font:700 9.5px var(--mono)}
.mchip.lk{cursor:pointer;transition:.15s}
.mchip.lk:hover{background:#fff;transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,61,124,.12)}
.mchip .nm2{overflow:hidden;text-overflow:ellipsis}
.tfam{font:600 9.5px 'Inter';color:var(--muted);padding:4px 10px;border-radius:999px;
  background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ticker */
.tickwrap{margin-top:22px;padding:10px 0;border-radius:999px;overflow:hidden;position:relative;
  -webkit-mask:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent);
  mask:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent)}
.ticktrack{display:inline-flex;gap:8px;white-space:nowrap;animation:tick 60s linear infinite}
.tickwrap:hover .ticktrack{animation-play-state:paused}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tchip{position:relative;display:inline-flex;align-items:center;gap:7px;font:600 11px 'Inter';color:var(--ink2);
  padding:6px 14px;border-radius:999px;background:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.75);box-shadow:0 1px 4px rgba(26,61,124,.05);transition:.3s}
.tchip i{width:5px;height:5px;border-radius:50%;background:var(--dim);transition:.3s}
.tchip.match{border-color:rgba(217,119,87,.6);background:#fff;color:var(--deep)}
.tchip.match i{background:var(--clay);box-shadow:0 0 7px rgba(217,119,87,.7)}
.tchip .plus{position:absolute;top:-8px;right:-3px;font:700 8.5px var(--mono);color:#fff;
  background:var(--clay);border-radius:999px;padding:2px 6px;opacity:0;transform:translateY(3px);transition:.3s}
.tchip.match .plus{opacity:1;transform:none}
/* ============ BOARD view ============ */
.boardcard{padding:8px 26px 18px}
.synthline{padding:18px 4px 12px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--hair)}
.synthline b{color:var(--ink);font-weight:600}
.synthline .sp{color:var(--clay)}
.strip{border-bottom:1px solid var(--hair)}
.strip:last-child{border-bottom:none}
.strip-h{display:grid;grid-template-columns:34px 1fr 150px 104px 86px 30px;gap:14px;align-items:center;
  padding:15px 4px;cursor:pointer;transition:background .15s;border-radius:16px}
.strip-h:hover{background:rgba(255,255,255,.5)}
.strip-h:focus-visible{outline:2px solid var(--blue);outline-offset:-2px}
.rank{font:700 12px var(--mono);color:var(--dim);text-align:center}
.strip.open .rank{color:var(--clay)}
.idcell{min-width:0}
.idcell .co{font-weight:700;font-size:14.5px;color:#0c1326;display:flex;align-items:center;gap:8px}
.idcell .co .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.idcell .seat{font-size:11px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag-new{font:700 7.5px 'Inter';letter-spacing:.06em;color:#1d4ed8;background:#e9effb;padding:2px 6px;border-radius:999px;flex:none}
.tag-dnc{font:700 7.5px var(--mono);letter-spacing:.1em;color:var(--red);border:1px solid rgba(192,57,43,.4);
  background:#fdecea;padding:2px 6px;border-radius:999px;flex:none}
.tp{justify-self:start;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  padding:3px 11px;border-radius:999px;font:600 10.5px/1.6 'Inter';border:1px solid rgba(255,255,255,.7)}
.tp::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.tp.lead{background:rgba(233,239,251,.85);color:#1d4ed8}.tp.lead::before{background:#3b82f6}
.tp.fund{background:rgba(231,243,236,.85);color:#1e7a41}.tp.fund::before{background:#34A853}
.tp.restr{background:rgba(237,240,244,.85);color:#46556e}.tp.restr::before{background:#6b7689}
.tp.warn{background:rgba(253,236,219,.85);color:#b5530e}.tp.warn::before{background:#D97A2B}
.tp.mna{background:rgba(239,233,251,.85);color:#6b3fb5}.tp.mna::before{background:#8B5CF6}
.tp.people{background:rgba(221,243,240,.85);color:#0e7c74}.tp.people::before{background:#12A594}
.wincell{font:600 9.5px var(--mono);letter-spacing:.05em;color:var(--muted);white-space:nowrap}
.strengthcell{display:flex;align-items:center;gap:8px;justify-self:end}
.strengthcell .sn{font:700 13.5px var(--mono)}
.s-hi{color:#1e7a41}.s-md{color:#9a3412}.s-lo{color:#6b7686}
.chev{justify-self:center;color:var(--dim);transition:transform .25s}
.strip.open .chev{transform:rotate(180deg);color:var(--clay)}
.chev svg{width:15px;height:15px;display:block}
.dossier{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.2,.8,.25,1)}
.strip.open .dossier{max-height:1000px}
.dbody{margin:4px 2px 18px;padding:22px 26px;border-radius:24px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 34px}
.dsec{margin-top:15px;min-width:0}
.dsec:first-child,.dsec:nth-child(2){margin-top:0}
.dt2{display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  font:700 8.5px var(--mono);letter-spacing:.2em;color:var(--deep);margin-bottom:7px;
  border-bottom:1px solid rgba(26,61,124,.13);padding-bottom:5px}
.dt2 span:last-child{color:var(--dim)}
.dsec p{font-size:12.5px;line-height:1.62;color:var(--ink2)}
.kv .k{font:600 8.5px var(--mono);letter-spacing:.14em;color:var(--dim)}
.kv .v{font-size:12.5px;line-height:1.5;color:var(--ink2);margin:2px 0 8px}
.src{display:flex;align-items:baseline;gap:9px;padding:5px 0;border-bottom:1px solid rgba(16,22,38,.05);font-size:11.5px}
.src:last-child{border-bottom:none}
.src .sk{font:700 8px var(--mono);letter-spacing:.1em;color:var(--dim);width:52px;flex:none}
.src .sl2{flex:1;min-width:0;color:var(--ink2)}
.src .sd{font:500 9.5px var(--mono);color:var(--dim);flex:none}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font:700 8.5px var(--mono);letter-spacing:.08em;padding:4px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.7)}
.chip.fee{color:#b5530e;background:rgba(253,236,219,.9);cursor:help}
.chip.q4{color:#9a3412;background:rgba(255,247,237,.9)}
.chip.ver-reg{color:#1e7a41;background:rgba(231,243,236,.9)}
.chip.ver-multi{color:#1d4ed8;background:rgba(233,239,251,.9)}
.chip.ver-single{color:#9a3412;background:rgba(255,247,237,.9)}
.chip.rt{color:#0e7c74;background:rgba(221,243,240,.9);cursor:help}
.chip.conf{color:var(--muted);background:rgba(255,255,255,.6)}
.chip.prop-pro{color:#1e7a41;background:rgba(231,243,236,.9);cursor:help}
.chip.prop-ext{color:#9a3412;background:rgba(255,247,237,.9);cursor:help}
.chip.prop-unk{color:#6b7689;background:rgba(238,241,245,.9);cursor:help}
.qrow{display:flex;gap:7px}
.qd{flex:1;text-align:center;padding:7px 4px;border-radius:14px;background:rgba(255,255,255,.55);
  border:1px solid rgba(255,255,255,.75);cursor:help}
.qd .qn{font:600 7.5px var(--mono);letter-spacing:.12em;color:var(--dim)}
.qd .qm{font:700 12.5px var(--mono);margin-top:2px}
.openerbox{margin-top:16px;padding:11px 14px;border-left:2px solid var(--vma);border-radius:0 14px 14px 0;
  background:rgba(62,92,132,.07);font-size:12.5px;line-height:1.62;color:var(--ink2)}
.dacts{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--hair)}
.btn{font:600 11px 'Inter';padding:8px 16px;border-radius:999px;cursor:pointer;transition:.15s;
  color:var(--ink);background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.85);
  box-shadow:0 1px 5px rgba(26,61,124,.07)}
.btn:hover{background:#fff;transform:translateY(-1px)}
.btn.primary{color:var(--deep);background:transparent;border:1px solid rgba(26,61,124,.4);font-weight:700;box-shadow:none}
.btn.primary:hover{background:rgba(26,61,124,.06)}
.btn.good.on{color:#1e7a41;background:rgba(243,250,245,.95)}
.btn.bad.on{color:#c0392b;background:rgba(253,244,242,.95)}
.gap{flex:1}
.strip.done-fu .idcell .co .nm{color:#1e7a41}
.strip.done-dis .idcell{opacity:.45;text-decoration:line-through}
.bl-toggle{display:inline-flex;align-items:center;gap:8px;font:600 11.5px 'Inter';color:var(--muted);
  background:none;border:none;cursor:pointer;padding:14px 4px 4px}
.bl-toggle:hover{color:var(--deep)}
.bl-toggle .chev2{transition:transform .25s;display:inline-flex}
.bl-toggle.on .chev2{transform:rotate(180deg)}
.bl-toggle svg{width:13px;height:13px}
.bl-list{max-height:0;overflow:hidden;transition:max-height .35s ease}
.bl-list.on{max-height:420px}
.bl-row{display:grid;grid-template-columns:34px 1fr 150px auto;gap:14px;align-items:center;
  padding:10px 4px;border-bottom:1px solid rgba(16,22,38,.05);opacity:.78}
.bl-row .co2{font-weight:600;font-size:12.5px;display:flex;gap:8px;align-items:center}
.bl-row .gw{font-size:10.5px;color:var(--amb);text-align:right}
.bl-row.blocked .gw{color:var(--red)}
/* ============ CALENDAR view ============ */
.calcard{padding:24px 30px 26px}
.calline{font-size:13px;color:var(--muted);margin-bottom:22px}
.calline b{color:var(--ink);font-weight:600}
.calline .sp{color:var(--clay)}
.opennow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.onchip{display:inline-flex;align-items:center;gap:8px;font:600 11px 'Inter';padding:7px 14px}
.onchip .ob{font:700 7.5px var(--mono);letter-spacing:.1em;color:#fff;border-radius:999px;padding:2px 6px;animation:breathe 3s ease-in-out infinite}
.onchip .dl{font:600 9px var(--mono);color:var(--dim)}
.calgrid{position:relative;border:1px solid rgba(255,255,255,.7);border-radius:20px;overflow:hidden;
  background:rgba(255,255,255,.36)}
.cg-head{display:grid;grid-template-columns:120px repeat(7,1fr);border-bottom:1px solid var(--hair)}
.cg-head span{font:700 8.5px var(--mono);letter-spacing:.16em;color:var(--muted);padding:11px 0 9px;text-align:center;
  border-left:1px solid rgba(16,22,38,.05)}
.cg-head span:first-child{border-left:none}
.cg-row{display:grid;grid-template-columns:120px 1fr;border-bottom:1px solid rgba(16,22,38,.05);min-height:64px}
.cg-row:last-child{border-bottom:none}
.cg-lab{display:flex;flex-direction:column;justify-content:center;gap:3px;padding:10px 14px;border-right:1px solid rgba(16,22,38,.05)}
.cg-lab .t{font:700 8.5px var(--mono);letter-spacing:.14em}
.cg-lab .c{font:500 9px 'Inter';color:var(--dim)}
.cg-track{position:relative}
.cg-track .vlines{position:absolute;inset:0;display:flex;pointer-events:none}
.cg-track .vlines i{flex:1;border-left:1px solid rgba(16,22,38,.04)}
.cg-track .vlines i:first-child{border-left:none}
.evt2{position:absolute;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;z-index:2}
.evt2 .ed{width:9px;height:9px;border-radius:50%;background:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.18),0 0 8px rgba(59,130,246,.4)}
.evt2 .el{font:600 10px 'Inter';color:var(--deep);background:rgba(255,255,255,.92);border:1px solid rgba(29,78,216,.22);
  border-radius:999px;padding:3px 10px;white-space:nowrap;box-shadow:0 2px 8px rgba(26,61,124,.08);transition:.15s}
.evt2 .et{font:700 8px var(--mono);color:var(--dim)}
.evt2:hover .el{transform:translateY(-2px);box-shadow:0 8px 18px rgba(26,61,124,.15)}
.evt2.up .el{order:-1}
.band2{position:absolute;height:26px;border-radius:999px;display:flex;align-items:center;gap:7px;padding:0 12px;
  font:600 10.5px 'Inter';white-space:nowrap;cursor:pointer;overflow:hidden;transition:.15s;z-index:2;
  background:rgba(221,243,240,.92);color:#0e7c74;border:1px solid rgba(255,255,255,.8);
  box-shadow:0 2px 8px rgba(14,124,116,.12),inset 0 1px 0 rgba(255,255,255,.8)}
.band2:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(14,124,116,.2);z-index:5}
.band2 .ob{font:700 7.5px var(--mono);letter-spacing:.1em;color:#fff;background:#12A594;border-radius:999px;padding:2px 6px;flex:none;animation:breathe 3s ease-in-out infinite}
.band2 .bn{overflow:hidden;text-overflow:ellipsis}
.band2 .bd2{margin-left:auto;font:700 8px var(--mono);color:rgba(14,124,116,.7);flex:none}
.band2.fw2{background:rgba(239,233,251,.92);color:#6b3fb5;box-shadow:0 2px 8px rgba(107,63,181,.12),inset 0 1px 0 rgba(255,255,255,.8)}
.band2.fw2 .ob{background:#8B5CF6}
.band2.fw2 .bd2{color:rgba(107,63,181,.7)}
.tdline{position:absolute;top:0;bottom:0;width:1.5px;background:var(--clay);z-index:6;pointer-events:none}
.tdline::before{content:"TODAY · 10 JUN";position:absolute;top:4px;left:7px;font:700 7.5px var(--mono);
  letter-spacing:.12em;color:#fff;background:var(--clay);border-radius:999px;padding:2px 7px;white-space:nowrap}
.legend{display:flex;gap:20px;margin-top:16px;font:600 9.5px 'Inter';color:var(--muted)}
.legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:-1px}
.cal-pop{position:absolute;z-index:30;width:300px;padding:14px 16px;display:none;border-radius:20px}
.cal-pop.on{display:block}
.cal-pop .pk{font:700 8.5px var(--mono);letter-spacing:.16em;margin-bottom:6px}
.cal-pop .pn{font-weight:700;font-size:13.5px;color:#0c1326}
.cal-pop .pd{font:600 10px var(--mono);color:var(--dim);margin-top:4px}

.assistcard{padding:34px 30px 30px;max-width:820px;margin:0 auto}
.composer{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:999px;

.composer .sp{color:var(--clay);font-size:15px;flex:none}

.send{flex:none;width:34px;height:34px;border-radius:50%;border:none;background:var(--deep);color:#fff;

.send:hover{background:#16335F}
.send svg{width:15px;height:15px}
.send.busy{background:var(--dim);pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}
.templates{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:16px}
.tmpl{font:600 11px 'Inter';color:var(--ink2);padding:7px 16px;cursor:pointer;transition:.15s}
.tmpl:hover{color:var(--deep);transform:translateY(-1px)}
.tmpl .sp{color:var(--clay);margin-right:5px}
.recent{margin-top:28px}
.recent .rrow{display:flex;align-items:baseline;gap:10px;padding:9px 4px;

.recent .rt3{margin-left:auto;font:500 9.5px var(--mono);color:var(--dim);flex:none}
/* ============ toast ============ */
.toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,16px);z-index:50;

.toast .sp{color:#FF8A65}

const TRIGGERS=["M&A","Water SAR","Redundancy","Restructure","CEO change","CFO change","CHRO change",

(function(){
"use strict";
const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const LEADS=RADAR.leads.slice().sort((a,b)=>b.score-a.score);
const READY=LEADS.filter(l=>l.tier==='ready');
const REST=LEADS.filter(l=>l.tier!=='ready');
const BY={};LEADS.forEach(l=>BY[l.id]=l);
const VER_LABEL={reg:'Registry-attested',multi:'2+ sources',single:'Single source'};
const TIER_WORD={dev:'Developing',early:'Watch',blocked:'Blocked'};
const state={followed:new Set(),dismissed:new Set()};
let toastT=null,openerT=null;
function toast(m){const t=$('toast');t.innerHTML='<span class="sp">✦</span> '+esc(m);
  t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}
function ageLabel(a){return a===0?'today':a+'d ago';}
function scol(s){return s>=70?'#1E9E57':s>=45?'#D97A2B':'#8A94A6';}
function sband(s){return s>=70?'s-hi':s>=45?'s-md':'s-lo';}
function countUp(el,target){const t0=performance.now();
  (function f(t){const p=Math.min(1,(t-t0)/950),e=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*e);if(p<1)requestAnimationFrame(f);})(t0);}

/* ---------- nav ---------- */

}
$('nav').addEventListener('click',e=>{const b=e.target.closest('button');if(b)show(b.dataset.v);});

/* ---------- engine chambers ---------- */
document.querySelectorAll('.stg .num').forEach(el=>countUp(el,+el.dataset.count));
$('ch3').innerHTML=['Leadership moves','Funding & M&A','Regulatory & risk'].map(t=>'<span class="tfam">'+t+'</span>').join('')
  +'<span class="ghost g3"></span><span class="gcount">38 CORROBORATED ACCOUNTS</span>';
$('ch4').innerHTML=LEADS.slice(0,4).map(l=>'<span class="mchip"><span class="nm2">'+esc(l.co)+'</span>'
  +'<span class="ms" style="color:'+scol(l.score)+'">'+l.score+'</span></span>').join('')
  +'<span class="gcount">+ '+(LEADS.length-4)+' MORE UNDER TEST</span>';
$('ch5').innerHTML=READY.slice(0,4).map(l=>'<span class="mchip lk" data-go="'+l.id+'"><span class="nm2">'+esc(l.co)+'</span>'
  +'<span class="ms" style="color:'+scol(l.score)+'">'+l.score+'</span></span>').join('')
  +'<span class="gcount" style="color:var(--grn)">+ '+(READY.length-4)+' MORE · OPEN THE BOARD →</span>';

/* ---------- endless trigger ticker (all families) + live matches ---------- */
(function(){
  const chips=TRIGGERS.map(t=>'<span class="tchip"><i></i>'+esc(t)+'<span class="plus">+1</span></span>').join('');
  $('ticker').innerHTML=chips+chips;
  const all=$('ticker').querySelectorAll('.tchip');
  setInterval(()=>{

/* ---------- board ---------- */
$('synthline').innerHTML='<span class="sp">✦</span> <b>'+esc(RADAR.meta.synthesis.split('.')[0])+'.</b> '
  +esc(RADAR.meta.synthesis.split('.').slice(1).join('.').trim());
function miniArc(score){
  const C=2*Math.PI*11,d=(C*score/100).toFixed(1);
  return '<svg width="28" height="28" viewBox="0 0 28 28">'
    +'<circle cx="14" cy="14" r="11" fill="none" stroke="rgba(16,22,38,.09)" stroke-width="2.5"/>'
    +'<circle cx="14" cy="14" r="11" fill="none" stroke="'+scol(score)+'" stroke-width="2.5" '
    +'stroke-linecap="round" stroke-dasharray="'+d+' '+C.toFixed(1)+'" transform="rotate(-90 14 14)"/></svg>';
}
function chip(cls,txt,tip){return '<span class="chip '+cls+'"'+(tip?' title="'+esc(tip)+'"':'')+'>'+txt+'</span>';}
function qd(n,v,why){const c=v>=2?'#1E7A41':v===1?'#B45309':'#9AA0A6';
  return '<div class="qd" title="'+esc(why)+'"><div class="qn">'+n+'</div>'
    +'<div class="qm" style="color:'+c+'">'+(v>=2?'✓✓':v===1?'✓':'✗')+'</div></div>';}
function dossierHTML(l){
  let h='<div class="dbody glass-lite" style="border-radius:24px" data-qa="portfolio">';
  h+='<div class="chips" style="margin-bottom:15px">'
    +chip('ver-'+l.ver,esc(VER_LABEL[l.ver]).toUpperCase())
    +(l.rt?chip('rt','STRESS-TESTED ✓ '+l.conviction,'A sceptical second pass tried to kill this lead and failed — conviction '+l.conviction+'/100'):'')
    +(l.conf?chip('conf','CONFIDENCE '+l.conf.toUpperCase()):'')
    +(l.fee?chip('fee',esc(l.fee),l.feeTip):'')
    +(l.q4?chip('q4',esc(l.q4)):'')
    +'</div>';
  h+='<div class="dgrid">';
  h+='<div class="dsec"><div class="dt2"><span>WHY NOW</span></div><p>'+esc(l.whyNow)+'</p></div>';
  h+='<div class="dsec"><div class="dt2"><span>WHO TO CALL</span></div><div class="kv">'
    +'<div class="k">ECONOMIC BUYER</div><div class="v">'+esc(l.buyer)+'</div>'
    +'<div class="k">WARM PATH</div><div class="v">'+esc(l.champion)+'</div></div></div>';
  h+='<div class="dsec"><div class="dt2"><span>THE OPENING</span><span>FIRST 20 SECONDS</span></div><p>'+esc(l.opening)+'</p></div>';
  h+='<div class="dsec"><div class="dt2"><span>WHAT KILLS IT</span></div><p>'+esc(l.kill)+'</p></div>';
  h+='<div class="dsec"><div class="dt2"><span>PROOF</span><span>'+l.stack.length+' SOURCES</span></div>'
    +l.stack.map(s=>'<div class="src"><span class="sk">'+esc(s.kind).toUpperCase()+'</span>'
    +'<span class="sl2">'+esc(s.label)+'</span><span class="sd">'+esc(s.src)+' · '+ageLabel(s.age)+'</span></div>').join('')+'</div>';
  const q=l.qual;
  h+='<div class="dsec"><div class="dt2"><span>THE NUMBERS</span><span>'+q.total+'/8 · '+esc(l.bizCase).toUpperCase()+'</span></div>'
    +'<div class="qrow">'+qd('SEAT',q.seat,q.seat_why)+qd('BUDGET',q.budget,q.budget_why)
    +qd('URGENCY',q.urgency,q.urgency_why)+qd('BUYER',q.buyer,q.buyer_why)+'</div>'
    +'<div class="chips" style="margin-top:9px">'+chip('prop-'+l.propCls,esc(l.prop).toUpperCase(),l.propWhy)+'</div></div>';
  h+='</div>';
  h+='<div class="openerbox" id="ob-'+l.id+'" hidden></div>';
  h+='<div class="dacts">'
    +'<button type="button" class="btn primary" data-act="pitch" data-id="'+l.id+'">Generate pitch</button>'
    +'<button type="button" class="btn" data-act="opener" data-id="'+l.id+'">✦ Draft opener</button>'
    +'<button type="button" class="btn" data-act="sources" data-id="'+l.id+'">View sources</button>'
    +'<span class="gap"></span>'
    +'<button type="button" class="btn good'+(state.followed.has(l.id)?' on':'')+'" data-act="fu" data-id="'+l.id+'">✓ Followed up</button>'
    +'<button type="button" class="btn bad'+(state.dismissed.has(l.id)?' on':'')+'" data-act="dis" data-id="'+l.id+'">✕ Dismiss</button>'
    +'</div></div>';
  return h;
}
function stripHTML(l,i){
  const cls=(state.followed.has(l.id)?' done-fu':'')+(state.dismissed.has(l.id)?' done-dis':'');
  return '<div class="strip'+cls+'" data-id="'+l.id+'">'
    +'<div class="strip-h" tabindex="0" data-qa="lead-trigger" data-id="'+l.id+'">'
    +'<span class="rank">'+String(i+1).padStart(2,'0')+'</span>'
    +'<div class="idcell"><div class="co"><span class="nm">'+esc(l.co)+'</span>'
    +(l.isNew?'<span class="tag-new">NEW</span>':'')+'</div>'
    +'<div class="seat">'+esc(l.seat)+' · '+esc(l.sector)+'</div></div>'
    +'<span class="tp '+l.key+'">'+esc(l.type)+'</span>'
    +'<span class="wincell">'+esc(l.win).toUpperCase()+'</span>'
    +'<span class="strengthcell '+sband(l.score)+'"><span class="sn">'+l.score+'</span>'+miniArc(l.score)+'</span>'
    +'<span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>'
    +'</div><div class="dossier">'+dossierHTML(l)+'</div></div>';
}
$('strips').innerHTML=READY.map((l,i)=>stripHTML(l,i)).join('');
$('blLabel').textContent='Below the line — '
  +REST.filter(l=>l.tier==='dev').length+' developing · '
  +REST.filter(l=>l.tier==='early').length+' watch · '
  +REST.filter(l=>l.tier==='blocked').length+' blocked';
$('blList').innerHTML=REST.map(l=>'<div class="bl-row'+(l.tier==='blocked'?' blocked':'')+'">'
  +'<span class="rank">·</span>'
  +'<div class="co2">'+esc(l.co)
  +(l.tier==='blocked'?'<span class="tag-dnc">DO NOT CALL</span>':'')
  +'<span style="font:600 9px var(--mono);letter-spacing:.1em;color:var(--dim)">'+TIER_WORD[l.tier].toUpperCase()+'</span></div>'
  +'<span class="tp '+l.key+'">'+esc(l.type)+'</span>'
  +'<span class="gw">'+esc(l.gateWhy)+'</span></div>').join('');
$('blToggle').addEventListener('click',()=>{
  $('blToggle').classList.toggle('on');$('blList').classList.toggle('on');});
function draftOpener(id){
  const l=BY[id],box=$('ob-'+id);if(!l||!box)return;
  box.hidden=false;box.scrollIntoView({behavior:'smooth',block:'nearest'});
  if(box.dataset.done){box.textContent=l.opener;return;}
  box.dataset.done='1';let i=0;box.textContent='';
  (function tick(){i+=2;box.textContent=l.opener.slice(0,i);
    if(i<l.opener.length)openerT=setTimeout(tick,14);})();
}
function triage(id,kind){
  const l=BY[id];if(!l)return;
  if(kind==='fu'){
    if(state.followed.has(id)){state.followed.delete(id);toast(l.co+' follow-up cleared');}
    else{state.followed.add(id);state.dismissed.delete(id);toast(l.co+' marked followed up');}
  }else{
    if(state.dismissed.has(id)){state.dismissed.delete(id);toast(l.co+' restored');}
    else{state.dismissed.add(id);state.followed.delete(id);toast(l.co+' dismissed');}
  }
  const strip=document.querySelector('.strip[data-id="'+id+'"]');
  if(strip){strip.classList.toggle('done-fu',state.followed.has(id));
    strip.classList.toggle('done-dis',state.dismissed.has(id));
    const fu=strip.querySelector('[data-act="fu"]'),di=strip.querySelector('[data-act="dis"]');
    if(fu)fu.classList.toggle('on',state.followed.has(id));
    if(di)di.classList.toggle('on',state.dismissed.has(id));}
}
function openStrip(id){
  show('board');
  document.querySelectorAll('.strip.open').forEach(s=>s.classList.remove('open'));
  const strip=document.querySelector('.strip[data-id="'+id+'"]');
  if(strip){strip.classList.add('open');
    setTimeout(()=>strip.scrollIntoView({behavior:'smooth',block:'center'}),120);}
}

/* ---------- calendar (clear grid) ---------- */
(function(){
  const D=s=>new Date(s+'T00:00:00Z').getTime();
  const t0=D(CAL.start),t1=D(CAL.end),span=t1-t0,today=D(CAL.today);
  const px=t=>Math.max(0,Math.min(100,(t-t0)/span*100));
  const MONTHS=['JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const fmt=s=>s.slice(8)+' '+MONTHS[+s.slice(5,7)-6];
  /* AI line + open-now chips */
  const openWins=CAL.windows.filter(w=>D(w.a)<=today&&D(w.b)>=today);
  const openFws=CAL.frameworks.filter(f=>f.open);
  const nev=CAL.events.map(e=>({...e,t:D(e.d)})).filter(e=>e.t>=today).sort((a,b)=>a.t-b.t)[0];
  $('calline').innerHTML='<span class="sp">✦</span> <b>'+(openWins.length+openFws.length)
    +' opportunities are open today.</b> Next event: <b>'+esc(nev.n)+'</b> in '
    +Math.round((nev.t-today)/86400000)+' days.';
  $('opennow').innerHTML=
    openWins.map((w,)=>{const days=Math.round((D(w.b)-today)/86400000);
      return '<span class="onchip glass-lite"><span class="ob" style="background:#12A594">OPEN</span>'
        +esc(w.n)+'<span class="dl">'+days+'D LEFT</span></span>';}).join('')
    +openFws.map(f=>'<span class="onchip glass-lite"><span class="ob" style="background:#8B5CF6">OPEN</span>'
      +esc(f.n)+'<span class="dl">FRAMEWORK</span></span>').join('');
  /* head */
  $('cgHead').innerHTML='<span></span>'+MONTHS.map(m=>'<span>'+m+'</span>').join('');
  /* rows: EVENTS / WINDOWS / FRAMEWORKS */
  const vlines='<div class="vlines">'+MONTHS.map(()=>'<i></i>').join('')+'</div>';
  let rows='';
  /* events row */
  rows+='<div class="cg-row" style="min-height:84px"><div class="cg-lab"><span class="t" style="color:#1d4ed8">EVENTS</span><span class="c">'+CAL.events.length+' dated</span></div>'
    +'<div class="cg-track">'+vlines
    +CAL.events.map((e,i)=>'<div class="evt2'+(i%2?' up':'')+'" data-cal="e'+i+'" style="left:'+px(D(e.d))+'%">'
      +'<span class="el">'+esc(e.n)+'</span><span class="ed"></span><span class="et">'+fmt(e.d)+'</span></div>').join('')
    +'</div></div>';
  /* windows rows (packed, 2 sub-rows) */
  const sub=[[],[]];
  CAL.windows.forEach(w=>{
    const a=px(D(w.a)),b=px(D(w.b));
    const row=(!sub[0].some(x=>a<x.b+2&&b>x.a-2))?0:1;
    sub[row].push({a,b,w});
  });
  rows+='<div class="cg-row" style="min-height:'+(sub[1].length?96:64)+'px"><div class="cg-lab"><span class="t" style="color:#0e7c74">WINDOWS</span><span class="c">'+openWins.length+' open now</span></div>'
    +'<div class="cg-track">'+vlines
    +sub.map((r,ri)=>r.map(x=>{
      const wi=CAL.windows.indexOf(x.w),open=D(x.w.a)<=today&&D(x.w.b)>=today;
      return '<div class="band2" data-cal="w'+wi+'" style="left:'+x.a+'%;width:'+Math.max(9,x.b-x.a)+'%;top:'+(14+ri*34)+'px">'
        +(open?'<span class="ob">OPEN</span>':'')+'<span class="bn">'+esc(x.w.n)+'</span>'
        +'<span class="bd2">→ '+fmt(x.w.b)+'</span></div>';
    }).join('')).join('')
    +'</div></div>';
  /* frameworks row */
  rows+='<div class="cg-row"><div class="cg-lab"><span class="t" style="color:#6b3fb5">FRAMEWORKS</span><span class="c">'+CAL.frameworks.length+' tracked</span></div>'
    +'<div class="cg-track">'+vlines
    +CAL.frameworks.map((f,i)=>{
      const a=px(D(f.a)),b=px(D(f.b));
      return '<div class="band2 fw2" data-cal="f'+i+'" style="left:'+a+'%;width:'+Math.max(9,b-a)+'%;top:19px">'
        +(f.open?'<span class="ob">OPEN</span>':'<span class="bd2" style="margin:0">OPENS '+fmt(f.a)+'</span>')
        +'<span class="bn">'+esc(f.n)+'</span></div>';
    }).join('')
    +'</div></div>';
  $('cgRows').innerHTML=rows;
  /* today line spanning the whole grid body (offset by the 120px label gutter) */
  const gw=100; /* percent within tracks */
  document.querySelectorAll('#cgRows .cg-track').forEach(tr=>{
    tr.insertAdjacentHTML('beforeend','<div class="tdline" style="left:'+px(today)+'%"></div>');
  });
  /* popover */
  const pop=$('calPop');
  function item(key){
    const k=key[0],i=+key.slice(1);
    if(k==='w'){const w=CAL.windows[i];
      return{kind:'PLACEMENT WINDOW',kc:'#0e7c74',n:w.n,d:fmt(w.a)+' → '+fmt(w.b),why:w.why};}
    if(k==='f'){const f=CAL.frameworks[i];
      return{kind:'FRAMEWORK',kc:'#6b3fb5',n:f.n,d:f.open?'Open now':'Opens '+fmt(f.a),why:f.why};}
    const e=CAL.events[i];
    return{kind:'EVENT',kc:'#1d4ed8',n:e.n,d:fmt(e.d)+' · '+e.loc,why:e.why};
  }
  document.addEventListener('click',ev=>{
    const b=ev.target.closest('[data-cal]');
    if(b){
      const it=item(b.dataset.cal);
      pop.innerHTML='<div class="pk" style="color:'+it.kc+'">'+it.kind+'</div>'
        +'<div class="pn">'+esc(it.n)+'</div><div class="pd">'+esc(it.d)+'</div>'
        +'<div class="pw">'+esc(it.why)+'</div>'
        +'<div class="pa"><button type="button" class="btn primary" data-act="plan">Add to BD plan</button></div>';
      const wrap=$('calgrid').getBoundingClientRect(),bb=b.getBoundingClientRect();
      let x=bb.left-wrap.left;x=Math.max(8,Math.min(x,wrap.width-312));
      let y=bb.bottom-wrap.top+10;y=Math.min(y,wrap.height-30);
      pop.style.left=x+'px';pop.style.top=y+'px';
      pop.classList.add('on');ev.stopPropagation();return;
    }
    if(ev.target.closest('[data-act="plan"]')){toast('Added to the BD plan');pop.classList.remove('on');return;}
    if(!ev.target.closest('.cal-pop'))pop.classList.remove('on');
  });
})();

/* ---------- assistant ---------- */
(function(){
  const TMPL=[
    {n:'Pitch pack',fill:'Build a pitch pack for '},
    {n:'Reverse match',fill:'Reverse-match this candidate to likely buyers: '},
    {n:'Pre-meeting brief',fill:'Pre-meeting brief for my meeting with '},
    {n:'Market sweep',fill:'Run a market sweep on '}
  ];
  $('templates').innerHTML=TMPL.map((t,i)=>'<span class="tmpl glass-lite" data-t="'+i+'"><span class="sp">✦</span>'+t.n+'</span>').join('');
  const recent=[
    {k:'PRE-MEETING',t:'Reckitt — Kris Licht intro call',w:'today 07:12'},
    {k:'SWEEP',t:'UK fintech comms — senior movers',w:'yesterday'}
  ];
  function renderRecent(){
    $('recent').innerHTML='<div class="dt2" style="margin-bottom:4px"><span>RECENT REPORTS</span></div>'
      +recent.map(r=>'<div class="rrow"><span class="rk">'+r.k+'</span><span>'+esc(r.t)+'</span><span class="rt3">'+r.w+'</span></div>').join('');
  }
  renderRecent();
  document.addEventListener('click',e=>{
    const t=e.target.closest('.tmpl');
    if(t){const inp=$('composerIn');inp.value=TMPL[+t.dataset.t].fill;inp.focus();
      inp.setSelectionRange(inp.value.length,inp.value.length);return;}
  });
  function dispatch(){
    const inp=$('composerIn'),v=inp.value.trim();
    if(!v){toast('Tell the assistant what to build');inp.focus();return;}
    const btn=$('sendBtn');btn.classList.add('busy');
    btn.innerHTML='<svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 3a9 9 0 1 0 9 9"/></svg>';
    setTimeout(()=>{
      btn.classList.remove('busy');
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>';
      recent.unshift({k:'QUEUED',t:v,w:'building…'});renderRecent();
      toast('Report queued — lands in a few minutes');inp.value='';
    },1400);
  }
  $('sendBtn').addEventListener('click',dispatch);
  $('composerIn').addEventListener('keydown',e=>{if(e.key==='Enter')dispatch();});
})();

/* ---------- global events ---------- */
document.addEventListener('click',e=>{
  const go=e.target.closest('[data-go]');
  if(go){openStrip(go.dataset.go);return;}
  const act=e.target.closest('[data-act]');
  if(act&&act.dataset.id){
    const id=act.dataset.id,l=BY[id],a=act.dataset.act;
    if(a==='pitch')toast('Pitch pack queued for '+l.co+' — a few minutes');
    else if(a==='sources')toast('Opening '+l.stack.length+' source'+(l.stack.length>1?'s':'')+' for '+l.co);
    else if(a==='opener')draftOpener(id);
    else if(a==='fu')triage(id,'fu');
    else if(a==='dis')triage(id,'dis');
    return;
  }
  const h=e.target.closest('.strip-h');
  if(h){
    const strip=h.closest('.strip'),was=strip.classList.contains('open');
    document.querySelectorAll('.strip.open').forEach(s=>s.classList.remove('open'));
    if(!was)strip.classList.add('open');
    return;
  }
});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.activeElement&&document.activeElement.classList.contains('strip-h'))
    document.activeElement.click();
  if(e.key==='Escape')document.querySelectorAll('.strip.open').forEach(s=>s.classList.remove('open'));
});
})();
