<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VMA — Communications Radar · The Briefing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F9FC; --ink:#101626; --sec:#3C4043; --muted:#5A6577; --dim:#9AA0A6;
  --hair:rgba(16,22,38,.08); --slate:#3E5C84; --deep:#1A3D7C; --accent:#4285F4;
  --wash:#E8F0FE; --clay:#D97757; --green:#1E7A41; --amber:#B45309;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html{ -webkit-text-size-adjust:100%; }
body{
  background:var(--bg); color:var(--ink);
  font:400 14px/1.5 var(--sans);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow-x:clip;
}
body.locked{ overflow:hidden; }
[hidden]{ display:none !important; }
button{ font:inherit; color:inherit; background:none; border:0; padding:0; cursor:pointer; }
button:focus-visible, [tabindex]:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
.mono{ font-family:var(--mono); }

/* ---------- column & header ---------- */
.col{ max-width:680px; margin:0 auto; padding:0 24px 250px; }
header{
  display:flex; justify-content:space-between; align-items:baseline; gap:16px;
  padding:26px 0 14px; border-bottom:1px solid var(--hair);
}
.brand{ display:flex; align-items:baseline; gap:12px; min-width:0; }
.wm{ font-size:15px; white-space:nowrap; }
.wm b{ font-weight:800; letter-spacing:.01em; }
.wm span{ font-weight:300; letter-spacing:.3em; margin-left:5px; }
.pgname{ font-size:13px; font-weight:500; color:var(--muted); padding-left:12px; border-left:1px solid var(--hair); white-space:nowrap; }
.scan{ font:400 10.5px var(--mono); color:var(--dim); letter-spacing:.04em; white-space:nowrap; }
@media (max-width:880px){ .scan{ display:none; } }

/* ---------- eyebrow + synthesis ---------- */
.eyebrow{ margin-top:64px; font:500 10px var(--mono); letter-spacing:.18em; color:var(--dim); }
.eyebrow .sp{ color:var(--clay); margin-right:3px; }
.synthwrap{ display:grid; margin-top:20px; }
.synthwrap>*{ grid-area:1/1; }
.synth{ font-size:22px; line-height:1.6; font-weight:400; color:var(--ink); letter-spacing:-.005em; }
.sizer{ visibility:hidden; pointer-events:none; }
#synth:not(.done){ cursor:pointer; }
.schip{
  display:inline-flex; align-items:center; gap:6px;
  padding:1px 9px 2px; border-radius:999px;
  background:var(--wash); color:var(--deep);
  font-weight:600; font-size:.82em; line-height:1.45;
  vertical-align:baseline; transform:translateY(-1px);
  transition:background .15s, box-shadow .15s;
}
button.schip:hover{ background:#DCE9FD; box-shadow:0 1px 6px rgba(26,61,124,.16); }
.schip .sdot{ width:6px; height:6px; border-radius:50%; flex:none; }
.typing::after{
  content:""; display:inline-block; width:2px; height:1em;
  background:var(--clay); margin-left:3px; vertical-align:-.12em;
  animation:caret 1s steps(2,start) infinite;
}
@keyframes caret{ 50%{ opacity:0; } }

/* ---------- queue ---------- */
.sechead{
  display:flex; justify-content:space-between; align-items:baseline;
  margin-top:72px; padding-bottom:10px; border-bottom:1px solid var(--hair);
  font:500 10px var(--mono); letter-spacing:.18em; color:var(--dim);
}
#queue{ margin-top:6px; }
.qrow{
  display:grid; grid-template-columns:30px minmax(0,1fr) auto;
  column-gap:14px; align-items:center;
  width:calc(100% + 28px); margin:0 -14px; padding:15px 14px;
  border-radius:12px; text-align:left;
  transition:background .16s, opacity .25s;
}
.qrow:hover{ background:var(--wash); }
.qrow.off{ opacity:.45; }
.qrank{ font:500 11px var(--mono); color:var(--dim); align-self:start; padding-top:4px; }
.qmain{ min-width:0; }
.qtop{ display:flex; align-items:baseline; gap:8px; min-width:0; }
.qco{ font-size:15px; font-weight:600; color:var(--ink); white-space:nowrap; }
.qseat{ font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
.qhook{ display:block; margin-top:3px; font-size:12.5px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.qside{ display:flex; align-items:center; gap:10px; }
.qscore{ font:600 16px var(--mono); }
.qscore.g{ color:var(--green); } .qscore.a{ color:var(--amber); } .qscore.d{ color:var(--dim); }
.wchip{
  font:500 9.5px var(--mono); letter-spacing:.05em; color:var(--muted);
  border:1px solid var(--hair); background:#fff; border-radius:999px; padding:3px 9px; white-space:nowrap;
}
.newtag{
  font:600 9px var(--mono); letter-spacing:.08em; color:var(--clay);
  background:rgba(217,119,87,.13); border-radius:4px; padding:2px 5px; align-self:center;
}
.tbadge{ font:600 9px var(--mono); letter-spacing:.08em; border-radius:4px; padding:2px 6px; align-self:center; white-space:nowrap; }
.tbadge.followed{ color:var(--green); background:rgba(30,122,65,.1); }
.tbadge.dismissed{ color:var(--dim); background:rgba(16,22,38,.06); }

/* ---------- folds ---------- */
#folds{ margin-top:56px; border-top:1px solid var(--hair); }
.fold{ border-bottom:1px solid var(--hair); }
.foldhead{
  width:100%; display:flex; align-items:center; gap:9px; padding:14px 2px;
  font:500 11px var(--mono); letter-spacing:.14em; color:var(--muted); text-align:left;
  transition:color .15s;
}
.foldhead:hover{ color:var(--ink); }
.foldhead svg{ transition:transform .22s; color:var(--dim); flex:none; }
.fold.open .foldhead svg{ transform:rotate(90deg); }
.foldnote{ margin-left:auto; color:var(--dim); letter-spacing:.1em; font-size:9px; }
.foldbody{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .26s ease; }
.fold.open .foldbody{ grid-template-rows:1fr; }
.foldinner{ overflow:hidden; min-height:0; }
.mrow{
  display:block; width:calc(100% + 24px); margin:0 -12px 4px; padding:12px;
  border-radius:10px; text-align:left; transition:background .16s, opacity .25s;
}
.mrow:hover{ background:var(--wash); }
.mrow.off{ opacity:.45; }
.mtop{ display:flex; align-items:center; gap:9px; min-width:0; }
.mco{ font-size:14px; font-weight:600; }
.mhook{ flex:1; min-width:0; font-size:12px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mgate{ display:block; margin-top:5px; font-size:12px; line-height:1.5; }
.mgate.amber{ color:var(--amber); }
.mgate.red{ color:#B3261E; }
.dnc{
  font:600 9px var(--mono); letter-spacing:.08em; background:#C5221F; color:#fff;
  border-radius:4px; padding:2px 6px; margin-right:7px;
}
.tpill{
  font:500 9.5px var(--mono); letter-spacing:.08em; border-radius:999px; padding:3px 9px; white-space:nowrap; flex:none;
}

/* ---------- concept label ---------- */
.concept{ margin-top:84px; font:400 10px var(--mono); letter-spacing:.14em; color:var(--dim); text-align:center; }

/* ---------- modal ---------- */
.scrim{
  position:fixed; inset:0; z-index:100; background:rgba(16,22,38,.4);
  display:flex; align-items:center; justify-content:center; padding:24px;
  opacity:0; transition:opacity .2s ease;
}
.scrim.on{ opacity:1; }
.modal{
  position:relative; background:#fff; border-radius:20px;
  box-shadow:0 24px 80px rgba(16,22,38,.22), 0 4px 20px rgba(16,22,38,.1), 0 0 0 .5px rgba(16,22,38,.06);
  width:min(720px,100%); max-height:84vh; display:flex; overflow:hidden;
  transform:translateY(14px) scale(.985); transition:transform .22s ease;
}
.scrim.on .modal{ transform:none; }
.mclose{
  position:absolute; top:16px; right:16px; z-index:2; width:32px; height:32px;
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  color:var(--muted); background:#fff; box-shadow:0 0 0 1px var(--hair);
  transition:background .15s, color .15s;
}
.mclose:hover{ background:var(--wash); color:var(--ink); }
.mbody{ overflow-y:auto; overscroll-behavior:contain; padding:30px 34px 22px; flex:1; min-height:0; }
.mhero{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; padding-bottom:22px; }
.mtags{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.vertag, .tierchip{ font:500 9.5px var(--mono); letter-spacing:.06em; color:var(--muted); border:1px solid var(--hair); border-radius:999px; padding:3px 9px; white-space:nowrap; }
.mhero h2{ font-size:24px; font-weight:700; letter-spacing:-.01em; margin:12px 0 4px; }
.msub{ font-size:13.5px; color:var(--muted); }
.mmeta{ display:flex; align-items:center; gap:8px; margin-top:12px; flex-wrap:wrap; }
.mring{ flex:none; margin-top:4px; }
.msec{ padding:22px 0; border-top:1px solid var(--hair); }
.mlabel{
  display:flex; align-items:center; gap:8px; margin-bottom:10px;
  font:500 10px var(--mono); letter-spacing:.16em; color:var(--dim);
}
.mtext{ font-size:14.5px; line-height:1.65; color:var(--sec); }
.mkill{ color:var(--muted); }
.mbiz{ background:#F2F6FE; border-left:3px solid var(--deep); border-radius:0 10px 10px 0; padding:12px 14px; }
.mbuyer{ font-size:15px; font-weight:600; color:var(--ink); }
.mchamp{ font-size:13.5px; color:var(--muted); margin-top:6px; line-height:1.55; }
.champk{ font:500 9.5px var(--mono); letter-spacing:.12em; color:var(--dim); margin-right:6px; }
.feebadge{
  position:relative; font:600 9.5px var(--mono); letter-spacing:.08em;
  color:#A8533A; background:rgba(217,119,87,.13); border-radius:4px; padding:2px 6px; cursor:help;
}
.feebadge::after{
  content:attr(data-tip); position:absolute; left:0; bottom:calc(100% + 8px); width:280px;
  background:var(--ink); color:#E8EDF6; font:400 11.5px/1.5 var(--sans); letter-spacing:0;
  padding:10px 12px; border-radius:10px; box-shadow:0 10px 30px rgba(16,22,38,.25);
  opacity:0; transform:translateY(4px); pointer-events:none; transition:.16s ease; z-index:5;
}
.feebadge:hover::after, .feebadge:focus-visible::after{ opacity:1; transform:none; }
.q4badge{ font:600 9.5px var(--mono); letter-spacing:.06em; color:#8A4A10; background:#FDECDB; border-radius:4px; padding:2px 6px; }
.gatepanel{ border-radius:12px; padding:13px 16px; font-size:13.5px; line-height:1.6; }
.gatepanel.amber{ color:#7C4A12; background:rgba(217,122,43,.09); border:1px solid rgba(217,122,43,.25); }
.gatepanel.red{ color:#8C2B28; background:rgba(197,34,31,.06); border:1px solid rgba(197,34,31,.22); }
.proofrow{ display:flex; gap:8px; flex-wrap:wrap; }
.pchip{ font:500 10px var(--mono); letter-spacing:.06em; color:var(--muted); border:1px solid var(--hair); border-radius:999px; padding:4px 10px; }
.pchip.rt{ color:var(--green); border-color:rgba(30,122,65,.3); background:rgba(30,122,65,.06); }
.srcs{ display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.srcchip{ display:inline-flex; flex-direction:column; gap:2px; border:1px solid var(--hair); border-radius:10px; padding:7px 11px; max-width:100%; }
.srclabel{ font-size:12px; font-weight:500; color:var(--sec); }
.srcmeta{ font:400 9.5px var(--mono); color:var(--dim); letter-spacing:.04em; }
.numsrow{ display:flex; gap:28px; margin-bottom:14px; flex-wrap:wrap; }
.numcell{ display:flex; flex-direction:column; gap:3px; }
.nk{ font:500 9.5px var(--mono); letter-spacing:.12em; color:var(--dim); }
.nv{ font:600 15px var(--mono); color:var(--ink); }
.nv.g{ color:var(--green); } .nv.a{ color:var(--amber); } .nv.d{ color:var(--dim); }
.qualgrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media (max-width:560px){ .qualgrid{ grid-template-columns:1fr; } }
.qcell{ border:1px solid var(--hair); border-radius:12px; padding:10px 12px; }
.qhead{ display:flex; justify-content:space-between; align-items:center; }
.qmark{ font:600 12px var(--mono); }
.qmark.g{ color:var(--green); } .qmark.a{ color:var(--amber); } .qmark.x{ color:var(--dim); }
.qwhy{ font-size:11.5px; line-height:1.5; color:var(--muted); margin-top:4px; }
.propline{ font-size:13px; color:var(--muted); margin-top:14px; line-height:1.55; }
.propline b{ color:var(--ink); font-weight:600; }
.openerpanel{ background:#F2F6FE; border-radius:12px; padding:14px 16px; margin-top:12px; }
.oplabel{ font:500 9.5px var(--mono); letter-spacing:.14em; color:var(--clay); margin-bottom:8px; }
.optext{ font-size:14px; line-height:1.65; color:var(--ink); }
.optext.typing{ cursor:pointer; }
.mactions{
  position:sticky; bottom:0; display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  padding:18px 0 4px; background:linear-gradient(rgba(255,255,255,0), #fff 38%);
}
.aspace{ flex:1; }
.abtn{
  border:1px solid rgba(16,22,38,.14); border-radius:999px; padding:8px 14px;
  font-size:13px; font-weight:500; color:var(--sec); background:#fff;
  transition:background .15s, color .15s, border-color .15s;
}
.abtn:hover{ background:var(--wash); color:var(--deep); border-color:rgba(26,61,124,.2); }
.abtn.primary{ background:var(--deep); border-color:var(--deep); color:#fff; }
.abtn.primary:hover{ background:#15326A; color:#fff; }
.abtn.good{ color:var(--green); }
.abtn.good:hover{ background:rgba(30,122,65,.08); border-color:rgba(30,122,65,.3); color:var(--green); }
.abtn.bad{ color:#B3261E; }
.abtn.bad:hover{ background:rgba(197,34,31,.07); border-color:rgba(197,34,31,.25); color:#B3261E; }

/* ---------- dock (composer) ---------- */
.dock{
  position:fixed; left:0; right:0; bottom:0; z-index:60;
  display:flex; justify-content:center; padding:28px 16px 18px;
  background:linear-gradient(to top, #F7F9FC 64%, rgba(247,249,252,0));
  pointer-events:none;
}
.dockin{ width:min(672px,100%); pointer-events:auto; }
.abubble{
  background:#fff; border-radius:16px; padding:14px 16px; margin-bottom:12px;
  box-shadow:0 12px 40px rgba(16,22,38,.14), 0 0 0 .5px rgba(16,22,38,.08);
  opacity:0; transform:translateY(8px); transition:opacity .25s ease, transform .25s ease;
}
.abubble.on{ opacity:1; transform:none; }
.bhead{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.bbrand{ font:600 9.5px var(--mono); letter-spacing:.14em; color:var(--clay); white-space:nowrap; }
.bre{ flex:1; min-width:0; font:400 9.5px var(--mono); letter-spacing:.04em; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bclose{ width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--dim); flex:none; transition:color .15s, background .15s; }
.bclose:hover{ color:var(--ink); background:var(--wash); }
.btext{ font-size:14px; line-height:1.65; color:var(--sec); max-height:34vh; overflow-y:auto; }
.btext.typing{ cursor:pointer; }
.blinks{ display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; }
.alink{ color:var(--deep); font-size:13px; font-weight:600; border-radius:6px; }
.alink:hover{ text-decoration:underline; }
.sugg{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
.sugg button{
  background:#fff; border:1px solid rgba(16,22,38,.1); border-radius:999px;
  padding:7px 13px; font-size:12.5px; color:var(--muted);
  box-shadow:0 1px 4px rgba(16,22,38,.04);
  transition:background .15s, color .15s, border-color .15s;
}
.sugg button:hover{ background:var(--wash); color:var(--deep); border-color:rgba(26,61,124,.18); }
.composer{
  display:flex; align-items:center; gap:10px;
  background:#fff; border-radius:20px; padding:14px;
  box-shadow:0 4px 20px rgba(16,22,38,.08), 0 0 0 .5px rgba(16,22,38,.08);
  transition:box-shadow .18s;
}
.composer:focus-within{ box-shadow:0 4px 24px rgba(16,22,38,.1), 0 0 0 1px rgba(16,22,38,.14); }
.composer .spark{ color:var(--clay); font-size:15px; padding-left:2px; flex:none; }
.composer input{
  flex:1; min-width:0; border:0; outline:0; background:transparent;
  font:400 15px var(--sans); color:var(--ink);
}
.composer input::placeholder{ color:var(--dim); }
.send{
  width:30px; height:30px; border-radius:50%; flex:none;
  background:var(--clay); color:#fff;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s, transform .15s;
}
.send:hover:not(:disabled){ background:#C26747; }
.send:disabled{ background:#E9EDF4; color:#AEB6C2; cursor:default; }

/* ---------- toast ---------- */
.toast{
  position:fixed; left:50%; bottom:148px; transform:translate(-50%,8px); z-index:200;
  display:flex; align-items:center; gap:12px;
  background:var(--ink); color:#E8EDF6; border-radius:999px; padding:10px 18px;
  font-size:13px; box-shadow:0 8px 24px rgba(16,22,38,.28);
  opacity:0; transition:opacity .22s ease, transform .22s ease;
  max-width:min(560px, calc(100vw - 48px)); white-space:nowrap; overflow:hidden;
}
.toast.on{ opacity:1; transform:translate(-50%,0); }
.toast button{ color:#A8C7FA; font-weight:600; font-size:13px; flex:none; }
.toast button:hover{ text-decoration:underline; }
.toast span{ overflow:hidden; text-overflow:ellipsis; }

@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ transition:none !important; animation:none !important; }
}
</style>
</head>
<body>

<div class="col">
  <header>
    <div class="brand">
      <span class="wm"><b>VMA</b><span>GROUP</span></span>
      <span class="pgname">Communications Radar</span>
    </div>
    <div class="scan" id="scan"></div>
  </header>

  <main>
    <p class="eyebrow" id="eyebrow"></p>

    <div class="synthwrap">
      <p class="synth sizer" id="synthSizer" aria-hidden="true"></p>
      <p class="synth typing" id="synth" aria-label="Morning synthesis"></p>
    </div>

    <section aria-label="The queue">
      <div class="sechead"><span>THE QUEUE</span><span id="queueNote"></span></div>
      <div id="queue"></div>
    </section>

    <div id="folds" aria-label="Leads not yet call-ready"></div>

    <footer class="concept">03 · THE BRIEFING — CONCIERGE CONCEPT · ✦ VMA INTELLIGENCE</footer>
  </main>
</div>

<div class="scrim" id="scrim" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mTitle">
    <button class="mclose" id="mclose" aria-label="Close call file">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <div class="mbody" id="mbody" data-qa="portfolio"></div>
  </div>
</div>

<div class="dock">
  <div class="dockin">
    <div class="abubble" id="abubble" hidden></div>
    <div class="sugg" id="sugg">
      <button type="button">Why is Reckitt first?</button>
      <button type="button">Who do I call at Octopus?</button>
      <button type="button">What changed overnight?</button>
    </div>
    <div class="composer">
      <span class="spark" aria-hidden="true">✦</span>
      <input id="ask" type="text" placeholder="Ask about any account…" aria-label="Ask VMA Intelligence about any account" autocomplete="off">
      <button class="send" id="send" aria-label="Send question" disabled>
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast" hidden role="status" aria-live="polite"></div>

<script>
/* ===== dataset (inlined verbatim from _shared/data.js) ===== */
/* ============================================================================
   Communications Radar v2 mockups — canonical sample dataset.
   Every mockup inlines this object verbatim (standalone HTML, file:// safe).
   Field contract mirrors the live console payload built in
   tool/dashboard.py::_build_mr_rows / _mr_gate_fields.
   ========================================================================== */
const RADAR = {
  meta: {
    user: "Sara",
    dateLabel: "Tuesday 10 June 2026",
    scanTime: "06:40",
    signals: 247,
    sources: 38,
    newToday: 2,
    callReady: 6,
    synthesis: "Three calls worth making before lunch. Reckitt is the one that won't wait — the CEO RNS landed this morning and the corporate-affairs reset clock is already running. Octopus and Monzo close out the morning; both windows are short and both paths in are warm.",
    planOrder: ["reckitt", "monzo", "octopus"]
  },
  leads: [
    {
      id: "reckitt", co: "Reckitt", sector: "Consumer Health",
      type: "Leadership", key: "lead",
      seat: "Corporate Affairs Director",

<script>
/* ===== The Briefing — concierge app ===== */
(function(){
'use strict';

/* ---------- utilities ---------- */
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const M = RADAR.meta;
const leadsById = {};
RADAR.leads.forEach(l => { leadsById[l.id] = l; });

const band = s => s >= 70 ? 'g' : s >= 45 ? 'a' : 'd';
const BAND_HEX = { g:'#1E7A41', a:'#B45309', d:'#9AA0A6' };
const bandHex = s => BAND_HEX[band(s)];
const TYPE_TINT = {
  lead:['#1d4ed8','#e9effb'], fund:['#1e7a41','#e7f3ec'], restr:['#46556e','#edf0f4'],
  warn:['#b5530e','#fdecdb'], mna:['#6b3fb5','#efe9fb'], people:['#0e7c74','#ddf3f0']
};
const VER_LABEL = { reg:'Registry-attested', multi:'2+ sources', single:'Single source' };
const TIER_LABEL = { ready:'Call-ready', dev:'Developing', early:'Watchlist', blocked:'Blocked' };
const winLabel = l => l.win === 'horizon' ? 'HORIZON' : l.win.toUpperCase();
const ageStr = a => a === 0 ? 'today' : a + 'd';
const NUM_WORD = ['No','One','Two','Three','Four','Five','Six'];

const CHEV = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>';
const XS   = '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>';

const triage = {};  /* id -> 'followed' | 'dismissed' */

/* ---------- typewriter ---------- */
function typeInto(el, text, ms, done){
  let finished = false, raf = 0;
  const finish = () => {
    if (finished) return;
    finished = true;
    cancelAnimationFrame(raf);
    el.textContent = text;
    if (done) done();
  };
  if (REDUCED){ requestAnimationFrame(finish); return { finish }; }
  const t0 = performance.now();
  let shown = 0;
  const step = now => {
    if (finished) return;
    const n = Math.min(text.length, Math.floor((now - t0) / ms));
    if (n !== shown){ shown = n; el.textContent = text.slice(0, n); }
    if (shown >= text.length) finish();
    else raf = requestAnimationFrame(step);
  };
  raf = requestAnimationFrame(step);
  return { finish };
}

/* ---------- inline company chips ---------- */
const CANDS = (() => {
  const arr = [];
  RADAR.leads.forEach(l => {
    arr.push({ name:l.co, lead:l });
    const first = l.co.split(' ')[0];
    if (first !== l.co && first.length >= 4) arr.push({ name:first, lead:l });
  });
  arr.sort((a,b) => b.name.length - a.name.length);
  return arr;
})();

function chipify(text, interactive){
  let out = '', i = 0;
  while (i < text.length){
    let best = null;
    for (const c of CANDS){
      const at = text.indexOf(c.name, i);
      if (at === -1) continue;
      const pre  = at > 0 ? text[at - 1] : ' ';
      const post = at + c.name.length < text.length ? text[at + c.name.length] : ' ';
      if (/[A-Za-z0-9]/.test(pre) || /[A-Za-z0-9]/.test(post)) continue;
      if (!best || at < best.at || (at === best.at && c.name.length > best.name.length))
        best = { at, name:c.name, lead:c.lead };
    }
    if (!best){ out += esc(text.slice(i)); break; }
    out += esc(text.slice(i, best.at));
    const dot = '<span class="sdot" style="background:' + bandHex(best.lead.score) + '"></span>';
    out += interactive
      ? '<button type="button" class="schip" data-qa="lead-trigger" data-lead="' + best.lead.id +
        '" title="Open the ' + esc(best.lead.co) + ' call file">' + dot + esc(best.name) + '</button>'
      : '<span class="schip">' + dot + esc(best.name) + '</span>';
    i = best.at + best.name.length;
  }
  return out;
}

/* ---------- queue ---------- */
function badgeHTML(st){
  return '<span class="tbadge ' + st + '">' + (st === 'followed' ? 'FOLLOWED UP' : 'DISMISSED') + '</span>';
}

function rowHTML(l, idx){
  const st = triage[l.id];
  return '<button type="button" class="qrow' + (st === 'dismissed' ? ' off' : '') +
    '" data-qa="lead-trigger" data-lead="' + l.id + '">' +
    '<span class="qrank">' + String(idx + 1).padStart(2,'0') + '</span>' +
    '<span class="qmain">' +
      '<span class="qtop">' +
        '<span class="qco">' + esc(l.co) + '</span>' +
        (l.isNew ? '<span class="newtag">NEW</span>' : '') +
        (st ? badgeHTML(st) : '') +
        '<span class="qseat">' + esc(l.seat) + '</span>' +
      '</span>' +
      '<span class="qhook">' + esc(l.hook) + '</span>' +
    '</span>' +
    '<span class="qside">' +
      '<span class="qscore ' + band(l.score) + '">' + l.score + '</span>' +
      '<span class="wchip">' + esc(winLabel(l)) + '</span>' +
    '</span>' +
  '</button>';
}

function renderQueue(){
  const ready = RADAR.leads.filter(l => l.tier === 'ready').sort((a,b) => b.score - a.score);
  $('#queue').innerHTML = ready.map(rowHTML).join('');
}

/* ---------- folds (developing / watchlist / blocked) ---------- */
const FOLDS = [
  { tier:'dev',     label:'Developing', note:'NOT YET CALL-READY' },
  { tier:'early',   label:'Watchlist',  note:'WATCH ONLY' },
  { tier:'blocked', label:'Blocked',    note:'DO NOT CALL' }
];

function mrowHTML(l){
  const tint = TYPE_TINT[l.key] || ['#46556e','#edf0f4'];
  const st = triage[l.id];
  const blocked = !!l.conflict;
  return '<button type="button" class="mrow' + (st === 'dismissed' ? ' off' : '') +
    '" data-qa="lead-trigger" data-lead="' + l.id + '">' +
    '<span class="mtop">' +
      '<span class="tpill" style="color:' + tint[0] + ';background:' + tint[1] + '">' + esc(l.type.toUpperCase()) + '</span>' +
      '<span class="mco">' + esc(l.co) + '</span>' +
      (st ? badgeHTML(st) : '') +
      '<span class="mhook">' + esc(l.hook) + '</span>' +
    '</span>' +
    '<span class="mgate ' + (blocked ? 'red' : 'amber') + '">' +
      (blocked ? '<span class="dnc">DO NOT CALL</span>' : '') + esc(l.gateWhy) +
    '</span>' +
  '</button>';
}

function renderFolds(){
  const host = $('#folds');
  const open = new Set(Array.from(host.querySelectorAll('.fold.open')).map(x => x.dataset.tier));
  host.innerHTML = FOLDS.map(f => {
    const items = RADAR.leads.filter(l => l.tier === f.tier);
    const isOpen = open.has(f.tier);
    return '<div class="fold' + (isOpen ? ' open' : '') + '" data-tier="' + f.tier + '">' +
      '<button type="button" class="foldhead" aria-expanded="' + isOpen + '">' +
        CHEV + ' ' + f.label.toUpperCase() + ' (' + items.length + ')' +
        '<span class="foldnote">' + f.note + '</span>' +
      '</button>' +
      '<div class="foldbody"><div class="foldinner">' + items.map(mrowHTML).join('') + '</div></div>' +
    '</div>';
  }).join('');
  host.querySelectorAll('.foldhead').forEach(h => h.addEventListener('click', () => {
    const f = h.closest('.fold');
    f.classList.toggle('open');
    h.setAttribute('aria-expanded', f.classList.contains('open'));
  }));
}

/* ---------- call-file modal ---------- */
function ringSVG(score){
  const r = 25, c = 2 * Math.PI * r;
  const off = (c * (1 - score / 100)).toFixed(1);
  const col = bandHex(score);
  return '<svg width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Lead strength ' + score + ' of 100">' +
    '<circle cx="32" cy="32" r="' + r + '" fill="none" stroke="rgba(16,22,38,.08)" stroke-width="4"/>' +
    '<circle cx="32" cy="32" r="' + r + '" fill="none" stroke="' + col + '" stroke-width="4" stroke-linecap="round"' +
    ' stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + off + '" transform="rotate(-90 32 32)"/>' +
    '<text x="32" y="37" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="600" fill="' + col + '">' + score + '</text>' +
  '</svg>';
}

function heroHTML(l){
  const tint = TYPE_TINT[l.key] || ['#46556e','#edf0f4'];
  const st = triage[l.id];
  return '<div class="mhero"><div>' +
    '<div class="mtags">' +
      '<span class="tpill" style="color:' + tint[0] + ';background:' + tint[1] + '">' + esc(l.type.toUpperCase()) + '</span>' +
      (l.isNew ? '<span class="newtag">NEW</span>' : '') +
      '<span class="tierchip">' + TIER_LABEL[l.tier].toUpperCase() + '</span>' +
      '<span class="vertag">' + VER_LABEL[l.ver] + '</span>' +
    '</div>' +
    '<h2 id="mTitle">' + esc(l.co) + '</h2>' +
    '<div class="msub">' + esc(l.seat) + ' · ' + esc(l.sector) + '</div>' +
    '<div class="mmeta">' +
      '<span class="wchip">WINDOW ' + esc(winLabel(l)) + '</span>' +
      (l.conf ? '<span class="wchip">CONF ' + esc(l.conf.toUpperCase()) + '</span>' : '') +
      (st ? badgeHTML(st) : '') +
    '</div>' +
  '</div><div class="mring">' + ringSVG(l.score) + '</div></div>';
}

function srcChip(s){
  return '<span class="srcchip">' +
    '<span class="srclabel">' + esc(s.label) + '</span>' +
    '<span class="srcmeta">' + esc(s.src) + ' · ' + ageStr(s.age) + ' · ' + esc(s.kind.toUpperCase()) + '</span>' +
  '</span>';
}

function qualCell(l, d){
  const v = l.qual[d];
  const mark = v === 2 ? '✓✓' : v === 1 ? '✓' : '✗';
  const cls  = v === 2 ? 'g'  : v === 1 ? 'a' : 'x';
  return '<div class="qcell"><div class="qhead">' +
    '<span class="nk">' + d.toUpperCase() + '</span>' +
    '<span class="qmark ' + cls + '">' + mark + '</span>' +
  '</div><div class="qwhy">' + esc(l.qual[d + '_why']) + '</div></div>';
}

function proofSec(l){
  return '<section class="msec"><div class="mlabel">PROOF</div>' +
    '<div class="proofrow">' +
      '<span class="pchip">' + VER_LABEL[l.ver] + '</span>' +
      (l.rt ? '<span class="pchip rt">RED-TEAMED ✓ ' + l.conviction + '</span>' : '') +
      (l.conf ? '<span class="pchip">CONFIDENCE ' + esc(l.conf.toUpperCase()) + '</span>' : '') +
    '</div>' +
    '<div class="srcs">' + l.stack.map(srcChip).join('') + '</div>' +
  '</section>';
}

function numbersSec(l, withProp){
  return '<section class="msec"><div class="mlabel">THE NUMBERS</div>' +
    '<div class="numsrow">' +
      '<div class="numcell"><span class="nk">SCORE</span><span class="nv ' + band(l.score) + '">' + l.score + '</span></div>' +
      '<div class="numcell"><span class="nk">QUALIFICATION</span><span class="nv">' + l.qual.total + '/8</span></div>' +
      '<div class="numcell"><span class="nk">WINDOW</span><span class="nv">' + esc(winLabel(l)) + '</span></div>' +
    '</div>' +
    '<div class="qualgrid">' + ['seat','budget','urgency','buyer'].map(d => qualCell(l, d)).join('') + '</div>' +
    (withProp ? '<p class="propline"><span class="champk">FEE PROPENSITY</span> <b>' + esc(l.prop) + '</b>' +
      (l.propWhy ? ' — ' + esc(l.propWhy) : '') + '</p>' : '') +
  '</section>';
}

function whyNowSec(l){
  return '<section class="msec"><div class="mlabel">WHY NOW' +
    (l.fee ? ' <span class="feebadge" tabindex="0" data-tip="' + esc(l.feeTip) + '">' + esc(l.fee) + '</span>' : '') +
    (l.q4 ? ' <span class="q4badge">' + esc(l.q4.toUpperCase()) + '</span>' : '') +
    '</div><p class="mtext">' + esc(l.whyNow) + '</p></section>';
}

function readyFile(l){
  return heroHTML(l) +
    whyNowSec(l) +
    '<section class="msec"><div class="mlabel">WHO TO CALL</div>' +
      '<p class="mbuyer">' + esc(l.buyer) + '</p>' +
      '<p class="mchamp"><span class="champk">WARM PATH</span>' + esc(l.champion) + '</p>' +
    '</section>' +
    '<section class="msec"><div class="mlabel">THE OPENING</div>' +
      '<p class="mtext">' + esc(l.opening) + '</p>' +
      '<div id="openerSlot"></div>' +
    '</section>' +
    '<section class="msec"><div class="mlabel">WHAT KILLS IT</div>' +
      '<p class="mtext mkill">' + esc(l.kill) + '</p>' +
    '</section>' +
    proofSec(l) +
    numbersSec(l, true) +
    (l.bizCase ? '<section class="msec"><div class="mlabel">BUSINESS CASE</div><p class="mtext mbiz">' + esc(l.bizCase) + '</p></section>' : '') +
    '<div class="mactions">' +
      '<button type="button" class="abtn primary" data-act="pitch">Generate pitch</button>' +
      '<button type="button" class="abtn" data-act="opener">✦ Draft opener</button>' +
      '<button type="button" class="abtn" data-act="sources">View sources</button>' +
      '<span class="aspace"></span>' +
      '<button type="button" class="abtn good" data-act="follow">✓ Followed up</button>' +
      '<button type="button" class="abtn bad" data-act="dismiss">✕ Dismiss</button>' +
    '</div>';
}

function gateFile(l){
  const blocked = !!l.conflict;
  return heroHTML(l) +
    whyNowSec(l) +
    '<section class="msec"><div class="mlabel">' + (blocked ? 'WHY THIS IS BLOCKED' : 'WHY NOT CALL-READY') + '</div>' +
      '<div class="gatepanel ' + (blocked ? 'red' : 'amber') + '">' +
        (blocked ? '<span class="dnc">DO NOT CALL</span>' : '') + esc(l.gateWhy) +
      '</div>' +
    '</section>' +
    proofSec(l) +
    numbersSec(l, !!l.propWhy) +
    '<div class="mactions">' +
      '<button type="button" class="abtn" data-act="sources">View sources</button>' +
      '<span class="aspace"></span>' +
      '<button type="button" class="abtn bad" data-act="dismiss">✕ Dismiss</button>' +
    '</div>';
}

let currentLead = null, lastFocus = null, openerTyper = null;

function lockBody(){
  const sw = window.innerWidth - document.documentElement.clientWidth;
  if (sw > 0) document.body.style.paddingRight = sw + 'px';
  document.body.classList.add('locked');
}
function unlockBody(){
  document.body.classList.remove('locked');
  document.body.style.paddingRight = '';
}

function openModal(id){
  const l = leadsById[id];
  if (!l) return;
  currentLead = l;
  lastFocus = document.activeElement;
  openerTyper = null;
  $('#mbody').innerHTML = l.tier === 'ready' ? readyFile(l) : gateFile(l);
  $('#mbody').scrollTop = 0;
  const scrim = $('#scrim');
  scrim.hidden = false;
  lockBody();
  requestAnimationFrame(() => scrim.classList.add('on'));
  $('#mclose').focus();
}

function closeModal(){
  const scrim = $('#scrim');
  if (scrim.hidden) return;
  scrim.classList.remove('on');
  unlockBody();
  currentLead = null;
  openerTyper = null;
  window.setTimeout(() => { scrim.hidden = true; }, 200);
  if (lastFocus && document.contains(lastFocus)) lastFocus.focus();
}

function startOpener(l){
  const slot = $('#openerSlot');
  if (!slot) return;
  let panel = slot.querySelector('.openerpanel');
  if (panel){
    if (openerTyper) openerTyper.finish();
    panel.scrollIntoView({ behavior: REDUCED ? 'auto' : 'smooth', block:'nearest' });
    return;
  }
  slot.innerHTML = '<div class="openerpanel"><div class="oplabel">✦ DRAFT OPENER</div><p class="optext typing"></p></div>';
  panel = slot.querySelector('.openerpanel');
  const tEl = panel.querySelector('.optext');
  panel.addEventListener('click', () => { if (openerTyper) openerTyper.finish(); });
  openerTyper = typeInto(tEl, l.opener, 12, () => {
    tEl.classList.remove('typing');
    openerTyper = null;
  });
  panel.scrollIntoView({ behavior: REDUCED ? 'auto' : 'smooth', block:'nearest' });
}

function setTriage(id, val){
  triage[id] = val;
  const co = leadsById[id].co;
  closeModal();
  renderQueue();
  renderFolds();
  toast(val === 'followed' ? co + ' marked as followed up' : co + ' dismissed from this morning’s queue', {
    label:'Undo',
    fn(){ delete triage[id]; renderQueue(); renderFolds(); toast('Restored to the queue'); }
  });
}

$('#mbody').addEventListener('click', e => {
  const b = e.target.closest('[data-act]');
  if (!b || !currentLead) return;
  const l = currentLead;
  switch (b.dataset.act){
    case 'pitch':   toast('Pitch pack queued for ' + l.co + ' — a few minutes'); break;
    case 'opener':  startOpener(l); break;
    case 'sources': toast(l.stack.length + ' source' + (l.stack.length > 1 ? 's' : '') + ' pinned to the ' + l.co + ' file'); break;
    case 'follow':  setTriage(l.id, 'followed'); break;
    case 'dismiss': setTriage(l.id, 'dismissed'); break;
  }
});
$('#mclose').addEventListener('click', closeModal);
$('#scrim').addEventListener('click', e => { if (e.target === $('#scrim')) closeModal(); });

/* ---------- toast ---------- */
let toastTimer = 0, toastHideTimer = 0;
function toast(msg, action){
  const t = $('#toast');
  window.clearTimeout(toastTimer);
  window.clearTimeout(toastHideTimer);
  t.innerHTML = '<span>' + esc(msg) + '</span>' +
    (action ? '<button type="button" id="toastAct">' + esc(action.label) + '</button>' : '');
  if (action) $('#toastAct').addEventListener('click', () => { action.fn(); });
  t.hidden = false;
  requestAnimationFrame(() => t.classList.add('on'));
  toastTimer = window.setTimeout(hideToast, action ? 4200 : 2600);
}
function hideToast(){
  const t = $('#toast');
  t.classList.remove('on');
  toastHideTimer = window.setTimeout(() => { t.hidden = true; }, 240);
}

/* ---------- concierge composer ---------- */
function reckittAnswer(){
  const r = leadsById.reckitt;
  return {
    text: r.co + ' leads the queue at ' + r.score + ' — the strongest score on the desk. The trigger is ' +
      VER_LABEL[r.ver].toLowerCase() + ': this morning’s RNS confirms the September CEO start, and the reset window is ' +
      r.win + ' before the seat is ever advertised. The path in is warm — ' + r.champion +
      '. Red-teamed at conviction ' + r.conviction + ', confidence ' + r.conf.toLowerCase() + '.',
    links: [{ id:r.id, label:'open the call file →' }]
  };
}

function octopusAnswer(){
  const o = leadsById.octopus;
  return {
    text: 'The economic buyer is ' + o.buyer + ' — ' + o.qual.buyer_why.toLowerCase() +
      '. The route in is ' + o.champion + '. ' + o.opening,
    links: [{ id:o.id, label:'open the call file →' }]
  };
}

function overnightAnswer(){
  const fresh = RADAR.leads.filter(l => l.isNew);
  const order = M.planOrder.map(id => leadsById[id].co);
  return {
    text: (NUM_WORD[fresh.length] || fresh.length) + ' new signals overnight, from ' + M.signals +
      ' scanned across ' + M.sources + ' sources at ' + M.scanTime + '. ' +
      fresh.map(l => l.co + ' — ' + l.hook).join(' ') +
      ' Suggested call order this morning: ' + order.join(', then ') + '.',
    links: fresh.map(l => ({ id:l.id, label:l.co + ' call file →' }))
  };
}

function snapshotAnswer(l){
  let text;
  if (l.tier === 'ready'){
    text = l.co + ' is call-ready at ' + l.score + ', window ' + l.win + '. ' + l.hook +
      ' The buyer is ' + l.buyer + '. Path in: ' + l.champion + '.';
  } else if (l.tier === 'blocked'){
    text = l.co + ' is blocked at ' + l.score + '. ' + l.hook + ' Blocked: ' + l.gateWhy + '.';
  } else {
    text = l.co + ' sits on the ' + TIER_LABEL[l.tier].toLowerCase() + ' at ' + l.score + '. ' + l.hook +
      ' Held back because: ' + l.gateWhy + '.';
  }
  return { text, links: [{ id:l.id, label: l.tier === 'ready' ? 'open the call file →' : 'open the file →' }] };
}

function fallbackAnswer(){
  return {
    text: 'I can brief you on any of the ' + RADAR.leads.length + ' accounts on this morning’s radar — why a lead ranks where it does, ' +
      'who to call and how warm the path is, what would kill it, and what changed overnight. ' +
      'Try one of the suggestions below, or just name a company.',
    links: []
  };
}

function route(q){
  const s = q.toLowerCase();
  if (/reckitt/.test(s) && /(why|first|top|rank|number one|#1)/.test(s)) return reckittAnswer();
  if (/octopus/.test(s) && /(who|call|contact|speak|ring)/.test(s)) return octopusAnswer();
  if (/(overnight|changed|since yesterday|what.?s new|new today|new this morning)/.test(s)) return overnightAnswer();
  const hit = RADAR.leads.find(l =>
    s.includes(l.co.toLowerCase()) || s.includes(l.co.split(' ')[0].toLowerCase()));
  if (hit) return snapshotAnswer(hit);
  return fallbackAnswer();
}

let bubbleTyper = null;
function showAnswer(q, a){
  if (bubbleTyper) bubbleTyper.finish();
  const b = $('#abubble');
  b.hidden = false;
  b.innerHTML =
    '<div class="bhead">' +
      '<span class="bbrand">✦ VMA INTELLIGENCE</span>' +
      '<span class="bre">RE: ' + esc(q) + '</span>' +
      '<button type="button" class="bclose" aria-label="Dismiss answer">' + XS + '</button>' +
    '</div>' +
    '<p class="btext typing" aria-live="polite"></p>' +
    '<div class="blinks" hidden></div>';
  b.classList.remove('on');
  void b.offsetWidth;
  b.classList.add('on');
  const tEl = b.querySelector('.btext');
  const linksEl = b.querySelector('.blinks');
  b.querySelector('.bclose').addEventListener('click', () => {
    if (bubbleTyper) bubbleTyper.finish();
    b.hidden = true;
  });
  tEl.addEventListener('click', () => { if (bubbleTyper) bubbleTyper.finish(); });
  bubbleTyper = typeInto(tEl, a.text, 9, () => {
    tEl.classList.remove('typing');
    bubbleTyper = null;
    if (a.links && a.links.length){
      linksEl.hidden = false;
      linksEl.innerHTML = a.links.map(k =>
        '<button type="button" class="alink" data-lead="' + k.id + '">' + esc(k.label) + '</button>').join('');
    }
  });
}

const askInput = $('#ask');
const sendBtn = $('#send');
function updateSend(){ sendBtn.disabled = askInput.value.trim() === ''; }
function send(){
  const q = askInput.value.trim();
  if (!q) return;
  askInput.value = '';
  updateSend();
  showAnswer(q, route(q));
}
askInput.addEventListener('input', updateSend);
askInput.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
sendBtn.addEventListener('click', send);
$('#sugg').querySelectorAll('button').forEach(c =>
  c.addEventListener('click', () => {
    const q = c.textContent.trim();
    showAnswer(q, route(q));
  }));

/* ---------- global interactions ---------- */
document.addEventListener('click', e => {
  const t = e.target.closest('[data-lead]');
  if (t) openModal(t.dataset.lead);
});
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (!$('#scrim').hidden){ closeModal(); return; }
  const b = $('#abubble');
  if (!b.hidden){
    if (bubbleTyper) bubbleTyper.finish();
    b.hidden = true;
  }
});

/* ---------- boot ---------- */
$('#scan').textContent = M.dateLabel + ' · ' + M.signals + ' signals · ' + M.sources + ' sources · scanned ' + M.scanTime;
$('#eyebrow').innerHTML = '<span class="sp">✦</span> VMA INTELLIGENCE · ' + esc(M.dateLabel.toUpperCase()) +
  ' · SCANNED ' + esc(M.scanTime) + ' · ' + M.signals + ' SIGNALS';
$('#queueNote').textContent = M.callReady + ' CALL-READY · SCORE ORDER';
$('#synthSizer').innerHTML = chipify(M.synthesis, false);
renderQueue();
renderFolds();

const synthEl = $('#synth');
const synthTyper = typeInto(synthEl, M.synthesis, 8, () => {
  synthEl.classList.remove('typing');
  synthEl.innerHTML = chipify(M.synthesis, true);
  synthEl.classList.add('done');
});
synthEl.addEventListener('click', () => {
  if (!synthEl.classList.contains('done')) synthTyper.finish();
});

})();
</script>
</body>
