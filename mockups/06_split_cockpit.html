  .radar-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,.1); }
  .radar-ring-label { position: absolute; font-size: 10px; color: rgba(255,255,255,.3); font-weight: 600; letter-spacing: .3px; }

  @keyframes sweep {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .radar-sweep::before { content: ''; position: absolute; left: 0; top: -20px; width: 100%; height: 42px; background: linear-gradient(90deg, rgba(91,155,213,.12), transparent); transform-origin: left center; border-radius: 0 50% 50% 0; }

  .rdc-desc { font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.7); }
  .rdc-close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: rgba(255,255,255,.4); font-size: 18px; cursor: pointer; }

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if (tab === 'radar') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('page-radar').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('page-calendar').classList.add('active');
  }
}

    const row = document.createElement('div');
    row.className = 'lead-row';
    row.dataset.index = i;
    row.innerHTML = `
      <div class="lead-rank">${lead.rank}</div>
      <div class="lead-company">${lead.company}</div>
      <div class="lead-role">${lead.role}</div>
      <div class="lead-pip pip-${lead.strength}"></div>`;
    row.addEventListener('click', () => selectLead(i, row));
    list.appendChild(row);
  });
})();

function selectLead(index, rowEl) {
  // Highlight row
  document.querySelectorAll('.lead-row').forEach(r => r.classList.remove('selected'));
  rowEl.classList.add('selected');

  const lead = leads[index];
  document.getElementById('right-empty').style.display = 'none';
  const detail = document.getElementById('right-detail');
  detail.style.display = 'flex';

  document.getElementById('d-company').textContent = lead.company;
  document.getElementById('d-role').textContent = lead.role;
  document.getElementById('d-meta').innerHTML = lead.signals.map(s =>
    `<span class="detail-badge">${s}</span>`
  ).join('') + `<span class="detail-badge" style="background:#f0fdf4;color:#22c55e;">${lead.status}</span>`;

  // Brief
  document.getElementById('sec-brief').innerHTML = `
    <div class="ai-summary">${lead.summary}</div>
    <ul class="evidence-list">${lead.evidence.map(e => `<li>${e}</li>`).join('')}</ul>`;

  // History
  document.getElementById('sec-history').innerHTML = `
    <div class="timeline">${lead.history.map(h => `
      <div class="timeline-item">
        <div class="timeline-date">${h.date}</div>
        <div class="timeline-text">${h.text}</div>
      </div>`).join('')}
    </div>`;

  // Act
  const statusOptions = ['Monitoring','Prospecting','Outreach','Warm Lead','Pitching','Active Mandate','In Progress','Conditional','Won','Lost'];
  document.getElementById('sec-act').innerHTML = `
    <div class="action-btn-group">
      <button class="action-btn action-btn-primary" onclick="alert('Generating pitch deck for ${lead.company}...')">
        <div class="action-icon">&#9998;</div>
        <div class="action-btn-label">
          <span class="action-title">Generate Pitch</span>
          <span class="action-sub">AI-drafted pitch deck tailored to ${lead.company} signals</span>
        </div>
      </button>
      <button class="action-btn action-btn-secondary" onclick="navigator.clipboard.writeText('${lead.summary.replace(/'/g,"\\'")}').then(()=>alert('Copied!'))">
        <div class="action-icon">&#128203;</div>
        <div class="action-btn-label">
          <span class="action-title">Copy Opener</span>
          <span class="action-sub">Copy AI-generated conversation opener to clipboard</span>
        </div>
      </button>
      <button class="action-btn action-btn-secondary" onclick="alert('Opening email composer for ${lead.company}...')">
        <div class="action-icon">&#9993;</div>
        <div class="action-btn-label">
          <span class="action-title">Draft Outreach Email</span>
          <span class="action-sub">Generate personalised outreach based on latest signals</span>
        </div>
      </button>
    </div>
    <div class="status-group">
      <div class="status-label">Mark Status</div>
      <div class="status-options">${statusOptions.map(s =>
        `<div class="status-pill${s === lead.status ? ' active' : ''}" onclick="setStatus(this)">${s}</div>`
      ).join('')}</div>
    </div>`;

  // Reset to Brief tab
  switchDetailTab('brief', document.querySelectorAll('.detail-tab')[0]);
}

function switchDetailTab(tab, btn) {
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.detail-section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sec-' + tab).classList.add('active');
}

function setStatus(el) {
  el.parentElement.querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}

];

(function buildRadar() {
  const container = document.getElementById('radar-container');
  const size = 480;
  const cx = size / 2;
  const cy = size / 2;

  // Draw concentric rings
  const rings = [
    { radius: 0.22, label: '1 month' },
    { radius: 0.50, label: '3 months' },
    { radius: 0.85, label: '6 months' }
  ];
  rings.forEach(r => {
    const ring = document.createElement('div');
    ring.className = 'radar-ring';
    const d = r.radius * size;
    ring.style.cssText = `width:${d}px;height:${d}px;left:${cx - d/2}px;top:${cy - d/2}px;`;
    container.appendChild(ring);

    const lbl = document.createElement('div');
    lbl.className = 'radar-ring-label';
    lbl.textContent = r.label;
    lbl.style.cssText = `left:${cx + 4}px;top:${cy - d/2 - 2}px;`;
    container.appendChild(lbl);
  });

  // Cross hairs
  const hLine = document.createElement('div');
  hLine.style.cssText = `position:absolute;left:5%;right:5%;top:${cy}px;height:1px;background:rgba(255,255,255,.06);`;
  container.appendChild(hLine);
  const vLine = document.createElement('div');
  vLine.style.cssText = `position:absolute;top:5%;bottom:5%;left:${cx}px;width:1px;background:rgba(255,255,255,.06);`;
  container.appendChild(vLine);

  // Place dots
  const maxMonths = 7;
  const maxR = size * 0.42; // max radius for dots

  radarItems.forEach((item, i) => {
    const dist = Math.min(item.months / maxMonths, 1) * maxR;
    const angleRad = (item.angle - 90) * Math.PI / 180;
    const x = cx + dist * Math.cos(angleRad);
    const y = cy + dist * Math.sin(angleRad);

    const dot = document.createElement('div');
    dot.className = `radar-dot dot-${item.cat}`;
    dot.style.cssText = `left:${x}px;top:${y}px;`;
    dot.title = item.label;
    dot.addEventListener('click', () => showRadarDetail(item));
    container.appendChild(dot);
  });
})();

function showRadarDetail(item) {
  const card = document.getElementById('radar-detail');
  const catLabels = { framework: 'Framework', event: 'Event', window: 'Window' };
  const catColors = { framework: '#3b82f6', event: '#22c55e', window: '#f59e0b' };
  document.getElementById('rdc-cat').textContent = catLabels[item.cat];
  document.getElementById('rdc-cat').style.color = catColors[item.cat];
  document.getElementById('rdc-title').textContent = item.label;
  document.getElementById('rdc-date').textContent = item.date;
  document.getElementById('rdc-desc').textContent = item.desc;
  card.classList.add('visible');
}

function closeRadarDetail() {
  document.getElementById('radar-detail').classList.remove('visible');
}
