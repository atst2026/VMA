<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD Calendar — Planning Calendar with Prep Markers</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:#F7F9FC;color:#1F1F1F;min-height:100vh}
.wm-head{padding:24px 32px 15px;background:radial-gradient(ellipse 86% 165% at 50% -16%,#a4c6e8 0%,#bdd4ea 16%,#d4e2ef 34%,#e9f0f7 58%,#f4f8fc 78%,rgba(247,249,252,0) 100%)}
.container{max-width:1240px;margin:0 auto;padding:24px 32px}
.month-nav{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.month-nav h2{font-size:22px;font-weight:700;color:#385578;min-width:200px}
.month-nav button{width:36px;height:36px;border-radius:50%;border:1px solid rgba(60,64,67,.12);background:#fff;cursor:pointer;display:grid;place-items:center;font-size:18px;color:#385578;transition:all .15s}
.month-nav button:hover{background:#e9f0f7;border-color:#385578}
.legend{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:16px;font-size:13px;color:#555}
.legend span{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block}
.legend-dot.dashed{border:2px dashed;background:transparent!important}
.cal-grid{background:#fff;border-radius:12px;border:1px solid rgba(60,64,67,.12);overflow:hidden;box-shadow:0 1px 3px rgba(60,64,67,.06)}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-bottom:1px solid rgba(60,64,67,.12)}
.cal-header div{padding:10px 8px;font-size:12px;font-weight:600;color:#385578;text-transform:uppercase;letter-spacing:.5px;text-align:center}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.day-cell{min-height:100px;border-right:1px solid rgba(60,64,67,.06);border-bottom:1px solid rgba(60,64,67,.06);padding:4px;position:relative;transition:background .15s}
.day-cell:nth-child(7n){border-right:none}
.day-cell:hover{background:#f4f8fc}
.day-cell.other-month{background:#fafbfd}
.day-cell.other-month .day-num{color:#bbb}
.day-cell.today .day-num{background:#385578;color:#fff;border-radius:50%;width:26px;height:26px;display:grid;place-items:center}
.day-num{font-size:13px;font-weight:600;color:#1F1F1F;padding:2px 4px;display:inline-block;margin-bottom:2px}
.bar-slot{height:16px;margin:1px 0;font-size:9px;line-height:16px;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;font-weight:500}
.bar-slot.framework{background:#4285F4}
.bar-slot.event-bar{background:#1E7A41}
.bar-slot.mandate{background:#B98235}
.bar-slot.bar-start{border-radius:3px 0 0 3px}
.bar-slot.bar-mid{border-radius:0}
.bar-slot.bar-end{border-radius:0 3px 3px 0}
.bar-slot.bar-full{border-radius:3px}
.prep-marker{height:16px;margin:1px 0;font-size:8px;line-height:16px;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;border-radius:3px;border:1.5px dashed}
.prep-marker.prep-framework{border-color:#4285F4;color:#4285F4;background:rgba(66,133,244,.06)}
.prep-marker.prep-event{border-color:#1E7A41;color:#1E7A41;background:rgba(30,122,65,.06)}
.prep-marker.prep-mandate{border-color:#B98235;color:#B98235;background:rgba(185,130,53,.06)}
.event-dot-row{display:flex;align-items:center;gap:3px;margin-top:1px}
.event-dot{width:7px;height:7px;border-radius:50%;background:#1E7A41;flex-shrink:0}
.event-label{font-size:9px;color:#1E7A41;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.coming-up-strip{margin-top:24px;background:#fff;border-radius:12px;border:1px solid rgba(60,64,67,.12);padding:20px 24px;box-shadow:0 1px 3px rgba(60,64,67,.06)}
.coming-up-strip h3{font-size:15px;font-weight:700;color:#385578;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.coming-up-items{display:flex;gap:16px;flex-wrap:wrap}
.coming-up-card{flex:1;min-width:250px;padding:14px 16px;border-radius:10px;border:1px solid rgba(60,64,67,.08);background:#f8fafc;position:relative;overflow:hidden}
.coming-up-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.coming-up-card.cu-framework::before{background:#4285F4}
.coming-up-card.cu-event::before{background:#1E7A41}
.coming-up-card.cu-mandate::before{background:#B98235}
.coming-up-card h4{font-size:13px;font-weight:700;color:#1F1F1F;margin-bottom:4px}
.coming-up-card p{font-size:12px;color:#666;line-height:1.4;margin:0}
.countdown-chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-top:6px}
.countdown-chip.urgent{background:#fce8e8;color:#c0392b}
.countdown-chip.soon{background:#fff3e0;color:#B98235}
.countdown-chip.later{background:#e8f5e9;color:#1E7A41}
</style>
</head>
<body>
<div class="wm-head">
  <div style="display:flex;align-items:center;gap:13px;max-width:1240px;margin:0 auto">
    <span style="display:grid;place-items:center;color:#1F1F1F"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg></span>
    <span style="font-size:30px;font-weight:700;letter-spacing:-.3px">BD Calendar</span>
  </div>
</div>
<div class="container">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <h2 id="monthTitle"></h2>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="legend">
    <span><span class="legend-dot" style="background:#4285F4"></span> Frameworks</span>
    <span><span class="legend-dot" style="background:#1E7A41"></span> Events</span>
    <span><span class="legend-dot" style="background:#B98235"></span> Mandate Windows</span>
    <span><span class="legend-dot dashed" style="border-color:#888"></span> AI Prep Marker (start preparing)</span>
  </div>
  <div class="cal-grid">
    <div class="cal-header">
      <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
    </div>
    <div class="cal-body" id="calBody"></div>
  </div>
  <div class="coming-up-strip">
    <h3>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#385578" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Coming Up
    </h3>
    <div class="coming-up-items" id="comingUp"></div>
  </div>
</div>

<script>
const TODAY = new Date(2026, 5, 6);
let currentYear = 2026, currentMonth = 5;

const FRAMEWORKS = [
  {name:'NHS Workforce Alliance — Exec Search & Interim', start:new Date(2026,0,1), end:new Date(2026,11,31), buyer:'NHS Workforce Alliance (via CCS)', detail:'Health sector senior leadership', type:'framework'},
  {name:'Nuclear Decommissioning Authority — Shared Services Lot 6', start:new Date(2026,9,1), end:new Date(2027,2,31), buyer:'NDA', detail:'Senior/specialist roles', type:'framework'},
  {name:'Devolved Government — Executive Search', start:new Date(2027,0,1), end:new Date(2027,8,30), buyer:'Scottish/Welsh/NI Governments', detail:'Senior public-appointment & comms', type:'framework'},
  {name:'Crown Commercial Service — Executive Search 3', start:new Date(2027,5,1), end:new Date(2028,4,31), buyer:'CCS', detail:'Senior public-sector comms leadership', type:'framework'}
];
const EVENTS = [
  {name:'CIPR Excellence Awards', date:new Date(2026,6,1), location:'London', category:'External', detail:'Senior comms judges + finalists', type:'event'},
  {name:'Internal Comms & Engagement Live', date:new Date(2026,6,8), location:'The Brewery, London', category:'Internal', detail:'Head of IC / Director of IC delegates', type:'event'},
  {name:'IoIC Awards', date:new Date(2026,8,17), location:'London', category:'Internal', detail:'Premier UK IC awards', type:'event'},
  {name:'ICCO Global Summit', date:new Date(2026,10,11), location:'Milan', category:'External', detail:'Consultancy CEOs + in-house clients', type:'event'},
  {name:'CIPR Annual Conference', date:new Date(2026,10,18), location:'London', category:'External', detail:'Tier-1 comms leaders', type:'event'},
  {name:'European Excellence Awards', date:new Date(2026,11,11), location:'Europe', category:'Mixed', detail:'UK + EU CCO attendance', type:'event'}
];
const MANDATES = [
  {name:'FCA Consumer Duty — board-report ramp', start:new Date(2026,3,1), end:new Date(2026,6,31), role:'Head of Regulatory Comms', daysLeft:56, confidence:'High', sector:'Financial Services', type:'mandate'},
  {name:'UK SRS — sustainability-reporting build-up', start:new Date(2026,0,1), end:new Date(2026,11,31), role:'Head of Sustainability Comms', daysLeft:209, confidence:'Medium', sector:'Cross-sector', type:'mandate'},
  {name:'Machinery-of-government — post-SR reshuffle', start:new Date(2026,3,1), end:new Date(2026,11,31), role:'Director of Communications (GCS)', daysLeft:209, confidence:'Medium', sector:'Public Sector', type:'mandate'},
  {name:'UK annual-report & AGM season', start:new Date(2026,1,1), end:new Date(2026,5,30), role:'Head of IR Communications', daysLeft:25, confidence:'High', sector:'Cross-sector', type:'mandate'},
  {name:'Gender Pay Gap — reporting & scrutiny', start:new Date(2026,2,1), end:new Date(2026,5,30), role:'Head of Internal/DEI Comms', daysLeft:25, confidence:'High', sector:'Cross-sector', type:'mandate'},
  {name:'NHS operational-planning round', start:new Date(2026,0,1), end:new Date(2026,4,31), role:'Director of Comms — NHS', daysLeft:-1, confidence:'Medium', sector:'Public Sector', closed:true, type:'mandate'},
  {name:'Higher-Education clearing & new-intake', start:new Date(2026,5,15), end:new Date(2026,8,30), role:'Head of Comms/Student Recruitment', daysLeft:117, confidence:'Medium', sector:'Public Sector', type:'mandate'}
];

function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function fmtDate(d){const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear()}

// Generate prep markers: 4-6 weeks before events and mandate deadlines
function getPrepMarkers() {
  const markers = [];
  EVENTS.forEach(e => {
    const prepStart = new Date(e.date); prepStart.setDate(prepStart.getDate() - 35);
    const prepEnd = new Date(e.date); prepEnd.setDate(prepEnd.getDate() - 28);
    markers.push({name:'Prep: '+e.name, prepStart, prepEnd, targetDate:e.date, cls:'prep-event', type:'event'});
  });
  MANDATES.forEach(m => {
    if(m.closed) return;
    const prepStart = new Date(m.end); prepStart.setDate(prepStart.getDate() - 42);
    const prepEnd = new Date(m.end); prepEnd.setDate(prepEnd.getDate() - 28);
    if(prepEnd > TODAY) {
      markers.push({name:'Prep: '+m.name, prepStart, prepEnd, targetDate:m.end, cls:'prep-mandate', type:'mandate'});
    }
  });
  FRAMEWORKS.forEach(f => {
    const prepStart = new Date(f.start); prepStart.setDate(prepStart.getDate() - 42);
    const prepEnd = new Date(f.start); prepEnd.setDate(prepEnd.getDate() - 28);
    markers.push({name:'Prep: '+f.name, prepStart, prepEnd, targetDate:f.start, cls:'prep-framework', type:'framework'});
  });
  return markers;
}

function renderCalendar() {
  const year = currentYear, month = currentMonth;
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('monthTitle').textContent = monthNames[month] + ' ' + year;

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const startDate = new Date(firstDay);
  startDate.setDate(startDate.getDate() - startDow);
  const totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;
  const endDateGrid = new Date(startDate.getTime() + (totalCells-1)*86400000);

  const calBody = document.getElementById('calBody');
  calBody.innerHTML = '';

  // Build bars
  const allBars = [];
  FRAMEWORKS.forEach(f => {
    const bs = new Date(Math.max(f.start, startDate));
    const be = new Date(Math.min(f.end, endDateGrid));
    if(bs<=be) allBars.push({...f,barStart:bs,barEnd:be,cls:'framework'});
  });
  MANDATES.forEach(m => {
    if(m.closed) return;
    const bs = new Date(Math.max(m.start, startDate));
    const be = new Date(Math.min(m.end, endDateGrid));
    if(bs<=be) allBars.push({...m,barStart:bs,barEnd:be,cls:'mandate'});
  });

  const prepMarkers = getPrepMarkers();

  for(let i = 0; i < totalCells; i++) {
    const cellDate = new Date(startDate);
    cellDate.setDate(cellDate.getDate() + i);
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    if(cellDate.getMonth() !== month) cell.classList.add('other-month');
    if(sameDay(cellDate, TODAY)) cell.classList.add('today');

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = cellDate.getDate();
    cell.appendChild(num);

    // Bars (max 2)
    let shown = 0;
    allBars.forEach(bar => {
      if(cellDate >= bar.barStart && cellDate <= bar.barEnd && shown < 2) {
        const el = document.createElement('div');
        el.className = 'bar-slot ' + bar.cls;
        const isStart = sameDay(cellDate, bar.barStart) || i%7===0;
        const isEnd = sameDay(cellDate, bar.barEnd) || i%7===6;
        if(isStart&&isEnd) el.classList.add('bar-full');
        else if(isStart) el.classList.add('bar-start');
        else if(isEnd) el.classList.add('bar-end');
        else el.classList.add('bar-mid');
        if(isStart) el.textContent = bar.name.length > 20 ? bar.name.substring(0,18)+'...' : bar.name;
        cell.appendChild(el);
        shown++;
      }
    });

    // Prep markers
    prepMarkers.forEach(pm => {
      if(cellDate >= pm.prepStart && cellDate <= pm.prepEnd) {
        if(sameDay(cellDate, pm.prepStart)) {
          const el = document.createElement('div');
          el.className = 'prep-marker ' + pm.cls;
          el.textContent = pm.name.length > 20 ? pm.name.substring(0,18)+'...' : pm.name;
          el.title = pm.name + ' — Target: ' + fmtDate(pm.targetDate);
          cell.appendChild(el);
        }
      }
    });

    // Events
    EVENTS.forEach(e => {
      if(sameDay(cellDate, e.date)) {
        const row = document.createElement('div');
        row.className = 'event-dot-row';
        const dot = document.createElement('span');
        dot.className = 'event-dot';
        row.appendChild(dot);
        const lbl = document.createElement('span');
        lbl.className = 'event-label';
        lbl.textContent = e.name.length > 16 ? e.name.substring(0,14)+'...' : e.name;
        row.appendChild(lbl);
        cell.appendChild(row);
      }
    });

    calBody.appendChild(cell);
  }

  renderComingUp();
}

function renderComingUp() {
  const upcoming = [];
  EVENTS.forEach(e => { if(e.date > TODAY) upcoming.push({name:e.name, date:e.date, type:'event', detail:e.location}); });
  MANDATES.forEach(m => { if(!m.closed && m.end > TODAY) upcoming.push({name:m.name, date:m.end, type:'mandate', detail:m.role}); });
  FRAMEWORKS.forEach(f => { if(f.start > TODAY) upcoming.push({name:f.name, date:f.start, type:'framework', detail:f.buyer}); });
  upcoming.sort((a,b) => a.date - b.date);

  const container = document.getElementById('comingUp');
  container.innerHTML = upcoming.slice(0,3).map(item => {
    const days = Math.ceil((item.date - TODAY) / 86400000);
    let chipCls = 'later';
    if(days <= 14) chipCls = 'urgent';
    else if(days <= 45) chipCls = 'soon';
    const cuCls = item.type === 'event' ? 'cu-event' : item.type === 'mandate' ? 'cu-mandate' : 'cu-framework';
    return `<div class="coming-up-card ${cuCls}">
      <h4>${item.name}</h4>
      <p>${item.detail}</p>
      <span class="countdown-chip ${chipCls}">${days} days away</span>
    </div>`;
  }).join('');
}

function changeMonth(dir) {
  currentMonth += dir;
  if(currentMonth > 11){currentMonth=0;currentYear++}
  if(currentMonth < 0){currentMonth=11;currentYear--}
  renderCalendar();
}

renderCalendar();
</script>
</body>
</html>
