# Render Blueprint — auto-configures the dashboard when this repo is connected.
# https://render.com/docs/blueprint-spec
#
# ONE service, BOTH desks. The dashboard serves Comms and Marketing from the
# same instance: the landing page's two pills go to /comms and /marketing,
# and the desk is carried per-request (a cookie) so one process renders
# either desk and its APIs. No second service to deploy.
#
# Each desk still keeps its own state namespace (comms -> tool/state/,
# marketing -> tool/state/marketing/) and its own nightly brief workflow
# (.github/workflows/morning-brief.yml and marketing-brief.yml), which
# publish each desk's data to the dashboard-state branch / Actions artifacts.

services:
  - type: web
    name: vma-dashboard
    runtime: python
    plan: free
    region: frankfurt        # closest EU region; the team's in the UK
    branch: main
    rootDir: .
    # requirements.txt is the SLIM web set. The pitch-pack PDF/logo stack
    # (weasyprint, cairosvg, pdfplumber, pillow) lives in
    # requirements-pitchpack.txt — the dashboard process never imports it
    # (only the pitch-pack GitHub Action does, and that workflow installs it
    # itself). Keeping it out of the web build keeps Render's slow free-tier
    # builds fast and reliable.
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 1 -t 60 -b 0.0.0.0:$PORT tool.dashboard:app"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PYTHONPATH
        value: "."
      # Default desk for a request with no desk cookie (e.g. Sara's existing
      # /dashboard bookmark). The /comms and /marketing pills override it.
      - key: VMA_PROFILE
        value: comms
      - key: GITHUB_OWNER
        value: atst2026
      - key: GITHUB_REPO
        value: VMA
      # Set in the Render dashboard (NOT in this file) so secrets don't end
      # up in git.
      - key: GITHUB_TOKEN
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
